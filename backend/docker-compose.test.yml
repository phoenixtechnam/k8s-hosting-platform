services:
  postgres-test:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: hosting_platform_test
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d hosting_platform_test"]
      interval: 5s
      timeout: 3s
      retries: 10
