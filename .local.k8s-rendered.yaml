apiVersion: v1
data:
  500.html: |
    <!doctype html><html><head><meta charset="utf-8"><title>Error</title></head>
    <body><h1>Internal Server Error</h1><p>An unexpected error occurred. Please try again later.</p></body></html>
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;

      # Generic /{status}.html — the default Traefik query path. Falls
      # back to a single template that interpolates the status code via
      # the X-Traefik-Status header (Traefik sends the original upstream
      # status as a request header when forwarding to the errors
      # backend). The template is the same regardless of code; operators
      # who want per-code branded pages override this file via a
      # platform-system ConfigMap overlay.
      location ~ "^/\d{3}\.html$" {
        default_type text/html;
        return 200 '<!doctype html><html><head><meta charset="utf-8"><title>Error</title></head><body><h1>Service unavailable</h1><p>Please try again later.</p></body></html>';
      }

      # Any other path — operator-supplied customErrorPath. Serves the
      # static asset from /usr/share/nginx/html/. Operators ship their
      # branded pages via the tenant-errors-content ConfigMap.
      location / {
        try_files $uri $uri/ /500.html;
      }

      # Health check for readiness/liveness probes.
      location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
      }
    }
