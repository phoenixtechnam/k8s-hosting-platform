apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: job-gc
    app.kubernetes.io/component: cluster-maintenance
    app.kubernetes.io/part-of: hosting-platform
  name: job-gc
  namespace: platform
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: job-gc
            app.kubernetes.io/part-of: hosting-platform
        spec:
          containers:
          - args:
            - |
              set -euo pipefail
              # IMPORTANT: this file is rendered by Flux Kustomization
              # with `postBuild.substituteFrom` enabled, which expands
              # every `${VAR}` against `platform-cluster-config`. Bash    # ci-flux-escape: ignore
              # variable references therefore MUST be written as
              # `$${VAR}` here so a single `${VAR}` survives Flux into  # ci-flux-escape: ignore
              # the running pod. Bare `$VAR` (no braces) is safe.       # ci-flux-escape: ignore
              #
              # Busybox `date` (alpine/k8s) does not understand GNU's
              # `-d "N days ago"`, so we use POSIX arithmetic.
              NOW=$(date -u +%s)
              CUTOFF=$((NOW - JOB_GC_MAX_AGE_DAYS * 86400))
              DRY="$${JOB_GC_DRY_RUN:-false}"
              EXCLUDE="$${JOB_GC_EXCLUDE_NS_REGEX:-^$$}"
              echo "[job-gc] cutoff=$${CUTOFF} ($${JOB_GC_MAX_AGE_DAYS}d) dryRun=$${DRY} excludeNs=$${EXCLUDE}"
              # Select Jobs that are completed OR failed AND whose
              # terminal condition is older than the cutoff. A Job
              # without a completionTime but with a failed condition
              # in lastTransitionTime is also handled. Namespaces
              # matching JOB_GC_EXCLUDE_NS_REGEX are skipped.
              TARGETS=$(
                kubectl get jobs -A -o json |
                jq -r --argjson cutoff "$CUTOFF" --arg exclude "$EXCLUDE" '
                  .items[]
                  | . as $j
                  | select(($j.metadata.namespace | test($exclude)) | not)
                  | (
                      ($j.status.completionTime // null) as $done
                      | ($j.status.conditions // []
                         | map(select(.type=="Failed" and .status=="True"))
                         | .[0].lastTransitionTime // null) as $failed
                      | ($done // $failed) as $t
                      | select($t != null)
                      | select(($t | fromdateiso8601) < $cutoff)
                      | "\($j.metadata.namespace)\t\($j.metadata.name)\t\($t)"
                    )
                '
              )
              if [ -z "$TARGETS" ]; then
                echo "[job-gc] no completed Jobs older than $${JOB_GC_MAX_AGE_DAYS}d"
              else
                COUNT=0
                # Process substitution (not pipe) so $COUNT survives — a
                # pipeline puts the while in a subshell and increments
                # are discarded.
                while IFS=$'\t' read -r ns name done_at; do
                  [ -z "$ns" ] && continue
                  if [ "$DRY" = "true" ]; then
                    echo "[job-gc] would delete: $${ns}/$${name} (terminal at $${done_at})"
                  else
                    echo "[job-gc] deleting: $${ns}/$${name} (terminal at $${done_at})"
                    # --wait=false so a stuck finalizer doesn't pin
                    # the GC pod; the apiserver schedules the delete.
                    kubectl -n "$ns" delete job "$name" --wait=false || \
                      echo "[job-gc] warn: delete failed for $${ns}/$${name}"
                  fi
                  COUNT=$((COUNT+1))
                done < <(printf '%s\n' "$TARGETS")
                echo "[job-gc] processed $${COUNT} Jobs"
              fi
              echo "[job-gc] done"
            command:
            - /bin/bash
            - -c
            env:
            - name: JOB_GC_MAX_AGE_DAYS
              value: "7"
            - name: JOB_GC_DRY_RUN
              value: "false"
            - name: JOB_GC_EXCLUDE_NS_REGEX
              value: ^(kube-system|kube-public)$
            image: alpine/k8s:1.33.3
            imagePullPolicy: IfNotPresent
            name: gc
            resources:
              limits:
                cpu: 200m
                memory: 256Mi
              requests:
                cpu: 50m
                memory: 64Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
          restartPolicy: OnFailure
          securityContext:
            runAsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
            seccompProfile:
              type: RuntimeDefault
          serviceAccountName: job-gc
      ttlSecondsAfterFinished: 3600
  schedule: 13 3 * * *
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
