apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app: platform-update-checker
    app.kubernetes.io/part-of: hosting-platform
  name: platform-update-checker
  namespace: platform
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 1
      template:
        spec:
          containers:
          - command:
            - /bin/sh
            - -c
            - |
              # Query the platform API for pending updates using internal secret
              RESPONSE=$(wget -qO- \
                --header="X-Internal-Secret: $${PLATFORM_INTERNAL_SECRET}" \
                "http://platform-api.platform.svc.cluster.local:3000/api/v1/internal/platform/version" \
                2>/dev/null || echo '{}')

              PENDING=$(echo "$RESPONSE" | jq -r '.data.pendingVersion // empty')

              if [ -z "$PENDING" ]; then
                echo "No pending update. Exiting."
                exit 0
              fi

              echo "Pending update detected: $${PENDING}"

              # Unsuspend the production Kustomization (if suspended)
              kubectl patch kustomization hosting-platform-production \
                -n flux-system \
                --type=merge \
                -p '{"spec":{"suspend":false}}'

              # Trigger reconciliation
              kubectl annotate --overwrite kustomization/hosting-platform-production \
                -n flux-system \
                reconcile.fluxcd.io/requestedAt="$(date +%s)"

              echo "Reconciliation triggered for version $${PENDING}."

              # Re-suspend after triggering (Flux will complete the current reconcile)
              sleep 10
              kubectl patch kustomization hosting-platform-production \
                -n flux-system \
                --type=merge \
                -p '{"spec":{"suspend":true}}'

              echo "Production Kustomization re-suspended."
            env:
            - name: PLATFORM_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  key: internal-secret
                  name: platform-secrets
            image: alpine/k8s:1.33.3
            name: checker
            resources:
              limits:
                cpu: 100m
                memory: 64Mi
              requests:
                cpu: 10m
                memory: 32Mi
          restartPolicy: Never
          serviceAccountName: platform-update-checker
  schedule: '*/5 * * * *'
  successfulJobsHistoryLimit: 1
  suspend: true
---
apiVersion: batch/v1
kind: CronJob
metadata:
  labels:
    app.kubernetes.io/component: ingress-external-ips
    app.kubernetes.io/part-of: hosting-platform
  name: ingress-external-ips-reconciler
  namespace: traefik
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/component: ingress-external-ips
            app.kubernetes.io/part-of: hosting-platform
        spec:
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - preference:
                  matchExpressions:
                  - key: platform.phoenix-host.net/node-role
                    operator: In
                    values:
                    - server
                weight: 1
          containers:
          - command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Read every Ready Node's ExternalIP. kubectl jsonpath
              # can't nest filters, so list all nodes and pair-up
              # the ExternalIP with the Ready-condition status via
              # custom-columns + post-filter. NotReady nodes (Ready
              # condition False/Unknown) are dropped so we never
              # advertise an IP that won't accept connections.
              IPS=$(kubectl get nodes -o custom-columns='NAME:.metadata.name,READY:.status.conditions[?(@.type=="Ready")].status,EXTIP:.status.addresses[?(@.type=="ExternalIP")].address' --no-headers \
                | awk '$2=="True" && $3 ~ /^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$/ {print $3}' \
                | sort -u)
              if [ -z "$IPS" ]; then
                echo "no Ready nodes with ExternalIP — leaving Service untouched" >&2
                exit 0
              fi
              # Build a JSON array of IPs without depending on jq.
              IP_LIST=$(echo "$IPS" | awk 'BEGIN{ORS=""} {if(NR>1) printf ","; printf "\""$0"\""}')
              echo "Ready ExternalIPs: $(echo "$IPS" | tr '\n' ' ')"
              PATCH="{\"spec\":{\"externalIPs\":[$${IP_LIST}]}}"
              CURRENT=$(kubectl get svc -n traefik traefik \
                -o jsonpath='{.spec.externalIPs}')
              echo "current: $${CURRENT}"
              echo "desired: [$${IP_LIST}]"
              kubectl patch svc -n traefik traefik \
                --type=merge --patch "$PATCH"
              echo "ok"
            image: alpine/k8s:1.33.4
            imagePullPolicy: IfNotPresent
            name: reconciler
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 10m
                memory: 32Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1001
              seccompProfile:
                type: RuntimeDefault
          restartPolicy: OnFailure
          serviceAccountName: ingress-external-ips-reconciler
          tolerations:
          - effect: NoSchedule
            key: platform.phoenix-host.net/server-only
            operator: Equal
            value: "true"
          - effect: NoSchedule
            key: node-role.kubernetes.io/control-plane
            operator: Exists
      ttlSecondsAfterFinished: 600
  schedule: '*/5 * * * *'
  successfulJobsHistoryLimit: 1
