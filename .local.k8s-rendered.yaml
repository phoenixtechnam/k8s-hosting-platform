apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    app.kubernetes.io/component: cluster-network
    app.kubernetes.io/part-of: hosting-platform
  name: clusterpendingpeers.networking.platform.phoenix-host.net
spec:
  group: networking.platform.phoenix-host.net
  names:
    categories:
    - hosting-platform
    kind: ClusterPendingPeer
    plural: clusterpendingpeers
    shortNames:
    - cpp
    - pendingpeer
    singular: clusterpendingpeer
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.ip
      name: IP
      type: string
    - jsonPath: .spec.role
      name: Role
      type: string
    - jsonPath: .spec.ttlSeconds
      name: TTL
      priority: 1
      type: integer
    - jsonPath: .status.expiresAt
      name: Expires
      type: string
    - jsonPath: .status.claimedAt
      name: Claimed
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              addedBy:
                maxLength: 200
                type: string
              hostname:
                description: Operator-supplied label. Not used by the reconciler —
                  the actual k8s node name is determined by k3s at join time.
                maxLength: 253
                type: string
              ip:
                description: |
                  Bare IPv4 or IPv6 address of the node about to bootstrap. The
                  reconciler implies /32 or /128 when adding to nft. The pattern
                  is a coarse first filter; structurally-invalid IPv6 strings
                  like ":::" or trailing-colon forms can pass admission and
                  will be rejected by the reconciler with a Failed condition.
                  The reconciler-side validation uses Go's net/netip which is
                  authoritative.
                maxLength: 64
                pattern: ^(([0-9]{1,3}\.){3}[0-9]{1,3}|[0-9a-fA-F:]+)$
                type: string
              role:
                description: UI hint for the bootstrap.sh --join-as flag. Not used
                  by the reconciler.
                enum:
                - server
                - worker
                type: string
              ttlSeconds:
                default: 1800
                description: Auto-cleanup TTL in seconds since creationTimestamp.
                  Reconciler removes from nft and deletes CR after expiry.
                maximum: 86400
                minimum: 60
                type: integer
            required:
            - ip
            - role
            type: object
          status:
            properties:
              claimedAt:
                description: Set by reconciler when the matching kube-API Node InternalIP
                  appears. Once set, the CR is safe to delete.
                format: date-time
                type: string
              conditions:
                description: Standard k8s conditions list. Reason discriminates Pending/TTLExpired/Claimed/Failed
                  lifecycle states.
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 1024
                      type: string
                    reason:
                      maxLength: 128
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 64
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              expiresAt:
                description: creationTimestamp + ttlSeconds. Reconciler enforces.
                format: date-time
                type: string
              family:
                enum:
                - v4
                - v6
                type: string
              normalizedIp:
                description: /32 or /128 form added to the nft cluster_peers set (union
                  with Node InternalIPs); reconciler-written.
                maxLength: 64
                type: string
              observedGeneration:
                description: metadata.generation the reconciler last observed; clients
                  use this to detect stale status.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    app.kubernetes.io/component: cluster-network
    app.kubernetes.io/part-of: hosting-platform
  name: clustertrustedranges.networking.platform.phoenix-host.net
spec:
  group: networking.platform.phoenix-host.net
  names:
    categories:
    - hosting-platform
    kind: ClusterTrustedRange
    plural: clustertrustedranges
    shortNames:
    - ctr
    - trustedrange
    singular: clustertrustedrange
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cidr
      name: CIDR
      type: string
    - jsonPath: .status.family
      name: Family
      type: string
    - jsonPath: .spec.description
      name: Description
      priority: 1
      type: string
    - jsonPath: .status.lastSyncedAt
      name: Synced
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          spec:
            properties:
              addedBy:
                description: Subject (user email or system actor) that created this
                  entry. Set by the platform-api on POST.
                maxLength: 200
                type: string
              cidr:
                description: |
                  Source range to trust. Accepts:
                    - bare IPv4 (1.2.3.4)            → /32 implied
                    - IPv4 CIDR (10.0.0.0/16)
                    - bare IPv6 (2001:db8::1)        → /128 implied
                    - IPv6 CIDR (fd00::/8)
                  The pattern is a coarse first filter; the
                  firewall-reconciler does authoritative IP/CIDR
                  validation via Go's net/netip and writes a Failed
                  condition on bad input. The IPv4 prefix is bounded
                  0..32 and the IPv6 prefix is bounded 0..128 by
                  the regex itself, so /33 and /129 are rejected at
                  admission time.
                maxLength: 64
                pattern: ^(([0-9]{1,3}\.){3}[0-9]{1,3}(/([0-9]|[12][0-9]|3[0-2]))?|[0-9a-fA-F:]+(/([0-9]|[1-9][0-9]|1[01][0-9]|12[0-8]))?)$
                type: string
                x-kubernetes-validations:
                - message: CIDR /0 (allow-all) is not permitted; pick a specific prefix.
                  rule: '!self.endsWith(''/0'')'
              description:
                description: Operator-readable purpose. e.g. "NYC office VPN", "Prometheus
                  scraper", "Hetzner private LAN".
                maxLength: 200
                type: string
            required:
            - cidr
            type: object
          status:
            properties:
              conditions:
                description: Standard k8s conditions list. Type is the unique key.
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 1024
                      type: string
                    reason:
                      maxLength: 128
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 64
                      type: string
                  required:
                  - type
                  - status
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              family:
                enum:
                - v4
                - v6
                type: string
              lastSyncedAt:
                description: Most recent reconciler tick that observed this CR.
                format: date-time
                type: string
              normalizedCidr:
                description: CIDR after /32 or /128 implication; reconciler-written.
                maxLength: 64
                type: string
              observedGeneration:
                description: metadata.generation the reconciler last observed; clients
                  use this to detect stale status.
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
