apiVersion: v1
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <title>Site temporarily suspended</title>
      <meta name="viewport" content="width=device-width,initial-scale=1" />
      <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0;
               display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { max-width: 560px; padding: 2.5rem; background: #1e293b; border-radius: 12px;
                border: 1px solid #334155; text-align: center; }
        h1 { margin: 0 0 .5rem; font-size: 1.5rem; }
        p { margin: .5rem 0; line-height: 1.55; color: #cbd5e1; }
        .code { font-family: ui-monospace, SFMono-Regular, monospace; color: #60a5fa; font-size: .9rem; }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>Site temporarily suspended</h1>
        <p>This hosting account is currently suspended. The site is not
           reachable until the owner reactivates the subscription.</p>
        <p class="code">status=suspended</p>
      </div>
    </body>
    </html>
  nginx.conf: |
    server {
      listen 80 default_server;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;
      # JSON endpoint for programmatic clients (mobile apps, API callers).
      location = /api/status {
        default_type application/json;
        return 200 '{"status":"suspended","message":"This hosting account is temporarily suspended"}';
      }
      # All other paths serve the static page.
      location / {
        try_files $uri /index.html;
      }
    }
