apiVersion: v1
data:
  config.yaml: |
    # Dex configuration for k8s dev/staging environments
    #
    # Static users for testing:
    #   - admin@k8s-platform.test  / admin  (maps to the platform's default super_admin)
    #   - admin2@k8s-platform.test / admin  (second admin for multi-user testing)
    #   - user@k8s-platform.test   / user   (unprivileged user for OIDC auto-provision testing)
    #   - user2@k8s-platform.test  / user   (second unprivileged user)
    #
    # Static OIDC clients:
    #   - hosting-platform-admin   (admin panel SSO)
    #   - hosting-platform-client  (tenant panel SSO)
    #   - hosting-platform-oauth2-proxy (OAuth2 Proxy session)
    #
    # IMPORTANT: The issuer URL and redirect URIs must be browser-reachable.
    # In dev, Dex is reached at https://dex.k8s-platform.test:2011/dex through
    # the ingress (was formerly http://dind.local:2015 on a NodePort — see
    # k8s/overlays/dev/dex/ingress.yaml for the transition). Production
    # bootstrap.sh --domain <FQDN> regenerates this file with real hostnames.

    issuer: https://dex.k8s-platform.test:2011/dex

    storage:
      type: sqlite3
      config:
        file: /var/dex/dex.db

    web:
      http: 0.0.0.0:5556

    oauth2:
      skipApprovalScreen: true

    staticClients:
      - id: hosting-platform-admin
        name: Hosting Platform Admin
        secret: local-dev-secret-admin
        redirectURIs:
          - http://admin.k8s-platform.test:2010/api/v1/auth/oidc/callback
      - id: hosting-platform-client
        name: Hosting Platform Client
        secret: local-dev-secret-client
        redirectURIs:
          - http://client.k8s-platform.test:2010/api/v1/auth/oidc/callback
      - id: hosting-platform-oauth2-proxy
        name: OAuth2 Proxy
        secret: local-dev-secret-oauth2-proxy
        redirectURIs:
          # Transparent oauth2-proxy: the callback URL is on the PROTECTED
          # domain, not on a shared oauth2 hostname. Each protected panel
          # Ingress routes /oauth2/* to the oauth2-proxy Service. See
          # backend/src/modules/system-settings/ingress-reconciler.ts for
          # the /oauth2 path rule that makes this work.
          - https://admin.k8s-platform.test:2011/oauth2/callback
          - https://tenant.k8s-platform.test:2011/oauth2/callback

    connectors: []

    enablePasswordDB: true

    staticPasswords:
      - email: admin@k8s-platform.test
        # password: "admin"
        hash: "$2a$12$CKIgnUHcoyiGpppJxt.03.O9rcptDVj3sD5K.vbx8VR5D/EcYgdua"
        username: admin
        userID: "00000000-0000-0000-0000-000000000001"
      - email: admin2@k8s-platform.test
        # password: "admin"
        hash: "$2a$12$CKIgnUHcoyiGpppJxt.03.O9rcptDVj3sD5K.vbx8VR5D/EcYgdua"
        username: admin2
        userID: "00000000-0000-0000-0000-000000000002"
      - email: user@k8s-platform.test
        # password: "user"
        hash: "$2a$12$hCtO8LmCEJW7B8UlS3jU7utAoLNHJf6P83ZpuyN6tM8YCnMJSsB5G"
        username: user
        userID: "00000000-0000-0000-0000-000000000003"
      - email: user2@k8s-platform.test
        # password: "user"
        hash: "$2a$12$hCtO8LmCEJW7B8UlS3jU7utAoLNHJf6P83ZpuyN6tM8YCnMJSsB5G"
        username: user2
        userID: "00000000-0000-0000-0000-000000000004"
