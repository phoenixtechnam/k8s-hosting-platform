apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: waf
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/part-of: hosting-platform
  name: crowdsec
  namespace: crowdsec
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crowdsec
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: waf
        app.kubernetes.io/name: crowdsec
        app.kubernetes.io/part-of: hosting-platform
    spec:
      containers:
      - env:
        - name: DISABLE_AGENT
          value: "true"
        - name: LOCAL_API_URL
          value: http://127.0.0.1:8080
        - name: BOUNCER_KEY_traefik
          valueFrom:
            secretKeyRef:
              key: bouncer-key
              name: crowdsec-bouncer-key
        image: docker.io/crowdsecurity/crowdsec:v1.7.0
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /health
            port: lapi
          initialDelaySeconds: 30
          periodSeconds: 30
        name: crowdsec
        ports:
        - containerPort: 8080
          name: lapi
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: lapi
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 50m
            memory: 128Mi
