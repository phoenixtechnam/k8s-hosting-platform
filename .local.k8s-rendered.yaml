apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: oauth2-proxy
  name: oauth2-proxy
  namespace: platform
spec:
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
      - args:
        - --http-address=0.0.0.0:4180
        - --upstream=static://200
        - --email-domain=*
        - --provider=oidc
        - --oidc-issuer-url=https://dex.k8s-platform.test:2011/dex
        - --skip-oidc-discovery=true
        - --login-url=https://dex.k8s-platform.test:2011/dex/auth
        - --redeem-url=http://dex.platform.svc.cluster.local:5556/dex/token
        - --oidc-jwks-url=http://dex.platform.svc.cluster.local:5556/dex/keys
        - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
        - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
        - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
        - --cookie-secure=false
        - --cookie-samesite=lax
        - --cookie-name=_platform_oauth2
        - --redirect-url=$(OAUTH2_PROXY_REDIRECT_URL)
        - --skip-provider-button=true
        - --reverse-proxy=true
        - --set-xauthrequest=true
        - --pass-access-token=true
        - --skip-auth-route=^/api/
        - --skip-auth-route=^/oauth2/
        - --silence-ping-logging=true
        - --insecure-oidc-skip-issuer-verification=true
        envFrom:
        - secretRef:
            name: oauth2-proxy-config
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
        livenessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 5
          periodSeconds: 30
        name: oauth2-proxy
        ports:
        - containerPort: 4180
          name: http
        readinessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
      initContainers:
      - command:
        - sh
        - -c
        - |
          set -eu
          url="$${OIDC_ISSUER_URL%/}/.well-known/openid-configuration"
          echo "polling: $${url}"
          for i in $$(seq 1 60); do
            if curl -fsS -o /dev/null --max-time 8 "$${url}"; then
              echo "OIDC discovery ready (attempt $${i})"
              exit 0
            fi
            echo "waiting for OIDC discovery (cert + dex)... ($${i}/60)"
            sleep 5
          done
          echo "OIDC discovery never succeeded after 5 min — main container would crashloop too" >&2
          exit 1
        envFrom:
        - secretRef:
            name: oauth2-proxy-config
        image: curlimages/curl:8.10.1
        name: wait-for-dex-discovery
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 10m
            memory: 32Mi
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app: oauth2-proxy
        maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
---
