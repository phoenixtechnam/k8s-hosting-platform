# Local staging stack
# Usage: ./scripts/staging.sh up
# Or:    docker compose --env-file .env.staging -f docker-compose.staging.yml up -d --build

services:
  mariadb:
    image: mariadb:10.6
    ports:
      - "${PORT_DB:-2013}:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-staging-root-password}
      MARIADB_DATABASE: ${DB_NAME:-hosting_platform}
      MARIADB_USER: ${DB_USER:-platform}
      MARIADB_PASSWORD: ${DB_PASSWORD:-staging-password}
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${PORT_REDIS:-2014}:6379"
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT_API:-2012}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: debug
      DATABASE_URL: "mysql://${DB_USER:-platform}:${DB_PASSWORD:-staging-password}@mariadb:3306/${DB_NAME:-hosting_platform}"
      JWT_SECRET: ${JWT_SECRET:-staging-jwt-secret-not-for-production-use}
      REDIS_URL: redis://redis:6379
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@platform.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_NAME: ${ADMIN_NAME:-Platform Admin}
      CORS_ORIGINS: "http://${DOCKER_HOST_NAME:-dind.local}:${PORT_ADMIN:-2010},http://${DOCKER_HOST_NAME:-dind.local}:${PORT_CLIENT:-2011}"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/admin/status"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  admin-panel:
    build:
      context: .
      dockerfile: frontend/admin-panel/Dockerfile
      args:
        VITE_API_URL: "http://${DOCKER_HOST_NAME:-dind.local}:${PORT_API:-2012}"
    ports:
      - "${PORT_ADMIN:-2010}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  client-panel:
    build:
      context: .
      dockerfile: frontend/client-panel/Dockerfile
      args:
        VITE_API_URL: "http://${DOCKER_HOST_NAME:-dind.local}:${PORT_API:-2012}"
    ports:
      - "${PORT_CLIENT:-2011}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  mariadb-data:
