# Dex configuration for local development
# This config uses a static user for testing without an external IdP.

issuer: http://dind.local:2015/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

staticClients:
  - id: hosting-platform-admin
    name: Hosting Platform Admin
    secret: local-dev-secret-admin
    redirectURIs:
      - http://dind.local:2012/api/v1/auth/oidc/callback
  - id: hosting-platform-client
    name: Hosting Platform Client
    secret: local-dev-secret-client
    redirectURIs:
      - http://dind.local:2012/api/v1/auth/oidc/callback
  - id: hosting-platform-oauth2-proxy
    name: OAuth2 Proxy
    secret: local-dev-secret-oauth2-proxy
    redirectURIs:
      - http://dind.local:2018/oauth2/callback

connectors: []

enablePasswordDB: true

staticPasswords:
  - email: admin@example.com
    hash: "$2a$12$eeH0FYMB7SNpQVmP0ULLAeUmWX3UILFSuUj/YAVWge4h78bMzHxni"
    # password: "password"
    username: admin
    userID: "00000000-0000-0000-0000-000000000001"
  - email: user@example.com
    hash: "$2a$12$eeH0FYMB7SNpQVmP0ULLAeUmWX3UILFSuUj/YAVWge4h78bMzHxni"
    # password: "password"
    username: testuser
    userID: "00000000-0000-0000-0000-000000000002"
