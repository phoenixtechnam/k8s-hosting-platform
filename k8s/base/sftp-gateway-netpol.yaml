# NetworkPolicy: restrict access to the backend's internal SFTP routes.
# Only the sftp-gateway pod is allowed to reach the backend on port 3000
# for /api/v1/internal/sftp/* endpoints. This is enforced at the network
# layer (Calico/Cilium) in addition to the X-Internal-Auth header check.
#
# NOTE: This policy restricts ingress to the backend pod. Since the backend
# also serves public API traffic, this policy ALLOWS traffic from all pods
# with the app=sftp-gateway label AND from the ingress controller. Adjust
# the ingress-controller selector for your CNI.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow-sftp-gateway
  namespace: platform-system
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    # Allow sftp-gateway → backend (internal SFTP auth)
    - from:
        - podSelector:
            matchLabels:
              app: sftp-gateway
      ports:
        - port: 3000
          protocol: TCP
    # Allow ingress controller → backend (public API)
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
    # Allow health checks from kubelet (no selector = node traffic).
    # Kubelet probes hit the gateway pod's health port (:8080), not
    # backend:3000. A rule without `from` selectors allows all pods,
    # so we scope to port 8080 only.
    - ports:
        - port: 8080
          protocol: TCP
