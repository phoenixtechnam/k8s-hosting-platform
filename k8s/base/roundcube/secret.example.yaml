#
# Example Secret template for Roundcube — DO NOT commit real values.
#
# JWT_AUTH_SECRET MUST equal the platform backend's WEBMAIL_JWT_SECRET
# (the dedicated webmail SSO signing secret). The backend will fall back
# to JWT_SECRET if WEBMAIL_JWT_SECRET is unset, but production MUST set
# WEBMAIL_JWT_SECRET to an independent random value so that a leak of
# the API JWT secret does not enable forged webmail SSO tokens, and vice
# versa. Generate with: openssl rand -hex 32
#
# STALWART_MASTER_USER + STALWART_MASTER_PASSWORD must match the master
# user configured in the Stalwart secret. Note: the password here is the
# CLEARTEXT password (Roundcube needs it for IMAP LOGIN), while Stalwart's
# stalwart-secrets stores the bcrypt hash. Both must come from the same
# source-of-truth in production.
#
# ROUNDCUBEMAIL_DES_KEY is the symmetric key Roundcube uses to encrypt
# session-stored IMAP credentials. Generate with: openssl rand -base64 24
#
apiVersion: v1
kind: Secret
metadata:
  name: roundcube-secrets
  namespace: mail
  labels:
    app: roundcube
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  # Must equal backend WEBMAIL_JWT_SECRET (not JWT_SECRET in production)
  JWT_AUTH_SECRET: "REPLACE_WITH_PLATFORM_WEBMAIL_JWT_SECRET"
  STALWART_MASTER_USER: "master"
  STALWART_MASTER_PASSWORD: "REPLACE_WITH_CLEARTEXT_MASTER_PASSWORD"
  ROUNDCUBEMAIL_DES_KEY: "REPLACE_WITH_24_RANDOM_BYTES_BASE64"
