#
# Example Secret template for Roundcube — DO NOT commit real values.
#
# JWT_AUTH_SECRET MUST equal the platform backend's WEBMAIL_JWT_SECRET
# (the dedicated webmail SSO signing secret). The backend will fall back
# to JWT_SECRET if WEBMAIL_JWT_SECRET is unset, but production MUST set
# WEBMAIL_JWT_SECRET to an independent random value so that a leak of
# the API JWT secret does not enable forged webmail SSO tokens, and vice
# versa. Generate with: openssl rand -hex 32
#
# STALWART_MASTER_USER must be the FQDN form `master@master.local`
# (NOT just `master`). Stalwart 0.16's IMAP master-auth requires the
# FQDN — using the short name returns AUTHENTICATIONFAILED with no
# useful error context. Verified empirically 2026-05-07. The
# master.local synthetic Domain + master Account are provisioned by
# bootstrap.sh's provision_stalwart_master_user().
#
# STALWART_MASTER_PASSWORD must match the master Account's
# credentials.0.secret in Stalwart. Note: the password here is the
# CLEARTEXT password (Roundcube needs it for IMAP LOGIN); Stalwart
# stores the same value as a Password credential. Both must come from
# the same source-of-truth in production. Rotate via the admin panel.
#
# ROUNDCUBEMAIL_DES_KEY is the symmetric key Roundcube uses to encrypt
# session-stored IMAP credentials. Generate with: openssl rand -base64 24
#
apiVersion: v1
kind: Secret
metadata:
  name: roundcube-secrets
  namespace: mail
  labels:
    app: roundcube
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  # Must equal backend WEBMAIL_JWT_SECRET (not JWT_SECRET in production)
  JWT_AUTH_SECRET: "REPLACE_WITH_PLATFORM_WEBMAIL_JWT_SECRET"
  STALWART_MASTER_USER: "master@master.local"
  STALWART_MASTER_PASSWORD: "REPLACE_WITH_CLEARTEXT_MASTER_PASSWORD"
  ROUNDCUBEMAIL_DES_KEY: "REPLACE_WITH_24_RANDOM_BYTES_BASE64"

  # Phase 3.A.5: Postgres session backend (replaces SQLite RWO PVC).
  # Before deploying in prod, create the `roundcube` database and user
  # in your platform Postgres instance:
  #   CREATE ROLE roundcube WITH LOGIN PASSWORD '...';
  #   CREATE DATABASE roundcube OWNER roundcube;
  #   GRANT ALL PRIVILEGES ON DATABASE roundcube TO roundcube;
  # Point Roundcube at the same postgres instance the platform backend
  # uses (typically via a k8s Service or Endpoints bridge in the
  # `mail` namespace).
  ROUNDCUBEMAIL_DB_HOST: "REPLACE_WITH_POSTGRES_HOST"
  ROUNDCUBEMAIL_DB_PORT: "5432"
  ROUNDCUBEMAIL_DB_NAME: "roundcube"
  ROUNDCUBEMAIL_DB_USER: "roundcube"
  ROUNDCUBEMAIL_DB_PASSWORD: "REPLACE_WITH_ROUNDCUBE_DB_PASSWORD"
