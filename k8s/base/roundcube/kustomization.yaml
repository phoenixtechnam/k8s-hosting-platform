apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  # Phase 3.A.5: pvc.yaml removed — Roundcube now uses Postgres for
  # session / contacts / identities and no longer needs a RWO PVC.
  # The /var/roundcube scratch dir is an emptyDir in the deployment.
  - configmap-config.yaml
  - deployment.yaml
  - service.yaml
  # secret.example.yaml is NOT included — operators provide the real
  # Secret per environment via kubectl / sealed-secrets / SOPS.

# Generate the jwt_auth plugin ConfigMap from the PHP source file.
# Kustomize tracks the file content; any change to jwt_auth.php produces
# a new ConfigMap hash, which triggers a Roundcube pod restart on apply.
#
# Note: roundcube-config-extra is a directly-declared ConfigMap in
# configmap-config.yaml (NOT a generator), so overlays cannot use
# configMapGenerator behavior: merge against it. Overlays that need to
# override jwt_auth.inc.php must use a strategic-merge ConfigMap patch
# under `patches:` (see k8s/overlays/staging/roundcube/).
configMapGenerator:
  - name: roundcube-jwt-plugin
    files:
      - jwt_auth.php
  # Platform branding bundle — CSS variable overrides + placeholder
  # SVG wordmark + branding.inc.php config + platform_branding plugin
  # source. Loaded at startup by deployment.yaml's wrapper script:
  #   * branding.css + logo.svg → /var/www/html/branding/ (Apache
  #     serves at /branding/*)
  #   * branding.inc.php        → /var/roundcube/config/ (loaded by
  #     Roundcube entrypoint glob)
  #   * platform_branding.php   → /var/www/html/plugins/platform_branding/
  - name: roundcube-branding
    files:
      - branding.css
      - logo.svg
      - branding.inc.php
      - platform_branding.php

# Disable name suffix hashing for the plugin configmap so the deployment
# can reference it by stable name.
generatorOptions:
  disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/part-of: hosting-platform
      app.kubernetes.io/component: webmail
