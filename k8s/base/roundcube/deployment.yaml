apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: mail
  labels:
    app: roundcube
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  replicas: 1
  strategy:
    # Phase 3.A.5: RollingUpdate is now safe because session state
    # lives in the shared Postgres database, not on a RWO PVC.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: webmail
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: roundcube
          # Phase 3.A.4: pinned by sha256 digest so security patches
          # published under the same mutable tag don't silently change
          # the running image. Bump this when:
          #   1. An upstream release fixes a CVE we care about
          #   2. We want a new feature
          # Get the current digest:
          #   docker pull roundcube/roundcubemail:1.6.10-apache
          #   docker inspect --format='{{index .RepoDigests 0}}' roundcube/roundcubemail:1.6.10-apache
          image: roundcube/roundcubemail@sha256:6e98656e6a6f27ab827a727b68010622186d369f4527186a06f306136c924bdb
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            # The official roundcube image's apache prefork MPM needs
            # SETUID + SETGID to drop privileges from root to www-data
            # after binding port 80 (NET_BIND_SERVICE). Dropping ALL
            # caps breaks the pod (setgid fails, error spam in logs).
            # We drop the rest but keep the three apache needs.
            # Phase 4+: pre-bake an image that runs fully as www-data
            # so we can drop these too.
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
                - SETUID
                - SETGID
                - CHOWN
                - DAC_OVERRIDE
          # Custom command: run the original entrypoint, then asynchronously
          # install the jwt_auth plugin once /var/www/html is populated. The
          # plugin must exist before any request hits the login form.
          command:
            - /bin/sh
            - -c
            - |
              set -e
              (
                while [ ! -f /var/www/html/index.php ]; do sleep 0.5; done
                mkdir -p /var/www/html/plugins/jwt_auth
                cp -f /jwt-plugin/jwt_auth.php /var/www/html/plugins/jwt_auth/jwt_auth.php
                chown -R www-data:www-data /var/www/html/plugins/jwt_auth 2>/dev/null || true
                echo "[jwt_auth] plugin installed"
              ) &
              exec /docker-entrypoint.sh apache2-foreground
          env:
            # Stalwart connection details (IMAPS and submission, both go to
            # the same in-cluster service in the mail namespace)
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://stalwart-mail.mail.svc.cluster.local"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "ssl://stalwart-mail.mail.svc.cluster.local"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "465"
            # Phase 3.A.5: Postgres backend for Roundcube session /
            # contacts / identities / cache. Replaces the old SQLite
            # on RWO PVC, which blocked RollingUpdate deploys.
            # The `roundcube` database and user are created by the
            # postgres initdb script in scripts/postgres-initdb/
            # (dev) or by operator bootstrap (prod).
            - name: ROUNDCUBEMAIL_DB_TYPE
              value: "pgsql"
            - name: ROUNDCUBEMAIL_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: ROUNDCUBEMAIL_DB_HOST
            - name: ROUNDCUBEMAIL_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: ROUNDCUBEMAIL_DB_PORT
            - name: ROUNDCUBEMAIL_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: ROUNDCUBEMAIL_DB_NAME
            - name: ROUNDCUBEMAIL_DB_USER
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: ROUNDCUBEMAIL_DB_USER
            - name: ROUNDCUBEMAIL_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: ROUNDCUBEMAIL_DB_PASSWORD
            # Plugins to enable (comma-separated). jwt_auth is what makes SSO work.
            - name: ROUNDCUBEMAIL_PLUGINS
              value: "archive,zipdownload,jwt_auth"
            - name: ROUNDCUBEMAIL_SKIN
              value: "elastic"
            # Cosmetic
            - name: ROUNDCUBEMAIL_USERNAME_DOMAIN
              value: ""
            # JWT plugin secrets
            - name: JWT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: JWT_AUTH_SECRET
            - name: STALWART_MASTER_USER
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: STALWART_MASTER_USER
            - name: STALWART_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: STALWART_MASTER_PASSWORD
            # Roundcube session/cred encryption key
            - name: ROUNDCUBEMAIL_DES_KEY
              valueFrom:
                secretKeyRef:
                  name: roundcube-secrets
                  key: ROUNDCUBEMAIL_DES_KEY
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          volumeMounts:
            # Roundcube install dir — emptyDir, repopulated by the entrypoint
            # on every boot from /usr/src/roundcubemail/. The plugin gets
            # injected by our wrapper script.
            - name: install
              mountPath: /var/www/html
            # Phase 3.A.5: ephemeral scratch dir where the Roundcube
            # entrypoint writes its config files. Previously a RWO PVC
            # holding SQLite; now an emptyDir since session state lives
            # in Postgres. This unblocks RollingUpdate deploys.
            - name: data
              mountPath: /var/roundcube
            # Mount the plugin source as a read-only file (the wrapper script
            # copies it to the install dir at startup)
            - name: jwt-plugin
              mountPath: /jwt-plugin
              readOnly: true
            # Extra config files (entrypoint includes anything matching
            # /var/roundcube/config/*.php). We use a subPath mount so other
            # writable files in /var/roundcube/config/ aren't shadowed.
            - name: config-extra
              mountPath: /var/roundcube/config/jwt_auth.inc.php
              subPath: jwt_auth.inc.php
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # startupProbe uses exec to wait for both Roundcube's files to be
          # populated in /var/www/html AND our jwt_auth plugin to be copied
          # into place by the wrapper script. This closes the race where
          # Apache could answer /?_jwt=... before the background copy
          # finished. Once startupProbe passes, the readinessProbe below
          # takes over and handles HTTP health. Note: the roundcube image
          # does not ship wget or curl, so we can only use file tests here.
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  test -f /var/www/html/index.php \
                    && test -f /var/www/html/plugins/jwt_auth/jwt_auth.php
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: install
          emptyDir: {}
        - name: data
          emptyDir: {}
        - name: jwt-plugin
          configMap:
            name: roundcube-jwt-plugin
            items:
              - key: jwt_auth.php
                path: jwt_auth.php
        - name: config-extra
          configMap:
            name: roundcube-config-extra
            items:
              - key: jwt_auth.inc.php
                path: jwt_auth.inc.php
