# Placeholder Secret; overlays populate real values.
#
# Dev overlay (k8s/overlays/dev/dev-secrets.yaml) sets OIDC_ISSUER_URL +
# OAUTH2_PROXY_REDIRECT_URL to dev subdomains derived from PLATFORM_BASE_DOMAIN.
# Prod uses bootstrap.sh to generate this Secret from the operator's domain.
#
# NEVER commit prod-worthy values here — the base is public repo content.
# OAUTH2_PROXY_COOKIE_SECRET is NOT in this file — the platform backend
# (backend/src/modules/oidc/ingress-proxy-manager.ts) generates it on
# first enable and patches it into this Secret.
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-config
  namespace: platform
type: Opaque
stringData:
  OIDC_ISSUER_URL: ""
  OAUTH2_PROXY_CLIENT_ID: "hosting-platform-oauth2-proxy"
  OAUTH2_PROXY_CLIENT_SECRET: ""
  OAUTH2_PROXY_REDIRECT_URL: ""
