# Dev-only defaults — production must override via sealed-secret or external-secrets
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-config
  namespace: platform
type: Opaque
stringData:
  OIDC_ISSUER_URL: "http://dind.local:2015/dex"
  OAUTH2_PROXY_CLIENT_ID: "hosting-platform-oauth2-proxy"
  OAUTH2_PROXY_CLIENT_SECRET: "local-dev-secret-oauth2-proxy"
  # OAUTH2_PROXY_COOKIE_SECRET is managed by the platform backend
  # via the ingress-proxy-manager. Do not hardcode — it is generated
  # on first enable and stored encrypted in the platform DB.
  OAUTH2_PROXY_REDIRECT_URL: "http://dind.local:2012/oauth2/callback"
