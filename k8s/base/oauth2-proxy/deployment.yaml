apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: platform
  labels:
    app: oauth2-proxy
spec:
  # M14: replicas owned by platform-storage-policy reconciler.
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: oauth2-proxy
      # Wait until oauth2-proxy can complete OIDC discovery exactly the
      # way the main container will: GET ${OIDC_ISSUER_URL}/.well-known
      # /openid-configuration with strict TLS verify. This is the same
      # call the main container makes on startup, so if this initContainer
      # passes, the main container will too.
      #
      # Two failure modes this catches on a fresh bootstrap:
      #   (1) dex Pending / mail-pg Pending — nginx 404 from the public
      #       ingress because no Service endpoints
      #   (2) LE cert not yet issued — nginx serves the default
      #       ingress.local self-signed cert; curl refuses TLS verify
      #
      # Without the wait, the main container hits one of those errors
      # at startup, exits, k8s applies exponential backoff, and even
      # after dex+cert come up the pod stays in long CrashLoopBackOff
      # — empirically requires manual `kubectl delete pod` (caught on
      # testing.phoenix-host.net 2026-05-08).
      #
      # We pull OIDC_ISSUER_URL from the same Secret the main container
      # uses, so any environment-specific override (dev uses internal
      # cluster DNS) is honored automatically. 60×5s = 5 min cap is
      # longer than any plausible cold boot window; if it expires, the
      # init container exits non-zero and the pod stays Pending with a
      # visible reason in `kubectl describe`.
      initContainers:
        - name: wait-for-dex-discovery
          image: curlimages/curl:8.10.1
          envFrom:
            - secretRef:
                name: oauth2-proxy-config
          command:
            - sh
            - -c
            # CRITICAL: every shell ${VAR} below is escaped as $${VAR}
            # so Flux's postBuild envsubst leaves it alone for the
            # shell to expand at runtime. Without the escape, envsubst
            # nukes OIDC_ISSUER_URL (which isn't in the cluster-config
            # substitution sources) to empty string, leaving curl with
            # url="/.well-known/..." which fails as "URL rejected: No
            # host part in the URL". Caught on testing.phoenix-host.net
            # 2026-05-08; same gotcha as project_valkey_phase1_2.
            - |
              set -eu
              url="$${OIDC_ISSUER_URL%/}/.well-known/openid-configuration"
              echo "polling: $${url}"
              for i in $$(seq 1 60); do
                if curl -fsS -o /dev/null --max-time 8 "$${url}"; then
                  echo "OIDC discovery ready (attempt $${i})"
                  exit 0
                fi
                echo "waiting for OIDC discovery (cert + dex)... ($${i}/60)"
                sleep 5
              done
              echo "OIDC discovery never succeeded after 5 min — main container would crashloop too" >&2
              exit 1
          resources:
            # Floor of 32Mi memory matches the platform LimitRange minimum
            # (k8s/base/limit-ranges.yaml). 16Mi is rejected with "minimum
            # memory usage per Container is 32Mi, but request is 16Mi" and
            # the entire pod is denied admission, including the main
            # container — caught on testing.phoenix-host.net 2026-05-08.
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.2
          args:
            - --http-address=0.0.0.0:4180
            - --upstream=static://200
            - --email-domain=*
            - --provider=oidc
            - --oidc-issuer-url=$(OIDC_ISSUER_URL)
            - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-name=_platform_oauth2
            - --redirect-url=$(OAUTH2_PROXY_REDIRECT_URL)
            - --skip-provider-button=true
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --skip-auth-route=^/api/
            - --skip-auth-route=^/oauth2/
            - --silence-ping-logging=true
          envFrom:
            - secretRef:
                name: oauth2-proxy-config
          ports:
            - containerPort: 4180
              name: http
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
