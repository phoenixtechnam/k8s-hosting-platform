# Stalwart state-export CronJob — runs `stalwart -e` every 2 minutes.
#
# WHY a CronJob rather than a sidecar:
#   The snapshot writes a DIRECTORY of per-subspace files (one file per
#   subspace, e.g. subspace_o, subspace_x, ...). On PG-backed installs
#   the export scans all 19 subspaces over the network — ~40s overhead.
#   Running this as a separate Job avoids tying the export I/O budget
#   to the live Stalwart pod and makes failures visible as Job status
#   rather than sidecar restarts.
#
# UPLOAD FLOW:
#   1. `snapshot` container: runs `stalwart -e /snapshot/snap` (a
#      directory), then writes /snapshot/done as a signal.
#   2. `upload` sidecar: waits for /snapshot/done, then runs
#      `restic backup /snapshot/snap/` to the configured repo.
#      The restic repo config + credentials come from the
#      stalwart-snapshot-restic-repo Secret (created by the platform
#      when a BackupStore is configured for mail snapshots).
#      If the Secret does not exist or RESTIC_REPOSITORY is empty, the
#      sidecar exits 0 with a log message — upload is optional.
#
# RESTORE:
#   On pod reschedule to a node without existing DataStore state, the
#   restore-state initContainer in deployment.yaml checks for the
#   `/var/lib/stalwart/data/CURRENT` sentinel file. When absent and the
#   pod annotation `mail.platform/allow-restore: "true"` is present,
#   it downloads the latest snapshot and runs `stalwart -i`.
#
# FLUX postBuild NOTE:
#   All $$ in inline shell are Flux-postBuild-escaped ($$VAR → $VAR
#   after Flux render). Do NOT change to single $ — Flux would try to
#   substitute them against platform-cluster-config and fail.
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stalwart-snapshot
  namespace: mail
  labels:
    app.kubernetes.io/component: stalwart-snapshot
  annotations:
    # backup-coverage: excluded:cluster-infrastructure
    # This Job reads/writes Stalwart DataStore snapshots; it IS the
    # backup mechanism, not a target for platform tenant-bundle backup.
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/component: stalwart-snapshot
        spec:
          restartPolicy: Never
          serviceAccountName: default
          securityContext:
            runAsNonRoot: false  # stalwart binary runs as root (binds port 25)
          initContainers:
            # Render config.json template: substitute ${STALWART_PG_*} placeholders
            # using busybox sed. Mirrors the render-config initContainer in
            # deployment.yaml — see that file for the $$ / Flux-escape rationale.
            - name: render-config
              image: docker.io/busybox:1.36
              imagePullPolicy: IfNotPresent
              command:
                - sh
                - -c
                - |
                  esc() { printf '%s' "$$1" | sed 's/[&\\|]/\\&/g'; }
                  H=$$(esc "$$STALWART_PG_HOST")
                  D=$$(esc "$$STALWART_PG_DATABASE")
                  U=$$(esc "$$STALWART_PG_USER")
                  P=$$(esc "$$STALWART_PG_PASSWORD")
                  sed \
                    -e "s|\$${STALWART_PG_HOST}|$$H|g" \
                    -e "s|\$${STALWART_PG_DATABASE}|$$D|g" \
                    -e "s|\$${STALWART_PG_USER}|$$U|g" \
                    -e "s|\$${STALWART_PG_PASSWORD}|$$P|g" \
                    /tmpl/config.json > /etc/stalwart/config.json
                  echo "Rendered /etc/stalwart/config.json"
              env:
                - name: STALWART_PG_HOST
                  value: "mail-db-rw.mail.svc.cluster.local"
                - name: STALWART_PG_DATABASE
                  value: "stalwart_app"
                - name: STALWART_PG_USER
                  valueFrom:
                    secretKeyRef:
                      name: mail-pg-app-credentials
                      key: username
                - name: STALWART_PG_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mail-pg-app-credentials
                      key: password
              volumeMounts:
                - name: config-tmpl
                  mountPath: /tmpl
                  readOnly: true
                - name: config-rendered
                  mountPath: /etc/stalwart
          containers:
            - name: snapshot
              image: docker.io/stalwartlabs/stalwart:v0.16.3
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  SNAP_PATH=/snapshot/snap
                  echo "=== Starting Stalwart export ==="
                  /usr/local/bin/stalwart -c /etc/stalwart/config.json -e "$$SNAP_PATH"
                  # stalwart -e writes a DIRECTORY; use du -sb for accurate byte count.
                  SNAP_SIZE=$$(du -sb "$$SNAP_PATH" 2>/dev/null | cut -f1 || echo 0)
                  echo "SNAPSHOT_DONE size=$$SNAP_SIZE path=$$SNAP_PATH"
                  # Signal the upload sidecar that the export is complete.
                  touch /snapshot/done
              env:
                - name: STALWART_PG_HOST
                  value: "mail-db-rw.mail.svc.cluster.local"
                - name: STALWART_PG_DATABASE
                  value: "stalwart_app"
                - name: STALWART_PG_USER
                  valueFrom:
                    secretKeyRef:
                      name: mail-pg-app-credentials
                      key: username
                - name: STALWART_PG_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mail-pg-app-credentials
                      key: password
              volumeMounts:
                - name: config-rendered
                  mountPath: /etc/stalwart
                  readOnly: true
                - name: snapshot-out
                  mountPath: /snapshot
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 2Gi
            # Upload sidecar: waits for /snapshot/done, then runs restic backup.
            # Credentials come from stalwart-snapshot-restic-repo Secret (optional).
            # If the Secret is absent or RESTIC_REPOSITORY is empty, exits 0.
            - name: upload
              image: ghcr.io/phoenixtechnam/mail-backup-tools:latest
              imagePullPolicy: IfNotPresent
              command: ["/usr/local/bin/snapshot-upload.sh"]
              envFrom:
                - secretRef:
                    name: stalwart-snapshot-restic-repo
                    optional: true
              env:
                - name: PLATFORM_API_URL
                  value: "http://platform-api.platform.svc.cluster.local:3000"
                - name: PLATFORM_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: platform-api-sa-token
                      key: token
                      optional: true
              volumeMounts:
                - name: snapshot-out
                  mountPath: /snapshot
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: config-tmpl
              configMap:
                name: stalwart-config
                items:
                  - key: config.json
                    path: config.json
            - name: config-rendered
              emptyDir: {}
            - name: snapshot-out
              emptyDir:
                sizeLimit: 2Gi
