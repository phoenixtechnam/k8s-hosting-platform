# Stalwart 0.16 Deployment.
#
# WHY Deployment (not StatefulSet):
#   Stalwart 0.16 is fully stateless when backed by PostgreSQL —
#   all configuration, account data, and mail blobs are in the DB.
#   A Deployment enables proper rolling updates + scale-out.
#
# CONFIG RENDERING (initContainer render-config):
#   Stalwart 0.16 does NOT support ${VAR} env-var substitution in
#   config.json.  The render-config initContainer (busybox sed) resolves
#   the ${STALWART_PG_*} placeholders from the ConfigMap template into a
#   concrete config.json written to an emptyDir.  The main container
#   mounts that emptyDir at /etc/stalwart (the path the upstream image
#   ENTRYPOINT passes to --config).
#
# BOOTSTRAP FLOW:
#   On first deploy the mail-pg DB is empty.  Stalwart connects to PG
#   and starts in "full mode with empty DB" — no admin account exists yet.
#   STALWART_RECOVERY_ADMIN env var (sourced from stalwart-admin-creds
#   Secret, key recoveryAdmin) provides a temporary HTTP-Basic credential
#   that stalwart-cli can use to POST the bootstrap plan before any
#   permanent admin exists.  bootstrap.sh generates stalwart-admin-creds
#   with recoveryAdmin = "admin:<random>" before applying the overlay, so
#   the Secret is present when the Deployment rolls out.
#
# RELOADER:
#   Stakater Reloader rolls the Deployment when stalwart-config
#   ConfigMap or mail-pg-app-credentials Secret changes.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart-mail
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-server
  annotations:
    # Stakater Reloader: roll on config or credentials change.
    configmap.reloader.stakater.com/reload: "stalwart-config"
    secret.reloader.stakater.com/reload: "mail-pg-app-credentials,stalwart-admin-creds"
spec:
  # Rolling-update strategy: kill the old pod BEFORE scheduling the new
  # one. Stalwart binds 6 hostPorts (25/465/587/143/993/4190); k8s default
  # `RollingUpdate{maxSurge:1,maxUnavailable:0}` would schedule the new
  # pod first — on a single-node cluster it stays Pending forever because
  # the old pod still owns the hostPorts, classic deadlock. On multi-node
  # HA, this still rolls one pod at a time (replicas-1 keep serving SMTP
  # / IMAP). Recreate strategy would briefly drop *all* replicas and is
  # rejected for that reason. See project_testing_bootstrap_2026_05_08.md.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  # Cut 3 (2026-05-05): replicas removed from manifest — owned by the
  # platform-storage-policy reconciler (Apply HA / Apply Local). Same
  # pattern as admin-panel / platform-api / roundcube. Without this,
  # Flux's kustomize-controller (server-side-apply with force-conflicts)
  # claims `.spec.replicas` and reverts every reconcile back to 1, so
  # the operator's `kubectl scale` (via /scale subresource) gets undone
  # within ~5 min. Empirically observed on staging 2026-05-04 evening
  # — Apply HA scaled stalwart 1→3 but next Flux reconcile reverted to
  # 1 because the manifest pinned it. Fresh clusters land at k8s
  # default = 1 until storage-policy fires for the first time.
  selector:
    matchLabels:
      app: stalwart-mail
  template:
    metadata:
      labels:
        app: stalwart-mail
        app.kubernetes.io/part-of: hosting-platform
      annotations:
        # Declarative hostPort manifest read by firewall-reconciler:
        # each port listed here is added to the host's nft `tenant_ports_tcp`
        # set when this pod is scheduled onto that node, and removed when
        # it leaves. Static bootstrap.sh rules already accept these
        # ports unconditionally (lines 877-884) so this annotation is
        # belt-and-suspenders, but it keeps the runtime-firewall view of
        # the cluster consistent.
        platform.phoenix-host.net/firewall-tcp-ports: "25,465,587,143,993,4190"
    spec:
      terminationGracePeriodSeconds: 90
      # Spread Stalwart pods one-per-node so any node IP that lands
      # external mail traffic has a local pod to receive it. Combined
      # with hostPort=containerPort below, traffic to <any-node>:25/587/etc
      # is bound directly by the local Stalwart process — no kube-proxy
      # DNAT round-trip across nodes (which can't work for hostPort anyway).
      #
      # DoNotSchedule (changed from ScheduleAnyway 2026-05-07): the
      # hostPort binding makes ScheduleAnyway strictly worse here. With
      # ScheduleAnyway + replicas=3 on a 2-node cluster, K8s places two
      # pods on one node — the second pod's hostPort=25/etc bind
      # collides with the first and the pod CrashLoopBackOffs. With
      # DoNotSchedule, the orphan pod stays Pending (visible alarm)
      # until a third node returns. Apply HA scaling 1↔3 still works:
      # K8s schedules as many pods as fit, the rest sit Pending — no
      # deadlock, just a transparent under-scaled service. On a fully
      # populated 3-node cluster, behavior is identical to ScheduleAnyway.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: stalwart-mail
      securityContext:
        runAsNonRoot: false  # Stalwart 0.16 binds port 25 — needs root or CAP_NET_BIND_SERVICE
      initContainers:
        # Render config.json template: substitute ${STALWART_PG_*} placeholders
        # using busybox sed (busybox has no envsubst).  The resolved file is
        # written to the config-rendered emptyDir so Stalwart can read it.
        #
        # HIGH fix (code review 2026-05-03): sed replacement strings interpret
        # `&` (matched text), `\` (escape), and `|` (our delimiter) specially.
        # A password containing any of these would silently corrupt config.json
        # and Stalwart would fail to connect to PG with no obvious cause.
        # Each value is escaped via `sed 's/[&\\|]/\\&/g'` before being injected.
        - name: render-config
          image: docker.io/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              # All $$ escapes here protect the inline shell variables
              # from Flux postBuild envsubst — Flux otherwise tries to
              # resolve `${STALWART_PG_HOST}` against platform-cluster-
              # config (where it isn't defined) and the apply fails with
              # "envsubst error: variable substitution failed".
              # `$${VAR}` → `${VAR}` after Flux render; sh then expands.
              esc() { printf '%s' "$$1" | sed 's/[&\\|]/\\&/g'; }
              H=$$(esc "$$STALWART_PG_HOST")
              D=$$(esc "$$STALWART_PG_DATABASE")
              U=$$(esc "$$STALWART_PG_USER")
              P=$$(esc "$$STALWART_PG_PASSWORD")
              sed \
                -e "s|\$${STALWART_PG_HOST}|$$H|g" \
                -e "s|\$${STALWART_PG_DATABASE}|$$D|g" \
                -e "s|\$${STALWART_PG_USER}|$$U|g" \
                -e "s|\$${STALWART_PG_PASSWORD}|$$P|g" \
                /tmpl/config.json > /etc/stalwart/config.json
              echo "Rendered /etc/stalwart/config.json"
          env:
            # Bump+rename history: mail-pg-rw (PG 16.9) → mail-pg-17-rw
            # (PG 17.5, transient) → mail-pg-18-rw (PG 18.3, 2026-05-07
            # transient) → mail-db-rw (PG 18.3 minimal-trixie, renamed
            # 2026-05-07 to drop version baggage from cluster name).
            - name: STALWART_PG_HOST
              value: "mail-db-rw.mail.svc.cluster.local"
            - name: STALWART_PG_DATABASE
              value: "stalwart_app"
            - name: STALWART_PG_USER
              valueFrom:
                secretKeyRef:
                  name: mail-pg-app-credentials
                  key: username
            - name: STALWART_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mail-pg-app-credentials
                  key: password
          volumeMounts:
            - name: config-tmpl
              mountPath: /tmpl
              readOnly: true
            - name: config-rendered
              mountPath: /etc/stalwart
        # restore-state: download + import the latest Stalwart DataStore
        # snapshot when the RocksDB data directory is empty AND the pod
        # annotation `mail.platform/allow-restore: "true"` is present.
        #
        # WHY this is a skeleton (no-op today):
        #   Full S3/SFTP download logic requires platform-api to write the
        #   snapshot URL + auth token into a Pod annotation or a ConfigMap
        #   at snapshot time. That integration is Phase 2 (requires active
        #   BackupStore wiring in the snapshot reconciler). Until then,
        #   this container always exits 0 — it never blocks Stalwart startup.
        #
        # ACTIVATION path (Phase 2):
        #   1. snapshot-cronjob uploads snap.lz4 to the active BackupStore
        #   2. platform-api writes `mail.platform/latest-snapshot-url` +
        #      `mail.platform/allow-restore: "true"` to the Stalwart Pod
        #      annotation (via Deployment annotation or pod-template patch).
        #   3. This initContainer reads the annotation, downloads snap.lz4,
        #      runs `stalwart -c /etc/stalwart/config.json -i /snapshot/snap.lz4`,
        #      and exits 0 on success.
        #
        # EXIT POLICY: ALWAYS exit 0. A restore failure must not prevent
        # Stalwart from starting in degraded mode — the operator can
        # trigger a manual restore via platform-api after investigating.
        - name: restore-state
          image: docker.io/busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              DATA_SENTINEL=/var/lib/stalwart/data/CURRENT
              if [ -f "$$DATA_SENTINEL" ]; then
                echo "restore-state: DataStore sentinel exists — skipping restore"
                exit 0
              fi
              echo "restore-state: DataStore is empty"
              # Phase 2 will check for `mail.platform/allow-restore: "true"`
              # annotation and download + import the latest snapshot here.
              # Until then, log and exit cleanly so Stalwart starts fresh.
              echo "restore-state: no restore configured (Phase 2 pending) — exiting 0"
              exit 0
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/stalwart
              readOnly: true
      containers:
        - name: stalwart
          image: docker.io/stalwartlabs/stalwart:v0.16.3
          imagePullPolicy: IfNotPresent
          # The upstream image ENTRYPOINT passes --config /etc/stalwart/config.json.
          # config-rendered emptyDir (written by render-config initContainer) is
          # mounted at that path so Stalwart picks up the fully-resolved config.
          # Mail ports use hostPort so external mail traffic to ANY node
          # IP lands directly on a local Stalwart process — bypasses
          # kube-proxy DNAT (which doesn't work for the externalIPs
          # path when DNS round-robin sends traffic to a node whose
          # Service spec has no externalIP for that hostname).
          # Combined with topologySpreadConstraints (one pod per node)
          # this gives true cross-node mail HA. The mgmt-http port is
          # cluster-internal only, so no hostPort there.
          # CAP_NET_BIND_SERVICE: the container runs as root (see
          # securityContext.runAsNonRoot=false above) so ports <1024
          # bind without an explicit capability grant.
          ports:
            - name: smtp
              containerPort: 25
              hostPort: 25
              protocol: TCP
            - name: submissions
              containerPort: 465
              hostPort: 465
              protocol: TCP
            - name: submission
              containerPort: 587
              hostPort: 587
              protocol: TCP
            - name: imap
              containerPort: 143
              hostPort: 143
              protocol: TCP
            - name: imaps
              containerPort: 993
              hostPort: 993
              protocol: TCP
            - name: sieve
              containerPort: 4190
              hostPort: 4190
              protocol: TCP
            - name: mgmt-http
              containerPort: 8080
              protocol: TCP
            # HTTP listener for ACME HTTP-01 challenge responses
            # (2026-05-06 TLS-bootstrap rewrite). Cluster-internal —
            # no hostPort, no externalIPs. Traffic flows: LE →
            # nginx-ingress :80 → mail-acme-ingress (path-prefix
            # /.well-known/acme-challenge/*) → this Service:80 →
            # this pod:80 → Stalwart's `http-acme` NetworkListener
            # (configured in bootstrap-plan-cm.yaml).
            - name: http-acme
              containerPort: 80
              protocol: TCP
          env:
            # STALWART_RECOVERY_ADMIN provides a temporary HTTP-Basic credential
            # ("admin:<password>") so stalwart-cli can authenticate before the
            # permanent admin account is created via the bootstrap plan.
            # bootstrap.sh writes this value (format "admin:<recoveryPassword>")
            # into stalwart-admin-creds Secret key "recoveryAdmin" before applying
            # the overlay.  Optional so the Deployment can be applied before that
            # Secret exists (bootstrap.sh creates it during the bootstrap flow).
            - name: STALWART_RECOVERY_ADMIN
              valueFrom:
                secretKeyRef:
                  name: stalwart-admin-creds
                  key: recoveryAdmin
                  optional: true
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/stalwart
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /healthz/live
              port: mgmt-http
            # Stalwart 0.16's first-time PG schema migration on a CNPG
            # cluster under load takes 60-180s in the wild — observed on
            # staging multiple times where the container exits cleanly
            # at exactly 90s (18*5s) because kubelet sends SIGTERM at the
            # threshold and Stalwart's signal handler clean-shuts.
            # Raise to 60 * 5s = 300s grace.
            failureThreshold: 60
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz/live
              port: mgmt-http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz/live
              port: mgmt-http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config-tmpl
          configMap:
            name: stalwart-config
            items:
              - key: config.json
                path: config.json
        - name: config-rendered
          emptyDir: {}
