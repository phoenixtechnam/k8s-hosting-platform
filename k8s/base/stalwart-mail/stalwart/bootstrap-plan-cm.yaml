# Bootstrap-plan ConfigMap — wraps bootstrap-plan.template.json for
# consumption by the bootstrap-job.yaml Job and bootstrap.sh.
#
# The ${...} variables in the plan are substituted at runtime by the
# bootstrap job (or bootstrap.sh), NOT by Kustomize — they contain
# secrets (passwords, private keys) that must not appear in manifests.
#
# Variables substituted at runtime:
#   ${STALWART_HOSTNAME}      — fully qualified MX hostname (e.g. mail.example.com)
#   ${STALWART_DOMAIN}        — primary mail domain (e.g. example.com)
#   ${STALWART_ADMIN_ID}      — admin account identifier (typically "admin")
#   ${STALWART_ADMIN_PASSWORD} — generated by bootstrap.sh, stored in stalwart-admin-creds
#   ${STALWART_DOMAIN_ID}     — domain DB identifier (e.g. "example-com")
#   ${STALWART_DKIM_PRIVATE_KEY_PEM} — Ed25519 private key, generated by bootstrap.sh
#
# TLS bootstrap (2026-05-06): Stalwart manages its own TLS cert via
# Let's Encrypt HTTP-01. Bootstrap.requestTlsCertificate=true triggers
# the ACME flow; AcmeProvider declares the LE prod directory + Http01
# challenge type; AllowedIp rows whitelist the cluster pod/service
# CIDRs so Stalwart's auto port-scanning ban doesn't fire on kubelet
# probes; NetworkListener on port 80 receives the challenge.
# Companion infra in the same overlay: Service exposes port 80
# cluster-internal, Ingress routes mail.${DOMAIN}/.well-known/
# acme-challenge/* to it.
#
# Coordinator (2026-05-07): Coordinator row points Stalwart at the
# platform-wide Valkey StatefulSet in redis-system. The URL uses the
# headless service form `valkey-0.valkey-headless...` so failover can
# be handled by the Sentinel-aware client; redis-rs (Stalwart's
# upstream client) speaks `redis://` against the Service ClusterIP
# round-robin. Phase 1 stays simple — Phase 3 deferred work upgrades
# the URL to `redis+sentinel://valkey.redis-system.svc.cluster.local:26379/mymaster`
# once the failover RTO becomes a measured pain point. STALWART_REDIS_PASSWORD
# is the cleartext password generated by bootstrap.sh into valkey-auth
# AND mirrored into stalwart-admin-creds at install time (so the
# bootstrap-plan substitution stays in one Secret).
#
# SystemSettings.defaultHostname (2026-05-08): drives the SMTP/IMAP/
# POP3/JMAP/CalDAV/CardDAV/WebDAV listener banners (the "220 <hostname>
# ESMTP" greeting + "250-<hostname> you had me at EHLO" + IMAP CAPABILITY
# greeting). Without this set, Stalwart falls back to gethostname() —
# which K8s pins to the pod name (e.g. "stalwart-mail-57f954f7bc-vr2lc")
# and external SMTP receivers do FCrDNS / EHLO-vs-PTR / EHLO-vs-cert
# checks against that pod-name and either reject the message outright
# or score it as spam. Setting defaultHostname to ${STALWART_HOSTNAME}
# (= mail.${DOMAIN}) ensures every replica announces the canonical
# FQDN that matches the cert SAN + DNS PTR + MX target.
#
# SystemSettings is a singleton — schema requires defaultDomainId, so
# the apply uses MERGE_PATCH-style update with both fields. Stalwart
# JMAP returns "Required: defaultDomainId" otherwise. STALWART_DOMAIN_ID
# is the same hyphen-converted slug used for the DkimSignature row's
# domainId field above.
#
# Jmap (singleton) upload + concurrency bumps (2026-05-11): the
# defaults (maxUploadCount=1000, uploadQuota=50 MB, maxConcurrent*=4)
# are sized for an interactive JMAP client, not for bulk
# backup/restore. Tenant Backup Phase 2 (jmap-sync.py, jmap-restore.py)
# pulls/pushes mailbox blobs in parallel — defaults trip the rolling
# 1h upload window during a 1000-message restore. New ceilings:
#   - maxUploadCount    1,000,000  (per-account, per uploadTtl=1h)
#   - uploadQuota       10 GB      (per-account, per uploadTtl=1h)
#   - maxUploadSize     100 MB     (single attachment cap)
#   - maxConcurrentUploads 128     (parallel Blob/upload from one client)
#   - maxConcurrentRequests 128    (parallel JMAP method calls per principal)
#   - maxMethodCalls    256        (Email/import batches up to ~250)
# The 128 ceiling on maxConcurrent* leaves headroom over our default
# 16-worker pool: in steady state the workers hold 16 in-flight Blob/
# upload requests, but TCP-keepalive timing + Email/import bursts can
# briefly push past 32, which Stalwart returns as HTTP 400
# `jmap:error:limit`. 128 keeps a 4× margin even at 32-worker pools.
# Memory cost per concurrent upload is bounded by maxUploadSize plus
# Stalwart's internal buffer overhead (~1.2x) → 128 × 100 MB × 1.2 ≈
# 15 GB worst-case per replica; for the realistic 5 KB-message case
# it's <100 MB. Stalwart's Cache.poolSize defaults to a separate cap.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-bootstrap-plan
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-server
data:
  # The $${VAR} escape stops Flux postBuild substituteFrom from trying
  # to resolve these placeholders at apply time. Flux substitutes
  # `$${VAR}` → `${VAR}` literal in the rendered ConfigMap; bootstrap.sh
  # then sed-replaces them with real values into the Secret.
  bootstrap-plan.json: |
    {"@type":"update","object":"Bootstrap","value":{"serverHostname":"$${STALWART_HOSTNAME}","defaultDomain":"$${STALWART_DOMAIN}","generateDkimKeys":false,"requestTlsCertificate":true}}
    {"@type":"update","object":"SystemSettings","value":{"defaultHostname":"$${STALWART_HOSTNAME}","defaultDomainId":"$${STALWART_DOMAIN_ID}"}}
    {"@type":"update","object":"Jmap","value":{"maxUploadCount":1000000,"uploadQuota":10737418240,"maxUploadSize":104857600,"maxConcurrentUploads":128,"maxConcurrentRequests":128,"maxMethodCalls":256}}
    {"@type":"update","object":"Account","id":"$${STALWART_ADMIN_ID}","value":{"@type":"User","credentials":{"0":{"@type":"Password","secret":"$${STALWART_ADMIN_PASSWORD}","allowedIps":{},"expiresAt":null}}}}
    {"@type":"create","object":"DkimSignature","value":{"dkim-default":{"@type":"Dkim1Ed25519Sha256","domainId":"$${STALWART_DOMAIN_ID}","selector":"default","canonicalization":"relaxed/relaxed","headers":{"From":true,"To":true,"Date":true,"Subject":true,"Message-ID":true},"privateKey":{"@type":"Text","secret":"$${STALWART_DKIM_PRIVATE_KEY_PEM}"},"report":false,"stage":"active","thirdParty":null,"thirdPartyHash":null,"auid":null,"expire":null,"memberTenantId":null,"nextTransitionAt":null}}}
    {"@type":"create","object":"AcmeProvider","value":{"letsencrypt":{"directory":"https://acme-v02.api.letsencrypt.org/directory","challengeType":"Http01","contact":{"hostmaster@$${STALWART_DOMAIN}":true}}}}
    {"@type":"create","object":"AllowedIp","value":{"cluster-pod":{"address":"10.42.0.0/16","reason":"k8s pod CIDR (kubelet probes + intra-cluster)"}}}
    {"@type":"create","object":"AllowedIp","value":{"cluster-svc":{"address":"10.43.0.0/16","reason":"k8s service CIDR"}}}
    {"@type":"create","object":"NetworkListener","value":{"http-acme":{"name":"http-acme","bind":{"[::]:80":true},"protocol":"http","tlsImplicit":false,"useTls":false}}}
    {"@type":"create","object":"NetworkListener","value":{"submission":{"name":"submission","bind":{"[::]:587":true},"protocol":"smtp","tlsImplicit":false}}}
    {"@type":"create","object":"NetworkListener","value":{"imap":{"name":"imap","bind":{"[::]:143":true},"protocol":"imap","tlsImplicit":false}}}
