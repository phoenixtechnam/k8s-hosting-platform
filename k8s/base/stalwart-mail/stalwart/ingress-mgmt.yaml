# Management IngressRoute for Stalwart 0.16 web-admin.
#
# URL: https://stalwart.${DOMAIN}/
# Backend: stalwart-mgmt.mail.svc.cluster.local:8080
#
# Access control: ForwardAuth middleware admin-auth-cookie (supplied by
# the overlay's admin-auth-gate-cookie or admin-auth-gate-oauth2 component).
#
# TLS: cert-manager Certificate CR below provides the Secret; Traefik
# references it via tls.secretName. The Certificate uses letsencrypt-
# prod-http01 by default; overlays can patch it to a DNS-01 issuer.
#
# The `platform.phoenix-host.net/admin-ui: "true"` label is kept here
# for CI guard compatibility (scripts/ci-admin-auth-check.sh). The
# admin-auth-gate component no longer needs to patch this resource —
# it creates the ForwardAuth Middleware that this route references directly.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stalwart-webadmin
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-server
    platform.phoenix-host.net/admin-ui: "true"
  annotations:
    platform.phoenix-host.net/admin-auth-gate: cookie
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`stalwart.${DOMAIN}`)"
      kind: Rule
      middlewares:
        - name: admin-auth-cookie
          namespace: traefik
        - name: compress
          namespace: traefik
      services:
        - name: stalwart-mgmt
          port: 8080
  tls:
    secretName: stalwart-webadmin-tls
---
# cert-manager Certificate for the Stalwart web-admin TLS endpoint.
# Overlays can patch issuerRef to use a DNS-01 ClusterIssuer if preferred.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stalwart-webadmin
  namespace: mail
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-server
spec:
  secretName: stalwart-webadmin-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
  dnsNames:
    - stalwart.${DOMAIN}
  issuerRef:
    name: "${CLUSTER_ISSUER_NAME}"
    kind: ClusterIssuer
    group: cert-manager.io
