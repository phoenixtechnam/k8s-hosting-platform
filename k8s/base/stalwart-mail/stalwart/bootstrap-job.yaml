# Stalwart 0.16 bootstrap Job.
#
# ci-flux-escape: ignore-file
#   This Job is annotated `kustomize.toolkit.fluxcd.io/reconcile: disabled`
#   and applied directly by bootstrap.sh (patches suspend=false to start it
#   on the cluster's first install). Flux postBuild.substituteFrom NEVER
#   runs over this manifest, so the bash heredoc's bare ${VAR} references
#   are safe — bash inside the container expands them at runtime, not Flux.
#
# PURPOSE: Seeds the empty Stalwart RocksDB with the initial configuration
# (server hostname, default domain) via a direct JMAP x:Bootstrap/set call.
# Full post-bootstrap configuration (SystemSettings, Jmap limits, DKIM,
# AcmeProvider, AllowedIp, NetworkListeners, admin credentials) is handled
# by bootstrap.sh's configure_stalwart_full() after this Job completes and
# the Deployment has been rolled to exit bootstrap mode.
#
# GATING: This Job is created with `suspend: true`. bootstrap.sh's
# bootstrap_stalwart_v016() step:
#   1. Detects an empty DB by probing /jmap/session with both adminPassword
#      and recoveryPassword (401 on both = bootstrap mode)
#   2. Writes rendered plan.json to stalwart-bootstrap-plan Secret
#   3. Patches this Job's spec.suspend = false to start it
#   4. Waits for Job completion
#   5. Rolls the Deployment to exit bootstrap mode
#   6. Calls configure_stalwart_full() for remaining JMAP configuration
#
# For re-runs (e.g. after a wiped DB), delete the Job and patch the new
# one's suspend=false, OR run bootstrap.sh again (idempotency: it skips
# if adminPassword authenticates successfully against /jmap/session).
#
# CREDENTIALS: bootstrap.sh writes the rendered bootstrap plan (with env-
# substituted hostname/domain) into Secret stalwart-bootstrap-plan before
# unsuspending this Job. The Job reads plan.json from that Secret.
# The STALWART_RECOVERY_PASSWORD is Stalwart's built-in bootstrap auth
# credential, separate from the permanent admin account password.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stalwart-bootstrap
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-bootstrap
  annotations:
    # Skip Flux reconciliation after first create. Required because k8s
    # auto-adds batch.kubernetes.io/controller-uid + job-name labels to
    # .spec.template.metadata.labels, and Job spec.template is immutable
    # — Flux dry-run-fails on every subsequent reconcile regardless of
    # SSA mode. ssa:merge alone was insufficient (caught on testing
    # .phoenix-host.net 2026-05-08; whole platform Kustomization stuck
    # Ready=False). The Job is suspended at create time and unsuspended
    # once by bootstrap.sh after the plan is rendered; no further
    # reconciliation needed. The reconcile:disabled annotation only
    # disables ongoing reconcile — Flux still creates it on first apply.
    kustomize.toolkit.fluxcd.io/reconcile: disabled
    kustomize.toolkit.fluxcd.io/ssa: merge
spec:
  # Suspended by default — bootstrap.sh patches suspend=false when ready.
  suspend: true
  # No retry — if the JMAP call fails, the operator needs to investigate.
  backoffLimit: 0
  # Keep the completed Job (and its pod logs) for 24 hours.
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mail-bootstrap
    spec:
      restartPolicy: Never
      containers:
        - name: apply-bootstrap-plan
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apk add -q --no-cache curl jq

              # Validate plan has been rendered (no unsubstituted template vars).
              if grep -q 'STALWART_HOSTNAME\|STALWART_DOMAIN' /plan/plan.json 2>/dev/null; then
                echo "ERROR: bootstrap plan contains unsubstituted variables." >&2
                echo "       bootstrap.sh must render the plan before unsuspending this Job." >&2
                exit 1
              fi

              MGMT="http://stalwart-mgmt.mail.svc.cluster.local:8080"

              # Parse Bootstrap parameters from plan.json.
              HOSTNAME=$(jq -r '.serverHostname' /plan/plan.json)
              DOMAIN=$(jq -r '.defaultDomain' /plan/plan.json)
              REQ_TLS=$(jq -r '.requestTlsCertificate // false' /plan/plan.json)
              echo "Bootstrap: hostname=${HOSTNAME} domain=${DOMAIN} tls=${REQ_TLS}"

              # Get JMAP session to resolve management accountId.
              SESSION=$(curl -sf \
                -u "admin:${STALWART_RECOVERY_PASSWORD}" \
                --max-time 10 \
                "${MGMT}/jmap/session") || {
                echo "ERROR: could not reach ${MGMT}/jmap/session" >&2
                exit 1
              }
              ACCT_ID=$(echo "${SESSION}" | jq -r \
                '(.primaryAccounts // {}) | to_entries[] | select(.key == "urn:stalwart:jmap") | .value' \
                2>/dev/null || echo "")
              ACCT_ID="${ACCT_ID:-d333333}"
              echo "Using accountId=${ACCT_ID}"

              # Call x:Bootstrap/set — only valid in bootstrap mode (empty DB).
              BODY=$(jq -n \
                --arg acct "${ACCT_ID}" \
                --arg h "${HOSTNAME}" \
                --arg d "${DOMAIN}" \
                --argjson rt "${REQ_TLS}" \
                '{using:["urn:ietf:params:jmap:core","urn:stalwart:jmap"],
                  methodCalls:[["x:Bootstrap/set",
                    {accountId:$acct,
                     update:{singleton:{
                       serverHostname:$h,
                       defaultDomain:$d,
                       generateDkimKeys:false,
                       requestTlsCertificate:$rt
                     }}},
                    "c0"]]}')

              RESP=$(curl -sf \
                -u "admin:${STALWART_RECOVERY_PASSWORD}" \
                -X POST "${MGMT}/jmap/" \
                -H 'Content-Type: application/json' \
                --max-time 30 \
                -d "${BODY}") || {
                echo "ERROR: JMAP POST /jmap/ failed" >&2
                exit 1
              }
              echo "Response: ${RESP}"

              # Detect failure: methodResponses[0] should not have notUpdated.
              if echo "${RESP}" | jq -e \
                  '.methodResponses[0][1] | has("notUpdated") and (.notUpdated | length > 0)' \
                  >/dev/null 2>&1; then
                echo "ERROR: x:Bootstrap/set returned notUpdated:" >&2
                echo "${RESP}" | jq '.methodResponses[0][1].notUpdated' >&2
                exit 1
              fi

              echo "Bootstrap init completed. Full configuration will follow after Deployment restart."
          env:
            # Recovery admin password — Stalwart's built-in bootstrap-mode
            # HTTP-Basic credential, separate from the permanent admin account
            # password set later by configure_stalwart_full().
            - name: STALWART_RECOVERY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-admin-creds
                  key: recoveryPassword
          volumeMounts:
            - name: bootstrap-plan
              mountPath: /plan
              readOnly: true
      volumes:
        - name: bootstrap-plan
          secret:
            secretName: stalwart-bootstrap-plan
            items:
              - key: plan.json
                path: plan.json
