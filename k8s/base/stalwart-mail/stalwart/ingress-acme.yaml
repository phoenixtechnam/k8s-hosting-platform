# ACME HTTP-01 IngressRoute for Stalwart-managed TLS certificate.
#
# URL: http://mail.${DOMAIN}/.well-known/acme-challenge/<token>
# Backend: stalwart-mail-acme.mail.svc.cluster.local:80 (http-acme port)
#
# 2026-05-17: backend Service renamed `stalwart-mail` → `stalwart-mail-acme`
# (split). See k8s/base/stalwart-mail/stalwart/service.yaml header for why.
#
# Why this exists:
#   Stalwart 0.16 manages its own TLS cert via Let's Encrypt (the
#   Bootstrap.requestTlsCertificate=true setting in
#   bootstrap-plan-cm.yaml). LE validates ownership by HTTP-GETting
#   /.well-known/acme-challenge/<token> on port 80 of the mail
#   hostname. Stalwart serves the response on its own internal HTTP
#   listener (NetworkListener `http-acme` on [::]:80, no TLS). Traefik
#   already binds port 80 on every node via hostPort, so this
#   IngressRoute is the bridge: external :80 → traefik (web entrypoint)
#   → this IngressRoute → Stalwart Service:80.
#
# Why the `web` entrypoint and no TLS:
#   ACME challenges are PLAIN HTTP per RFC 8555 §8.3. No cert needed
#   here — that's the whole point of the bootstrap (we don't HAVE a
#   cert until LE issues one). The route is on the `web` entrypoint
#   only and carries NO redirect-to-https middleware, so plain-HTTP
#   probes reach Stalwart's http-acme listener unmolested.
#
# Why priority: 100:
#   In Traefik, IngressRoutes are matched by route priority (default
#   is rule length). We pin a high priority to guarantee this specific
#   path prefix wins against any catch-all redirect routes that might
#   later attach to the `web` entrypoint for the same host.
#
# Why path-prefix-only (not the full host):
#   This IngressRoute claims ONLY /.well-known/acme-challenge/* —
#   anything else under mail.${DOMAIN} either matches a different
#   route, returns the Traefik 404, or falls through to other listeners.
#   We're not making the mail hostname into a general HTTP reverse proxy.
#
# Why mail.${DOMAIN} hardcoded (and not a variable):
#   The default mail-server hostname is mail.${DOMAIN}. The platform-
#   cluster-config ConfigMap exposes ${DOMAIN} only; adding
#   mail.${DOMAIN} would couple Flux's postBuild rendering to
#   the platform-api's runtime config (which is the wrong layering —
#   Flux re-renders manifests on every git change, not on every API
#   write). When the operator overrides the hostname in admin Email
#   Settings, the platform-api creates a SECOND IngressRoute with the
#   override hostname (using the same backend/path) and triggers a
#   Stalwart Bootstrap.serverHostname update. The default mail.${DOMAIN}
#   route stays as a fallback for clients that haven't migrated.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stalwart-mail-acme
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-server
spec:
  entryPoints:
    - web
  routes:
    - match: "Host(`mail.${DOMAIN}`) && PathPrefix(`/.well-known/acme-challenge/`)"
      kind: Rule
      priority: 100
      services:
        - name: stalwart-mail-acme
          port: 80
