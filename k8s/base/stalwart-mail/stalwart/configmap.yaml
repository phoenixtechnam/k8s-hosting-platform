# Stalwart 0.16 config.json — ConfigMap.
#
# Phase 1 (RocksDB migration): switched DataStore from PostgreSQL to
# RocksDB. RocksDB is an embedded key-value store that lives entirely
# on-disk under /var/lib/stalwart/data (the stalwart-rocksdb-data PVC).
# No PG credentials, no env-var substitution, no initContainer needed.
# The config.json is mounted DIRECTLY from this ConfigMap at
# /etc/stalwart in the Deployment and the snapshot CronJob.
#
# Stalwart 0.16 "Declarative Deployments" architecture:
#   A minimal config.json points at a single DataStore; all server
#   settings (listeners, domains, accounts, etc.) live in the store
#   and are managed via `stalwart-cli apply` (the bootstrap-plan Job)
#   or the JMAP API.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-server
data:
  config.json: |
    {
      "@type": "RocksDb",
      "path": "/var/lib/stalwart/data"
    }
