apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Stalwart 0.16 deployment layer — Phase 1 (RocksDB migration).
#
# mail-db/ (CNPG PostgreSQL cluster) has been removed. Stalwart now
# uses an embedded RocksDB DataStore on a local-path PVC
# (stalwart-rocksdb-data, 20Gi). See stalwart/pvc.yaml.
#
# haproxy/ ships the static support objects (ConfigMap + NetworkPolicy)
# for the haproxy DaemonSet. The DaemonSet ITSELF is created and
# destroyed by platform-api (see backend/src/modules/mail-admin/
# haproxy-builder.ts) when the port-exposure mode toggles. Pre-streamline
# the DaemonSet was Flux-applied with a no-match nodeSelector and SSA-
# patched at runtime — that arrangement caused a months-long
# ownership war (PRs #43–#45) and was retired.
#
# 2026-05-15 Phase 1 streamline: migration/ subdirectory removed. The
# pre-streamline rsync data path used a Job that needed an SSH
# known-hosts ConfigMap in migration/. The new snapshot+restore
# migration (backend/src/modules/mail-admin/migration.ts) reuses the
# existing restic CronJob — no Job orchestration, no SSH, no ConfigMap.
#
# This top-level kustomization is intentionally NOT included in
# k8s/base/kustomization.yaml yet — it will be uncommented in M10
# once all manifests are validated end-to-end on local DinD k3s.
# Dev overlay wires it directly: k8s/overlays/dev/stalwart-mail/.

resources:
  - stalwart/
  - haproxy/

labels:
  - pairs:
      app.kubernetes.io/part-of: hosting-platform
