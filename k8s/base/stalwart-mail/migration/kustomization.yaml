apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources used by the runtime mail-migration Job (created on-demand
# by backend/src/modules/mail-admin/migration.ts). The Job itself is
# NOT defined in git — it's generated and applied via the K8s API
# every time an operator triggers /admin/mail/migrate. Only the
# supporting trust material lives here.
#
# The ConfigMap defaults to empty; the migration script falls back to
# StrictHostKeyChecking=accept-new in that state. See the file-level
# comment in known-hosts-cm.yaml for the operator procedure to enable
# strict mode.

resources:
  - known-hosts-cm.yaml
