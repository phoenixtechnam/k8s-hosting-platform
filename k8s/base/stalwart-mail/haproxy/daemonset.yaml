# haproxy DaemonSet — mail port forwarder with PROXY Protocol v2.
#
# WHY hostNetwork: true:
#   Binds directly to each server node's external IP on mail ports.
#   This is only deployed when mailPortExposureMode = 'allServerNodes'.
#   In 'thisNodeOnly' mode, Stalwart uses hostPort directly on its pod.
#
# PROXY Protocol v2 preserves original client IPs even though haproxy
# forwards via the cluster network to stalwart-mail.mail.svc.cluster.local.
# Stalwart listens with proxyNetworks configured (set by platform-api when
# switching to allServerNodes mode).
#
# PORT CONFLICT PREVENTION:
#   When switching from 'thisNodeOnly' to 'allServerNodes', platform-api:
#   1. Removes hostPort from the Stalwart Deployment
#   2. Waits for the Deployment rollout
#   3. THEN enables this DaemonSet by patching the nodeSelector back to
#      platform.phoenix-host.net/node-role: server
#   Reverse order applies when switching back.
#
# ENABLE/DISABLE MECHANISM:
#   platform-api toggles this DaemonSet by patching spec.template.spec.nodeSelector:
#     Enabled:  { platform.phoenix-host.net/node-role: server }
#     Disabled: { platform.phoenix-host.net/mail-haproxy-disabled: "true" }
#   The disabled selector matches no nodes, so the DaemonSet schedules zero pods.
#   The DaemonSet itself stays in the cluster so Flux can manage its spec;
#   platform-api does not create or delete it directly.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: stalwart-haproxy
  namespace: mail
  labels:
    app.kubernetes.io/component: stalwart-haproxy
    app.kubernetes.io/part-of: hosting-platform
  annotations:
    configmap.reloader.stakater.com/reload: "stalwart-haproxy-config"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: stalwart-haproxy
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stalwart-haproxy
        app.kubernetes.io/part-of: hosting-platform
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      # Default nodeSelector = disabled. platform-api patches this to
      # platform.phoenix-host.net/node-role: server to enable scheduling.
      nodeSelector:
        platform.phoenix-host.net/mail-haproxy-disabled: "true"
      tolerations:
        - key: platform.phoenix-host.net/server-only
          operator: Exists
          effect: NoSchedule
      terminationGracePeriodSeconds: 30
      containers:
        - name: haproxy
          image: haproxy:2.9-alpine
          imagePullPolicy: IfNotPresent
          # Drop ALL capabilities and run as root inside the container.
          # The official haproxy:2.9-alpine image binary doesn't carry
          # NET_BIND_SERVICE as a file capability, so non-root cannot
          # bind <1024 even when K8s adds the cap (K8s adds to
          # permitted+effective but NOT ambient — and containerd <2.0
          # doesn't propagate to ambient for non-root). Running as root
          # with dropALL keeps the attack surface tight:
          #   • No fs writes (readOnlyRootFilesystem) except the
          #     /tmp tmpfs emptyDir for the stats socket.
          #   • No privilege escalation (allowPrivilegeEscalation: false).
          #   • Seccomp RuntimeDefault clamps the syscall set.
          # Effective capability set is empty post-bind because dropALL
          # wins, so root inside this container has no actual privileges
          # beyond the bind itself.
          # We MUST run as uid 0 inside the container. The haproxy:2.9-alpine
          # image's Dockerfile ends with `USER haproxy` (uid 99), and K8s
          # adds caps to the bounding set but NOT to effective/permitted
          # for non-root processes — so non-root can't bind <1024 even
          # with NET_BIND_SERVICE in the cap.add list. Verified empirically
          # on staging: uid 99 shows CapEff=0 / CapBnd=0x400, bind 25 fails
          # with Permission denied.
          #
          # Defense-in-depth despite uid 0:
          #   • capabilities.drop: [ALL] strips every cap except those
          #     explicitly added (just NET_BIND_SERVICE). Root inside the
          #     container has no privileges beyond binding low ports.
          #   • allowPrivilegeEscalation: false prevents setuid escapes.
          #   • readOnlyRootFilesystem: true blocks fs tampering;
          #     /tmp is a memory-backed emptyDir for the haproxy stats
          #     socket only.
          #   • seccompProfile=RuntimeDefault clamps the syscall surface.
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 25
              hostPort: 25
              protocol: TCP
              name: smtp
            - containerPort: 465
              hostPort: 465
              protocol: TCP
              name: smtps
            - containerPort: 587
              hostPort: 587
              protocol: TCP
              name: submission
            - containerPort: 143
              hostPort: 143
              protocol: TCP
              name: imap
            - containerPort: 993
              hostPort: 993
              protocol: TCP
              name: imaps
            - containerPort: 4190
              hostPort: 4190
              protocol: TCP
              name: sieve
          volumeMounts:
            - name: haproxy-config
              mountPath: /usr/local/etc/haproxy/haproxy.cfg
              subPath: haproxy.cfg
              readOnly: true
            # Writable /tmp for the haproxy stats socket (declared in
            # configmap.yaml as /tmp/haproxy.sock).
            - name: haproxy-run
              mountPath: /tmp
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "echo 'show info' | socat - /tmp/haproxy.sock | grep -q 'Uptime'"
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: haproxy-config
          configMap:
            name: stalwart-haproxy-config
        - name: haproxy-run
          emptyDir:
            medium: Memory
            sizeLimit: 16Mi
