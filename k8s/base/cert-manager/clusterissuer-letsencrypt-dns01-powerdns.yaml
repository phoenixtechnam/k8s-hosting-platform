# PowerDNS DNS-01 solver via REST API webhook
# Requires: cert-manager-webhook-powerdns installed in the cluster
# Secret: powerdns-api-key in cert-manager namespace with key 'api-key'
#
# Install the webhook:
#   helm repo add cert-manager-webhook-powerdns https://lordofsystem.github.io/cert-manager-webhook-powerdns
#   helm install cert-manager-webhook-powerdns cert-manager-webhook-powerdns/cert-manager-webhook-powerdns \
#     --namespace cert-manager \
#     --set powerdns.apiUrl=http://pdns.platform.internal:8081 \
#     --set powerdns.secretName=powerdns-api-key
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns01-powerdns
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "${ACME_EMAIL:-operator@example.com}"
    privateKeySecretRef:
      name: letsencrypt-prod-dns01-powerdns-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.powerdns.com
            solverName: powerdns
            config:
              apiUrl: http://pdns.platform.internal:8081
              apiKeySecretRef:
                name: powerdns-api-key
                key: api-key
