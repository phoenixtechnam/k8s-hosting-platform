#
# Let's Encrypt STAGING issuer — HTTP-01 via nginx ingress.
#
# Use this for development, integration tests, and any environment
# where we want to exercise the ACME challenge flow without hitting
# production Let's Encrypt rate limits (50 certs per registered domain
# per week, 5 duplicate certs per week).
#
# Certificates issued by this issuer are NOT trusted by browsers or
# mail clients — they're signed by the Fake LE Intermediate X1 CA.
# That's fine for automated tests but never mount one in front of a
# real user.
#
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging-http01
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: operator@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-http01-account
    solvers:
      - http01:
          ingress:
            # Traefik migration 2026-05-15: was `nginx`. See the
            # equivalent comment in clusterissuer-letsencrypt-http01.yaml
            # for the full rationale (narrow ingressClass + labelSelector
            # hole on the Traefik kubernetesIngress provider).
            ingressClassName: traefik
            # See clusterissuer-letsencrypt-http01.yaml for why solver
            # Pods need platform-tenant-overhead — tenant ResourceQuota
            # would otherwise reject the 64Mi solver under the
            # tenant-default scope.
            podTemplate:
              spec:
                priorityClassName: platform-tenant-overhead
