# ClouDNS DNS-01 solver via webhook
# Requires: cert-manager-webhook-cloudns installed
#
# Install:
#   helm repo add cert-manager-webhook-cloudns https://ixoncloud.github.io/cert-manager-webhook-cloudns
#   helm install cert-manager-webhook-cloudns cert-manager-webhook-cloudns/cert-manager-webhook-cloudns \
#     --namespace cert-manager
#
# Create the secret:
#   kubectl create secret generic cloudns-credentials \
#     --namespace cert-manager \
#     --from-literal=auth-id='YOUR_CLOUDNS_AUTH_ID' \
#     --from-literal=auth-password='YOUR_CLOUDNS_AUTH_PASSWORD'
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns01-cloudns
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: "${ACME_EMAIL:-operator@example.com}"
    privateKeySecretRef:
      name: letsencrypt-prod-dns01-cloudns-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.cloudns.com
            solverName: cloudns
            config:
              authIdSecretRef:
                name: cloudns-credentials
                key: auth-id
              authPasswordSecretRef:
                name: cloudns-credentials
                key: auth-password
