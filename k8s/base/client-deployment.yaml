apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-panel
  namespace: platform
  labels:
    app: client-panel
    app.kubernetes.io/part-of: hosting-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-panel
  template:
    metadata:
      labels:
        app: client-panel
    spec:
      containers:
        - name: client
          image: ghcr.io/phoenixtechnam/hosting-platform/client-panel:latest
          ports:
            - containerPort: 80
              protocol: TCP
          # API_URL intentionally omitted — defaults to '' (same-origin).
          # Frontend nginx proxies /api/* to platform-api:3000 internally.
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: client-panel
  namespace: platform
  labels:
    app: client-panel
spec:
  selector:
    app: client-panel
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
