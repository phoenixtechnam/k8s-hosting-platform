# Service account + RBAC for the ingress-external-ips reconciler.
# It needs to:
#   - list Nodes (read .status.addresses[type=ExternalIP])
#   - patch one Service (ingress-nginx-controller .spec.externalIPs)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ingress-external-ips-reconciler
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: ingress-external-ips
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ingress-external-ips-reconciler
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ingress-external-ips-reconciler
  labels:
    app.kubernetes.io/part-of: hosting-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ingress-external-ips-reconciler
subjects:
  - kind: ServiceAccount
    name: ingress-external-ips-reconciler
    namespace: ingress-nginx
---
# Namespace-scoped patch right on the ingress-nginx Service.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ingress-external-ips-reconciler
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["services"]
    resourceNames: ["ingress-nginx-controller"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ingress-external-ips-reconciler
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/part-of: hosting-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ingress-external-ips-reconciler
subjects:
  - kind: ServiceAccount
    name: ingress-external-ips-reconciler
    namespace: ingress-nginx
