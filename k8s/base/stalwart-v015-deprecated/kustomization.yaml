# DEPRECATED — Stalwart 0.15 manifests.
#
# M13 (2026-05-01): moved from k8s/base/stalwart/ to here so the
# staging overlay (k8s/overlays/staging/stalwart/) can still build while
# the staging operator-cutover to 0.16 is pending.
#
# DO NOT add new resources here. The staging operator should run:
#   scripts/cutover-stalwart-v015-to-v016.sh
# and then update k8s/overlays/staging/ to reference base/stalwart-v016/
# instead. This directory will be deleted in the staging-cutover PR.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - namespace.yaml
  - statefulset.yaml
  - service.yaml
  - networkpolicy.yaml
  # Phase 3 T3.4: backup CronJob + RBAC. The CronJob exec's into
  # stalwart-mail-0 to run `stalwart-cli server backup`, so no
  # second PVC mount is required.
  - backup-rbac.yaml
  - backup-cronjob.yaml
  # cert-reload-cronjob.yaml REMOVED — replaced by Stakater Reloader.
  # The StatefulSet now carries:
  #   secret.reloader.stakater.com/reload: "stalwart-webadmin-staging-tls,stalwart-secrets"
  # Reloader rolls the pod on Secret change, so cert-manager renewals
  # automatically trigger a restart without any exec/credentials coupling.
  # secret.example.yaml is NOT included — operators provide the real Secret
  # per environment via kubectl / sealed-secrets / SOPS.

# Generate the stalwart-config ConfigMap from a standalone TOML file.
# disableNameSuffixHash is required: the StatefulSet volumes.configMap.name
# and the Reloader annotation both reference the literal name "stalwart-config".
# Without this flag Kustomize appends a content hash and breaks those references.
configMapGenerator:
  - name: stalwart-config
    files:
      - config.toml=stalwart-config.toml
    options:
      disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/part-of: hosting-platform
      app.kubernetes.io/component: mail-server
