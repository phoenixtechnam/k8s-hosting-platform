apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: platform-system
  labels:
    app: roundcube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest-fpm
          ports:
            - containerPort: 9000
          env:
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://stalwart-mail.platform-system.svc.cluster.local"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "tls://stalwart-mail.platform-system.svc.cluster.local"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "587"
            - name: ROUNDCUBEMAIL_DB_TYPE
              value: "pgsql"
            - name: ROUNDCUBEMAIL_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: db-host
          volumeMounts:
            - name: roundcube-config
              mountPath: /var/roundcube/config
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
      volumes:
        - name: roundcube-config
          configMap:
            name: roundcube-config
---
apiVersion: v1
kind: Service
metadata:
  name: roundcube
  namespace: platform-system
spec:
  selector:
    app: roundcube
  ports:
    - port: 9000
      targetPort: 9000
---
# NOTE: This base IngressRoute is dev-only. Staging + production overlays
# ship their own webmail IngressRoute under k8s/overlays/{staging,
# production}/webmail-ingress.yaml — those bind to the `mail` namespace
# (where Roundcube actually runs in those overlays) and use the LE
# cluster issuer. Keep this resource around so a plain `kubectl apply -k
# base/` still produces a usable cluster.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: roundcube-ingress
  namespace: platform-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`webmail.${DOMAIN}`)"
      kind: Rule
      services:
        - name: roundcube
          port: 9000
  tls:
    secretName: webmail-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: roundcube-webmail
  namespace: platform-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  secretName: webmail-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
  dnsNames:
    - webmail.${DOMAIN}
  issuerRef:
    name: "${CLUSTER_ISSUER_NAME}"
    kind: ClusterIssuer
    group: cert-manager.io
