# Anchor IngressRoute for the Private Worker tunnel feature.
#
# Holds the TLS certificate (via cert-manager Certificate CR below) for
# tunnels.${DOMAIN} and serves a catch-all default backend (the platform
# suspended page) for unrouted requests.
#
# Per-client IngressRoutes (tunnel-{slug}) are created at runtime by the
# backend reconciler on the SAME host (tunnels.${DOMAIN}) with rule
# PathPrefix(`/c/{slug}/`) + a higher route priority so they win over
# the anchor's catch-all `/` match.
#
# WebSocket handling: Traefik forwards HTTP/1.1 Upgrade/Connection
# headers natively — frps uses HTTP Upgrade for its WSS transport,
# no extra middleware required. The control-plane connection is
# long-lived, so we override the per-route ResponseForwarding for
# extended timeouts via the response-forwarding patch in serversTransport
# (cluster-default ServersTransport applies; tenant routes that need
# tighter behaviour patch their own).
#
# Rate-limit anchor catch-all to defend against scanning. The per-client
# tunnel-<slug> IngressRoutes created at runtime layer their own tighter
# RateLimit Middleware on top.
#
# ${DOMAIN} is substituted by Flux postBuild.substituteFrom in each
# overlay. Base must keep ${DOMAIN} literal.
---
# Default catch-all backend — points at the existing platform-suspended
# Service in the `platform` namespace. ExternalName lets us cross
# namespaces without duplicating the suspended deployment. If the
# operator removes the suspended page in their overlay, they should
# also patch this ExternalName to point at a different backend (e.g.
# platform-api.platform.svc.cluster.local). The Traefik controller is
# installed with providers.kubernetesCRD.allowExternalNameServices=true,
# which is required for IngressRoute → ExternalName routing.
apiVersion: v1
kind: Service
metadata:
  name: tunnel-anchor-default
  namespace: platform-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: private-worker-tunnel
spec:
  type: ExternalName
  externalName: platform-suspended.platform.svc.cluster.local
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
# Rate-limit Middleware for the anchor catch-all. 10 req/s steady-state
# (average), 20 burst (max queued). Per-client tunnel-{slug} routes
# layer their own tighter limits on top via separate Middlewares.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: tunnel-anchor-ratelimit
  namespace: platform-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: private-worker-tunnel
spec:
  rateLimit:
    average: 10
    burst: 20
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tunnel-anchor
  namespace: platform-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: private-worker-tunnel
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`tunnels.${DOMAIN}`)"
      kind: Rule
      # Low priority so per-client `PathPrefix(/c/{slug}/)` routes
      # always win for tunneled traffic.
      priority: 1
      middlewares:
        - name: tunnel-anchor-ratelimit
          namespace: platform-system
        - name: compress
          namespace: traefik
      services:
        - name: tunnel-anchor-default
          port: 80
  tls:
    # The Certificate CR lives in certificate.yaml — cert-manager creates
    # the Secret independently. IngressRoute references it by name. The
    # cert-manager Ingress shim does not pick up IngressRoute CRDs, so
    # an explicit Certificate CR is the only way to provision TLS.
    secretName: tunnels-platform-domain-tls
