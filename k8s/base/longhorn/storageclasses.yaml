# M2: Longhorn StorageClass tiers.
#
# Five platform-managed classes that map the role+tier taxonomy from
# ADR-031 onto Longhorn provisioning. The default `longhorn` class
# installed by the Longhorn chart is left untouched for backwards
# compatibility; these classes are additive.
#
# Tier matrix:
#   Namespace │ Default        │ HA variant
#   ──────────┼────────────────┼────────────────────
#   system    │ system-ha (3×) │ (always HA)
#   tenant    │ tenant-local   │ tenant-ha (2×)
#   mail      │ mail-local     │ mail-ha (2×)
#
# numberOfReplicas = desired Longhorn replica count per volume.
# On a single-node cluster Longhorn schedules min(replicas, nodes)
# and keeps the remainder pending — volumes stay functional, just
# degraded until more nodes join. At 3-server HA (M8) replica count
# is fulfilled automatically for system-ha; tenant-ha needs 2+ nodes.
#
# dataLocality strategies:
#   - `disabled`     → replicas spread freely (HA classes, system-ha)
#   - `best-effort`  → prefer the node hosting the pod (tenant-local,
#                      mail-local) so reads stay node-local
#   - `strict-local` → REQUIRE a local replica; pod can't schedule
#                      if the node has no replica. Too strict for
#                      tenant workloads (blocks rescheduling) — not
#                      used.
#
# recurringJobSelector references the `default` job group defined in
# recurring-jobs.yaml. Marking each SC here means fresh PVCs
# auto-enroll without the per-PVC label dance described in the
# recurring-jobs.yaml comment. The default Longhorn SC (installed
# by the chart) did not set this, so legacy PVCs still rely on (a)
# the direct label.
#
# reclaimPolicy=Retain protects against accidental PVC deletion
# cascading to data loss — operators restore via the normal PVC
# restore path (storage-lifecycle module) rather than relying on the
# PVC lifecycle.
#
# Changing the storageClassName on an existing StatefulSet is BLOCKED
# by k8s (volumeClaimTemplates is immutable). Migration to a new tier
# requires delete-recreate + restore-from-backup. Planned as part of
# M8 for system workloads; M7 for tenant HA opt-in.
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-system-ha
  labels:
    app.kubernetes.io/part-of: hosting-platform
    platform.phoenix-host.net/tier: system-ha
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "3"
  staleReplicaTimeout: "30"
  fsType: "ext4"
  dataLocality: "disabled"
  recurringJobSelector: '[{"name":"default","isGroup":true}]'
  # M-NS-2: pin platform replicas to system server nodes only.
  # Worker nodes are tagged "" (empty) so this nodeSelector excludes
  # them — a fresh platform PVC is provisioned exclusively across
  # nodes with the "system" Longhorn tag (see syncNodesOnce in
  # backend/src/modules/nodes/k8s-sync.ts).
  nodeSelector: "system"
---
# M13: 1-replica counterpart to longhorn-system-ha for fresh installs
# that haven't reached the 3-server HA threshold yet. The platform
# StatefulSets (postgres, stalwart-mail) reference -ha by default but
# the platform-storage-policy reconciler patches Volume.spec.
# numberOfReplicas live to follow the operator's chosen tier (no
# StorageClass swap, which would require StatefulSet recreation).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-system-local
  labels:
    app.kubernetes.io/part-of: hosting-platform
    platform.phoenix-host.net/tier: system-local
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fsType: "ext4"
  dataLocality: "best-effort"
  recurringJobSelector: '[{"name":"default","isGroup":true}]'
  # M-NS-2: still system-only — single replica, but it must land on a
  # tagged server (not the worker, which is reserved for tenants).
  nodeSelector: "system"
---
# Unified tenant StorageClass. Replaces the previous
# longhorn-tenant-local + longhorn-tenant-ha pair.
#
# Rationale: PVC.spec.storageClassName is immutable on a bound PVC, so
# splitting tier semantics across two SCs forced a snapshot+restore
# migration to change a tenant's tier — not workable. Following the
# system-tier pattern, we keep ONE SC and treat the local↔HA flip as a
# live `Volume.spec.numberOfReplicas` patch on the Longhorn CR. The
# k8s-provisioner sets the initial replica count at PVC create
# (1 for Local, 2 for HA) by post-patching the freshly-bound Volume.
#
# dataLocality=best-effort means Longhorn places one replica on the
# pod's node (= the operator's chosen worker), so reads/writes are
# node-local. The second replica (HA tier) goes wherever Longhorn has
# capacity. Local-tier failure = restore from backup. HA-tier failure =
# automatic pod reschedule + attach to the surviving replica
# (~30-90s outage), enabled by tier-aware nodeAffinity in the workload
# spec (required for Local, preferred for HA).
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-tenant
  labels:
    app.kubernetes.io/part-of: hosting-platform
    platform.phoenix-host.net/tier: tenant
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  # Initial value only. The k8s-provisioner patches Volume.spec.
  # numberOfReplicas to the per-client tier setting after PVC binding.
  # Subsequent tier changes also live-patch via applyTenantTier.
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fsType: "ext4"
  dataLocality: "best-effort"
  recurringJobSelector: '[{"name":"default","isGroup":true}]'
  # No nodeSelector — tenant volumes land on any host-client-workloads
  # node. The `system` tag is reserved for platform PVCs.
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-mail-local
  labels:
    app.kubernetes.io/part-of: hosting-platform
    platform.phoenix-host.net/tier: mail-local
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "1"
  staleReplicaTimeout: "30"
  fsType: "ext4"
  dataLocality: "best-effort"
  recurringJobSelector: '[{"name":"default","isGroup":true}]'
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-mail-ha
  labels:
    app.kubernetes.io/part-of: hosting-platform
    platform.phoenix-host.net/tier: mail-ha
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "30"
  fsType: "ext4"
  dataLocality: "disabled"
  recurringJobSelector: '[{"name":"default","isGroup":true}]'
