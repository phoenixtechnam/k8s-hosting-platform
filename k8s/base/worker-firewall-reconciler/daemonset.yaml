# worker-firewall-reconciler — keeps host nft sets tenant_ports_{tcp,udp}
# in sync with Pods scheduled to this node.
#
# bootstrap.sh declares the sets empty at install time. This DaemonSet is
# the only writer thereafter: every 30s it lists Pods on its own node,
# computes the union of `spec.containers[*].ports[*].hostPort` and the
# annotations `platform.io/firewall-{tcp,udp}-ports`, and converges the
# sets via `nft add element` / `nft delete element`.
#
# The pod runs on every node (server + worker) because hostPort can land
# anywhere — but the catalog deploy gate (read in backend) decides whether
# we let an annotated workload schedule onto a server-role node, gated by
# `system_settings.allow_host_ports_server`.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: worker-firewall-reconciler
  namespace: platform-system
  labels:
    app: worker-firewall-reconciler
    app.kubernetes.io/part-of: hosting-platform
spec:
  selector:
    matchLabels:
      app: worker-firewall-reconciler
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: worker-firewall-reconciler
    spec:
      serviceAccountName: worker-firewall-reconciler
      # Talk to the host's netfilter stack directly. Without hostNetwork,
      # `nft` would mutate the container's own (empty) ruleset.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Run on every node — including control-plane / server-role nodes.
      # The catalog deploy gate enforces the per-role toggle; the pod
      # itself only mirrors what's already scheduled to its node.
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: reconciler
          image: ghcr.io/phoenixtechnam/hosting-platform/worker-firewall-reconciler:latest # {"$imagepolicy": "flux-system:worker-firewall-reconciler"}
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: RECONCILE_INTERVAL
              value: "30"
          securityContext:
            # Privileged because nft talks to netfilter via netlink and
            # the simplest host-firewall management path is straight
            # CAP_NET_ADMIN + privileged. Matches the established
            # bash-based reconciler pattern in the repo.
            privileged: true
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
