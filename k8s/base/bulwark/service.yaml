# Internal Service in front of Bulwark.
#
# In production this is NOT the public-facing entrypoint — the
# `bulwark-impersonator` sidecar Service (k8s/base/bulwark-impersonator/)
# sits in front and handles both transparent proxying and the
# JWT-signed `/_impersonate?token=...` flow.
#
# Direct access to this Service is allowed in-cluster for diagnostics
# and for the impersonator's server-side `/api/auth/stalwart-context`
# POSTs.
apiVersion: v1
kind: Service
metadata:
  name: bulwark
  namespace: mail
  labels:
    app: bulwark
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  type: ClusterIP
  selector:
    app: bulwark
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
