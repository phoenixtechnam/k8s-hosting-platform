# Public-facing Service for Bulwark webmail.
#
# Master-user impersonation is handled by Bulwark's native
# /api/auth/impersonate route (issue #296) — no sidecar in between.
# IngressRoutes target this Service directly.
apiVersion: v1
kind: Service
metadata:
  name: bulwark
  namespace: mail
  labels:
    app: bulwark
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  type: ClusterIP
  selector:
    app: bulwark
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
