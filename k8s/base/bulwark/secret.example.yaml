# EXAMPLE — not included in kustomization.yaml.
#
# Operators provision the real Secret per environment:
#   - Dev: k8s/overlays/dev/bulwark/secret.yaml (plaintext dev defaults)
#   - Staging / Production: sealed-secrets or SOPS-encrypted
#
# bootstrap.sh generates BULWARK_JWT_AUTH_SECRET on first install and
# mirrors the value into platform-api's WEBMAIL_JWT_SECRET so the two
# sides share one HMAC key. The Stalwart master credentials are copied
# from stalwart-mail-secrets.
#
# Keys:
#   ADMIN_PASSWORD                    — Bulwark /admin/login (admin dashboard)
#   SESSION_SECRET                    — 32+ char random. Encrypts session cookies.
#                                       Generate: openssl rand -base64 32
#   BULWARK_JWT_AUTH_SECRET           — ≥32-char HMAC HS256 secret. MUST equal
#                                       platform-api's WEBMAIL_JWT_SECRET.
#                                       Generate: openssl rand -hex 32
#   BULWARK_STALWART_MASTER_USER      — e.g. master@<apex>. Stalwart account
#                                       with the Administrator role.
#   BULWARK_STALWART_MASTER_PASSWORD  — password for the master account.
apiVersion: v1
kind: Secret
metadata:
  name: bulwark-secrets
  namespace: mail
  labels:
    app: bulwark
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  ADMIN_PASSWORD: "REPLACE_ME_admin_password"
  SESSION_SECRET: "REPLACE_ME_at_least_32_random_bytes_base64"
  BULWARK_JWT_AUTH_SECRET: "REPLACE_ME_at_least_32_random_hex_chars"
  BULWARK_STALWART_MASTER_USER: "master@example.test"
  BULWARK_STALWART_MASTER_PASSWORD: "REPLACE_ME_master_password"
