# Bulwark webmail — JMAP-native client for Stalwart Mail Server.
#
# Master-user impersonation is handled by Bulwark's native
# /api/auth/impersonate route (upstream issue #296, shipped on
# webmail-beta:latest 2026-05-16). Our previous impersonator sidecar
# (k8s/base/bulwark-impersonator/) is retired.
#
# The Deployment ships as part of the platform base but is NOT included
# by k8s/base/kustomization.yaml — overlays opt-in.
#
# Image is pinned by digest. Source: ghcr.io/bulwarkmail/webmail-beta
# (built from the main branch — see Bulwark's docker-publish.yml which
# names main-branch builds `<repo>-beta`). Bump procedure documented in
# ADR-039.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulwark
  namespace: mail
  labels:
    app: bulwark
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
  annotations:
    # Roll on bulwark-secrets change. The secret carries:
    #   - ADMIN_PASSWORD              admin dashboard login
    #   - SESSION_SECRET              encrypts session cookies
    #   - BULWARK_JWT_AUTH_SECRET     verifies platform-api's impersonation JWTs
    #   - BULWARK_STALWART_MASTER_USER
    #   - BULWARK_STALWART_MASTER_PASSWORD
    secret.reloader.stakater.com/reload: bulwark-secrets
    # Flux SSA: Merge so platform-api's webmail-router reconciler can
    # patch container env (e.g. on engine flip) without Flux reverting.
    kustomize.toolkit.fluxcd.io/ssa: Merge
spec:
  # Replicas owned by platform-storage-policy (mirrors Roundcube). Fresh
  # clusters land at k8s default = 1 until the policy fires.
  strategy:
    # Stateless except for the /app/data PVC (admin config + per-user
    # settings). Multi-replica deployments all mount the same RWO PVC —
    # only one Mounts, so HA > 1 requires switching to RWX at provision.
    # Single-replica + rolling-update with maxUnavailable=0 / maxSurge=1
    # gives zero-downtime image bumps.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bulwark
  template:
    metadata:
      labels:
        app: bulwark
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: webmail
    spec:
      # One-per-node placement; DoNotSchedule keeps a node-failure window
      # from leaving 2 pods on one surviving node + 0 on another.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: bulwark
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup is critical — Bulwark writes to four subdirectories
        # under /app/data (admin/, settings/, telemetry/, version-check/).
        # A single PVC mount with fsGroup=1000 makes the entire tree
        # writable by the non-root container UID.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bulwark
          # ghcr.io/bulwarkmail/webmail-beta@sha256:958c8e87... — beta
          # channel built from upstream main. Includes the
          # /api/auth/impersonate route (issue #296). Bump per ADR-039.
          image: ghcr.io/bulwarkmail/webmail-beta@sha256:958c8e872026087c10a65bd1d16543fb44027c924c1e6314f30888115acc9089
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          env:
            # JMAP server URL — must be browser-reachable because
            # Bulwark's SPA fetches `${JMAP_SERVER_URL}/.well-known/jmap`
            # tenant-side after login. Overlays override per env.
            - name: JMAP_SERVER_URL
              value: "https://stalwart.${DOMAIN}"
            - name: ALLOW_CUSTOM_JMAP_ENDPOINT
              value: "false"
            - name: STALWART_FEATURES
              value: "true"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            - name: SETTINGS_SYNC_ENABLED
              value: "true"
            - name: ADMIN_DATA_DIR
              value: "/app/data/admin"
            - name: SETTINGS_DATA_DIR
              value: "/app/data/settings"
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: ADMIN_PASSWORD
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: SESSION_SECRET
            # Impersonation envs (Bulwark issue #296). When all three are
            # set Bulwark exposes GET /api/auth/impersonate?token=<jwt>.
            # JWT contract: HS256, ≥32-char secret, claims
            # {iss="platform-api/webmail", iat, exp, jti, mailbox};
            # lifetime ≤300s; replay-protected via in-memory jti LRU.
            # BULWARK_JWT_AUTH_SECRET MUST equal platform-api's
            # WEBMAIL_JWT_SECRET so platform-api can sign tokens Bulwark
            # verifies. bootstrap.sh generates one shared value.
            - name: BULWARK_JWT_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: BULWARK_JWT_AUTH_SECRET
            - name: BULWARK_STALWART_MASTER_USER
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: BULWARK_STALWART_MASTER_USER
            - name: BULWARK_STALWART_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bulwark-secrets
                  key: BULWARK_STALWART_MASTER_PASSWORD
            # Issuer claim Bulwark checks against (defaults to
            # "platform-api/webmail" in the route handler — set
            # explicitly so the contract is self-documenting on
            # both sides).
            - name: BULWARK_JWT_AUTH_ISSUER
              value: "platform-api/webmail"
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 36
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bulwark-data
