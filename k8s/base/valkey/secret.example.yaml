# Valkey auth Secret — operator generates a random password during
# bootstrap.sh.
#
# Why a Secret (not ConfigMap value):
#   Valkey config has the password inline (`requirepass <pw>`).
#   Storing it in a ConfigMap would surface in `kubectl describe`
#   output, ConfigMap diffs in Flux, and any in-cluster service that
#   can read ConfigMaps. A Secret is the standard envelope.
#
# bootstrap.sh creates this Secret with a fresh `openssl rand -hex 32`
# value. Operator can rotate later via the admin panel (TODO: add
# rotation endpoint similar to mail-master rotation).
---
apiVersion: v1
kind: Secret
metadata:
  name: valkey-auth
  namespace: redis-system
  labels:
    app: valkey
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  # 32-byte hex string. Generate with: openssl rand -hex 32
  REDIS_PASSWORD: "REPLACE_ME_WITH_RANDOM_HEX"
