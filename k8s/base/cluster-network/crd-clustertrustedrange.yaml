# ClusterTrustedRange — CIDR or single IP that the host firewall trusts
# for full TCP/UDP. Converged onto every node's nft set
# `trusted_ranges_v{4,6}` by firewall-reconciler. Cluster-scoped
# because firewall trust is a cluster-wide concern, not per-namespace.
#
# Lifecycle:
#   - Operator creates via Settings → Cluster Networking → Trusted Ranges
#     (admin panel, Phase 4-5). Bootstrap-time entries from --allow-source
#     are seeded directly into nft and are NOT mirrored as CRs;
#     re-applying them via the UI is idempotent (same CIDR → same nft
#     set member).
#   - Reconciler (Phase 3) reads spec.cidr, normalizes (/32 or /128
#     implied for bare IPs), and ensures the entry is present in the
#     local nft set. Writes status.normalizedCidr + family + lastSyncedAt.
#   - Deletion removes the entry from nft on every node.
#
# Validation:
#   - openAPIV3Schema pattern is a coarse first filter (matches v4/v6
#     bare or with prefix). The reconciler does the authoritative
#     ipaddress validation and writes a Failed condition on bad input.
#   - A future ValidatingAdmissionWebhook may reject CIDRs that overlap
#     the pod CIDR (10.42.0.0/16). Out of scope for v1alpha1.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustertrustedranges.networking.platform.phoenix-host.net
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: cluster-network
spec:
  group: networking.platform.phoenix-host.net
  scope: Cluster
  names:
    plural: clustertrustedranges
    singular: clustertrustedrange
    kind: ClusterTrustedRange
    shortNames:
      - ctr
      - trustedrange
    categories:
      - hosting-platform
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - cidr
              properties:
                cidr:
                  type: string
                  description: |
                    Source range to trust. Accepts:
                      - bare IPv4 (1.2.3.4)            → /32 implied
                      - IPv4 CIDR (10.0.0.0/16)
                      - bare IPv6 (2001:db8::1)        → /128 implied
                      - IPv6 CIDR (fd00::/8)
                    The pattern is a coarse first filter; the
                    firewall-reconciler does authoritative IP/CIDR
                    validation via Go's net/netip and writes a Failed
                    condition on bad input. The IPv4 prefix is bounded
                    0..32 and the IPv6 prefix is bounded 0..128 by
                    the regex itself, so /33 and /129 are rejected at
                    admission time.
                  pattern: '^(([0-9]{1,3}\.){3}[0-9]{1,3}(/([0-9]|[12][0-9]|3[0-2]))?|[0-9a-fA-F:]+(/([0-9]|[1-9][0-9]|1[01][0-9]|12[0-8]))?)$'
                  maxLength: 64
                  x-kubernetes-validations:
                    - rule: "!self.endsWith('/0')"
                      message: "CIDR /0 (allow-all) is not permitted; pick a specific prefix."
                description:
                  type: string
                  description: 'Operator-readable purpose. e.g. "NYC office VPN", "Prometheus scraper", "Hetzner private LAN".'
                  maxLength: 200
                addedBy:
                  type: string
                  description: 'Subject (user email or system actor) that created this entry. Set by the platform-api on POST.'
                  maxLength: 200
            status:
              type: object
              properties:
                normalizedCidr:
                  type: string
                  description: 'CIDR after /32 or /128 implication; reconciler-written.'
                  maxLength: 64
                family:
                  type: string
                  enum:
                    - v4
                    - v6
                lastSyncedAt:
                  type: string
                  format: date-time
                  description: 'Most recent reconciler tick that observed this CR.'
                observedGeneration:
                  type: integer
                  format: int64
                  description: 'metadata.generation the reconciler last observed; clients use this to detect stale status.'
                conditions:
                  type: array
                  description: 'Standard k8s conditions list. Type is the unique key.'
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        maxLength: 64
                      status:
                        type: string
                        enum:
                          - 'True'
                          - 'False'
                          - Unknown
                      reason:
                        type: string
                        maxLength: 128
                      message:
                        type: string
                        maxLength: 1024
                      lastTransitionTime:
                        type: string
                        format: date-time
      additionalPrinterColumns:
        - name: CIDR
          type: string
          jsonPath: .spec.cidr
        - name: Family
          type: string
          jsonPath: .status.family
        - name: Description
          type: string
          jsonPath: .spec.description
          priority: 1
        - name: Synced
          type: date
          jsonPath: .status.lastSyncedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
