apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
data:
  # Environment identifier — overlays patch this per environment.
  environment: "development"
  log-level: "info"

  # Ingress / TLS — overlays MUST patch these with real values.
  ingress-base-domain: "${DOMAIN}"
  ingress-default-ipv4: ""
  cluster-issuer-name: "letsencrypt-prod-http01"

  # Storage — Longhorn is the default; dev overlay can override to local-path.
  default-storage-class: "longhorn"

  # Frontend URLs — API is same-origin (empty = proxied by frontend nginx).
  # client-url is only needed by admin panel for impersonation links.
  admin-url: "https://admin.${DOMAIN}"
  client-url: "https://client.${DOMAIN}"

  # CORS — with same-origin proxy, CORS is not strictly needed for browser
  # requests. Kept for API consumers like Swagger UI or external tools.
  cors-origins: "https://admin.${DOMAIN},https://client.${DOMAIN}"

  # Per-client sidecar images. local.sh imports these into DinD's
  # containerd with the bare names (matching this default). Staging
  # and production overlays swap to the GHCR paths so the pods can
  # pull from a real registry.
  file-manager-image: "file-manager-sidecar:latest"

  # Private Worker — per-client tunnel agent the client runs at home.
  # tunnel-base-url is the dial-in FQDN. Cluster-side frps image is the
  # upstream frp server; agent docker image is what clients run at home.
  # Overlays MUST patch tunnel-base-url with the real public hostname
  # (the wildcard DNS entry must point at cluster ingress).
  tunnel-base-url: "wss://tunnels.${DOMAIN}"
  private-worker-frps-image: "fatedier/frps:v0.62.1"
  private-worker-agent-image: "ghcr.io/phoenixtechnam/hosting-platform/private-worker-agent:latest"
