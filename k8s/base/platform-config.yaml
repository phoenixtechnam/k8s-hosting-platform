apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
data:
  # Environment identifier — overlays patch this per environment.
  environment: "development"
  log-level: "info"

  # Ingress / TLS — overlays MUST patch these with real values.
  ingress-base-domain: "k8s-platform.local-dev"
  ingress-default-ipv4: ""
  cluster-issuer-name: "letsencrypt-prod-http01"

  # Storage — Longhorn is the default; dev overlay can override to local-path.
  default-storage-class: "longhorn"

  # Frontend URLs — API is same-origin (empty = proxied by frontend nginx).
  # client-url is only needed by admin panel for impersonation links.
  admin-url: "https://admin.k8s-platform.local-dev"
  client-url: "https://client.k8s-platform.local-dev"

  # CORS — with same-origin proxy, CORS is not strictly needed for browser
  # requests. Kept for API consumers like Swagger UI or external tools.
  cors-origins: "https://admin.k8s-platform.local-dev,https://client.k8s-platform.local-dev"
