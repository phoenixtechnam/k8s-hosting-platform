apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: platform
  labels:
    app: platform-api
    app.kubernetes.io/part-of: hosting-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      serviceAccountName: platform-api
      containers:
        - name: api
          image: ghcr.io/phoenixtechnam/hosting-platform/backend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-jwt-secret
                  key: secret
            - name: REDIS_URL
              value: redis://redis.platform.svc.cluster.local:6379
            - name: OIDC_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oidc-encryption-key
            - name: PLATFORM_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: internal-secret
            - name: DEFAULT_STORAGE_CLASS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: default-storage-class
                  optional: true
            - name: INGRESS_BASE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ingress-base-domain
                  optional: true
            - name: INGRESS_DEFAULT_IPV4
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ingress-default-ipv4
                  optional: true
            - name: CLUSTER_ISSUER_NAME
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: cluster-issuer-name
                  optional: true
            - name: PLATFORM_ENV
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: environment
                  optional: true
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: cors-origins
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: platform
  labels:
    app: platform-api
spec:
  selector:
    app: platform-api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
