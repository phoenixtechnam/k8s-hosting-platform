apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: platform
  labels:
    app: platform-api
    app.kubernetes.io/part-of: hosting-platform
spec:
  # M14: replicas removed — owned by platform-storage-policy
  # reconciler (Apply HA / Apply Local). Flux SSA would otherwise
  # revert our imperative scale within ~30s.
  selector:
    matchLabels:
      app: platform-api
  template:
    metadata:
      labels:
        app: platform-api
    spec:
      serviceAccountName: platform-api
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: platform-api
      containers:
        - name: api
          image: ghcr.io/phoenixtechnam/hosting-platform/backend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-jwt-secret
                  key: secret
            # Cut 3 (2026-05-04): independent webmail SSO signing secret
            # (separate from JWT_SECRET so a leak of one doesn't enable
            # forged tokens of the other). Mirrors the Roundcube
            # `roundcube-secrets/JWT_AUTH_SECRET` value so platform-api's
            # /api/v1/admin/mail/sso?to= flow signs tokens Roundcube can
            # validate. Marked optional so non-mail clusters still come
            # up; the mail SSO endpoint returns a clear error when unset.
            - name: WEBMAIL_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-webmail-jwt
                  key: WEBMAIL_JWT_SECRET
                  optional: true
            # Admin seed credentials — only consumed during db/seed.js on
            # startup; harmless to leave set after seed completes. Secret
            # is created by bootstrap.sh and marked optional so the Pod
            # still comes up on environments that supply it differently.
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: platform-admin-seed
                  key: ADMIN_EMAIL
                  optional: true
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-admin-seed
                  key: ADMIN_PASSWORD
                  optional: true
            # REDIS_URL removed M14 — Redis replaced by in-memory LRU
            # in backend/src/shared/redis.ts. Config still accepts the
            # var (zod default) to remain backward-compatible during
            # rolling deploys but it is no longer consumed.
            - name: OIDC_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oidc-encryption-key
            - name: PLATFORM_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: internal-secret
            - name: DEFAULT_STORAGE_CLASS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: default-storage-class
                  optional: true
            - name: INGRESS_BASE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ingress-base-domain
                  optional: true
            # Canonical apex domain. Prefer this over INGRESS_BASE_DOMAIN on
            # new deploys. Subdomains (admin, client, dex, webmail, mail,
            # stalwart) derive from this via config/domains.ts.
            - name: PLATFORM_BASE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: platform-base-domain
                  optional: true
            # Platform version — consumed by /api/v1/admin/version-info
            # so the Admin Panel shows the real running version. Sourced
            # from the platform-version ConfigMap (written by CI at
            # build time) with a falsy default so the service correctly
            # reports "unknown" rather than a stale 0.1.0.
            - name: PLATFORM_VERSION
              valueFrom:
                configMapKeyRef:
                  name: platform-version
                  key: version
                  optional: true
            # Build branch (main, staging, stable). Surfaced under the
            # admin/client panel sidebar title via /auth/runtime-info so
            # operators can tell at a glance which lane the running
            # build came from. CI writes this to the platform-version
            # ConfigMap alongside `version` (see build-deploy.yml).
            - name: PLATFORM_BRANCH
              valueFrom:
                configMapKeyRef:
                  name: platform-version
                  key: branch
                  optional: true
            # Pod + node identity from the K8s downward API. Surfaced
            # via /auth/runtime-info so the UI can show the user which
            # platform-api replica served them — useful for live debug
            # of replica-specific weirdness without kubectl.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # PLATFORM_ENV is defined further down — don't redeclare.
            # Per-client sidecar image (optional — default baked into code
            # for local-dev uses the bare name imported into DinD containerd).
            - name: FILE_MANAGER_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: file-manager-image
                  optional: true
            # Private Worker — overlay-supplied per environment.
            - name: TUNNEL_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: tunnel-base-url
                  optional: true
            - name: PRIVATE_WORKER_FRPS_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: private-worker-frps-image
                  optional: true
            - name: PRIVATE_WORKER_AGENT_IMAGE
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: private-worker-agent-image
                  optional: true
            # System-settings defaults populated by seed.ts on a fresh install.
            # All optional — when unset the seed leaves the column NULL and
            # the admin can fill it in via the UI later. Values come from
            # bootstrap.sh's platform-config ConfigMap in production.
            - name: ADMIN_PANEL_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: admin-url
                  optional: true
            - name: CLIENT_PANEL_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: client-url
                  optional: true
            - name: SUPPORT_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: support-email
                  optional: true
            - name: SUPPORT_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: support-url
                  optional: true
            - name: PLATFORM_NAME
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: platform-name
                  optional: true
            # Name of the Secret that holds the TLS cert for the platform
            # Ingress. Dev uses a self-signed cert in `platform-dev-tls`;
            # prod uses cert-manager-issued `platform-tls`. The ingress
            # reconciler stamps this into spec.tls[0].secretName when
            # rebuilding Ingress rules from admin/client panel URLs.
            - name: PLATFORM_TLS_SECRET_NAME
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: platform-tls-secret-name
                  optional: true
            # Cross-namespace mirror of the Stalwart admin password.
            # The backend reads /etc/stalwart-creds/ADMIN_SECRET_PLAIN
            # at JMAP call time so a rotated password lands within the
            # kubelet's ~60s Secret-volume refresh window — no
            # platform-api restart required. Volume mount + Secret are
            # below; rotate-jmap.ts keeps the Secret in sync via its
            # mirrorNamespace/mirrorSecretName options.
            - name: STALWART_ADMIN_CREDS_DIR
              value: /etc/stalwart-creds
            - name: INGRESS_DEFAULT_IPV4
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ingress-default-ipv4
                  optional: true
            - name: CLUSTER_ISSUER_NAME
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: cluster-issuer-name
                  optional: true
            # Passkey (WebAuthn) RP configuration. RP_ID must be the
            # registrable suffix shared by both panel domains (e.g.
            # phoenix-host.net for admin.phoenix-host.net + client.X).
            # ORIGINS is a CSV of fully-qualified panel origins; both
            # admin and client panel URLs MUST be included.
            # See: backend/src/modules/auth/passkey-service.ts → loadPasskeyConfig
            - name: PLATFORM_PASSKEY_RP_ID
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: passkey-rp-id
                  optional: true
            - name: PLATFORM_PASSKEY_RP_NAME
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: passkey-rp-name
                  optional: true
            - name: PLATFORM_PASSKEY_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: passkey-origins
                  optional: true
            - name: PLATFORM_ENV
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: environment
                  optional: true
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: cors-origins
                  optional: true
            # Cookie Domain attribute for the platform_session cookie. Empty
            # means "no Domain=" (host-only cookie, only admin.* gets it).
            # Set to ".<apex>" to share the session across all platform
            # subdomains — required for the Stalwart web-admin auth_request
            # gate since that request lands on stalwart.<apex>, not admin.
            - name: SESSION_COOKIE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: session-cookie-domain
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # 1500m / 1Gi matches ADR-036 "Locked decisions": per-pod
              # restic concurrency cap = 4, platform-api memory budget
              # 1 GiB. Prior 500m / 512Mi caused OOMKill mid-restic-stream
              # — staging swqhg 2026-05-11T10:35:48Z + l4jn7 00:31:37Z.
              # The restic capture pipeline (highWaterMark 256 KiB +
              # --pack-size 64 in-flight pack ~48 MiB) plus ambient
              # platform-api workload (mail-stats, certificate-reconciler,
              # principals-sync) does not fit in 512 MiB.
              cpu: 1500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            # Snapshot store — the same hostPath the storage-lifecycle
            # snapshot Jobs mount in tenant namespaces. platform-api
            # uses it to stat + delete finished tarballs (Jobs write
            # the files; the service reads their size back via stat
            # and later reaps expired ones).
            - name: platform-snapshots
              mountPath: /snapshots
            # Cross-namespace mirror of mail/stalwart-admin-creds.
            # platform-api reads ADMIN_SECRET_PLAIN at call time for
            # JMAP authentication. The mirror is kept in sync by the
            # rotate-jmap flow (mirrorNamespace/mirrorSecretName).
            # Marked optional so platform-api still comes up on
            # clusters that pre-date v016; the rotate route will 503
            # cleanly until the mirror exists.
            - name: stalwart-creds
              mountPath: /etc/stalwart-creds
              readOnly: true
      volumes:
        - name: platform-snapshots
          hostPath:
            path: /var/lib/platform/snapshots
            type: DirectoryOrCreate
        - name: stalwart-creds
          secret:
            secretName: platform-stalwart-creds
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: platform-api
  namespace: platform
  labels:
    app: platform-api
spec:
  selector:
    app: platform-api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
