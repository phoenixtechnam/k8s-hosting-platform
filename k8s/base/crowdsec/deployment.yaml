# CrowdSec local-API (LAPI) Deployment.
#
# A single-replica CrowdSec agent that hosts the Local API (LAPI) at
# :8080 and exposes the bouncer endpoint at :8080/v1/decisions. The
# Traefik bouncer plugin (loaded into the Traefik DaemonSet via
# scripts/bootstrap.sh) queries this Service on each request to check
# IP reputation.
#
# Architecture choice — LAPI-only, no log acquisition:
#   * We are NOT scraping logs from Traefik / web servers here. Log
#     parsing would require Calico-style sidecars on every pod and is
#     a much bigger commitment. Instead, we rely entirely on the
#     CrowdSec community blocklist (free tier) which already covers
#     ~6M known-bad IPs (DDoS sources, scanners, brute-forcers).
#   * The bouncer in Traefik queries this LAPI for decisions; the
#     community blocklist is pulled on a 1-hour interval by CrowdSec
#     itself (no operator action required).
#
# Persistence:
#   * SQLite DB at /var/lib/crowdsec/data/crowdsec.db backed by a 1GiB
#     PVC. Survives pod restarts so the bouncer key + cached
#     decisions don't have to be re-issued.
#   * NB: production-scale operators can swap to Postgres by setting
#     DB_TYPE=postgres + DB_HOST=... env vars and using a
#     CNPG Cluster — out of scope for this baseline.
#
# Single replica is correct here — CrowdSec LAPI is a single-writer
# system (the bouncer key registration + decision cache update both
# need consistent state). Operators needing HA can run the
# crowdsec-engine in a separate Deployment and point LAPI at a shared
# Postgres.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec
  namespace: crowdsec
  labels:
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  replicas: 1
  strategy:
    # Recreate so the SQLite file isn't opened by two pods simultaneously.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: crowdsec
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crowdsec
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: waf
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: crowdsec
          # v1.7.8 (2026-05-11) — latest stable on the v1.7.x line. Includes
          # CVE patches + LAPI metrics-endpoint improvements since v1.7.0.
          image: docker.io/crowdsecurity/crowdsec:v1.7.8
          imagePullPolicy: IfNotPresent
          env:
            - name: DISABLE_AGENT
              # No log acquisition needed — we rely on the community
              # blocklist. Setting this skips the parsing loop so the
              # container uses ~30MB instead of ~150MB.
              value: "true"
            - name: LOCAL_API_URL
              value: "http://127.0.0.1:8080"
            - name: BOUNCER_KEY_traefik
              # The bouncer key is mounted from a Secret + referenced
              # by env so CrowdSec auto-registers the bouncer on
              # startup. Same key value lives in the Traefik plugin
              # config (Middleware spec.plugin.crowdsec.crowdsecLapiKey)
              # — see bootstrap.sh generate_crowdsec_bouncer_key().
              # Secret data key is `bouncer-key` (NOT `traefik-bouncer-
              # key`) so the file projection in the Traefik pod at
              # /var/run/secrets/crowdsec/bouncer-key matches the
              # Middleware's crowdsecLapiKeyFile path.
              valueFrom:
                secretKeyRef:
                  name: crowdsec-bouncer-key
                  key: bouncer-key
          ports:
            - name: lapi
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: lapi
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: lapi
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: false
          lifecycle:
            postStart:
              # `cscli capi status` requires /etc/crowdsec/hub/.index.json
              # which is downloaded by `cscli hub update`. The config
              # volume is emptyDir (pod-restart-ephemeral), so without
              # this hook every fresh pod reports CAPI as failed even
              # though credentials are valid + community blocklist is
              # enabled. Bug observed 2026-05-20 — the platform-api
              # status panel showed "Community blocklist: disabled
              # (CAPI auth failed)" until an operator manually ran
              # `cscli hub update`.
              #
              # Retry in-shell because LAPI may not be Ready when the
              # postStart hook fires; the 3-attempt loop covers the
              # typical 1-5s startup window. Failure is non-fatal —
              # the container still starts (LAPI itself doesn't need
              # the hub index).
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    for i in 1 2 3; do
                      cscli hub update && break
                      sleep 2
                    done
          volumeMounts:
            - name: data
              mountPath: /var/lib/crowdsec/data
            - name: config
              mountPath: /etc/crowdsec
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: crowdsec-data
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: crowdsec-data
  namespace: crowdsec
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
# PodDisruptionBudget — explicit minAvailable=0 (Recreate strategy +
# SQLite single-writer means the pod will go down during node drains
# regardless). Documents intent: operators upgrading to multi-replica
# (Postgres backend) can flip this to minAvailable: 1.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: crowdsec
  namespace: crowdsec
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: crowdsec
---
apiVersion: v1
kind: Service
metadata:
  name: crowdsec
  namespace: crowdsec
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: crowdsec
  ports:
    - name: lapi
      port: 8080
      targetPort: lapi
      protocol: TCP
