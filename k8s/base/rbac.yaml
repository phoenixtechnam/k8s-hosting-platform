# ClusterRole: platform-admin — full access to platform and hosting namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-admin
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers", "clusterissuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# ClusterRole: platform-api — for the management API service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-api
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "resourcequotas"]
    verbs: ["*"]
  # Subresource: pod logs (used by deployments/routes.ts and waf-log-scraper)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Subresource: pods/exec — used directly by SQL Manager (kubectl exec into
  # DB pods to run queries) and indirectly via RBAC privilege-escalation
  # prevention (platform-api must hold any permission it grants to
  # sub-roles like sftp-gateway's file-manager role). @kubernetes/client-node
  # v1 establishes the exec channel via a WebSocket GET, so `get` is also
  # required alongside `create`.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  # Subresource: services/proxy — used by the File Manager proxy path
  # (backend hits the apiserver at /api/v1/namespaces/<ns>/services/
  # <svc>:<port>/proxy/<fm-endpoint> to reach the tenant's file-manager
  # sidecar). K8s treats subresources as distinct resources for RBAC, so
  # the wildcard on top-level `services` above does NOT grant this. As
  # with pods/exec, the apiserver uses GET for read operations and
  # POST/create for write operations, so both verbs are required.
  - apiGroups: [""]
    resources: ["services/proxy"]
    verbs: ["get", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["*"]
  # Subresource: deployment scale (used by k8s-deployer for replicas patch)
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  # SFTP gateway exec Role/RoleBinding provisioning (file-manager/k8s-lifecycle.ts)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Pod metrics via metrics-server (resource-metrics.ts, deployments/routes.ts)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Node awareness: get/list for health checks and Phase 1 node pinning
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Phase 2c: the backend `certificates` module creates and manages
  # cert-manager Certificate CRs in customer namespaces. Issuers and
  # ClusterIssuers are read-only (operators provision them via
  # k8s/base/cert-manager/) so the backend can validate the selected
  # issuer exists, but cannot modify them.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers", "clusterissuers"]
    verbs: ["get", "list", "watch"]
---
# ServiceAccount for the management API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
---
# Bind platform-api role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-api-binding
  labels:
    app.kubernetes.io/part-of: hosting-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-api
subjects:
  - kind: ServiceAccount
    name: platform-api
    namespace: platform
---
# ClusterRole: hosting-readonly — for monitoring/support access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hosting-readonly
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
