# ClusterRole: platform-admin — full access to platform and hosting namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-admin
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps", "secrets", "persistentvolumeclaims"]
    verbs: ["*"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["*"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates", "issuers", "clusterissuers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# ClusterRole: platform-api — for the management API service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: platform-api
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets", "persistentvolumeclaims", "resourcequotas"]
    verbs: ["*"]
  # Cluster-scoped PV access — listing is needed for storage inventory,
  # delete for the deprovision flow's Released-PV cleanup
  # (tenant SC reclaimPolicy=Retain leaves PVs around after PVC delete;
  # the deprovision step purges them so re-provisioning doesn't conflict).
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "delete"]
  # Subresource: pod logs (used by deployments/routes.ts and waf-log-scraper)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Subresource: pods/exec — used directly by SQL Manager (kubectl exec into
  # DB pods to run queries) and indirectly via RBAC privilege-escalation
  # prevention (platform-api must hold any permission it grants to
  # sub-roles like sftp-gateway's file-manager role). @kubernetes/client-node
  # v1 establishes the exec channel via a WebSocket GET, so `get` is also
  # required alongside `create`.
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
  # Subresource: services/proxy — used by the File Manager proxy path
  # (backend hits the apiserver at /api/v1/namespaces/<ns>/services/
  # <svc>:<port>/proxy/<fm-endpoint> to reach the tenant's file-manager
  # sidecar). K8s treats subresources as distinct resources for RBAC, so
  # the wildcard on top-level `services` above does NOT grant this. As
  # with pods/exec, the apiserver uses GET for read operations and
  # POST/create for write operations, so both verbs are required.
  - apiGroups: [""]
    resources: ["services/proxy"]
    verbs: ["get", "create"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["*"]
  # Subresource: deployment + statefulset scale.
  # - deployments/scale: used by k8s-deployer for replicas patch.
  # - statefulsets/scale: used by system-snapshots restore orchestrator
  #   to scale a StatefulSet to 0 (detach Longhorn volume), revert, and
  #   scale back. K8s treats subresources as distinct for RBAC, so the
  #   `statefulsets` wildcard verb above does NOT grant this.
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "update", "patch"]
  # DaemonSets — read-only, used by cluster-health to surface
  # ingress-nginx + longhorn-manager readiness. Scoped to get/list/watch
  # because we never create or mutate DaemonSets from the API (bootstrap
  # + Helm own those).
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["*"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["*"]
  # SFTP gateway exec Role/RoleBinding provisioning (file-manager/k8s-lifecycle.ts)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Phase 4 cluster-scoped-refs-cleanup hook: lists ClusterRoleBindings
  # cluster-wide and deletes those whose subjects[*].namespace points
  # at a deleted tenant namespace (e.g. SFTP gateway per-tenant SAs
  # that were granted CRBs for impersonation). Without this the hook
  # surfaces a 403 retry envelope and orphan CRBs accumulate forever.
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterrolebindings"]
    verbs: ["get", "list", "delete"]
  # Pod metrics via metrics-server (resource-metrics.ts, deployments/routes.ts)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Node awareness: list/get for health checks and M1 node pinning,
  # plus patch so the admin API can update platform-managed labels
  # (node-role, host-client-workloads, ingress-mode) + taints
  # (server-only). `delete` is required for the M-NS-1 Drain-then-
  # Delete flow which removes a node from k8s after a successful drain.
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "delete"]
  # Subresource: nodes/proxy — used by getClientStoragePlacement to
  # query each node's kubelet `/stats/summary` endpoint for filesystem-
  # level usedBytes per PVC. Without this the API call silently falls
  # back to 0 and the storage table reports user-data usage as empty.
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]
  # M-NS-1: drain endpoint creates Eviction subresource objects.
  # Eviction is treated as a distinct subresource for RBAC even
  # though pods/* is already wildcarded above (the API server
  # checks "pods/eviction" specifically).
  - apiGroups: [""]
    resources: ["pods/eviction"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # CSINode resources surface which CSI drivers each node has registered
  # (cluster-health/service.ts uses listCSINode to flag nodes whose
  # Longhorn CSI plugin never finished registration). Built-in
  # storage.k8s.io/v1 — must be granted explicitly because the wildcard
  # on core "" group does not cover the storage API group.
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]
  # Phase 2c: the backend `certificates` module creates and manages
  # cert-manager Certificate CRs in customer namespaces. Issuers and
  # ClusterIssuers are read-only (operators provision them via
  # k8s/base/cert-manager/) so the backend can validate the selected
  # issuer exists, but cannot modify them.
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers", "clusterissuers"]
    verbs: ["get", "list", "watch"]
  # Phase B3: Longhorn backup-target reconciliation. The backend's
  # backup-config module owns the admin-panel UI for defining S3 backup
  # targets; activating one writes the `longhorn-backup-credentials`
  # Secret into the longhorn-system namespace AND patches the
  # BackupTarget/default CR. Keep these narrow — list/patch on the
  # BackupTarget, get/list for read-only inventory (Phase D).
  - apiGroups: ["longhorn.io"]
    resources: ["backuptargets", "backupvolumes", "backups", "snapshots", "nodes", "volumes", "recurringjobs", "replicas"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["longhorn.io"]
    resources: ["backuptargets"]
    verbs: ["update", "patch"]
  # Mirror node-role label → Longhorn node tag "system" (M-NS-2).
  # Lets the platform StorageClass restrict replicas to system servers.
  - apiGroups: ["longhorn.io"]
    resources: ["nodes"]
    verbs: ["patch"]
  # M13: platform-storage-policy patches volume.spec.numberOfReplicas
  # live on Longhorn Volume CRs to switch the platform's StatefulSets
  # (postgres, stalwart) between local (1×) and HA (3×) replication.
  # Phase D: client deprovision deletes orphan volumes left after PV
  # cleanup (CSI volume name == PV name; without delete, every client
  # deletion leaks a "detached" volume that counts against
  # storageScheduled until Longhorn refuses new replicas).
  - apiGroups: ["longhorn.io"]
    resources: ["volumes"]
    verbs: ["patch", "delete"]
  # fsck on detached volume needs to force-attach via the
  # VolumeAttachment CR (Longhorn 1.6+ uses attachment tickets to
  # coordinate attach/detach across competing consumers — direct
  # Volume.spec.nodeID patches are silently cleared by the mutation
  # webhook). The fsck flow patches a single ticket per volume:
  #   spec.attachmentTickets["platform-fsck"] = { id, type:
  #   'longhorn-api', nodeID, parameters: {disableFrontend:'false'} }
  # …and clears it on completion via merge-patch with null.
  - apiGroups: ["longhorn.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "patch"]
  # M14: Apply HA also scales the CNPG Cluster CR. apps/deployments
  # is already covered by the broader apps verbs:["*"] rule above.
  # PITR adds create+delete: the auto-promote path provisions a temp
  # cluster from a VolumeSnapshot, deletes the source, then recreates
  # the source from the temp's snapshot.
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "create", "patch", "delete"]
  # PITR uses the external-snapshotter API (snapshot.storage.k8s.io)
  # to wrap a Longhorn snapshot as a CSI VolumeSnapshot that CNPG
  # bootstrap.recovery.volumeSnapshots can consume. VolumeSnapshot is
  # namespace-scoped; VolumeSnapshotContent is cluster-scoped (hence
  # the ClusterRole grant).
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots", "volumesnapshotcontents"]
    verbs: ["get", "list", "create", "delete"]
  # The Backup-Now admin action creates Backup CRs directly; Longhorn's
  # controller then snapshots the volume and uploads to the active
  # BackupTarget. Snapshot CRs are needed for the two-step create-
  # snapshot-then-backup pattern some Longhorn versions require.
  - apiGroups: ["longhorn.io"]
    resources: ["backups", "snapshots"]
    verbs: ["create", "delete"]
  # PITR orchestrator suspends Flux's `platform` Kustomization for the
  # cutover window so its 5-min reconcile does not race delete-source +
  # recreate-source. Without this the orchestrator gets HTTP 409 on
  # recreate (Flux re-applied the cluster from git's bootstrap.initdb
  # mid-cutover) and the source comes up with an empty DB. Get/list are
  # for the resume-on-recovery path; patch is the suspend/resume verb.
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "patch"]
---
# ServiceAccount for the management API
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
---
# Bind platform-api role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: platform-api-binding
  labels:
    app.kubernetes.io/part-of: hosting-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: platform-api
subjects:
  - kind: ServiceAccount
    name: platform-api
    namespace: platform
---
# ClusterRole: hosting-readonly — for monitoring/support access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hosting-readonly
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services", "configmaps", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
