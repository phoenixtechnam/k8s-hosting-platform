# SFTP Gateway — K8s Exec-based architecture (ADR-027)
#
# Accepts SFTP/SCP/rsync/FTPS connections, authenticates against the
# platform backend, then execs sftp-server inside the client's
# file-manager pod via the K8s API. No PVC mounts needed — fully
# multi-node compatible.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sftp-gateway
  namespace: platform-system
  labels:
    app: sftp-gateway
---
# Read-only ClusterRole: list/get pods across client-* namespaces to find
# file-manager pods. Does NOT grant exec — that is scoped per-namespace
# via Roles created by the provisioner when a client namespace is set up.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sftp-gateway-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sftp-gateway-pod-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sftp-gateway-pod-reader
subjects:
  - kind: ServiceAccount
    name: sftp-gateway
    namespace: platform-system
---
# Per-namespace exec Role — created automatically by the backend provisioner
# in k8s-lifecycle.ts when ensureFileManagerRunning() is called. Each client
# namespace gets its own Role+RoleBinding scoping pod/exec to that namespace
# only. No cluster-wide exec ClusterRole exists.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sftp-gateway
  namespace: platform-system
  labels:
    app: sftp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sftp-gateway
  template:
    metadata:
      labels:
        app: sftp-gateway
    spec:
      serviceAccountName: sftp-gateway
      containers:
        - name: gateway
          image: ghcr.io/phoenixtechnam/hosting-platform/sftp-gateway:latest # {"$imagepolicy": "flux-system:sftp-gateway"}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 2222
              name: sftp
            - containerPort: 2121
              name: ftps
            - containerPort: 8080
              name: health
            # FTPS passive data ports (30000-30099) are negotiated directly
            # via the FTPS protocol. The LoadBalancer with externalTrafficPolicy
            # handles them without explicit containerPort entries.
          env:
            - name: BACKEND_URL
              value: "http://platform-api.platform.svc.cluster.local:3000"
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: internal-secret
            - name: SSH_HOST_KEY_PATH
              value: "/etc/ssh/keys/ssh_host_ed25519_key"
            - name: SSH_PORT
              value: "2222"
            - name: FTPS_PORT
              value: "2121"
            - name: FTPS_CERT_PATH
              value: "/etc/tls/tls.crt"
            - name: FTPS_KEY_PATH
              value: "/etc/tls/tls.key"
            - name: IDLE_TIMEOUT
              value: "15m"
            - name: MAX_CONNECTIONS
              value: "200"
          volumeMounts:
            - name: ssh-host-keys
              mountPath: /etc/ssh/keys
              readOnly: true
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: ssh-host-keys
          secret:
            secretName: sftp-host-keys
            defaultMode: 0444  # readable by nobody (65534); Secret is RBAC-protected
        - name: tls-certs
          secret:
            secretName: sftp-tls-certs
            defaultMode: 0444
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: sftp-gateway
  namespace: platform-system
spec:
  type: LoadBalancer
  selector:
    app: sftp-gateway
  ports:
    - port: 2222
      targetPort: 2222
      name: sftp
    - port: 2121
      targetPort: 2121
      name: ftps
    # FTPS passive data ports (30000-30099) are handled by the
    # LoadBalancer with externalTrafficPolicy. They do not need
    # individual Service port entries — the FTP client negotiates
    # the data port directly with the gateway pod's IP.
