# Flux Image Policies — select the latest timestamp-prefixed tag.
# build-deploy.yml produces tags like: 20260414120000-a1b2c3d
# The timestamp prefix ensures chronological ordering via alphabetical sort.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: backend
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: backend
  filterTags:
    pattern: '^(?P<ts>\d{14})-[0-9a-f]{7,40}$'
    extract: '$ts'
  policy:
    numerical:
      order: asc
