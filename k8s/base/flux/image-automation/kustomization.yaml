# Flux Image Automation — installed once per cluster that wants
# auto-promotion of newly-built timestamp-tagged images.
#
# Wired in only by the staging overlay (production deploys via stable
# branch + manual rollouts). Requires the image-reflector-controller
# and image-automation-controller Flux components — install once via:
#
#   flux install --components-extra=image-reflector-controller,image-automation-controller
#
# OR (newer Flux installs that ship them by default) just apply this
# kustomization. The CRDs `imagerepositories.image.toolkit.fluxcd.io`,
# `imagepolicies.image.toolkit.fluxcd.io`, and
# `imageupdateautomations.image.toolkit.fluxcd.io` must exist on the
# cluster before this is applied.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - image-repositories.yaml
  - image-policies.yaml
  - image-update-automation.yaml
