# Production Flux Kustomization — watches the `stable` branch.
#
# Deployment flow:
#   1. Developer creates tag v1.0.0 → release.yml builds images
#   2. release.yml creates PR to `stable` branch with pinned semver tags
#   3. Human reviews and merges the PR
#   4. Flux detects the stable branch change → rolling update
#
# The PR merge IS the gate — no suspend/unsuspend needed.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hosting-platform-production
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/overlays/production
  prune: true
  sourceRef:
    kind: GitRepository
    name: hosting-platform-stable
  # Operator-domain templating — same path staging uses (see
  # kustomization-staging.yaml). Production overlay's ingress-patch.yaml
  # and platform-config-patch.yaml already reference ${DOMAIN}, so the
  # ConfigMap is required for those to render correctly. bootstrap.sh
  # creates platform-cluster-config in the flux-system namespace at
  # install time.
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: platform-cluster-config
        optional: false
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: platform-api
      namespace: platform
    - apiVersion: apps/v1
      kind: Deployment
      name: admin-panel
      namespace: platform
    - apiVersion: apps/v1
      kind: Deployment
      name: client-panel
      namespace: platform
  timeout: 5m
