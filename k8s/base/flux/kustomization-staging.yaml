apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hosting-platform-staging
  namespace: flux-system
spec:
  interval: 5m
  path: ./k8s/overlays/staging
  prune: true
  sourceRef:
    kind: GitRepository
    name: hosting-platform-staging
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: platform-api
      namespace: platform
    - apiVersion: apps/v1
      kind: Deployment
      name: admin-panel
      namespace: platform
    - apiVersion: apps/v1
      kind: Deployment
      name: client-panel
      namespace: platform
  timeout: 5m
