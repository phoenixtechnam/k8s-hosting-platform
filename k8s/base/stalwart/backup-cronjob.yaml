# Stalwart pre-snapshot quiesce CronJob.
#
# Strategy: exec into the running stalwart-mail-0 pod and call
# `stalwart-cli server database-maintenance`, which flushes RocksDB
# WAL + triggers a compaction pass. Makes the on-disk state at
# /opt/stalwart/data internally consistent before Longhorn takes its
# block-level snapshot 15 minutes later.
#
# Why database-maintenance (not a `server backup <path>` tar):
#   - Stalwart v0.15 removed the `server backup <file>` subcommand. The
#     replacement `database-maintenance` triggers the same internal
#     quiesce path (MemTable flush → SST compaction) but doesn't write
#     a tarball — the Longhorn block-level snapshot IS the backup
#     artefact, not a file inside the PVC.
#   - Writing a .tar to the PVC we're about to snapshot double-counted
#     the data inside every Longhorn snapshot. Dropping it is leaner.
#   - For logical (cross-Stalwart-instance) restore use
#     `stalwart-cli export account <email>` per-account — separate
#     flow, not this CronJob.
#
# Coupled timing with Longhorn RecurringJobs (k8s/base/longhorn/
# recurring-jobs.yaml):
#   stalwart-backup  → 01:45 UTC daily  (this CronJob flushes RocksDB)
#   longhorn daily   → 02:00 UTC daily  (recurring-jobs.yaml daily-backup)
#   longhorn weekly  → 03:00 UTC Sunday (recurring-jobs.yaml weekly-backup)
#
# The 15-minute buffer is defensive. After this CronJob runs, the PVC
# on-disk RocksDB is quiesced to a consistent checkpoint and a
# /opt/stalwart/backups/BACKUP_OK_<ts> freshness marker is written.
# When Longhorn snapshots at 02:00, both the quiesced RocksDB and the
# marker are captured. dr-restore.sh uses the marker to detect stale
# backups (no quiesce ran within last 26h → fall back to earlier
# snapshot or fail loud).
#
# The CronJob's ServiceAccount needs permission to exec into pods
# in the `mail` namespace — granted by backup-rbac.yaml.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stalwart-backup
  namespace: mail
  labels:
    app: stalwart-backup
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-backup
    platform.phoenix-host.net/quiesce-hook: stalwart-cli
spec:
  schedule: "45 1 * * *"  # 01:45 UTC daily — 15 min before Longhorn daily-backup 02:00
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 7
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: stalwart-backup
        spec:
          serviceAccountName: stalwart-backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine/k8s:1.33.3
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                # IMPORTANT: the inner sh -c uses SINGLE quotes so
                # ${ADMIN_SECRET_PLAIN} is expanded by the shell
                # INSIDE the stalwart-mail-0 pod (where the env var
                # is populated from stalwart-secrets via envFrom),
                # NOT by the CronJob pod. This keeps the cleartext
                # out of /proc/<pid>/cmdline of the kubectl exec
                # process, out of the K8s audit log of the exec
                # call, and out of the visible exec arguments.
                #
                # The cleartext (not the bcrypt hash ADMIN_SECRET)
                # is required because stalwart-cli does Basic Auth.
                #
                # The backup CronJob's pod itself does NOT need any
                # secret in its own environment.
                - |
                  set -eu
                  TS=$(date -u +%Y%m%d-%H%M%S)
                  echo "[stalwart-backup] starting quiesce TS=$TS"

                  # Trigger a RocksDB WAL flush + SST compaction inside
                  # the Stalwart pod. The stalwart-cli's
                  # `server database-maintenance` command has a v0.15.5
                  # quirk: the HTTP endpoint returns success with an
                  # empty body, but the CLI parses that as the error
                  # "Request failed: No data returned." and exits 1 —
                  # even though the maintenance actually ran.
                  #
                  # Workaround: capture stdout+stderr and treat this
                  # specific message as a successful-but-noisy return.
                  # Any OTHER error (network, auth, actual server
                  # error) still propagates as a real failure.
                  #
                  # Can't use wget/curl — the stalwartlabs/stalwart
                  # v0.15.5 image ships only openssl + stalwart-cli,
                  # no generic HTTP clients.
                  OUT=$(kubectl -n mail exec stalwart-mail-0 -- sh -c '
                    mkdir -p /opt/stalwart/backups
                    stalwart-cli --url http://127.0.0.1:8080 \
                      --credentials "admin:${ADMIN_SECRET_PLAIN}" \
                      server database-maintenance 2>&1
                  ') || RC=$?
                  RC=${RC:-0}
                  if [ "$RC" = "0" ]; then
                    echo "[stalwart-backup] quiesce OK: $OUT"
                  elif printf "%s" "$OUT" | grep -qE 'No data returned'; then
                    # Known v0.15.5 parser bug — maintenance ran, CLI
                    # just didn't like the empty-body reply. Treat as
                    # success.
                    echo "[stalwart-backup] quiesce OK (v0.15.5 'No data returned' CLI quirk ignored)"
                  else
                    echo "[stalwart-backup] database-maintenance failed (exit=$RC):" >&2
                    echo "$OUT" >&2
                    exit 1
                  fi

                  # Drop a freshness marker INSIDE the PVC before the
                  # Longhorn snapshot runs at 02:00 UTC. The marker
                  # carries the same $TS so dr-restore.sh can verify
                  # the captured snapshot is a post-quiesce one and
                  # not a mid-write live state. Only one marker kept —
                  # older ones pruned next. Each kubectl exec is
                  # wrapped in || exit 1 so a silent failure inside
                  # the pod (read-only filesystem, out of disk) doesn't
                  # let the job succeed without a marker — which would
                  # make dr-restore.sh treat today's Longhorn snapshot
                  # as stale and fall back to yesterday's.
                  kubectl -n mail exec stalwart-mail-0 -- sh -c \
                    "echo '${TS} quiesce=database-maintenance' > /opt/stalwart/backups/BACKUP_OK_${TS}" || {
                    echo "[stalwart-backup] ERROR: freshness marker write failed" >&2
                    exit 1
                  }
                  kubectl -n mail exec stalwart-mail-0 -- sh -c \
                    "ls -1t /opt/stalwart/backups/BACKUP_OK_* 2>/dev/null | tail -n +2 | xargs -r rm -f" || {
                    echo "[stalwart-backup] WARN: marker prune failed (non-fatal)" >&2
                  }
                  echo "[stalwart-backup] freshness marker BACKUP_OK_${TS} written"

                  # Clean up any legacy .tar archives from the
                  # pre-v0.15 `server backup` era — we no longer
                  # produce them and leaving them wastes PVC space +
                  # snapshot bandwidth. `cd` guarded with `|| exit 0`
                  # so a pristine PVC (no backups/ dir yet) is a
                  # successful no-op, not a failure.
                  kubectl -n mail exec stalwart-mail-0 -- sh -c '
                    set -eu
                    cd /opt/stalwart/backups 2>/dev/null || exit 0
                    # Preserve any .tar younger than 30 days (for
                    # operators who triggered a manual legacy backup
                    # we don''"'"'t know about). Evict anything older.
                    find . -maxdepth 1 -type f -name "*.tar" -mtime +30 -delete 2>/dev/null || true
                  ' || {
                    echo "[stalwart-backup] WARN: legacy-tar cleanup failed (non-fatal)" >&2
                  }
                  echo "[stalwart-backup] done"
              # No env: ADMIN_SECRET is referenced from inside the
              # stalwart-mail-0 pod's own environment (single-quoted
              # shell expansion above), so the backup pod itself
              # doesn't need the secret at all.
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
