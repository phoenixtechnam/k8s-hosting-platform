# Stalwart pre-snapshot quiesce CronJob.
#
# Strategy: exec into the running stalwart-mail-0 pod and call
# `stalwart-cli server backup`, which writes a consistent RocksDB
# snapshot + blob archive to /opt/stalwart/backups/<date>.tar inside
# the pod's existing PVC — live state is flushed before the archive
# is written.
#
# Coupled timing with Longhorn RecurringJobs (k8s/base/longhorn/
# recurring-jobs.yaml):
#   stalwart-backup  → 01:45 UTC daily  (this CronJob)
#   longhorn daily   → 02:00 UTC daily  (recurring-jobs.yaml daily-backup)
#   longhorn weekly  → 03:00 UTC Sunday (recurring-jobs.yaml weekly-backup)
#
# The 15-minute buffer is defensive. When the Longhorn snapshot runs
# at 02:00, the PVC contains the .tar archive written at ~01:45 plus a
# freshness-marker file that the restore drill uses to assert the
# captured snapshot is clean and not a live-DB mid-write.
#
# A successful run drops /opt/stalwart/backups/BACKUP_OK_<ts> — the
# Longhorn snapshot includes that marker. During cold-restore, if the
# newest marker is older than 26h, treat the snapshot as stale and
# fall back to a previous backup.
#
# The CronJob's ServiceAccount needs permission to exec into pods
# in the `mail` namespace — granted by backup-rbac.yaml.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: stalwart-backup
  namespace: mail
  labels:
    app: stalwart-backup
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-backup
    platform.phoenix-host.net/quiesce-hook: stalwart-cli
spec:
  schedule: "45 1 * * *"  # 01:45 UTC daily — 15 min before Longhorn daily-backup 02:00
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 7
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app: stalwart-backup
        spec:
          serviceAccountName: stalwart-backup
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: bitnami/kubectl:1.33
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                # IMPORTANT: the inner sh -c uses SINGLE quotes so
                # ${ADMIN_SECRET_PLAIN} is expanded by the shell
                # INSIDE the stalwart-mail-0 pod (where the env var
                # is populated from stalwart-secrets via envFrom),
                # NOT by the CronJob pod. This keeps the cleartext
                # out of /proc/<pid>/cmdline of the kubectl exec
                # process, out of the K8s audit log of the exec
                # call, and out of the visible exec arguments.
                #
                # The cleartext (not the bcrypt hash ADMIN_SECRET)
                # is required because stalwart-cli does Basic Auth.
                #
                # The backup CronJob's pod itself does NOT need any
                # secret in its own environment.
                - |
                  set -eu
                  TS=$(date -u +%Y%m%d-%H%M%S)
                  echo "[stalwart-backup] starting backup TS=$TS"

                  kubectl -n mail exec stalwart-mail-0 -- sh -c '
                    set -eu
                    mkdir -p /opt/stalwart/backups
                    stalwart-cli --url http://127.0.0.1:8080 \
                      --credentials "admin:${ADMIN_SECRET_PLAIN}" \
                      server backup /opt/stalwart/backups/'"${TS}"'.tar
                  ' || {
                    echo "[stalwart-backup] backup command failed" >&2
                    exit 1
                  }

                  # Verify the file exists and has non-zero size.
                  SIZE=$(kubectl -n mail exec stalwart-mail-0 -- stat -c '%s' "/opt/stalwart/backups/${TS}.tar" 2>/dev/null || echo 0)
                  if [ "$SIZE" -lt 1024 ]; then
                    echo "[stalwart-backup] backup file too small (${SIZE} bytes), aborting" >&2
                    exit 1
                  fi
                  echo "[stalwart-backup] backup OK: /opt/stalwart/backups/${TS}.tar (${SIZE} bytes)"

                  # Drop a freshness marker INSIDE the PVC before the
                  # Longhorn snapshot runs at 02:00 UTC. The marker
                  # carries the same $TS so dr-restore.sh can verify
                  # the captured snapshot is a post-quiesce one and
                  # not a mid-write live state.
                  kubectl -n mail exec stalwart-mail-0 -- sh -c \
                    "echo '${TS} SIZE=${SIZE}' > /opt/stalwart/backups/BACKUP_OK_${TS}"
                  kubectl -n mail exec stalwart-mail-0 -- sh -c \
                    "ls -1t /opt/stalwart/backups/BACKUP_OK_* 2>/dev/null | tail -n +2 | xargs -r rm -f"
                  echo "[stalwart-backup] freshness marker BACKUP_OK_${TS} written"

                  # Retention: keep newest 7 archives, delete the rest.
                  kubectl -n mail exec stalwart-mail-0 -- sh -c '
                    cd /opt/stalwart/backups
                    ls -1t *.tar 2>/dev/null | tail -n +8 | xargs -r rm -f
                  '
                  echo "[stalwart-backup] retention prune complete"
              # No env: ADMIN_SECRET is referenced from inside the
              # stalwart-mail-0 pod's own environment (single-quoted
              # shell expansion above), so the backup pod itself
              # doesn't need the secret at all.
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
