apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - namespace.yaml
  - configmap.yaml
  - statefulset.yaml
  - service.yaml
  - networkpolicy.yaml
  # secret.example.yaml is NOT included — operators provide the real Secret
  # per environment via kubectl / sealed-secrets / SOPS.

labels:
  - pairs:
      app.kubernetes.io/part-of: hosting-platform
      app.kubernetes.io/component: mail-server
