#
# Example Secret template for Stalwart Mail Server.
# DO NOT commit real secrets. This file is committed as an example only.
#
# To create the real Secret in a cluster:
#
#   # 1) Hash an admin password (Argon2id recommended, or bcrypt)
#   ADMIN_HASH=$(docker run --rm stalwartlabs/stalwart:v0.15.5 \
#     stalwart-cli hash --algorithm argon2id)
#
#   # 2) Hash a master password (same command)
#   MASTER_HASH=$(docker run --rm stalwartlabs/stalwart:v0.15.5 \
#     stalwart-cli hash --algorithm argon2id)
#
#   # 3) Create the Secret
#   kubectl create secret generic stalwart-secrets -n mail \
#     --from-literal=ADMIN_SECRET="$ADMIN_HASH" \
#     --from-literal=MASTER_SECRET="$MASTER_HASH" \
#     --from-literal=STALWART_HOSTNAME="mail.example.com"
#
# For production, use sealed-secrets or SOPS instead of plaintext.
#
apiVersion: v1
kind: Secret
metadata:
  name: stalwart-secrets
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  # PLACEHOLDER — replace with real Argon2id/bcrypt hashes before deploy.
  ADMIN_SECRET: "$argon2id$v=19$m=19456,t=2,p=1$REPLACE_ME$REPLACE_ME"
  MASTER_SECRET: "$argon2id$v=19$m=19456,t=2,p=1$REPLACE_ME$REPLACE_ME"
  STALWART_HOSTNAME: "mail.example.com"
