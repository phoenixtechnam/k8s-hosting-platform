#
# REFERENCE — the actual Secret is NOT committed anywhere.
#
# At first deploy, `scripts/generate-stalwart-secret.sh` creates this
# Secret (random passwords + bcrypt hashes, written directly to the
# cluster). For dev: `./scripts/local.sh mail-up` invokes the helper
# automatically. For production: see docs/04-deployment/MAIL_SERVER_OPERATIONS.md §3.2.
# The file below documents the SHAPE the helper produces so operators
# using sealed-secrets / SOPS can supply their own.
#
# ADMIN_SECRET_PLAIN is the cleartext admin password used by the
# stalwart-backup and stalwart-cert-reload CronJobs. They authenticate
# to Stalwart's admin HTTP API via Basic Auth, which requires the
# cleartext (the server bcrypt-compares against ADMIN_SECRET).
# Production deployments that don't run these CronJobs (or run them
# with credentials mounted from a separate Secret) can omit this key.
#
# For production, use sealed-secrets or SOPS to seal this shape, or set
# BOOTSTRAP_STALWART_SECRET=manual to skip the helper and apply your own.
#
apiVersion: v1
kind: Secret
metadata:
  name: stalwart-secrets
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  # PLACEHOLDER — replace with real Argon2id/bcrypt hashes before deploy.
  ADMIN_SECRET: "$argon2id$v=19$m=19456,t=2,p=1$REPLACE_ME$REPLACE_ME"
  # Cleartext copy of the admin password — needed by the backup +
  # cert-reload CronJobs. Optional if those CronJobs are disabled
  # or if you mount the cleartext into them via a separate Secret.
  ADMIN_SECRET_PLAIN: "REPLACE_ME"
  MASTER_SECRET: "$argon2id$v=19$m=19456,t=2,p=1$REPLACE_ME$REPLACE_ME"
  STALWART_HOSTNAME: "mail.example.com"
  # PostgreSQL SQL directory (platform DB). The `stalwart_reader` role has
  # SELECT on the stalwart schema only (see
  # backend/src/db/migrations/0004_stalwart_directory.sql). Rotate the
  # password in production via ALTER ROLE.
  STALWART_DB_HOST: "platform-postgres.mail.svc.cluster.local"
  STALWART_DB_NAME: "hosting_platform"
  STALWART_DB_USER: "stalwart_reader"
  STALWART_DB_PASSWORD: "REPLACE_ME"
