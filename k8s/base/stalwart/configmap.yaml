apiVersion: v1
kind: ConfigMap
metadata:
  name: stalwart-config
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
data:
  config.toml: |
    # ─── Server identity ───────────────────────────────────────────────────
    [server]
    hostname = "%{env:STALWART_HOSTNAME}%"

    # ─── Listeners ─────────────────────────────────────────────────────────

    [server.listener.smtp]
    bind = "[::]:25"
    protocol = "smtp"

    [server.listener.submission]
    bind = "[::]:587"
    protocol = "smtp"

    [server.listener.submissions]
    bind = "[::]:465"
    protocol = "smtp"
    tls.implicit = true

    [server.listener.imap]
    bind = "[::]:143"
    protocol = "imap"

    [server.listener.imaptls]
    bind = "[::]:993"
    protocol = "imap"
    tls.implicit = true

    [server.listener.pop3]
    bind = "[::]:110"
    protocol = "pop3"

    [server.listener.pop3s]
    bind = "[::]:995"
    protocol = "pop3"
    tls.implicit = true

    [server.listener.sieve]
    bind = "[::]:4190"
    protocol = "managesieve"

    [server.listener.http]
    protocol = "http"
    bind = "[::]:8080"

    # ─── Storage ───────────────────────────────────────────────────────────
    # Phase 1: RocksDB for metadata/FTS/lookup; filesystem for blobs.
    # All mail data lives on the local PVC under /opt/stalwart.
    # Phase 2a: account directory now reads from the platform's PostgreSQL
    # via read-only views in the `stalwart` schema (see
    # backend/src/db/migrations/0004_stalwart_directory.sql).
    # Migration targets (zero code change, see docs/04-deployment/MAIL_SERVER_OPERATIONS.md):
    #   - hcloud-volumes  → change PVC storageClassName
    #   - NFS             → change PVC storageClassName
    #   - S3 blobs        → add [store."s3-blob"] and flip storage.blob
    [storage]
    data = "rocksdb"
    fts = "rocksdb"
    lookup = "rocksdb"
    blob = "fs-blob"
    directory = "sql"

    [store.rocksdb]
    type = "rocksdb"
    path = "/opt/stalwart/data"
    compression = "lz4"

    [store.fs-blob]
    type = "fs"
    path = "/opt/stalwart/blobs"
    depth = 2

    # ─── PostgreSQL data store (account directory source) ─────────────────
    # Reads the platform DB via the stalwart_reader role, which has SELECT
    # on the stalwart schema only. The `platform-postgres` service name is
    # provided by each environment's overlay (dev: k8s Endpoints pointing at
    # the docker-compose postgres IP; prod: real platform DB service).
    [store.pg]
    type = "postgresql"
    host = "%{env:STALWART_DB_HOST}%"
    port = 5432
    database = "%{env:STALWART_DB_NAME}%"
    user = "%{env:STALWART_DB_USER}%"
    password = "%{env:STALWART_DB_PASSWORD}%"
    timeout = "15s"

    [store.pg.tls]
    enable = false
    allow-invalid-certs = true

    [store.pg.pool]
    max-connections = 10

    # All queries take exactly one parameter ($1), which Stalwart binds to
    # the account name / email address / domain. Even queries that don't
    # semantically need the parameter must still consume it — otherwise
    # rust-postgres returns "expected 0 parameters but got 1".
    [store.pg.query]
    name       = "SELECT name, type, secret, description, quota FROM stalwart.principals WHERE name = $1"
    members    = "SELECT $1::text AS member_of WHERE false"
    recipients = "SELECT name FROM stalwart.emails WHERE address = $1"
    emails     = "SELECT address FROM stalwart.emails WHERE name = $1 ORDER BY type DESC, address ASC"
    # Phase 3 T3.2: VRFY is disabled for privacy. A substring LIKE query
    # across stalwart.emails would let any anonymous SMTP client
    # enumerate addresses across all clients on the platform. Best
    # practice per RFC 5321 §3.5.2 and most modern mail servers is
    # to return "252 Cannot VRFY user". Stalwart does that when the
    # query returns no rows. The parameter is still consumed because
    # rust-postgres requires it.
    verify     = "SELECT address FROM stalwart.emails WHERE false AND $1::text IS NOT NULL"
    expand     = "SELECT member_address AS address FROM stalwart.alias_expansion WHERE list_address = $1 ORDER BY member_address LIMIT 50"
    domains    = "SELECT 1 FROM stalwart.domains WHERE name = $1 LIMIT 1"

    # ─── SQL directory bound to the PostgreSQL store ──────────────────────
    [directory.sql]
    type = "sql"
    store = "pg"

    [directory.sql.columns]
    name = "name"
    description = "description"
    secret = "secret"
    email = "address"
    quota = "quota"
    class = "type"

    # ─── Authentication ────────────────────────────────────────────────────
    # Fallback admin: emergency access to WebAdmin (port 8080).
    # Master user: used by Roundcube SSO in Phase 2 via `<mailbox>%master` syntax.
    # Secrets are injected from the `stalwart-secrets` Secret.
    [authentication.fallback-admin]
    user = "admin"
    secret = "%{env:ADMIN_SECRET}%"

    [authentication.master]
    user = "master"
    secret = "%{env:MASTER_SECRET}%"

    # ─── Spam scoring ──────────────────────────────────────────────────────
    # Phase 3 (post-Phase-3 hardening): inbound spam scoring policy.
    #
    # We rely on Stalwart's built-in spam classifier (Bayesian filter
    # + heuristics + reputation) with its default thresholds. We
    # explicitly do NOT enable any public DNSBL lookup. The risk
    # register (docs/06-features/MAIL_SERVER_IMPLEMENTATION_STATUS.md
    # §5) documents the reason: Spamhaus public DNSBL queries return
    # errors from Hetzner IP space (since 2025-02-19), which would
    # mark every inbound message as "DNS error" rather than
    # spam-or-ham.
    #
    # Note: spam-filter.score.* values are DB-managed in Stalwart's
    # internal config store, not local-file-overridable. Setting them
    # in this configmap produces a warning AND has no effect at
    # runtime (Stalwart picks the DB value). Operators who want
    # different thresholds must use the WebAdmin UI on port 8080 or
    # call stalwart-cli config set.
    #
    # Upgrade paths for operators who want stronger spam filtering:
    #
    #   A. Spamhaus Data Query Service (DQS, paid):
    #      via WebAdmin → spam-filter → DNSBL → add
    #      ${MY_KEY}.zen.dq.spamhaus.net
    #
    #   B. SURBL Multi (free, narrower coverage):
    #      via WebAdmin → spam-filter → DNSBL → add multi.surbl.org
    #
    #   C. Manual score tweaks:
    #      stalwart-cli config set spam-filter.score.spam 4.5
    #
    # Per-domain overrides
    # (email_domains.spam_threshold_junk / spam_threshold_reject) are
    # already wired into the SQL directory and applied per-recipient.
    #
    # Stalwart's spam-filter is enabled by default in the DB-managed
    # config store; no explicit `[spam-filter] enable = true` is needed
    # in this file (and adding one would produce a "local config
    # overriding database key" warning at startup).

    # ─── Telemetry ─────────────────────────────────────────────────────────
    [tracer.stdout]
    type = "stdout"
    level = "info"
    ansi = false
    enable = true

    [metrics.prometheus]
    enable = true
