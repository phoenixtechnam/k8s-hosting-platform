# Platform Postgres — managed by CloudNativePG operator.
#
# WHY CNPG instead of vanilla StatefulSet:
#   - Scaling 1 → 3 instances is a single CR field flip; no data
#     migration. Apply HA can flip instance count atomically.
#   - Built-in streaming replication, automatic failover, PITR
#     (point-in-time-recovery) via barman-cloud + WAL archive.
#   - Operator already installed (M10) — no new infra component.
#
# CONTRACT FOR APP CONNECTIONS:
#   The Service named `postgres` (defined below) ALWAYS routes to
#   the current primary pod (via cnpg.io/role=primary label
#   selector). Apps continue to use postgres.platform.svc:5432 —
#   no DATABASE_URL change required when failover happens or when
#   instances scale up/down. CNPG also exposes its own
#   <name>-rw / <name>-ro / <name>-r services automatically; we
#   keep the platform-named Service as a stable alias.
#
# SECRET CONTRACT:
#   platform-db-credentials must contain BOTH:
#     - username: platform   (CNPG initdb owner)
#     - password: <pwd>      (CNPG initdb password)
#     - url: postgresql://...  (consumed by backend DATABASE_URL)
#   bootstrap.sh's generate_platform_secrets() builds all three.
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: platform
  labels:
    app: postgres
    app.kubernetes.io/part-of: hosting-platform
spec:
  # Apply our `app: postgres` label to every Pod CNPG creates so
  # existing K8s NetworkPolicies (allow-platform-internal selects
  # by app=postgres) match. Without this, platform-api can't reach
  # the DB through the cluster's deny-by-default ingress posture.
  inheritedMetadata:
    labels:
      app: postgres
      app.kubernetes.io/part-of: hosting-platform

  # Floor for fresh clusters. The kustomize.toolkit.fluxcd.io/ssa
  # annotation above tells Flux to NOT force this field — Apply HA
  # patches it to 3 imperatively via the reconciler and that wins.
  instances: 1

  # Pin to PG 17. PG18 changed the expected mount layout (single
  # mount at /var/lib/postgresql with PGDATA in subdir) — vanilla
  # StatefulSet hit this; CNPG abstracts it but we pin for
  # repeatability. Bump deliberately when upstream stable.
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5

  bootstrap:
    initdb:
      database: hosting_platform
      owner: platform
      # Secret with username + password keys. bootstrap.sh creates
      # this; CNPG reads it once at first init and stores the
      # result in <cluster>-app afterwards. We set ownerLessSecret
      # to keep our existing Secret usable as the source of truth
      # for both initdb AND the backend's DATABASE_URL.
      secret:
        name: platform-db-credentials
      # Grant CREATEROLE to the application user so the existing
      # Drizzle migrations can `CREATE ROLE stalwart_reader` etc.
      # CNPG's initdb-created app user is unprivileged by default
      # (the cluster's `postgres` superuser handles ops). Without
      # this grant, platform-api's migrate step fails with
      # "permission denied to create role".
      postInitApplicationSQL:
        # Match vanilla-postgres initdb behaviour: the application
        # user is SUPERUSER. Existing migrations (0024_…sql etc.)
        # `CREATE DATABASE roundcube OWNER roundcube` and similar
        # require: CREATEROLE + CREATEDB + ability to SET ROLE
        # to the new owner. Granting SUPERUSER is the simplest
        # match. Trade-off: anyone with platform-db-credentials
        # can do anything in the cluster — same surface as the
        # previous StatefulSet-managed `platform` user.
        - "ALTER USER platform WITH SUPERUSER"

  storage:
    size: 10Gi
    storageClass: longhorn

  # Per-instance resources. Conservative defaults for staging;
  # production overlay should bump to 4Gi memory + 2 CPU.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Bind to the system-only nodes via the same toleration the
  # rest of the platform Deployments use. Without it, CNPG pods
  # would land on tenant-tainted server nodes too.
  affinity:
    tolerations:
      - key: platform.phoenix-host.net/server-only
        operator: Exists
        effect: NoSchedule
    # Spread across nodes when instances >= 2 — prevents a
    # multi-instance cluster from co-locating on one server.
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname

  # Monitoring: CNPG exposes Postgres metrics on a sidecar that
  # ServiceMonitor (when monitoring is enabled) scrapes.
  monitoring:
    enablePodMonitor: false  # set true when prometheus is enabled

  # Backup integration: when backup-credentials Secret has S3
  # creds, the CNPG operator picks them up via barman-cloud +
  # ScheduledBackup CR (defined separately). Leaving disabled
  # by default; the existing postgres-dump cronjob still works
  # (connects via the postgres Service like any client) and
  # provides logical backup coverage in parallel.
---
# Stable Service alias. Keeps app connection strings unchanged
# (postgres.platform.svc:5432) across CNPG instance scaling +
# failover. ExternalName aliases to CNPG's auto-managed
# postgres-rw Service which always routes to the current primary.
# Using ExternalName instead of a selector-based Service avoids
# CNPG version skew (instance-role label name has changed
# between minor releases — the operator's own *-rw service is
# the canonical truth).
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: platform
  labels:
    app: postgres
    app.kubernetes.io/part-of: hosting-platform
spec:
  type: ExternalName
  externalName: postgres-rw.platform.svc.cluster.local
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
