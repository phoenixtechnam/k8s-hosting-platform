apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-panel
  namespace: platform
  labels:
    app: tenant-panel
    app.kubernetes.io/part-of: hosting-platform
spec:
  # M14: replicas owned by platform-storage-policy reconciler.
  selector:
    matchLabels:
      app: tenant-panel
  template:
    metadata:
      labels:
        app: tenant-panel
    spec:
      # 2026-05-11: DoNotSchedule for strict one-per-server placement.
      # In HA mode every server runs a tenant-panel pod, so node loss =
      # lose 1 of N; survivors already serve, no rescheduling needed.
      # Failover headroom (see backend/src/modules/platform-storage-policy/
      # failover-headroom.ts) prevents this from wedging Pending pods.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: tenant-panel
      containers:
        - name: client
          image: ghcr.io/phoenixtechnam/hosting-platform/tenant-panel:latest
          ports:
            - containerPort: 80
              protocol: TCP
          # API_URL intentionally omitted — defaults to '' (same-origin).
          # Frontend nginx proxies /api/* to platform-api:3000 internally.
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
          volumeMounts:
            # See admin-deployment.yaml for the operator-managed
            # trusted-proxy CIDRs mount rationale (Nodes & Storage →
            # Trusted Proxies tab → cluster-trusted-proxies ConfigMap).
            - name: trusted-proxies
              mountPath: /etc/nginx/conf.d/trusted-proxies.d
              readOnly: true
      volumes:
        - name: trusted-proxies
          configMap:
            name: cluster-trusted-proxies
            optional: true
            items:
              - key: trusted-proxies.conf
                path: trusted-proxies.conf
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-panel
  namespace: platform
  labels:
    app: tenant-panel
spec:
  selector:
    app: tenant-panel
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
