apiVersion: v1
kind: ServiceAccount
metadata:
  name: peer-firewall-reconciler
  namespace: platform-system
  labels:
    app: peer-firewall-reconciler
    app.kubernetes.io/part-of: hosting-platform
---
# RBAC for the always-on set-mode firewall reconciler.
#
#   Nodes                  read     — kube-API InternalIPs converge into
#                                     cluster_peers_v{4,6} nft sets.
#   ClusterTrustedRange    read     — spec.cidr converges into
#                                     trusted_ranges_v{4,6} nft sets.
#   ClusterTrustedRange    write    — status subresource (normalizedCidr,
#   /status                          family, lastSyncedAt, conditions).
#   ClusterPendingPeer     read     — spec.ip converges into
#                                     cluster_peers_v{4,6} nft sets
#                                     (union with Node InternalIPs).
#   ClusterPendingPeer     write    — status subresource (claimedAt,
#   /status                          family, expiresAt, conditions).
#   ClusterPendingPeer     delete   — TTL cleanup + post-claim cleanup.
#
# No read/write on host firewall via API — that happens via the host's
# nft binary using CAP_NET_ADMIN, which the DaemonSet has natively.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: peer-firewall-reconciler
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.platform.phoenix-host.net"]
    resources: ["clustertrustedranges", "clusterpendingpeers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.platform.phoenix-host.net"]
    resources: ["clustertrustedranges/status", "clusterpendingpeers/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["networking.platform.phoenix-host.net"]
    resources: ["clusterpendingpeers"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: peer-firewall-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: peer-firewall-reconciler
subjects:
  - kind: ServiceAccount
    name: peer-firewall-reconciler
    namespace: platform-system
