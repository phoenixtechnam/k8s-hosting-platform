# peer-firewall-reconciler DaemonSet — always-on set-mode firewall.
#
# scripts/bootstrap.sh declares four nft sets on every node:
#   cluster_peers_v4 / cluster_peers_v6   — control-plane ports trust
#                                            (kube-API node InternalIPs
#                                            + pending-peer IPs union)
#   trusted_ranges_v4 / trusted_ranges_v6 — full TCP/UDP trust
#                                            (ClusterTrustedRange CRs
#                                            + bootstrap-time
#                                            --allow-source seed)
#
# This DaemonSet converges the four sets against three kube-API sources:
#   Nodes                  → cluster_peers_v{4,6}     (read InternalIPs)
#   ClusterPendingPeer     → cluster_peers_v{4,6}     (read .spec.ip,
#                                                      union with Nodes,
#                                                      enforce TTL,
#                                                      claim on match)
#   ClusterTrustedRange    → trusted_ranges_v{4,6}    (read .spec.cidr)
#
# Same manifest ships everywhere — operator manages cluster-network
# trust via Settings → Cluster Networking, never via per-cluster YAML.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: peer-firewall-reconciler
  namespace: platform-system
  labels:
    app: peer-firewall-reconciler
    app.kubernetes.io/part-of: hosting-platform
spec:
  selector:
    matchLabels:
      app: peer-firewall-reconciler
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: peer-firewall-reconciler
    spec:
      serviceAccountName: peer-firewall-reconciler
      # Share the host's network namespace so in-container nft talks
      # directly to the host's netfilter ruleset. Without this, the
      # container would maintain its own (empty) ruleset.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Tolerate every node, including control-plane and any platform
      # taints — the reconciler must run on every node whose firewall
      # holds a cluster_peers set (i.e. every cluster node in set mode).
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      containers:
        - name: reconciler
          image: ghcr.io/phoenixtechnam/hosting-platform/peer-firewall-reconciler:latest # {"$imagepolicy": "flux-system:peer-firewall-reconciler"}
          imagePullPolicy: IfNotPresent
          securityContext:
            # nft talks to netfilter via netlink — needs CAP_NET_ADMIN.
            # Drop everything else; no privileged, no host PID/IPC.
            capabilities:
              drop: ["ALL"]
              add: ["NET_ADMIN"]
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
