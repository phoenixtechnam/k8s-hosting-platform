apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml
  - priority-classes.yaml
  - platform-tenant-ops/namespace.yaml
  - rbac.yaml
  - network-policies.yaml
  - resource-quotas.yaml
  # System-namespace LimitRanges that flip BestEffort control-plane
  # pods (Calico, cert-manager, CNPG, Longhorn CSI sidecars) into
  # Burstable QoS so they are not first-evicted under pressure.
  - limit-ranges-system.yaml
  - platform-config.yaml
  - platform-version.yaml
  # cluster-issuers.yaml is NOT included here — ClusterIssuers are created
  # imperatively by bootstrap.sh with the correct ACME email address.
  # See scripts/bootstrap.sh install_cert_manager() function.
  - database.yaml
  - backend-deployment.yaml
  - admin-deployment.yaml
  - client-deployment.yaml
  - platform-suspended.yaml
  - ingress.yaml
  - sftp-gateway.yaml
  - sftp-gateway-netpol.yaml
  # cluster-network — CRDs (ClusterTrustedRange, ClusterPendingPeer)
  # that drive the always-on set-mode firewall. Must apply BEFORE
  # firewall-reconciler so the reconciler's informers can resolve
  # the kinds at startup. See docs/04-deployment/CLUSTER_NETWORK.md.
  - cluster-network/
  # firewall-reconciler — single DaemonSet running TWO reconcile
  # goroutines against the host's nft state via libnftnl netlink:
  #   peer goroutine (cluster scope):
  #     Nodes + ClusterPendingPeer + ClusterTrustedRange
  #       → cluster_peers_v{4,6}, trusted_ranges_v{4,6}
  #   tenant-ports goroutine (per-node scope):
  #     Pods on $NODE_NAME (filtered to tenant namespaces)
  #       → tenant_ports_{tcp,udp}
  # bootstrap.sh declares all six nft sets on every node; this
  # DaemonSet is the only writer at runtime. Replaces the prior
  # peer-firewall-reconciler + worker-firewall-reconciler split.
  # See docs/04-deployment/CLUSTER_NETWORK.md +
  # docs/04-deployment/RUNTIME_FIREWALL.md.
  - firewall-reconciler/
  - oauth2-proxy/
  # private-worker-tunnel — cluster-wide singletons for the Private
  # Worker feature: cert-manager Certificate for tunnels.${DOMAIN} and
  # the anchor Ingress that holds the TLS cert + catch-all backend.
  # Per-client tunnel-{slug} Ingresses + ExternalName Services + frps
  # Deployments are materialised at runtime by the backend reconciler
  # in backend/src/modules/private-workers/. See
  # docs/04-deployment/PRIVATE_WORKER.md for the full design.
  - private-worker-tunnel/
  # Stakater Reloader — watches annotated Secrets/ConfigMaps and rolls
  # StatefulSets/Deployments on change. Replaces the brittle cert-reload
  # CronJob that exec'd into stalwart-mail-0 with admin credentials.
  - reloader/
  - update-checker-rbac.yaml
  - update-checker-cronjob.yaml
  # Daily cluster-wide sweep of completed Jobs older than 7d.
  # Defensive layer behind ttlSecondsAfterFinished (enforced at create
  # time by ci-job-ttl-check); catches Jobs we don't control directly
  # — Longhorn snapshot jobs, third-party operators, ad-hoc kubectl.
  - job-gc-cronjob.yaml
  # Traefik v3 controller — IngressRoute + Middleware CRDs.
  # Installed imperatively by bootstrap.sh (helm upgrade --install traefik).
  # This directory holds the Kustomize-managed companion resources:
  # global Middleware CRs (compress, etc.) that IngressRoutes in any
  # namespace can reference via allowCrossNamespace.
  - traefik/
  # CronJob that mirrors live Node ExternalIPs into the Traefik
  # Service.spec.externalIPs every 5 min. Without it the Service has
  # no externalIPs and tenant traffic only works against whichever IP
  # public DNS happens to point to. This makes the platform survive
  # any single node outage at the IP layer (paired with multi-A DNS).
  - ingress-external-ips/
  # longhorn/ is NOT included in base — Longhorn itself is installed per-
  # environment via the bootstrap script, and the dashboard Ingress
  # depends on a TLS cert-manager issuer that varies by overlay. Each
  # overlay that wants the dashboard adds `k8s/base/longhorn` or its own
  # equivalent to its resources + supplies an Ingress patch.
  #
  # stalwart-mail/ is NOT included here yet — uncomment in M10 after
  # end-to-end validation on local DinD k3s. Until then the dev overlay
  # wires it directly via k8s/overlays/dev/stalwart-mail/.
  # - stalwart-mail/
