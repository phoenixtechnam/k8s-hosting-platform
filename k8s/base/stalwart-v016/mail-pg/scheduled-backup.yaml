# ScheduledBackup for mail-pg.
#
# Cron: 03:15 UTC daily. Deliberately offset from:
#   - platform-PG:    02:00 UTC (Longhorn backup for platform volumes)
#   - Longhorn daily: 02:00 UTC (recurring-jobs.yaml)
# The 75-minute gap prevents concurrent WAL-archive + Longhorn snapshot
# I/O from saturating the S3 upload bandwidth on a single-server install.
#
# Retention: 7 days — same as platform-PG to align DR window expectations.
# Operator note: Longhorn still provides an additional block-level
# recovery path for the mail-pg PVCs (via the Longhorn recurring-job-group
# label on the CNPG PVCs). CNPG logical backup + Longhorn block backup
# are complementary, not competing.
#
# S3 path: barman-cloud writes to the active backup target at
#   s3://<bucket>/mail/<cluster-name>/...
# The `mail/` prefix isolates mail backups from the `platform/` prefix
# that platform-PG uses. Both share the same S3 bucket and credentials
# (the platform's backup-credentials Secret, mirrored to the mail namespace
# via reconcileMailBackupCredentials — see M6.3 / longhorn-reconciler.ts).
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: mail-pg-daily
  namespace: mail
  labels:
    app: mail-pg
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-database
spec:
  schedule: "0 15 3 * * *"  # daily at 03:15 UTC (seconds minutes hours ...)
  backupOwnerReference: self
  cluster:
    name: mail-pg
  # Immediate: trigger a backup on object creation for day-0 coverage.
  immediate: false
