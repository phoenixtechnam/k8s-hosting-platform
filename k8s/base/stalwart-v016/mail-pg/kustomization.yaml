apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - cluster.yaml
  # NOTE: scheduled-backup.yaml removed 2026-05-07. The static CR used
  # the deprecated `method: barmanObjectStore` and minimal-trixie images
  # don't bundle barman-cloud anyway. The system-backup admin UI now
  # creates ScheduledBackup CRs dynamically with `method: plugin` when
  # an operator enables WAL archive. See backend/src/modules/system-
  # backup/wal-archive.ts.

labels:
  - pairs:
      app.kubernetes.io/part-of: hosting-platform
      app.kubernetes.io/component: mail-database
