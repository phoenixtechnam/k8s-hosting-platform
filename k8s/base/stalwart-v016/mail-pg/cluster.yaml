# Mail-PG — dedicated CNPG Cluster for Stalwart 0.16.
#
# WHY a separate Cluster (not sharing platform-PG):
#   - Independent snapshot/recovery cycles. A mail DR exercise should not
#     require a coordinated restore of the platform DB and vice versa.
#   - Stalwart manages its own schema (DDL via Stalwart migrations); the
#     application role needs full DDL rights on its own database.
#   - Backup prefix isolation: mail/ vs platform/ in the same S3 bucket.
#
# CNPG operator is already running (installed by bootstrap.sh install_cnpg).
# This CR adds a second Cluster; no new operator component is required.
#
# bootstrap.sh must create `mail-pg-app-credentials` Secret in namespace
# `mail` with `username` and `password` keys BEFORE this CR is applied.
# (See generate_platform_secrets in bootstrap.sh — the v016 step appended
# by M8 does this.) CNPG reads the Secret once at initdb and stores the
# result in `mail-pg-app` afterwards; our Secret is then stable.
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mail-db
  namespace: mail
  # Flux SSA must NOT force spec.instances so that Apply HA can patch
  # it imperatively via patchCnpgClusters() (same pattern as system-db).
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: merge
  labels:
    app: mail-pg
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-database
spec:
  # Inherit pod labels so NetworkPolicies (mail namespace allow-all-
  # intra-ns) can select by app=mail-pg. Label kept as `mail-pg`
  # (not the cluster name) so the policy doesn't need to track
  # cluster renames.
  inheritedMetadata:
    labels:
      app: mail-pg
      app.kubernetes.io/part-of: hosting-platform

  # spec.instances is INTENTIONALLY OMITTED — see k8s/base/database.yaml
  # for the full rationale. tl;dr: setting it here means Flux's merge-
  # patch reverts Apply HA's runtime patch every 60s, oscillating
  # between 1 and 3. CNPG defaults to 1 if unset.

  # PostgreSQL 18.3 on Debian 13 (Trixie). `minimal-trixie` excludes
  # barman-cloud (we use the cnpg-i barman-cloud plugin), PGAudit,
  # pgvector. Stalwart 0.16.3 verified working against this stack on
  # 2026-05-07. Bump history: 16.9 → 17.5 → 18.0-system-trixie →
  # 18.3-minimal-trixie. See docs/02-operations/MAIL_PG_PG_MAJOR_UPGRADE.md.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-minimal-trixie

  bootstrap:
    initdb:
      database: stalwart_app
      owner: stalwart_app
      # Secret with `username` and `password` keys. bootstrap.sh creates
      # this in generate_stalwart_v016_secrets() before Flux reconciles.
      secret:
        name: mail-pg-app-credentials
      # Stalwart manages its own schema via internal migrations. The
      # application user needs full DDL rights on stalwart_app. No
      # SUPERUSER — Stalwart never needs cross-database access.
      postInitApplicationSQL:
        - "GRANT ALL PRIVILEGES ON DATABASE stalwart_app TO stalwart_app"
        - "ALTER USER stalwart_app CREATEDB"  # Stalwart's migration runner uses CREATE EXTENSION

  storage:
    size: 5Gi
    # mail-pg is a system PVC — must use longhorn-system-local (1 replica
    # + system tag) so replicas never land on worker nodes. Apply HA
    # patches numberOfReplicas at runtime via the storage-policy
    # reconciler. See k8s/base/database.yaml for the same rationale.
    storageClass: longhorn-system-local

  # Conservative defaults. Mail metadata is small; 256Mi is fine for
  # a single-domain install. Production overlay should bump to 512Mi+.
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

  # Pin to system (server) nodes — same pattern as platform-PG.
  affinity:
    nodeSelector:
      platform.phoenix-host.net/node-role: server
    tolerations:
      - key: platform.phoenix-host.net/server-only
        operator: Exists
        effect: NoSchedule
    # Spread across nodes when instances >= 2 (HA mode).
    podAntiAffinityType: preferred
    topologyKey: kubernetes.io/hostname

  monitoring:
    enablePodMonitor: false  # set true when prometheus is enabled

  # Backup integration: barman-cloud WAL archive + base backups.
  # The `backup-credentials` Secret in the `mail` namespace must contain
  # AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_ENDPOINTS /
  # S3_BUCKET / S3_REGION at minimum.
  #
  # reconcileMailBackupCredentials() (backend/src/modules/backup-config/
  # longhorn-reconciler.ts) mirrors the active backup-credentials Secret
  # from the platform namespace to the mail namespace under the same name.
  # The operator must activate a backup config in the admin panel before
  # CNPG WAL archiving starts; without the Secret the Cluster CR is valid
  # but barman-cloud will log auth errors (non-fatal — Stalwart still runs).
  #
  # S3 path prefix: mail/<cluster-name>/ — isolates mail backups from
  # the platform/ prefix used by platform-PG in the same bucket.
  #
  # This section is INTENTIONALLY disabled (commented out) by default.
  # Enable it when a backup target has been configured and the
  # backup-credentials Secret exists in the mail namespace.
  # backup:
  #   barmanObjectStore:
  #     destinationPath: s3://${S3_BUCKET}/mail/mail-pg
  #     endpointURL: ${S3_ENDPOINT}
  #     s3Credentials:
  #       accessKeyId:
  #         name: backup-credentials
  #         key: AWS_ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: backup-credentials
  #         key: AWS_SECRET_ACCESS_KEY
  #     wal:
  #       compression: gzip
  #     data:
  #       compression: gzip
  #   retentionPolicy: "7d"
