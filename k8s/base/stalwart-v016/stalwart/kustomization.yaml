apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  # namespace.yaml is comment-only (0.15 already defines the mail namespace).
  # Include it for documentation; it produces no resources.
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress-mgmt.yaml
  - networkpolicy.yaml
  - bootstrap-plan-cm.yaml
  - bootstrap-job.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: hosting-platform
      app.kubernetes.io/component: mail-server
