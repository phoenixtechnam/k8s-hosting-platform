# mail namespace — created here because the 0.15 base was retired in
# the staging cutover (2026-05-04). When the 0.15 base shipped this
# Namespace, this file was a no-op reference for documentation only.
# After cutover, v016 owns the namespace.
#
# If both bases ever co-exist again (rollback scenario), one of them
# must drop this manifest to avoid duplicate-Namespace conflicts.
apiVersion: v1
kind: Namespace
metadata:
  name: mail
  labels:
    kubernetes.io/metadata.name: mail
    app.kubernetes.io/part-of: hosting-platform
