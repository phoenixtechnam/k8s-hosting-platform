# NetworkPolicy for Stalwart 0.16.
#
# Ingress:
#   - Public mail ports (25/465/587/143/993/4190) — from anywhere
#   - Management HTTP (8080) — from same namespace + platform namespace
#     (platform-api JMAP proxying + ingress controller)
#
# Egress:
#   - DNS (kube-system port 53)
#   - mail-pg PostgreSQL (port 5432, mail namespace only)
#   - Outbound SMTP (port 25) for direct MX delivery
#   - Outbound SMTP submission (465/587) for commercial relays
#   - HTTPS (443) for DNSBL, ACME, relay APIs
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stalwart-mail-v016
  namespace: mail
  labels:
    app: stalwart-mail-v016
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchLabels:
      app: stalwart-mail-v016
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public mail ports — accept from anywhere
    - from: []
      ports:
        - protocol: TCP
          port: 25
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
        - protocol: TCP
          port: 143
        - protocol: TCP
          port: 993
        - protocol: TCP
          port: 4190
    # Management HTTP — cluster-internal: same namespace + platform namespace
    # (platform-api JMAP proxy + bootstrap job) + ingress-controller pods.
    # ingress-nginx runs hostNetwork=true on this cluster, so its packets
    # source from the node IP (or, more precisely, get re-sourced by Linux
    # to the Calico VXLAN tunnel IP which falls inside the cluster pod
    # CIDR — see docs/03-cluster-networking/CALICO_VXLAN.md). A pure
    # namespace+podSelector match for ingress-nginx fails for this case
    # because the source is not a recognised pod IP. The ipBlock below
    # allows the entire cluster pod CIDR — strictly looser than the prior
    # podSelector for *intra-pod* sources, but ingress is already gated
    # by auth_request → /api/v1/auth/verify-admin-session at the nginx
    # layer, so the JMAP port is not actually exposed publicly.
    # See `project_calico_netpol_ipblock_fix.md` for the canonical write-up.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mail
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
        - ipBlock:
            cidr: 10.42.0.0/16
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # mail-pg PostgreSQL — only within mail namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mail
      ports:
        - protocol: TCP
          port: 5432
    # Outbound SMTP (direct MX delivery)
    - to: []
      ports:
        - protocol: TCP
          port: 25
    # Outbound SMTP submission (commercial relays)
    - to: []
      ports:
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
    # HTTPS for DNSBL, ACME, relay APIs
    - to: []
      ports:
        - protocol: TCP
          port: 443
