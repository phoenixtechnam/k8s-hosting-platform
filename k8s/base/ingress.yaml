# Platform ingress — admin and client panels only.
# The API is not publicly exposed. Each frontend's nginx container
# reverse-proxies /api/* to platform-api:3000 internally.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-http01
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - admin.platform.local
        - client.platform.local
      secretName: platform-tls
  rules:
    - host: admin.platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.platform.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
