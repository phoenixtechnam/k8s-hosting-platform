apiVersion: v1
kind: ServiceAccount
metadata:
  name: firewall-reconciler
  namespace: platform-system
  labels:
    app: firewall-reconciler
    app.kubernetes.io/part-of: hosting-platform
---
# RBAC for the consolidated firewall reconciler.
#
# Peer goroutine:
#   Nodes                  read     — InternalIPs → cluster_peers_v{4,6}.
#   ClusterTrustedRange    read     — spec.cidr → trusted_ranges_v{4,6}.
#   ClusterTrustedRange    write    — status subresource (normalizedCidr,
#   /status                          family, lastSyncedAt, conditions).
#   ClusterPendingPeer     read     — spec.ip → cluster_peers_v{4,6}
#                                     (union with Node InternalIPs).
#   ClusterPendingPeer     write    — status subresource (claimedAt,
#   /status                          family, expiresAt, conditions).
#   ClusterPendingPeer     delete   — TTL cleanup + post-claim cleanup.
#
# Tenant-ports goroutine:
#   Pods                   read     — spec.containers[*].ports[*].hostPort
#                                     + platform.io/firewall-{tcp,udp}-ports
#                                     annotations → tenant_ports_{tcp,udp}.
#                                     Filtered server-side by
#                                     spec.nodeName == NODE_NAME.
#   Namespaces             read     — annotation
#                                     platform.phoenix-host.net/tenant-namespace
#                                     classifies which Pods the tenant
#                                     reconciler considers.
#
# No write outside the two CRD /status subresources. Host firewall
# state is mutated locally via libnftnl + CAP_NET_ADMIN, not via the
# kube-API.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: firewall-reconciler
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.platform.phoenix-host.net"]
    resources: ["clustertrustedranges", "clusterpendingpeers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.platform.phoenix-host.net"]
    resources: ["clustertrustedranges/status", "clusterpendingpeers/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["networking.platform.phoenix-host.net"]
    resources: ["clusterpendingpeers"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: firewall-reconciler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: firewall-reconciler
subjects:
  - kind: ServiceAccount
    name: firewall-reconciler
    namespace: platform-system
