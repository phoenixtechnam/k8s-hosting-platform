# OWASP ModSecurity-CRS Deployment in the `traefik` namespace —
# tenant-opt-in WAF backend.
#
# Lives in the `traefik` namespace (not its own) so the
# madebymode/traefik-modsecurity-plugin Yaegi plugin can reference it
# without cross-namespace ExternalName plumbing. Consumed by the
# `modsecurity-crs@traefik` Middleware
# (k8s/base/traefik/middlewares-modsecurity.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: traefik

resources:
  - deployment.yaml
  # modsec-stub: tiny always-200 backend for the OWASP image's
  # `proxy_pass ${BACKEND}` line. See deployment-stub.yaml for the
  # full rationale — original BACKEND pointed at CrowdSec /health
  # which only worked for path `/` because of nginx URI appending.
  - deployment-stub.yaml
  # CRS rule exclusions for platform-API JSON-field-name false-
  # positives. Mounted into the modsec-crs container as a *.conf
  # file under /etc/modsecurity.d/owasp-crs/rules/. See file
  # comments for the rationale + scope (only admin.*/client.*/api.*
  # hostnames; tenant routes keep full CRS coverage).
  - exclusion-rules-configmap.yaml
