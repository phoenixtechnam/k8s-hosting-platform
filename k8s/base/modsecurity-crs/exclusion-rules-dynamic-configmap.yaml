# F4 — Dynamic (DB-rendered) ModSecurity CRS exclusions.
#
# Empty seed ConfigMap so the modsec-crs Deployment can mount the file
# even before the backend reconciler runs for the first time. The
# reconciler at backend/src/modules/waf-rule-exclusions/reconciler.ts
# patches this ConfigMap with the rendered SecRule content every time
# an operator creates/updates/deletes a row in waf_rule_exclusions, and
# bumps a hash annotation on the modsec-crs Deployment to roll pods.
#
# This file is the STATIC SEED — its content matches the renderer's
# empty-body output so Flux re-apply on a fresh cluster never disrupts
# already-rendered exclusions: the reconciler diffs by file content,
# not by annotation. If you change the empty body in renderer.ts, mirror
# it here.
#
# DO NOT add SecRule blocks here. Use the admin panel's WAF Events tab
# ("Whitelist this rule for this host" button) or the Exclusions tab
# (/settings/security-hardening). Manual edits will be reverted by the
# reconciler on its next 5-min tick.
#
# The CRS image globs every *.conf under /etc/modsecurity.d/owasp-crs/
# rules/ at startup. The "-BEFORE-CRS" suffix matches CRS convention
# (auto-load before main rules); the 901 sort key places this file
# AFTER the static 900 file so static exclusions apply first but still
# BEFORE main CRS rules.
apiVersion: v1
kind: ConfigMap
metadata:
  name: modsec-crs-exclusions-dynamic
  namespace: traefik
  labels:
    app.kubernetes.io/name: modsec-crs
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
    app.kubernetes.io/managed-by: platform-api-waf-rule-exclusions
data:
  REQUEST-901-EXCLUSION-RULES-BEFORE-CRS-DYNAMIC.conf: |
    # AUTO-GENERATED by waf-rule-exclusions reconciler.
    # Do NOT edit by hand — your changes will be overwritten.
    # Source of truth: waf_rule_exclusions table.
    # Companion to the static REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
    # from k8s/base/modsecurity-crs/exclusion-rules-configmap.yaml.

    # No DB-rendered exclusions are currently enabled.
    # Operators can add exclusions from the WAF Events tab in the
    # admin panel (/settings/security-hardening).
