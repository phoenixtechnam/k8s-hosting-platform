# OWASP ModSecurity-CRS sidecar Deployment.
#
# Fronted by the madebymode/traefik-modsecurity-plugin Yaegi plugin
# loaded into the Traefik DaemonSet (see scripts/bootstrap.sh's
# install_traefik helm flags + k8s/base/traefik/
# middlewares-modsecurity.yaml). When a tenant route opts into WAF
# (wafEnabled=1), annotation-sync emits a reference to the shared
# `modsecurity-crs@traefik` Middleware; the plugin proxies the request
# body to this Service for verdict.
#
# This is the canonical OWASP image — nginx + libmodsecurity + the
# CRS rules pre-loaded. Listens on :80, takes any HTTP request, returns
# the matching status from the CRS evaluation. The plugin in Traefik
# enforces the verdict (200 = allow, 403 = block).
#
# Resource sizing:
#   * 2 replicas for HA (single replica would block all WAF-enabled
#     routes on a pod restart). The image starts in ~3s.
#   * Default per-replica: ~150MB memory, ~50m cpu. CRS evaluation
#     is mostly regex matching against request body — scales with
#     body size and CRS rule depth.
#
# The plugin sets BACKEND=http://echo to a dummy upstream the OWASP
# image expects; the plugin discards the proxied response and only
# reads the status code. Setting BACKEND to any always-200 endpoint
# is fine — we point at `crowdsec` LAPI's /health for convenience
# (always returns 200 OK).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modsec-crs
  namespace: traefik
  labels:
    app.kubernetes.io/name: modsec-crs
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: modsec-crs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: modsec-crs
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: waf
    spec:
      securityContext:
        runAsNonRoot: false  # OWASP image starts nginx as root then drops
        fsGroup: 0
      containers:
        - name: modsec
          # OWASP CRS pre-loaded nginx + libmodsecurity image. The
          # `-alpine` variant is tiny (~150MB final image). Pinned to
          # the canonical 4.25.0 LTS tag (CRS 4.x stream). Bump via PR
          # after running the live block-test smoke.
          image: docker.io/owasp/modsecurity-crs:4.25.0-nginx-alpine-202604040104
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND
              # The OWASP image expects a backend to proxy past the WAF
              # check. nginx's `proxy_pass ${BACKEND}` APPENDS the
              # original request URI to the BACKEND URL — so a fixed-
              # path BACKEND like `.../health` becomes `/health/assets/
              # x.js` etc. for any non-root request, returning 404 from
              # the upstream. The Traefik madebymode/traefik-modsecurity-
              # plugin then forwards that 404 to the client (it does NOT
              # discard the upstream response as a prior comment claimed
              # — empirical test on staging.phoenix-host.net 2026-05-15:
              # / returned 200 because /health/ exists, but /assets/x.js
              # returned 404 because /health/assets/x.js doesn't, and
              # the admin panel rendered blank).
              #
              # Fix: point BACKEND at the modsec-stub Deployment in this
              # namespace — traefik/whoami returns 200 with a tiny
              # request-echo body for ANY path + method, regardless of
              # what nginx appends to the URL. Same idea as the WAF-
              # smoke-test trick the OWASP image's own examples use.
              # See deployment-stub.yaml in this dir.
              value: "http://modsec-stub.traefik.svc.cluster.local:80/"
            - name: PARANOIA
              # CRS paranoia level 1 — broad coverage with manageable
              # false-positive rate. Operators wanting stricter checks
              # can patch this in their overlay (2/3/4 progressively
              # stricter).
              value: "1"
            - name: ALLOWED_METHODS
              # CRS rule 911100 ("HTTP method is not allowed by policy")
              # defaults to `tx.allowed_methods=GET HEAD POST OPTIONS`.
              # Our admin / client / tenant API uses PATCH heavily —
              # system-settings, auth/passkey-mode, routes/<id> updates,
              # mtls-providers/clients/<cid>/certificates/<certid>
              # (revoke), etc. — plus PUT + DELETE for resource
              # lifecycle. Without this override, every non-POST mutating
              # request gets a 403 from modsec at the middleware sub-
              # request, the plugin forwards 403 verbatim, and the
              # admin panel surfaces it as "could not save". Caught
              # 2026-05-15 when admin couldn't set passkey-mode.
              # Default-allow the full REST verb set we actually use.
              value: "GET HEAD POST PUT PATCH DELETE OPTIONS"
            - name: ANOMALY_INBOUND
              # Anomaly score threshold for blocking. CRS sums rule
              # scores per request; if total >= threshold, block. 5 is
              # the OWASP recommended balanced value.
              value: "5"
            - name: ANOMALY_OUTBOUND
              value: "4"
          ports:
            - name: http
              # OWASP CRS nginx-alpine image's default nginx config
              # listens on :8080 (NOT :80) — confirmed in DinD smoke
              # test 2026-05-14. Operators using a different base
              # image must adjust here AND in the Service below.
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            # Mount the platform's CRS exclusion file at the standard
            # CRS pre-rules path. The image globs every *.conf under
            # /etc/modsecurity.d/owasp-crs/rules/ at startup, so this
            # file is auto-loaded. `subPath` is REQUIRED — without it
            # the whole rules dir would be replaced with just our one
            # file and the cluster would have effectively no WAF.
            # See exclusion-rules-configmap.yaml for the rule body
            # and scope rationale.
            - name: exclusion-rules
              mountPath: /etc/modsecurity.d/owasp-crs/rules/REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
              subPath: REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
              readOnly: true
            # F4 — DB-rendered exclusions. Reconciler at
            # backend/src/modules/waf-rule-exclusions/reconciler.ts
            # patches the ConfigMap data + bumps a hash annotation on
            # this Deployment so pods roll and pick up the new rules.
            # Mounted with subPath alongside the static 900 file so
            # both layers are in the CRS auto-load directory.
            - name: exclusion-rules-dynamic
              mountPath: /etc/modsecurity.d/owasp-crs/rules/REQUEST-901-EXCLUSION-RULES-BEFORE-CRS-DYNAMIC.conf
              subPath: REQUEST-901-EXCLUSION-RULES-BEFORE-CRS-DYNAMIC.conf
              readOnly: true
      volumes:
        - name: exclusion-rules
          configMap:
            name: modsec-crs-exclusions
            items:
              - key: REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
                path: REQUEST-900-EXCLUSION-RULES-BEFORE-CRS.conf
        - name: exclusion-rules-dynamic
          configMap:
            name: modsec-crs-exclusions-dynamic
            items:
              - key: REQUEST-901-EXCLUSION-RULES-BEFORE-CRS-DYNAMIC.conf
                path: REQUEST-901-EXCLUSION-RULES-BEFORE-CRS-DYNAMIC.conf
      affinity:
        # Spread the 2 replicas across nodes so a single-node failure
        # doesn't take both WAF instances down.
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: modsec-crs
---
apiVersion: v1
kind: Service
metadata:
  name: modsec-crs
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: waf
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: modsec-crs
  ports:
    - name: http
      # Service Port stays 80 (the modsecurity-crs@traefik Middleware's
      # modSecurityUrl uses the bare hostname, which resolves to
      # Service:80). targetPort=8080 maps to the container's listen
      # port (see Deployment containerPort above).
      port: 80
      targetPort: http
      protocol: TCP
