apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-panel
  namespace: platform
  labels:
    app: admin-panel
    app.kubernetes.io/part-of: hosting-platform
spec:
  # M12: 2 replicas + topology spread for HA across control-plane.
  replicas: 2
  selector:
    matchLabels:
      app: admin-panel
  template:
    metadata:
      labels:
        app: admin-panel
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: admin-panel
      containers:
        - name: admin
          image: ghcr.io/phoenixtechnam/hosting-platform/admin-panel:latest
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            # API_URL intentionally omitted — defaults to '' (same-origin).
            # Frontend nginx proxies /api/* to platform-api:3000 internally.
            - name: CLIENT_PANEL_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: client-url
                  optional: true
            # Separate hostname for Stalwart's embedded web-admin SPA.
            # Gated by ingress auth_request — the browser's platform_session
            # cookie authenticates the whole iframe. Empty in prod until
            # the mail-admin.<apex> ingress is provisioned.
            - name: STALWART_ADMIN_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: stalwart-admin-url
                  optional: true
            # Longhorn dashboard URL for the Storage Configuration iframe.
            # Gated by admin-auth-gate-cookie — platform_session travels
            # cross-subdomain because the cookie's Domain=.<apex>.
            - name: LONGHORN_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: longhorn-url
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: admin-panel
  namespace: platform
  labels:
    app: admin-panel
spec:
  selector:
    app: admin-panel
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
