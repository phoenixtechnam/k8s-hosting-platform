apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-panel
  namespace: platform
  labels:
    app: admin-panel
    app.kubernetes.io/part-of: hosting-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-panel
  template:
    metadata:
      labels:
        app: admin-panel
    spec:
      containers:
        - name: admin
          image: ghcr.io/phoenixtechnam/hosting-platform/admin-panel:latest
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: api-url
                  optional: true
            - name: CLIENT_PANEL_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: client-url
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: admin-panel
  namespace: platform
  labels:
    app: admin-panel
spec:
  selector:
    app: admin-panel
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
