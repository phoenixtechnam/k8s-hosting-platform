# R-X4-followup: rclone.conf moved from ConfigMap → Secret.
#
# WHY: the rendered rclone.conf contains rclone-obscured S3
# `secret_access_key` + SFTP `pass` values. rclone-obscure is reversible
# by anyone with the rclone binary (per `crypto.ts:rcloneObscure`); the
# ConfigMap form would let any cluster principal with `get configmap`
# in the `platform` namespace recover upstream provider credentials in
# seconds. Storing rclone.conf in a Secret aligns with the SSH-keys
# Secret pattern and lets operators enable encryption-at-rest via
# EncryptionConfiguration in a single place.
#
# The Secret is created here as an empty placeholder so the DaemonSet's
# projected volume can mount it on fresh clusters before platform-api
# materializes the rendered content. The `data` map is intentionally
# empty (`data: {}` is the YAML form for "Secret with zero data
# entries"; the API server accepts it). Once platform-api reconciles,
# the `rclone.conf` data key is populated.
#
# Flux is configured to skip-data-reconcile (annotation below) so a
# `flux reconcile` doesn't overwrite the platform-api's content.
apiVersion: v1
kind: Secret
metadata:
  name: backup-rclone-shim-credentials
  namespace: platform
  labels:
    app: backup-rclone-shim
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: platform-api-backup-rclone-shim
  annotations:
    # Flux Kustomize toolkit honors this annotation to skip reconciling
    # the resource's `data` field — platform-api owns the contents.
    platform.phoenix-host.net/managed-by: backup-rclone-shim/config-renderer
    kustomize.toolkit.fluxcd.io/ssa: merge
type: Opaque
data: {}
