# Initial ConfigMap with launcher.sh.
#
# R-X19 — rclone-serve-s3 unified architecture (2026-05-21):
#   - One `rclone serve s3` per pod
#   - Native rclone backends for all upstream types:
#       S3      → rclone s3 backend (passthrough proxy)
#       SFTP    → rclone sftp backend (native userspace SSH client)
#       CIFS    → rclone smb backend (native userspace SMB client)
#       Local   → rclone local backend (against PVC-mounted dir)
#   - NO kernel mounts. NO FUSE. NO CAP_SYS_ADMIN. NO /dev/fuse.
#   - Pod runs fully unprivileged: runAsUser:65534, drop ALL caps.
#
# Memory tuning (v3-tuned per 2026-05-21 bench):
#   - GOGC=20 + GOMEMLIMIT=200MiB (aggressive Go GC + soft cap)
#   - --s3-disable-http2 (HTTP/1.1 = parallel TCP, no HoL blocking)
#   - --s3-upload-concurrency 2 (upstream is the bottleneck)
#   - --buffer-size 2M (smaller per-file read buffer)
#   - --s3-memory-pool-flush-time 30s (idle pool returns memory faster)
#
# Owned at runtime by platform-api's backup-rclone-shim/reconciler.ts:
# operator assigns a target to a class → reconciler MERGE-patches
# `data.classes.txt` here + writes `data.upstream.env` into the Secret +
# bumps DaemonSet annotation hash → rolling restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-rclone-shim-config
  namespace: platform
  labels:
    app: backup-rclone-shim
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: backup
  annotations:
    platform.phoenix-host.net/managed-by: backup-rclone-shim/config-renderer
    # Flux must use merge-patch (not full SSA) on this ConfigMap so
    # `data.classes.txt` isn't reset to "" each tick when the
    # reconciler has populated it. Without this annotation, every Flux
    # reconcile wipes the runtime state.
    kustomize.toolkit.fluxcd.io/ssa: merge
data:
  # classes.txt is INTENTIONALLY ABSENT here so Flux doesn't claim
  # ownership of the field. The reconciler creates + maintains it
  # with one line per bound class (system, tenant, mail).

  # The shim's entrypoint. Reads classes.txt + upstream.env; if either
  # is missing / empty, sleeps so the pod stays Ready=false (Service
  # routes nothing to it; clients get connection-refused).
  launcher.sh: |
    #!/bin/sh
    set -eu

    UPSTREAM_ENV=/etc/rclone-credentials/upstream.env
    CLASSES_FILE=/etc/rclone-static/classes.txt
    RCLONE_CONF=/tmp/rclone.conf
    ADDR=":9000"

    log() { printf '[backup-rclone-shim] %s\n' "$*" >&2; }

    # ─── Pre-flight: upstream.env + classes.txt must exist ────────────
    if [ ! -f "$UPSTREAM_ENV" ]; then
      log "$UPSTREAM_ENV missing — reconciler has not rendered yet."
      log "Sleeping until platform-api renders config."
      while :; do sleep 30; done
    fi
    if [ ! -s "$CLASSES_FILE" ]; then
      log "$CLASSES_FILE empty — no class-target assignments."
      log "Sleeping until platform-api renders config."
      while :; do sleep 30; done
    fi

    # ─── Validate classes.txt against strict allowlist ────────────────
    # Each line must be exactly one of: system / tenant / mail.
    # Defends against:
    #   - shell-meta injection (`; rm -rf /`, $(curl ...), backticks)
    #   - argument injection (`--config /tmp/evil`, extra flags)
    #   - IFS / whitespace pathology
    CLASSES_OK=""
    LINE=""
    while IFS= read -r LINE || [ -n "$LINE" ]; do
      LINE=$(printf '%s' "$LINE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
      [ -z "$LINE" ] && continue
      case "$LINE" in
        system|tenant|mail) ;;
        *) log "FATAL: classes.txt contains invalid class: '$LINE'"; exit 2 ;;
      esac
      # Flux postBuild substituteFrom escape: `$$` keeps literal `$`
      # past envsubst. Without this the variables get blanked.
      CLASSES_OK="$${CLASSES_OK}$${LINE} "
    done < "$CLASSES_FILE"
    if [ -z "$CLASSES_OK" ]; then
      log "$CLASSES_FILE present but yielded zero valid classes — sleeping."
      while :; do sleep 30; done
    fi

    # ─── Load upstream params from env file ───────────────────────────
    # The env file contains:
    #   UPSTREAM_TYPE=s3|sftp|cifs|local
    #   UPSTREAM_<TYPE>_<FIELD>=...  (type-specific)
    #   ROOT_ACCESS_KEY (shim's HKDF-derived creds for clients)
    #   ROOT_SECRET_KEY
    # All values are written by the reconciler with strict allowlist
    # validation (rclone-config.ts shellQuote — no NUL, no newline).
    set -a
    . "$UPSTREAM_ENV"
    set +a

    case "$${UPSTREAM_TYPE:-}" in
      s3|sftp|cifs|local) ;;
      *) log "FATAL: UPSTREAM_TYPE='$${UPSTREAM_TYPE:-}' not recognised"; exit 2 ;;
    esac

    log "shim launcher: upstream type='$${UPSTREAM_TYPE}' classes='$${CLASSES_OK}'"

    # ─── Go runtime memory tuning ─────────────────────────────────────
    # Per 2026-05-21 bench: aggressive GC + soft memory cap keeps RSS
    # bounded under multipart workloads without sacrificing throughput.
    # GOMEMLIMIT is a SOFT cap — Go will exceed it but trigger more
    # frequent GC, so we tolerate peaks above the limit during heavy
    # bursts. The pod's memory limit is the hard ceiling.
    export GOGC="$${GOGC:-20}"
    export GOMEMLIMIT="$${GOMEMLIMIT:-200MiB}"
    export HOME=/tmp

    # ─── Render rclone.conf per upstream type ─────────────────────────
    # Each backend produces an [upstream] section in rclone.conf with
    # the operator-supplied credentials. Passwords are obscured at
    # render time (rclone refuses plaintext passwords in config).
    : > "$RCLONE_CONF"
    chmod 0600 "$RCLONE_CONF"

    case "$${UPSTREAM_TYPE}" in
      s3)
        # S3 backend = pure passthrough proxy. Client bucket name
        # flows through to upstream. Operator must pre-create the
        # bucket on the upstream provider matching their class names
        # (or use a shared bucket and rely on per-class prefixes —
        # see docs/02-operations/BACKUP_RCLONE_SHIM.md).
        cat >> "$RCLONE_CONF" <<EOF
    [upstream]
    type = s3
    provider = Other
    endpoint = $${UPSTREAM_ENDPOINT}
    region = $${UPSTREAM_REGION:-us-east-1}
    access_key_id = $${UPSTREAM_ACCESS_KEY}
    secret_access_key = $${UPSTREAM_SECRET_KEY}
    force_path_style = $${UPSTREAM_USE_PATH_STYLE:-true}
    EOF
        # rclone serve s3 with path "upstream:" → serves the upstream
        # S3 endpoint's bucket namespace verbatim. boto3 PUT to
        # bucket=system maps to upstream bucket=system.
        REMOTE_PATH="upstream:"
        VFS_CACHE_MODE="off"
        ;;
      sftp)
        # SFTP backend = rclone's native pkg/sftp client. No FUSE.
        # No kernel mount. No SYS_ADMIN. Pure userspace.
        if [ -z "$${UPSTREAM_SFTP_HOST:-}" ] || [ -z "$${UPSTREAM_SFTP_USER:-}" ]; then
          log "FATAL: SFTP requires UPSTREAM_SFTP_HOST + UPSTREAM_SFTP_USER"
          exit 2
        fi
        cat >> "$RCLONE_CONF" <<EOF
    [upstream]
    type = sftp
    host = $${UPSTREAM_SFTP_HOST}
    user = $${UPSTREAM_SFTP_USER}
    port = $${UPSTREAM_SFTP_PORT:-22}
    shell_type = unix
    EOF
        if [ -n "$${UPSTREAM_SFTP_KEYFILE:-}" ]; then
          echo "key_file = $${UPSTREAM_SFTP_KEYFILE}" >> "$RCLONE_CONF"
        elif [ -n "$${UPSTREAM_SFTP_PASSWORD:-}" ]; then
          # rclone refuses plaintext passwords in config — obscure now.
          OBS=$(printf '%s' "$${UPSTREAM_SFTP_PASSWORD}" | rclone obscure -)
          echo "pass = $OBS" >> "$RCLONE_CONF"
        else
          log "FATAL: SFTP requires UPSTREAM_SFTP_KEYFILE or UPSTREAM_SFTP_PASSWORD"
          exit 2
        fi
        # PATH from the target → served as the root. Top-level dirs
        # under it become buckets in the served S3 view.
        REMOTE_PATH="upstream:$${UPSTREAM_SFTP_PATH:-}"
        VFS_CACHE_MODE="writes"
        ;;
      cifs)
        # SMB/CIFS backend = rclone's native pkg/smb2 client. No FUSE.
        # No mount.cifs. No SYS_ADMIN.
        if [ -z "$${UPSTREAM_CIFS_HOST:-}" ] || [ -z "$${UPSTREAM_CIFS_USER:-}" ] || [ -z "$${UPSTREAM_CIFS_PASSWORD:-}" ]; then
          log "FATAL: CIFS requires UPSTREAM_CIFS_HOST + UPSTREAM_CIFS_USER + UPSTREAM_CIFS_PASSWORD"
          exit 2
        fi
        OBS=$(printf '%s' "$${UPSTREAM_CIFS_PASSWORD}" | rclone obscure -)
        cat >> "$RCLONE_CONF" <<EOF
    [upstream]
    type = smb
    host = $${UPSTREAM_CIFS_HOST}
    user = $${UPSTREAM_CIFS_USER}
    pass = $OBS
    EOF
        [ -n "$${UPSTREAM_CIFS_DOMAIN:-}" ] && echo "domain = $${UPSTREAM_CIFS_DOMAIN}" >> "$RCLONE_CONF"
        [ -n "$${UPSTREAM_CIFS_PORT:-}" ] && echo "port = $${UPSTREAM_CIFS_PORT}" >> "$RCLONE_CONF"
        # SMB share goes in the path: upstream:<share>/[path]
        if [ -z "$${UPSTREAM_CIFS_SHARE:-}" ]; then
          log "FATAL: CIFS requires UPSTREAM_CIFS_SHARE"
          exit 2
        fi
        REMOTE_PATH="upstream:$${UPSTREAM_CIFS_SHARE}$${UPSTREAM_CIFS_PATH:+/$${UPSTREAM_CIFS_PATH}}"
        VFS_CACHE_MODE="writes"
        ;;
      local)
        # Local backend = filesystem at /mnt/upstream, which the
        # reconciler bind-mounts from the operator-specified PVC.
        # No kernel mount inside the pod (Kubernetes mounted it at
        # pod startup, before the launcher runs).
        cat >> "$RCLONE_CONF" <<EOF
    [upstream]
    type = local
    EOF
        if [ ! -d /mnt/upstream ]; then
          log "FATAL: /mnt/upstream not mounted (Local target requires PVC)"
          exit 2
        fi
        REMOTE_PATH="upstream:/mnt/upstream"
        VFS_CACHE_MODE="writes"
        ;;
    esac

    # Strip the awkward heredoc indentation
    sed -i 's/^    //' "$RCLONE_CONF"
    log "rclone.conf rendered (creds redacted):"
    grep -vE '^(secret_access_key|pass|password)' "$RCLONE_CONF" >&2 || true

    # ─── VFS cache dir (only used when --vfs-cache-mode != off) ───────
    # Mounted at /var/cache/rclone-shim from the daemonset's
    # rclone-cache emptyDir volume. Disk-backed (not tmpfs) because
    # multipart parts can total GiBs in flight.
    CACHE_DIR=/var/cache/rclone-shim
    mkdir -p "$CACHE_DIR"

    # ─── Common rclone serve s3 flags ─────────────────────────────────
    # ROOT_ACCESS_KEY + ROOT_SECRET_KEY are the shim's own creds —
    # clients use these to authenticate TO the shim, NOT to upstream.
    log "launching rclone serve s3 ($${UPSTREAM_TYPE} backend)"
    exec rclone serve s3 \
      --config "$RCLONE_CONF" \
      --addr "$ADDR" \
      --auth-key "$${ROOT_ACCESS_KEY},$${ROOT_SECRET_KEY}" \
      --vfs-cache-mode "$VFS_CACHE_MODE" \
      --vfs-cache-max-size 512M \
      --vfs-cache-max-age 24h \
      --vfs-cache-poll-interval 1m \
      --vfs-write-back 0s \
      --vfs-read-ahead 0 \
      --buffer-size 2M \
      --no-modtime \
      --no-checksum \
      --s3-chunk-size 5M \
      --s3-upload-concurrency 2 \
      --s3-memory-pool-flush-time 30s \
      --s3-disable-http2 \
      --cache-dir "$CACHE_DIR" \
      --log-level NOTICE \
      "$REMOTE_PATH"
