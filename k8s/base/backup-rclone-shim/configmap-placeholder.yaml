# Initial ConfigMap with launcher.sh + empty buckets.txt.
#
# R-X4-followup: rclone.conf moved to a Secret
# (backup-rclone-shim-credentials). This ConfigMap now only carries
# non-sensitive content. Buckets.txt is a plaintext list of bucket
# names ('system:', 'tenant:', 'mail:') — not a secret. launcher.sh
# is the entry-point script — also not a secret.
#
# Owned at runtime by platform-api's backup-rclone-shim/reconciler.ts:
# when an operator assigns a target to a class, the reconciler MERGE-
# patches `data.buckets.txt` here (leaving `launcher.sh` untouched) +
# writes `data.rclone.conf` into the Secret + bumps the DaemonSet
# annotation hash, triggering a rolling restart.
#
# Until the reconciler runs and the first target is assigned, the
# launcher.sh wrapper detects an empty buckets.txt and sleeps the
# container. `internalTrafficPolicy: Local` ensures clients on a node
# whose shim is sleeping get connection-refused on the Service VIP,
# which their retry logic handles as a transient outage.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-rclone-shim-config
  namespace: platform
  labels:
    app: backup-rclone-shim
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: backup
  annotations:
    platform.phoenix-host.net/managed-by: backup-rclone-shim/config-renderer
    # Flux must use merge-patch (not full SSA) on this ConfigMap so
    # `data.buckets.txt` isn't reset to "" each tick when the
    # reconciler has populated it with real bucket names. Without
    # this annotation, every Flux reconcile wipes the runtime state.
    # Discovered via E2E on staging 2026-05-20.
    kustomize.toolkit.fluxcd.io/ssa: merge
data:
  # buckets.txt is INTENTIONALLY ABSENT here so Flux doesn't claim
  # ownership of the field. The reconciler creates + maintains it.
  # When the reconciler hasn't run yet, launcher.sh sleeps because
  # BUCKETS_FILE doesn't exist (the launcher tolerates that).

  # The shim's entrypoint. Reads buckets.txt; if empty, sleep
  # indefinitely (the pod stays Ready=false from the readiness probe,
  # so the Service doesn't route to it; clients get connection
  # refused). If buckets exist, exec into rclone.
  #
  # buckets.txt is validated line-by-line against a strict allowlist
  # before being passed to rclone. A malicious ConfigMap edit (by a
  # `platform`-namespace admin or a buggy reconciler) writing shell
  # metacharacters cannot inject extra arguments — each line must be
  # exactly one of: `system`, `tenant`, `mail` (R-X16 class names,
  # bare — no `:` suffix, no `-raw` variants).
  launcher.sh: |
    #!/bin/sh
    set -eu

    CONFIG=/etc/rclone-credentials/rclone.conf
    BUCKETS_FILE=/etc/rclone-static/buckets.txt
    ADDR=":9000"

    log() { printf '[backup-rclone-shim] %s\n' "$*" >&2; }

    # The credentials Secret is projected into /etc/rclone-credentials.
    # On fresh clusters before the reconciler has populated it, the
    # `rclone.conf` data key may be absent — the projected file then
    # simply doesn't exist. We tolerate that by sleeping until the
    # reconciler renders content (same path as the empty buckets.txt
    # branch). The Secret object itself MUST exist (Flux applies the
    # placeholder) so the projected volume can mount.
    if [ ! -f "$CONFIG" ]; then
      log "$CONFIG missing — reconciler has not rendered yet."
      log "Sleeping until platform-api renders config."
      while :; do sleep 30; done
    fi

    if [ ! -s "$BUCKETS_FILE" ]; then
      log "$BUCKETS_FILE empty — no class-target assignments."
      log "Sleeping until platform-api renders config."
      while :; do sleep 30; done
    fi

    # Parse buckets.txt line-by-line. R-X16 unified architecture: each
    # line is now a bare CLASS NAME (no `:` suffix, no `-raw` variants).
    # The launcher uses the list purely as a sanity-check that the
    # reconciler completed and at least one class is bound. The actual
    # served remote is the fixed `encrypted:` single crypt remote.
    #
    # Class-name allowlist: lowercase letters only (system, tenant, mail).
    # This defends against:
    #   - shell-meta injection (`; rm -rf /`, $(curl ...), backticks)
    #   - argument injection (`--config /tmp/evil`, extra flags)
    #   - IFS / whitespace pathology
    CLASSES_OK=""
    LINE=""
    while IFS= read -r LINE || [ -n "$LINE" ]; do
      LINE=$(printf '%s' "$LINE" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')
      [ -z "$LINE" ] && continue
      case "$LINE" in
        system|tenant|mail) ;;
        *) log "FATAL: buckets.txt contains invalid class: '$LINE'"; exit 2 ;;
      esac
      # Flux postBuild substituteFrom uses envsubst-style expansion
      # on the ConfigMap content. The two refs below would otherwise
      # be eaten (substituted to "" because they're not in the
      # platform-config envFrom). The $$ escape tells Flux to leave
      # them as literal dollar-brace-NAME for the runtime shell.
      # Memory rule [feedback_flux_postbuild_escape] documents this
      # trap; ci-flux-escape-check.sh enforces.
      CLASSES_OK="$${CLASSES_OK}$${LINE} "
    done < "$BUCKETS_FILE"

    if [ -z "$CLASSES_OK" ]; then
      log "$BUCKETS_FILE present but yielded zero valid classes — sleeping."
      while :; do sleep 30; done
    fi

    # `rclone serve s3` accepts ONE remote:path and serves the top-level
    # DIRECTORIES under it as buckets. The renderer emits ONE upstream
    # remote (the operator-configured S3/SFTP/CIFS/NFS target) wrapped
    # by ONE crypt remote (`encrypted:`). When a caller writes to
    # `s3://system/...` through the served endpoint, rclone serve s3
    # creates `system/` as a top-level dir inside the crypt remote on
    # first write — no static bucket list needed. This replaces the
    # R-X10 `[buckets]` combine backend (which broke rclone's LIST
    # traversal — see staging E2E 2026-05-20).
    log "launching rclone serve s3 encrypted: (classes: $${CLASSES_OK})"

    # Performance flags carried from BACKUP_ARCHITECTURE_RFC §13a.
    # --vfs-cache-mode writes (NOT off): rclone serve s3 stores in-flight
    # multipart-upload parts in the VFS cache between InitiateMultipartUpload
    # and CompleteMultipartUpload. With `off`, parts evict before completion
    # and CompleteMultipartUpload returns NoSuchUpload — barman-cloud and
    # restic both rely on multipart for large objects (base backup, big
    # snapshots). `writes` keeps just the in-flight write data, not the
    # whole VFS, so memory pressure stays bounded.
    exec rclone serve s3 \
      --config "$CONFIG" \
      --addr "$ADDR" \
      --vfs-cache-mode writes \
      --no-checksum \
      --s3-chunk-size 16M \
      --s3-upload-concurrency 4 \
      encrypted:
