# R-X4-followup: per-class SFTP PEM keys, materialised by platform-api
# from `backup_configurations.ssh_key_encrypted` decrypted with
# PLATFORM_ENCRYPTION_KEY.
#
# Placeholder Secret so the DaemonSet's volume can mount it on fresh
# clusters. Empty until at least one SFTP target is assigned to a
# shim class.
apiVersion: v1
kind: Secret
metadata:
  name: backup-rclone-shim-ssh-keys
  namespace: platform
  labels:
    app: backup-rclone-shim
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: backup
    app.kubernetes.io/managed-by: platform-api-backup-rclone-shim
  annotations:
    platform.phoenix-host.net/managed-by: backup-rclone-shim/config-renderer
    kustomize.toolkit.fluxcd.io/ssa: merge
type: Opaque
data: {}
