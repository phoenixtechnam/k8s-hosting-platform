# Daily backup of deployment-critical Secrets.
#
# What: platform control Secrets (platform-secrets, platform-jwt-secret,
# platform-db-credentials, platform-admin-seed, oauth2-proxy-config,
# platform-tls-*), all Secrets in each client-* namespace, and
# longhorn-backup-credentials.
#
# How: kubectl get -o yaml dumped into a tarball, age-encrypted to the
# operator-owned public recipient stored in platform-operator-recipient
# ConfigMap, uploaded to the active backup target. See ADR-029.
#
# Why nightly + 03:15: runs after etcd-snapshot (02:30), pg-dump
# (02:45), cluster-state (03:00) so the secrets bundle reflects the
# same consistent post-backup window.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-backup
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: dr-backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secrets-backup
  labels:
    app.kubernetes.io/part-of: hosting-platform
rules:
  # Read Secret objects across namespaces we want to capture. Using
  # cluster-scope list/get so we don't have to maintain per-namespace
  # RoleBindings as tenants come and go. Pod has no write permissions.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # Read the operator recipient ConfigMap + namespace inventory (so
  # the script can iterate client-* namespaces by name).
  - apiGroups: [""]
    resources: ["configmaps", "namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secrets-backup
  labels:
    app.kubernetes.io/part-of: hosting-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: secrets-backup
subjects:
  - kind: ServiceAccount
    name: secrets-backup
    namespace: platform
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-secrets-backup
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: dr-backup
spec:
  # Suspended by default. Unsuspended by longhorn-reconciler when a
  # backup target becomes active. See cluster-state-cronjob.yaml for the
  # full rationale.
  suspend: true
  schedule: "15 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 604800
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: secrets-backup
          containers:
            - name: backup
              # Alpine-based image with kubectl + aws-cli + jq pre-
              # installed. age / openssh-client / rsync are apk-added
              # at startup (small, cached nightly). bitnami/kubectl was
              # the previous choice but its pinned minor-version tags
              # (1.31/1.32/1.33) were removed from Docker Hub in 2026.
              image: alpine/k8s:1.33.3
              imagePullPolicy: IfNotPresent
              env:
                # S3 credentials when active target is S3. Missing when
                # target is SSH — the script branches on TARGET_KIND.
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ACCESS_KEY_ID
                      optional: true
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                      optional: true
                - name: AWS_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ENDPOINTS
                      optional: true
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: S3_REGION
                      optional: true
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: S3_BUCKET
                      optional: true
                - name: S3_PATH_PREFIX
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: S3_PATH_PREFIX
                      optional: true
                # SSH-target fields (active target = SSH). Reconciler
                # writes these instead of AWS_* when the operator picks
                # SSH in the admin panel. Exactly one set is populated.
                - name: SSH_HOST
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: SSH_HOST
                      optional: true
                - name: SSH_PORT
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: SSH_PORT
                      optional: true
                - name: SSH_USER
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: SSH_USER
                      optional: true
                - name: SSH_PATH
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: SSH_PATH
                      optional: true
                - name: TARGET_KIND
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: TARGET_KIND
                      optional: true
              volumeMounts:
                # SSH private key mounted as a file with 0600 perms so
                # ssh-keygen / rsync won't refuse it. Reconciler writes
                # the key under this name when target is SSH.
                - name: ssh-key
                  mountPath: /secrets/ssh
                  readOnly: true
              command: [/bin/sh, -c]
              args:
                - |
                  set -euo pipefail

                  # Prereqs — keep minimal, install-on-run to stay
                  # image-agnostic. Trust this container's network
                  # policy limits egress to k8s API + backup target.
                  # alpine/k8s ships kubectl + aws + jq + tar + gzip.
                  # age + openssh-client + rsync are the only additions.
                  apk add --no-cache age openssh-client rsync >/dev/null

                  # Pull the operator's age recipient. If missing the
                  # bundle can't be encrypted — fail loudly rather than
                  # produce a plaintext backup.
                  RECIPIENT=$(kubectl get configmap platform-operator-recipient \
                    -n platform -o jsonpath='{.data.recipient}' 2>/dev/null || true)
                  if [ -z "${RECIPIENT}" ]; then
                    echo '[secrets-backup] ERROR: platform-operator-recipient ConfigMap missing or empty.'
                    echo '  Run bootstrap.sh again or create the ConfigMap manually before this CronJob fires.'
                    exit 1
                  fi
                  echo "[secrets-backup] recipient=${RECIPIENT}"

                  OUT=$(mktemp -d)
                  STAMP=$(date -u +%Y%m%dT%H%M%SZ)
                  PREFIX="${S3_PATH_PREFIX:+${S3_PATH_PREFIX}/}secrets"
                  BUNDLE="${OUT}/secrets-${STAMP}.tar"

                  dump() {
                    local ns=$1; shift
                    local out=$1; shift
                    # Single-secret or --all; caller decides. We redact
                    # zero fields — the whole payload is about to be
                    # age-encrypted, and downstream restore needs the
                    # data verbatim.
                    kubectl get secret -n "${ns}" "$@" -o yaml > "${out}" 2>/dev/null || true
                  }

                  mkdir -p "${OUT}/platform"
                  for name in platform-secrets platform-jwt-secret \
                              platform-db-credentials platform-admin-seed \
                              oauth2-proxy-config platform-tls \
                              platform-staging-tls platform-dev-tls \
                              longhorn-backup-credentials backup-credentials; do
                    dump platform "${OUT}/platform/${name}.yaml" "${name}"
                  done

                  # Tenant Secrets by namespace. Filter out
                  # ServiceAccount tokens (regenerable) and anything
                  # carrying the backup-excluded annotation.
                  mkdir -p "${OUT}/tenants"
                  for ns in $(kubectl get ns -o jsonpath='{range .items[?(@.metadata.name)]}{.metadata.name}{"\n"}{end}' \
                              | grep -E '^client-'); do
                    mkdir -p "${OUT}/tenants/${ns}"
                    kubectl get secrets -n "${ns}" -o json \
                      | jq -r --arg ns "${ns}" '.items[]
                          | select(.type != "kubernetes.io/service-account-token")
                          | select((.metadata.annotations["platform.phoenix-host.net/backup-excluded"] // "false") != "true")
                          | .metadata.name' \
                      | while read -r sname; do
                          [ -z "${sname}" ] && continue
                          dump "${ns}" "${OUT}/tenants/${ns}/${sname}.yaml" "${sname}"
                        done
                  done

                  # Include the longhorn-system backup credentials too
                  # — reconciler writes these; losing them means the
                  # restored cluster can't re-authenticate to the same
                  # S3 bucket until the operator re-enters creds.
                  mkdir -p "${OUT}/longhorn-system"
                  dump longhorn-system "${OUT}/longhorn-system/longhorn-backup-credentials.yaml" longhorn-backup-credentials

                  # Tarball + encrypt in one pipe so we never touch
                  # disk with plaintext bundle.
                  tar -czf "${BUNDLE}" -C "${OUT}" platform tenants longhorn-system
                  age -r "${RECIPIENT}" -o "${BUNDLE}.age" "${BUNDLE}"
                  rm -f "${BUNDLE}"  # plaintext tar — evict immediately
                  ENC_SIZE=$(stat -c%s "${BUNDLE}.age")
                  echo "[secrets-backup] encrypted bundle ${ENC_SIZE} bytes"

                  # Upload to active backup target. TARGET_KIND is
                  # written by the reconciler; default s3 for first-
                  # install compatibility.
                  KIND=${TARGET_KIND:-s3}
                  case "${KIND}" in
                    s3)
                      [ -n "${S3_BUCKET:-}" ] || { echo '[secrets-backup] ERROR: S3_BUCKET empty'; exit 1; }
                      aws s3 cp --endpoint-url="${AWS_ENDPOINT_URL}" \
                        "${BUNDLE}.age" "s3://${S3_BUCKET}/${PREFIX}/secrets-${STAMP}.tar.age"
                      # Retain 30 newest.
                      aws s3 ls --endpoint-url="${AWS_ENDPOINT_URL}" \
                        "s3://${S3_BUCKET}/${PREFIX}/" \
                        | awk '{print $4}' \
                        | grep -E '^secrets-.*\.tar\.age$' \
                        | sort -r \
                        | tail -n +31 \
                        | while read -r f; do
                            aws s3 rm --endpoint-url="${AWS_ENDPOINT_URL}" \
                              "s3://${S3_BUCKET}/${PREFIX}/${f}"
                          done
                      echo "[secrets-backup] s3://${S3_BUCKET}/${PREFIX}/secrets-${STAMP}.tar.age"
                      ;;
                    ssh)
                      [ -f /secrets/ssh/key ] || { echo '[secrets-backup] ERROR: /secrets/ssh/key missing'; exit 1; }
                      [ -n "${SSH_HOST:-}" ] || { echo '[secrets-backup] ERROR: SSH_HOST empty'; exit 1; }
                      PORT=${SSH_PORT:-22}
                      DEST="${SSH_USER}@${SSH_HOST}:${SSH_PATH}/secrets/"
                      chmod 600 /secrets/ssh/key  # rsync refuses looser perms
                      ssh -i /secrets/ssh/key -p "${PORT}" \
                        -o StrictHostKeyChecking=accept-new \
                        "${SSH_USER}@${SSH_HOST}" \
                        "mkdir -p ${SSH_PATH}/secrets"
                      rsync -az -e "ssh -i /secrets/ssh/key -p ${PORT} -o StrictHostKeyChecking=accept-new" \
                        "${BUNDLE}.age" "${DEST}"
                      # Retention sweep — delete anything older than 30 days.
                      ssh -i /secrets/ssh/key -p "${PORT}" \
                        -o StrictHostKeyChecking=accept-new \
                        "${SSH_USER}@${SSH_HOST}" \
                        "find ${SSH_PATH}/secrets -name 'secrets-*.tar.age' -mtime +30 -delete"
                      echo "[secrets-backup] ssh://${SSH_USER}@${SSH_HOST}${SSH_PATH}/secrets/secrets-${STAMP}.tar.age"
                      ;;
                    *)
                      echo "[secrets-backup] ERROR: unknown TARGET_KIND=${KIND}"
                      exit 1
                      ;;
                  esac
                  echo "[secrets-backup] done"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
          volumes:
            - name: ssh-key
              secret:
                secretName: backup-credentials
                optional: true
                items:
                  - key: SSH_PRIVATE_KEY
                    path: key
                    mode: 0600
