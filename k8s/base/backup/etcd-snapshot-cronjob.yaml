# Daily sync of k3s etcd snapshots to S3. Runs at 02:30 — before the
# pg_dump so both make it off-box within a 30-minute window.
#
# k3s ships automatic etcd snapshots to
#   /var/lib/rancher/k3s/server/db/snapshots
# on the server node (default schedule every 12h, retention 5). We
# mount that path read-only and upload anything newer than 36h. This
# means if an operator destroys the whole server VM we can restore from
# the latest S3 object without needing the original node.
#
# SECURITY: the snapshot dir contains the full cluster state including
# Secrets. ServiceAccount has no extra cluster privileges — only
# hostPath-mount. Pod runs as root (it needs to read files owned by
# k3s); a non-root sidecar option would require chown at snapshot-time
# which k3s doesn't support. Acceptable for staging/single-node; a
# dedicated backup node with a RO bind mount is the prod path.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: platform-etcd-snapshot-upload
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: dr-backup
    platform.phoenix-host.net/backup-health-watch: "true"
    platform.phoenix-host.net/backup-category: "dr"
    platform.phoenix-host.net/backup-severity: "critical"
    platform.phoenix-host.net/depends-on: "backup-credentials"
  annotations:
    platform.phoenix-host.net/backup-display-name: "etcd snapshot upload"
spec:
  # Suspended by default. Unsuspended by longhorn-reconciler when a
  # backup target becomes active. See cluster-state-cronjob.yaml for the
  # full rationale.
  suspend: true
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 604800
      template:
        spec:
          restartPolicy: OnFailure
          # Must run on the control-plane node — that's where k3s writes
          # the snapshots. On a single-node staging cluster this is a
          # no-op; on a HA cluster it pins to one of the server nodes.
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          # k3s masters tolerate NoSchedule by default; add an explicit
          # toleration for the common control-plane taint so the cron
          # scheduler doesn't get stuck when someone hardens the node.
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists
            - key: node-role.kubernetes.io/master
              effect: NoSchedule
              operator: Exists
          containers:
            - name: etcd-upload
              # alpine/k8s bundles aws-cli so we avoid the apk add step
              # that was fast-failing on 2026-04-23 (the pod terminated
              # within 2s with no log retained, likely apk network issue
              # or a pipefail edge case in the retention-list step).
              # Matches the image pattern used by the other DR CronJobs.
              image: alpine/k8s:1.33.3
              imagePullPolicy: IfNotPresent
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_SECRET_ACCESS_KEY
                - name: AWS_ENDPOINT_URL
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: AWS_ENDPOINTS
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: S3_REGION
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: S3_BUCKET
                - name: S3_PATH_PREFIX
                  valueFrom:
                    secretKeyRef:
                      name: backup-credentials
                      key: S3_PATH_PREFIX
              # Use bash explicitly — the script uses `mapfile -t` (bash
              # builtin, not POSIX sh). alpine/k8s ships bash.
              command: [/bin/bash, -c]
              args:
                - |
                  set -euo pipefail
                  SRC=/snapshots
                  PREFIX="${S3_PATH_PREFIX:+${S3_PATH_PREFIX}/}etcd"
                  if [ ! -d "${SRC}" ]; then
                    echo "[etcd] snapshot dir missing — is this a k3s server node?"
                    exit 1
                  fi
                  cd "${SRC}"
                  # Match k3s's auto-snapshot naming (etcd-snapshot-<host>-
                  # <timestamp>) AND operator-created on-demand snapshots
                  # (any filename the snapshot API produced). First-run
                  # clusters may have no auto-snapshots yet — exit cleanly
                  # in that case rather than treating "nothing to upload"
                  # as an error. Populate `files` via mapfile so an empty
                  # result doesn't trip set -e + pipefail on the pipeline.
                  mapfile -t files < <(find . -maxdepth 1 -type f -mtime -2 2>/dev/null | sed 's|^\./||')
                  if [ "${#files[@]}" -eq 0 ]; then
                    echo "[etcd] no snapshots <36h old — k3s auto-snapshot-schedule-cron defaults to 0 */12 * * *; first run on a fresh cluster may skip an upload cycle. Exiting clean."
                    exit 0
                  fi
                  for name in "${files[@]}"; do
                    echo "[etcd] upload ${name}"
                    aws s3 cp --endpoint-url="${AWS_ENDPOINT_URL}" \
                      "${name}" "s3://${S3_BUCKET}/${PREFIX}/${name}"
                  done
                  # Retention: keep 14 newest in S3. `aws s3 ls` on an
                  # empty prefix returns 0 with no output — pipefail-safe.
                  mapfile -t to_evict < <(aws s3 ls --endpoint-url="${AWS_ENDPOINT_URL}" \
                    "s3://${S3_BUCKET}/${PREFIX}/" \
                    | awk '{print $4}' \
                    | sort -r \
                    | tail -n +15)
                  for f in "${to_evict[@]}"; do
                    [ -z "$f" ] && continue
                    echo "[etcd] evict ${PREFIX}/${f}"
                    aws s3 rm --endpoint-url="${AWS_ENDPOINT_URL}" \
                      "s3://${S3_BUCKET}/${PREFIX}/${f}"
                  done
                  echo "[etcd] done (${#files[@]} uploaded)"
              volumeMounts:
                - name: snapshots
                  mountPath: /snapshots
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 300m
                  memory: 256Mi
          volumes:
            - name: snapshots
              hostPath:
                path: /var/lib/rancher/k3s/server/db/snapshots
                type: Directory
