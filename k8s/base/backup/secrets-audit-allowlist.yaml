# Differential secrets-audit allowlist (DR-bundle roadmap, Phase 0).
#
# Every Secret in the cluster lands in one of five buckets per the
# classifier in backend/src/modules/system-backup/secrets-audit.ts:
#   - denied (auto-managed by k8s/operators)
#   - tier-1-bundle (BUNDLE_SECRET_LIST)
#   - tier-2-tenant-sweep (namespace `client-*`)
#   - allowlisted (this file)
#   - uncovered (silent DR risk)
#
# An UNCOVERED Secret means "if this cluster dies, this Secret won't
# be in any bundle and DR will be incomplete." The operator must
# either extend the bundle OR — when the Secret is genuinely safe to
# lose at restore-time — add an entry here with a documented reason.
#
# Edits via the admin panel (System Backup → Secrets Bundle →
# Coverage → "Add to allowlist") are persisted by patching this
# ConfigMap's `allowlist.yaml` data key. Operators can also edit by
# hand and `kubectl apply -f` — the backend re-reads on every audit.
#
# Format: a single key `allowlist.yaml` whose value is a YAML doc
# with `entries: [...]`. Each entry needs all 5 fields populated.
apiVersion: v1
kind: ConfigMap
metadata:
  name: secrets-audit-allowlist
  namespace: platform-system
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: system-backup
data:
  allowlist.yaml: |
    # Operators: prefer fixing coverage (extending BUNDLE_SECRET_LIST or
    # adding the Secret to the daily CronJob's sweep) over adding rows
    # here. The allowlist is for genuinely-ephemeral Secrets that
    # SHOULD NOT survive restore.
    #
    # Example entry (uncomment + edit):
    # entries:
    #   - namespace: monitoring
    #     name: grafana-cookie-secret
    #     reason: "session cookie — better to rotate on restore than carry old value"
    #     addedBy: admin@example.com
    #     addedAt: "2026-05-18T10:00:00Z"
    entries: []
