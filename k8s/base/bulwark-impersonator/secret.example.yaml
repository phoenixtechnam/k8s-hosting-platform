# EXAMPLE — not included in kustomization.yaml.
#
# Operators provision the real Secret per environment. Production
# bootstrap.sh writes JWT_SECRET (shared with platform-api) and
# STALWART_MASTER_USER + STALWART_MASTER_PASSWORD (matched against
# the Stalwart `master@master.local` account it provisions).
#
# Required keys:
#   JWT_SECRET                — HS256 secret, MUST match the platform
#                               backend's JWT_SECRET (the same secret
#                               that signs admin/client panel JWTs and
#                               the Roundcube jwt_auth tokens). 32+ chars.
#   STALWART_MASTER_USER      — Stalwart Account with the `impersonate`
#                               permission. Production convention:
#                               `master@master.local`.
#   STALWART_MASTER_PASSWORD  — Cleartext password for the master account.
#                               Stalwart stores the hashed form in its
#                               Account `credentials/0/secret` field.
apiVersion: v1
kind: Secret
metadata:
  name: bulwark-impersonator-secrets
  namespace: mail
  labels:
    app: bulwark-impersonator
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME_HS256_secret_32+_chars_matches_platform_JWT_SECRET"
  STALWART_MASTER_USER: "master@master.local"
  STALWART_MASTER_PASSWORD: "REPLACE_WITH_CLEARTEXT_MASTER_PASSWORD"
