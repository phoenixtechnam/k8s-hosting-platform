apiVersion: v1
kind: Service
metadata:
  name: bulwark-impersonator
  namespace: mail
  labels:
    app: bulwark-impersonator
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  type: ClusterIP
  # Sidecar in the Bulwark Pod — select bulwark pods, target the
  # impersonator container's `imp-http` named port. Bulwark's own
  # SPA traffic flows through a separate Service (`bulwark`) which
  # targets the same Pod's `http` (3000) port.
  selector:
    app: bulwark
  ports:
    - name: http
      port: 80
      targetPort: imp-http
      protocol: TCP
