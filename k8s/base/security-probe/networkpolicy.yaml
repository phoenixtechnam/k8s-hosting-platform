# NetworkPolicy locking down egress from the security-probe pods.
# The probe needs exactly one destination — the Kubernetes apiserver
# (typically :443 or :6443 depending on cluster) — plus CoreDNS for
# in-cluster DNS resolution used by client-go. Anything else is a
# data-exfiltration vector if the probe binary is ever compromised.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: security-probe
  namespace: platform-system
  labels:
    app: security-probe
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchLabels:
      app: security-probe
  policyTypes: [Egress]
  egress:
    # CoreDNS — client-go resolves apiserver Service VIP via in-cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Apiserver: in k3s this is the Service VIP (10.43.0.1) on
    # :443. Use a port-only egress rule — Calico's policy engine will
    # match the destination IP via the ServiceVIP routing.
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
