# Stub ConfigMap for operator-managed trusted-proxy CIDRs.
#
# OWNED at runtime by platform-api's cluster-trusted-proxies reconciler
# (backend/src/modules/cluster-trusted-proxies/reconciler.ts). The
# reconciler overwrites data['trusted-proxies.conf'] every tick from
# the cluster_trusted_proxy_ranges DB table + platform_settings
# bootstrap CIDRs.
#
# The static stub exists so:
#   1. admin-panel + tenant-panel pods can start cleanly on a fresh
#      cluster (their volumes mount this ConfigMap; `optional: true`
#      tolerates absence but having the empty stub avoids the brief
#      "pod waiting for ConfigMap" race during cold-start).
#   2. Flux apply order is predictable — the ConfigMap is in the
#      kustomization, reconciled before the Deployments come up.
#
# DO NOT EDIT data['trusted-proxies.conf'] in this file. Use the
# admin UI: Nodes & Storage → Trusted Proxies tab.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-trusted-proxies
  namespace: platform
  labels:
    app.kubernetes.io/managed-by: platform-api
    app.kubernetes.io/part-of: hosting-platform
  # Flux: do not reconcile the data — platform-api owns it.
  annotations:
    kustomize.toolkit.fluxcd.io/reconcile: disabled
data:
  trusted-proxies.conf: |
    # Empty stub — platform-api reconciler will overwrite this with
    # one `set_real_ip_from <cidr>;` line per operator-managed CIDR.
  trusted-proxies.csv: "127.0.0.1/32"
  hash: ""
