# Default deny all ingress in hosting namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress from NGINX Ingress Controller to hosting pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
# Allow platform namespace to access hosting namespace (for management API)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-to-hosting
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
---
# Allow monitoring namespace to scrape hosting pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
---
# Platform namespace: default deny + allow ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress controller to reach platform API, admin panel, and client panel
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-platform
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["platform-api", "admin-panel", "client-panel", "oauth2-proxy", "dex"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        # ingress-nginx runs as hostNetwork=true (DaemonSet binding host
        # :80/443 directly). When it forwards to a pod IP cross-node,
        # the kernel routes via vxlan.calico — and rewrites the source
        # IP from the host's wt0 IP (e.g. 100.120.x.x in the NetBird
        # CGNAT) to vxlan.calico's tunnel IP (in the cluster pod CIDR
        # 10.42.0.0/16). By the time Felix on the destination node
        # evaluates this NetworkPolicy, the source is 10.42.x.x — NOT
        # 100.120.x.x. So an `ipBlock: 100.64.0.0/10` alone never
        # matches; the packet falls through to default-deny.
        #
        # The ipBlock 10.42.0.0/16 below catches host-source packets
        # *after* the vxlan.calico re-source. It's also redundant with
        # the namespaceSelector (which only matches non-hostNetwork
        # pods anyway), so it's the only thing keeping cross-node
        # admin traffic working when ingress-nginx is hostNetwork=true.
        #
        # Verified live on the 4-node staging cluster 2026-04-26 by
        # bisect: removing this rule reproduces 5s/15s nginx upstream
        # timeouts on every cross-node combination; adding it brings
        # TTFB to <1s across all 4 external IPs.
        - ipBlock:
            cidr: 10.42.0.0/16
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000  # platform-api
        - protocol: TCP
          port: 80    # admin-panel / client-panel
        - protocol: TCP
          port: 4180  # oauth2-proxy
        - protocol: TCP
          port: 5556  # dex (OIDC issuer behind dex.<base> Ingress)
        - protocol: TCP
          port: 4180
---
# Allow intra-platform-namespace traffic to the data-plane + API pods.
# Without this, platform-api can't reach postgres/redis (all DB/cache
# operations time out) and the panels' nginx reverse-proxies can't
# reach platform-api:3000 (all /api/v1/* requests 499).
# Narrowly scoped: named sources → named target ports.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-internal
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["postgres", "redis", "dex", "platform-api"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["platform-api", "admin-panel", "client-panel", "oauth2-proxy", "dex"]
        # DR backup CronJob pods (platform-pg-backup, cluster-state-backup,
        # secrets-backup) carry the component label so they can reach
        # postgres without being in the main app allow-list. Without this
        # rule, pg_dump stalls at TCP connect on 5432 because default-
        # deny-ingress blocks the CronJob-owned pod. Caught during the
        # 2026-04-23 drill — pg-backup had been silently failing for 45h+.
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: dr-backup
      ports:
        - protocol: TCP
          port: 5432  # postgres
        - protocol: TCP
          port: 6379  # redis
        - protocol: TCP
          port: 5556  # dex (OIDC discovery inside cluster)
        - protocol: TCP
          port: 3000  # platform-api (admin/client-panel nginx → backend)
---
# Allow CNPG operator (cnpg-system ns) → postgres instance pods.
#
# CNPG's reconciler probes each instance at https://<podIP>:8000/pg/status
# every ~12s to extract role/ready state. Without this rule, default-
# deny-ingress sinks the probe → cluster stays in
# "Instance Status Extraction Error" → operator never reconciles
# spec.instances bumps, so Apply HA can't actually scale postgres
# from 1 → 3 instances.
#
# Observed live 2026-04-26: spec.instances=3 ignored, only postgres-1
# ever existed; PDB event "NoPods" because operator couldn't tell
# whether existing instances were ready before creating new ones.
# 9187 is the metrics-exporter sidecar (PodMonitor scrape source);
# 5432 is replication for streaming standbys to follow the primary.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator-to-postgres
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000   # instance manager status (HTTPS)
        - protocol: TCP
          port: 9187   # postgres-exporter metrics
    # Streaming replication: standby instances connect to the
    # primary on 5432. Both are in the platform namespace, both
    # carry cnpg.io/cluster=postgres, so this peer rule allows
    # postgres-{2,3} → postgres-1 once the operator creates them.
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: postgres
      ports:
        - protocol: TCP
          port: 5432
---
# Allow ingress-nginx → cm-acme-http-solver pods on port 8089.
#
# cert-manager dynamically creates short-lived solver pods (and a
# matching Ingress) for each HTTP-01 challenge. Without this rule,
# default-deny-ingress sinks the LE validator's HTTP request and
# every challenge stalls / fails with 504 — observed live during the
# 2026-04-26 staging cluster bring-up: dex.staging.phoenix-host.net
# challenge invalid because LE hit staging2's nginx but solver pod
# was on staging3 (kube-proxy load-balanced cross-node) → blocked
# by default-deny-ingress.
#
# Same ipBlock+namespaceSelector pattern as allow-ingress-to-platform
# above (hostNetwork ingress-nginx → vxlan.calico re-source rewrite).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-acme-solver
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8089
