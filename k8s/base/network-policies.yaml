# Default deny all ingress in hosting namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress from NGINX Ingress Controller to hosting pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
---
# Allow platform namespace to access hosting namespace (for management API)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-to-hosting
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
---
# Allow monitoring namespace to scrape hosting pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
---
# Platform namespace: default deny + allow ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress controller to reach platform API, admin panel, and client panel
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-platform
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["platform-api", "admin-panel", "client-panel", "oauth2-proxy", "dex"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        # Traefik (replacing nginx-ingress) runs as DaemonSet with
        # hostPort=80/443, NOT hostNetwork=true. With hostPort, the
        # source IP seen by the destination pod IS the Traefik pod's
        # pod-network IP (10.42.x.x), so the namespaceSelector on
        # `traefik` reliably matches and the ipBlock fallback is no
        # longer load-bearing for cross-node routing. We keep the
        # 10.42.0.0/16 ipBlock as defence-in-depth (covers Calico's
        # vxlan re-source on the rare cross-node tunnel path).
        - ipBlock:
            cidr: 10.42.0.0/16
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 3000  # platform-api
        - protocol: TCP
          port: 80    # admin-panel / client-panel
        - protocol: TCP
          port: 4180  # oauth2-proxy
        - protocol: TCP
          port: 5556  # dex (OIDC issuer behind dex.<base> Ingress)
        - protocol: TCP
          port: 4180
---
# Allow intra-platform-namespace traffic to the data-plane + API pods.
# Without this, platform-api can't reach postgres/redis (all DB/cache
# operations time out) and the panels' nginx reverse-proxies can't
# reach platform-api:3000 (all /api/v1/* requests 499).
# Narrowly scoped: named sources → named target ports.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-internal
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["postgres", "redis", "dex", "platform-api"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["platform-api", "admin-panel", "client-panel", "oauth2-proxy", "dex"]
        # DR backup CronJob pods (platform-pg-backup, cluster-state-backup,
        # secrets-backup) carry the component label so they can reach
        # postgres without being in the main app allow-list. Without this
        # rule, pg_dump stalls at TCP connect on 5432 because default-
        # deny-ingress blocks the CronJob-owned pod. Caught during the
        # 2026-04-23 drill — pg-backup had been silently failing for 45h+.
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: dr-backup
      ports:
        - protocol: TCP
          port: 5432  # postgres
        - protocol: TCP
          port: 6379  # redis
        - protocol: TCP
          port: 5556  # dex (OIDC discovery inside cluster)
        - protocol: TCP
          port: 3000  # platform-api (admin/client-panel nginx → backend)
---
# Allow CNPG operator (cnpg-system ns) → postgres instance pods.
#
# CNPG's reconciler probes each instance at https://<podIP>:8000/pg/status
# every ~12s to extract role/ready state. Without this rule, default-
# deny-ingress sinks the probe → cluster stays in
# "Instance Status Extraction Error" → operator never reconciles
# spec.instances bumps, so Apply HA can't actually scale postgres
# from 1 → 3 instances.
#
# Observed live 2026-04-26: spec.instances=3 ignored, only postgres-1
# ever existed; PDB event "NoPods" because operator couldn't tell
# whether existing instances were ready before creating new ones.
# 9187 is the metrics-exporter sidecar (PodMonitor scrape source);
# 5432 is replication for streaming standbys to follow the primary.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator-to-postgres
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  # matchExpressions Exists so the policy applies to pods of ANY
  # cnpg-managed cluster in this namespace — not just the source
  # `postgres` cluster. Required by snapshot-only PITR: the
  # auto-promote orchestrator briefly runs a temp cluster
  # `postgres-pitr-<ts>` whose pods carry a different
  # cnpg.io/cluster label. Without Exists, the CNPG operator can't
  # reach the temp cluster's instance-manager status endpoint
  # (port 8000) and the cluster sits at "Instance Status Extraction
  # Error: HTTP communication issue" forever.
  podSelector:
    matchExpressions:
      - key: cnpg.io/cluster
        operator: Exists
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
      ports:
        - protocol: TCP
          port: 8000   # instance manager status (HTTPS)
        - protocol: TCP
          port: 9187   # postgres-exporter metrics
    # Streaming replication: standby instances connect to the
    # primary on 5432. Both peer rule sides use Exists so any
    # cnpg-managed pod can replicate from any other cnpg-managed
    # pod in this namespace (covers temp PITR clusters too).
    - from:
        - podSelector:
            matchExpressions:
              - key: cnpg.io/cluster
                operator: Exists
      ports:
        - protocol: TCP
          port: 5432
---
# Allow Traefik → cm-acme-http-solver pods on port 8089.
#
# cert-manager dynamically creates short-lived solver pods (and a
# matching IngressRoute via the Ingress shim) for each HTTP-01 challenge.
# Without this rule, default-deny-ingress sinks the LE validator's HTTP
# request and every challenge stalls / fails with 504.
#
# Same ipBlock+namespaceSelector pattern as allow-ingress-to-platform
# above — covers both the direct Traefik pod path and any Calico vxlan
# re-source rewrite on cross-node tunneled traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-acme-solver
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchLabels:
      acme.cert-manager.io/http01-solver: "true"
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8089

---
# Allow backups-v2 files-component Jobs (running in tenant
# namespaces) to POST archive + tree uploads to platform-api over
# HTTP. Without this rule the existing allow-ingress-to-platform
# blocks the connection — it only permits Traefik + same-ns
# pods. Scoped by Pod label, not namespace, so it applies to every
# `client-<id>` namespace without enumeration.
#
# The orchestrator labels every files-component Job with
# platform.io/component: backup-files (see backups-v2/components/files.ts).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backup-files-jobs-to-platform-api
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  # Allow tenant + mail-namespace Jobs to reach platform-api for the
  # internal upload (capture) and download (restore) endpoints. The
  # endpoints are HMAC-token-protected; this NP is the L3/L4 boundary
  # so a malicious-but-authenticated pod cannot reach platform-api at
  # all unless it's running in a namespace the platform manages AND
  # carries a backup-files / restore-files component label.
  #
  # Without the namespaceSelector scope, ANY pod cluster-wide could
  # set those labels and reach the unauthenticated endpoints (the
  # HMAC defends each request, but defense-in-depth is cheap).
  podSelector:
    matchLabels:
      app: platform-api
  policyTypes:
    - Ingress
  ingress:
    # Tenant namespaces (provisioned by k8s-provisioner with
    # `platform: k8s-hosting` label) running backup or restore Jobs.
    - from:
        - namespaceSelector:
            matchLabels:
              platform: k8s-hosting
          podSelector:
            matchExpressions:
              - key: platform.io/component
                operator: In
                values: [backup-files, restore-files]
      ports:
        - protocol: TCP
          port: 3000
    # Mail namespace (Stalwart) running mailbox backup or restore Jobs.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mail
          podSelector:
            matchExpressions:
              - key: platform.io/component
                operator: In
                values: [backup-files, restore-files]
      ports:
        - protocol: TCP
          port: 3000
