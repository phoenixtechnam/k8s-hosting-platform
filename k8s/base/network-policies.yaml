# Default deny all ingress in hosting namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress from NGINX Ingress Controller to hosting pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
# Allow platform namespace to access hosting namespace (for management API)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-to-hosting
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
---
# Allow monitoring namespace to scrape hosting pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
---
# Platform namespace: default deny + allow ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress controller to reach platform API, admin panel, and client panel
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-platform
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["platform-api", "admin-panel", "client-panel", "oauth2-proxy", "dex"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000  # platform-api
        - protocol: TCP
          port: 80    # admin-panel / client-panel
        - protocol: TCP
          port: 4180  # oauth2-proxy
        - protocol: TCP
          port: 5556  # dex (OIDC issuer behind dex.<base> Ingress)
        - protocol: TCP
          port: 4180
---
# Allow intra-platform-namespace traffic to the data-plane pods.
# Without this, platform-api can't reach postgres (5432) or redis (6379)
# and all DB/cache operations time out — the app comes up but falls
# over on the first query. Narrowly scoped to the two backends and
# the known platform clients.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-internal
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["postgres", "redis", "dex"]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["platform-api", "admin-panel", "client-panel", "oauth2-proxy", "dex"]
      ports:
        - protocol: TCP
          port: 5432  # postgres
        - protocol: TCP
          port: 6379  # redis
        - protocol: TCP
          port: 5556  # dex (OIDC discovery inside cluster)
