# Default deny all ingress in hosting namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress from NGINX Ingress Controller to hosting pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
---
# Allow platform namespace to access hosting namespace (for management API)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-platform-to-hosting
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: platform
---
# Allow monitoring namespace to scrape hosting pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  namespace: hosting
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
---
# Platform namespace: default deny + allow ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress controller to reach platform API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-platform
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
spec:
  podSelector:
    matchLabels:
      app: platform-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
