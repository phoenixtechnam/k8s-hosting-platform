# Dev patch: ClusterIP → NodePort 30028.
# docker-compose.local.yml maps host port 2028 → k3s-server 30028 →
# this service → Bulwark pod port 3000.
apiVersion: v1
kind: Service
metadata:
  name: bulwark
  namespace: mail
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30028
      protocol: TCP
