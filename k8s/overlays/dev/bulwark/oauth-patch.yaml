# Dev overlay patch: point Bulwark at the rewriter-fronted Stalwart URL.
#
# Production wiring: Bulwark talks to `https://stalwart.${DOMAIN}` (port
# 443 implicit). The local DinD topology publishes Traefik on host port
# 2011 (NPM owns :443 on the Unraid host) so the URL Bulwark hands to
# the browser must include `:2011`. The base manifest's default URL is
# port-free; this patch overrides it for dev.
#
# Also wires the local CA bundle so Node trusts the self-signed TLS.
# Removes the dev OAuth/Dex SSO config (the platform's webmail auth
# model is direct basic-auth + master-user impersonation per ADR-039,
# not OIDC).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulwark
  namespace: mail
spec:
  template:
    spec:
      # DinD DNS quirk — cluster pods can't resolve the wildcard
      # `*.k8s-platform.test` (only the host can). Map the Stalwart
      # hostname to localhost; the dev-stalwart-bridge sidecar below
      # listens on :2011 and forwards to Traefik in-cluster.
      hostAliases:
        - ip: "127.0.0.1"
          hostnames:
            - stalwart.k8s-platform.test
      containers:
        - name: bulwark
          env:
            # Override base. Port-free hostname won't reach Traefik
            # on the DinD-published host port. Bulwark passes this URL
            # to the browser via /api/config; from inside the pod the
            # bridge sidecar resolves it via the hostAlias.
            - name: JMAP_SERVER_URL
              value: "https://stalwart.${DOMAIN}:2011"
            # Trust the dev local-ca for outbound TLS to Stalwart.
            - name: NODE_EXTRA_CA_CERTS
              value: "/etc/ssl/local-ca/ca.crt"
          volumeMounts:
            - name: local-ca
              mountPath: /etc/ssl/local-ca
              readOnly: true
        # TLS-passthrough TCP bridge — 127.0.0.1:2011 → Traefik
        # websecure (Service port 443). Bulwark's TLS client sends
        # SNI `stalwart.k8s-platform.test` to Traefik directly; Traefik
        # terminates and routes via the IngressRoute → rewriter →
        # Stalwart. DinD-only, drops in production where the public
        # DNS works in-cluster.
        - name: dev-stalwart-bridge
          image: alpine/socat:1.8.0.0
          args:
            - "-d"
            - "TCP-LISTEN:2011,fork,reuseaddr,bind=127.0.0.1"
            - "TCP:traefik.traefik.svc.cluster.local:443"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE]
          resources:
            requests: { cpu: "10m", memory: "8Mi" }
            limits:   { cpu: "100m", memory: "32Mi" }
      volumes:
        - name: local-ca
          secret:
            secretName: local-ca-cert
            optional: true
