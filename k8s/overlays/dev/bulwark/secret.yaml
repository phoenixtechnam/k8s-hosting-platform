# Dev-only Secret. DO NOT use these values in production.
#
# ADMIN_PASSWORD  — Bulwark admin dashboard login at /admin/login.
# SESSION_SECRET  — Encrypts the `jmap_stalwart_ctx` cookie + OAuth
#                   PKCE state. Must be 32+ chars.
apiVersion: v1
kind: Secret
metadata:
  name: bulwark-secrets
  namespace: mail
  labels:
    app: bulwark
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  ADMIN_PASSWORD: "bulwark-dev-admin"
  SESSION_SECRET: "local-dev-bulwark-session-secret-change-me-32+"
