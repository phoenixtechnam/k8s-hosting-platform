# Dev-only Secret. DO NOT use these values in production.
#
# ADMIN_PASSWORD                    Bulwark admin dashboard login at /admin/login.
# SESSION_SECRET                    Encrypts session cookies. 32+ chars.
# BULWARK_JWT_AUTH_SECRET           Verifies impersonation JWTs from platform-api.
#                                   MUST match BULWARK_WEBMAIL_JWT_SECRET in
#                                   .env.local (with fallback to WEBMAIL_JWT_SECRET
#                                   then JWT_SECRET if unset — legacy path only).
#                                   Independent from Roundcube's JWT_AUTH_SECRET
#                                   (review fix C1: cross-engine replay).
# BULWARK_STALWART_MASTER_USER      Stalwart Account with the Administrator role.
#                                   For DinD this is bootstrapped by the Phase 0
#                                   spike (master@k8s-platform.test).
# BULWARK_STALWART_MASTER_PASSWORD  Master account password.
apiVersion: v1
kind: Secret
metadata:
  name: bulwark-secrets
  namespace: mail
  labels:
    app: bulwark
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  ADMIN_PASSWORD: "bulwark-dev-admin"
  SESSION_SECRET: "local-dev-bulwark-session-secret-change-me-32+"
  # WARNING: must match .env.local's BULWARK_WEBMAIL_JWT_SECRET.
  # Distinct from Roundcube's JWT_AUTH_SECRET (separate engines, separate
  # HMAC keys — security review C1).
  BULWARK_JWT_AUTH_SECRET: "local-dev-bulwark-jwt-secret-distinct-from-roundcube"
  BULWARK_STALWART_MASTER_USER: "master@k8s-platform.test"
  BULWARK_STALWART_MASTER_PASSWORD: "Master-Webmail-2026-Pass!"
