# Dev overlay patch — adjust impersonator URLs for DinD topology.
#
# Bulwark's STALWART_JMAP_URL is browser-reachable on :2011 (the
# published port). The impersonator's STALWART_JMAP_URL is used in the
# `serverUrl` field of the /api/auth/stalwart-context POST body —
# Bulwark validates this URL against its configured jmapServerUrl
# (with ALLOW_CUSTOM_JMAP_ENDPOINT=false), so it must match.
#
# Same DinD DNS quirk as Bulwark: the impersonator pod can't resolve
# bulwark.k8s-platform.test, but Bulwark's Service is reachable
# in-cluster directly — so we override BULWARK_HOST to the
# cluster-internal Service name. PUBLIC_ORIGIN gets the :2011 port
# so Bulwark's Origin check matches the browser-facing URL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bulwark
  namespace: mail
spec:
  template:
    spec:
      containers:
        - name: impersonator
          env:
            - name: STALWART_JMAP_URL
              value: "https://stalwart.k8s-platform.test:2011"
            - name: PUBLIC_ORIGIN
              value: "https://bulwark.k8s-platform.test:2011"
