# Platform-wide Roundcube at https://webmail.<PLATFORM_BASE_DOMAIN>.
# Per-customer webmail.<clientdomain> IngressRoutes are created by the
# backend's email-domains module per email domain with webmail_enabled=1
# — those live in each client's namespace and share the same upstream
# Roundcube via ExternalName. This IngressRoute is the platform-wide
# fallback / admin-access entry point.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: platform-webmail-ingress
  namespace: mail
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`webmail.${DOMAIN}`)"
      kind: Rule
      services:
        - name: roundcube
          port: 80
  tls:
    secretName: platform-webmail-dev-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-webmail
  namespace: mail
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  secretName: platform-webmail-dev-tls
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
  dnsNames:
    - webmail.${DOMAIN}
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
