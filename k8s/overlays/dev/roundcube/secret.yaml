#
# Dev-only secret for local DinD k3s.
#
# JWT_AUTH_SECRET MUST equal .env.local JWT_SECRET so the jwt_auth plugin
# can verify webmail tokens issued by the local backend.
#
# STALWART_MASTER_PASSWORD is the cleartext master password (not the bcrypt
# hash). It must match the cleartext that was used to generate the
# MASTER_SECRET bcrypt hash in k8s/overlays/dev/stalwart/secret.yaml.
# (See docs/06-features/MAIL_SERVER_IMPLEMENTATION_STATUS.md decision D7.)
#
# DO NOT use any of these values in production.
#
apiVersion: v1
kind: Secret
metadata:
  name: roundcube-secrets
  namespace: mail
  labels:
    app: roundcube
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  # Matches .env.local JWT_SECRET
  JWT_AUTH_SECRET: "local-dev-jwt-secret-not-for-production"
  # Stalwart 0.16's IMAP master-auth requires the FQDN form (the
  # bare `master` short name returns AUTHENTICATIONFAILED).
  # 2026-05-16: ALSO confirmed Stalwart 0.16 hard-rejects the .local
  # TLD on auth entirely (`AUTHENTICATIONFAILED master.local`
  # regardless of password or role). Anchor the master Account under
  # the platform's base domain (matches the bulwark dev secret +
  # the bootstrap.sh contract).
  STALWART_MASTER_USER: "master@k8s-platform.test"
  # Cleartext of the master password whose bcrypt hash lives in
  # k8s/overlays/dev/stalwart/secret.yaml as MASTER_SECRET
  STALWART_MASTER_PASSWORD: "stalwart-dev-master"
  # Roundcube's session/cred encryption key — any 24 bytes will do for dev
  ROUNDCUBEMAIL_DES_KEY: "dev-only-roundcube-key24"

  # Phase 3.A.5: Postgres session backend config. Points at the
  # platform-postgres Service bridge in the mail namespace (dynamic
  # Endpoints, see scripts/local.sh _patch_postgres_bridge). These
  # values match the defaults in scripts/postgres-initdb/01-roundcube-db.sh.
  ROUNDCUBEMAIL_DB_HOST: "platform-postgres.mail.svc.cluster.local"
  ROUNDCUBEMAIL_DB_PORT: "5432"
  ROUNDCUBEMAIL_DB_NAME: "roundcube"
  ROUNDCUBEMAIL_DB_USER: "roundcube"
  ROUNDCUBEMAIL_DB_PASSWORD: "roundcube-local-dev-password"
