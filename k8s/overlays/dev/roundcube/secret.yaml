#
# Dev-only secret for local DinD k3s.
#
# JWT_AUTH_SECRET MUST equal .env.local JWT_SECRET so the jwt_auth plugin
# can verify webmail tokens issued by the local backend.
#
# STALWART_MASTER_PASSWORD is the cleartext master password (not the bcrypt
# hash). It must match the cleartext that was used to generate the
# MASTER_SECRET bcrypt hash in k8s/overlays/dev/stalwart/secret.yaml.
# (See docs/06-features/MAIL_SERVER_IMPLEMENTATION_STATUS.md decision D7.)
#
# DO NOT use any of these values in production.
#
apiVersion: v1
kind: Secret
metadata:
  name: roundcube-secrets
  namespace: mail
  labels:
    app: roundcube
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  # Matches .env.local JWT_SECRET
  JWT_AUTH_SECRET: "local-dev-jwt-secret-not-for-production"
  STALWART_MASTER_USER: "master"
  # Cleartext of the master password whose bcrypt hash lives in
  # k8s/overlays/dev/stalwart/secret.yaml as MASTER_SECRET
  STALWART_MASTER_PASSWORD: "stalwart-dev-master"
  # Roundcube's session/cred encryption key — any 24 bytes will do for dev
  ROUNDCUBEMAIL_DES_KEY: "dev-only-roundcube-key24"
