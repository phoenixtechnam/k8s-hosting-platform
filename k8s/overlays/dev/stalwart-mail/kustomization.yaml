#
# Dev overlay for Stalwart 0.16 (RocksDB DataStore — no CNPG).
#
# Standalone kustomization. Deploy with:
#
#   kubectl apply -k k8s/overlays/dev/stalwart-mail/
#
# Or via local.sh (once wired):
#   ./scripts/local.sh mail16-up
#
# Differences from the base:
#   1. stalwart-mail Service: LoadBalancer → NodePort (DinD has no LB)
#   2. NetworkPolicy deleted (DinD k3s has no NetworkPolicy enforcer)
#   3. Ingress: local-ca-issuer + ${DOMAIN} = k8s-platform.test
#
# 2026-05-13 (Phase 5 of mail-arch re-audit): removed the stale mail-db
# CNPG Cluster patch — Stalwart 0.16 uses embedded RocksDB; there is no
# CNPG cluster to patch.
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - ../../../base/stalwart-mail

patches:
  # mail namespace: the 0.15 overlay already created it — skip re-creation.
  # (namespace.yaml in stalwart-mail/stalwart/ is comment-only, no action needed.)

  # Patch stalwart-mail Service: LoadBalancer → NodePort
  # Node ports are offset from the 0.15 ports (+1) to avoid collision:
  #   30026 → smtp (0.15 uses 30025)
  #   30027 → submission (0.15 uses 30587)
  #   etc.
  - patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: stalwart-mail
        namespace: mail
      spec:
        type: NodePort
        externalTrafficPolicy: Cluster
        ports:
          - name: smtp
            port: 25
            targetPort: smtp
            nodePort: 30026
            protocol: TCP
          - name: submissions
            port: 465
            targetPort: submissions
            nodePort: 30466
            protocol: TCP
          - name: submission
            port: 587
            targetPort: submission
            nodePort: 30588
            protocol: TCP
          - name: imap
            port: 143
            targetPort: imap
            nodePort: 30144
            protocol: TCP
          - name: imaps
            port: 993
            targetPort: imaps
            nodePort: 30994
            protocol: TCP
          - name: sieve
            port: 4190
            targetPort: sieve
            nodePort: 30191
            protocol: TCP
    target:
      kind: Service
      name: stalwart-mail

  # Remove NetworkPolicy — DinD k3s has no NP enforcer
  - patch: |-
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: stalwart-mail
        namespace: mail
    target:
      kind: NetworkPolicy
      name: stalwart-mail

  # NOTE: the mail-db CNPG Cluster patch that lived here was deleted on
  # 2026-05-13 — Stalwart 0.16 uses embedded RocksDB on the
  # `stalwart-rocksdb-data` local-path PVC. There is no CNPG cluster.

  # IngressRoute + Certificate: dev host + local-CA cert. The base
  # IngressRoute matches `Host(stalwart.${DOMAIN})` — on dev,
  # ${DOMAIN}=k8s-platform.test → stalwart.k8s-platform.test. We rebind
  # to the historical `stalwart16` subdomain so dev users can keep both
  # the old and new admin UIs reachable side-by-side during cutover.
  - patch: |
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: stalwart-webadmin
        namespace: mail
      spec:
        routes:
          - match: "Host(`stalwart16.k8s-platform.test`)"
            kind: Rule
            middlewares:
              - name: admin-auth-cookie
                namespace: traefik
              - name: compress
                namespace: traefik
            services:
              - name: stalwart-mgmt
                port: 8080
        tls:
          secretName: stalwart-webadmin-dev-tls
    target:
      group: traefik.io
      version: v1alpha1
      kind: IngressRoute
      name: stalwart-webadmin

  # Pair the IngressRoute with a dev cert from the local-CA issuer.
  - patch: |
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: stalwart-webadmin
        namespace: mail
      spec:
        secretName: stalwart-webadmin-dev-tls
        dnsNames:
          - stalwart16.k8s-platform.test
        issuerRef:
          name: local-ca-issuer
          kind: ClusterIssuer
          group: cert-manager.io
    target:
      group: cert-manager.io
      version: v1
      kind: Certificate
      name: stalwart-webadmin
