# Dev overlay: split browser-facing and cluster-internal URLs for oauth2-proxy.
#
# Pods can't validate the self-signed cert that the dev ingress presents on
# dex.k8s-platform.test:2011, so we keep the redeem/jwks calls on the
# cluster-internal Service DNS. The browser-facing login URL uses the
# ingress subdomain so the user sees HTTPS with the dev CA.
#
#   - login-url       → https://dex.<base>:2011 (browser, self-signed CA)
#   - redeem/jwks-url → http://dex.platform.svc.cluster.local:5556 (cluster)
# The issuer string must match what Dex advertises for JWT verification.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: platform
spec:
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - --http-address=0.0.0.0:4180
            - --upstream=static://200
            - --email-domain=*
            - --provider=oidc
            - --oidc-issuer-url=https://dex.k8s-platform.test:2011/dex
            - --skip-oidc-discovery=true
            - --login-url=https://dex.k8s-platform.test:2011/dex/auth
            - --redeem-url=http://dex.platform.svc.cluster.local:5556/dex/token
            - --oidc-jwks-url=http://dex.platform.svc.cluster.local:5556/dex/keys
            - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --cookie-secure=false
            - --cookie-samesite=lax
            - --cookie-name=_platform_oauth2
            - --redirect-url=$(OAUTH2_PROXY_REDIRECT_URL)
            - --skip-provider-button=true
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --skip-auth-route=^/api/
            - --skip-auth-route=^/oauth2/
            - --silence-ping-logging=true
            - --insecure-oidc-skip-issuer-verification=true
