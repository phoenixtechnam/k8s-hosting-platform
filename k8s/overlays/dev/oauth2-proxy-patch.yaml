# Dev overlay: split browser-facing and cluster-internal URLs for oauth2-proxy.
#
# In dev, pods cannot DNS-resolve the browser-facing hostname (dind.local),
# and the NodePort (2015) isn't reachable from inside the cluster either.
# We disable OIDC discovery and set each URL explicitly:
#   - login-url       → browser-facing Dex (host NodePort)
#   - redeem/jwks-url → in-cluster Dex service
# The issuer string must still match what Dex advertises for JWT verification.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: platform
spec:
  template:
    spec:
      containers:
        - name: oauth2-proxy
          args:
            - --http-address=0.0.0.0:4180
            - --upstream=static://200
            - --email-domain=*
            - --provider=oidc
            - --oidc-issuer-url=http://dind.local:2015/dex
            - --skip-oidc-discovery=true
            - --login-url=http://dind.local:2015/dex/auth
            - --redeem-url=http://dex.platform.svc.cluster.local:5556/dex/token
            - --oidc-jwks-url=http://dex.platform.svc.cluster.local:5556/dex/keys
            - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --cookie-secure=false
            - --cookie-samesite=lax
            - --cookie-name=_platform_oauth2
            - --redirect-url=$(OAUTH2_PROXY_REDIRECT_URL)
            - --skip-provider-button=true
            - --reverse-proxy=true
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --skip-auth-route=^/api/
            - --skip-auth-route=^/oauth2/
            - --silence-ping-logging=true
            - --insecure-oidc-skip-issuer-verification=true
