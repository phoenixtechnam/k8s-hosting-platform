# Dev overlay for platform-ingress.
#
# NOTE: spec.rules + spec.tls intentionally NOT set here — platform-api's
# ingress-reconciler owns them (server-side apply with
# fieldManager: platform-api), sourced from system_settings.admin_panel_url /
# client_panel_url. The reconciler runs on every platform-api startup and on
# every PATCH /admin/system-settings, so a fresh reset + up converges as
# soon as the platform-api pod's onReady hook fires.
#
# This overlay only sets annotations: cluster-issuer (self-signed CA) + the
# WAF rule override. If you need to force specific dev hosts, set them in
# system_settings via local.sh's _run_migrations_and_seed (env exports).
#
# HTTP is on :2010, HTTPS (self-signed) on :2011 — both serve independently.
# HTTPS redirect is disabled so that :2010 stays usable without the ingress
# controller rewriting URLs to :443 (which isn't published).
# Add /etc/hosts entries for admin.k8s-platform.test + client.k8s-platform.test.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: local-ca-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    # WAF is on at the controller level. Disable CRS rules that conflict
    # with the platform's own design:
    #   - 911100 "Method is not allowed" — default CRS allowlist is
    #     GET/HEAD/POST/OPTIONS which blocks the admin panel's
    #     DELETE/PATCH/PUT routes (client delete, resource updates, …).
    #   - 920420 "Request content type is not allowed" — default CRS list
    #     doesn't include application/octet-stream, which the File
    #     Manager's streaming upload-raw endpoint requires. The raw
    #     streaming path is the sanctioned way to upload >64 MB files.
    # Every other CRS check (SQLi, XSS, RFI, scanner detection) still
    # evaluates. IDs 1100000-1199999 are reserved for local overrides.
    # WAF is on at the controller level. Disable CRS rules that conflict
    # with the platform's own design:
    #   - 911100 "Method is not allowed" — default CRS allowlist is
    #     GET/HEAD/POST/OPTIONS which blocks the admin panel's
    #     DELETE/PATCH/PUT routes (client delete, resource updates, …).
    #   - 920420 "Request content type is not allowed" — default CRS list
    #     doesn't include application/octet-stream, needed by non-upload
    #     paths that accept binary (e.g. cert uploads).
    # Every other CRS check (SQLi, XSS, RFI, scanner detection) still
    # evaluates. IDs 1100000-1199999 are reserved for local overrides.
    #
    # NOTE: /api/v1/clients/*/files/upload-raw is routed through a
    # SEPARATE Ingress (ingress-upload-patch.yaml) with ModSec disabled.
    # ModSec's SecRequestBodyAccess forces in-memory buffering of the
    # full request body, which OOM-kills the controller on multi-GB
    # uploads. Only that one path opts out; everything else on the
    # platform ingress keeps CRS inspection.
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRule REQUEST_URI "@beginsWith /" \
          "id:1100010,phase:1,pass,nolog,ctl:ruleRemoveById=911100"
      SecRule REQUEST_URI "@beginsWith /" \
          "id:1100020,phase:1,pass,nolog,ctl:ruleRemoveById=920420"
