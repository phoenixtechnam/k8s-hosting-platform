# Dev overlay: local hostnames with self-signed CA.
# HTTP is on :2010, HTTPS (self-signed) on :2011 — both serve independently.
# HTTPS redirect is disabled so that :2010 stays usable without the ingress
# controller rewriting URLs to :443 (which isn't published).
# Add /etc/hosts entries for admin.k8s-platform.test + client.k8s-platform.test.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: local-ca-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    # Disable WAF on this ingress in dev. The cluster-wide k3s-init
    # enables ModSecurity + OWASP CRS — rule 920420 (Request content type
    # is not allowed by policy) rejects the Stalwart web-admin SPA's
    # POST /auth/token because it uses `Content-Type: text/plain` (a
    # Leptos form-submission quirk). Per-ingress opt-out is the cleanest
    # dev-only override; in prod we'd add a narrow rule exclusion instead.
    nginx.ingress.kubernetes.io/enable-modsecurity: "false"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "false"
    # The global modsecurity-snippet in k3s-init force-enables SecRuleEngine
    # even when the per-ingress annotations above are set, so we also emit
    # a snippet at this ingress to explicitly turn the engine off.
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine Off
spec:
  tls:
    - hosts:
        - admin.k8s-platform.test
        - client.k8s-platform.test
      secretName: platform-dev-tls
  rules:
    - host: admin.k8s-platform.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.k8s-platform.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
