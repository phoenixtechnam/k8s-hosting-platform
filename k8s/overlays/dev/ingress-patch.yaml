# Dev overlay: local hostnames with self-signed CA.
# Access via http://admin.k8s-platform.local-dev:2010 (add /etc/hosts entry).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: local-ca-issuer
spec:
  tls:
    - hosts:
        - admin.k8s-platform.local-dev
        - client.k8s-platform.local-dev
      secretName: platform-dev-tls
  rules:
    - host: admin.k8s-platform.local-dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.k8s-platform.local-dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
