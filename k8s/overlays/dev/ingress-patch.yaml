# Dev overlay: local hostnames with self-signed CA.
# HTTP is on :2010, HTTPS (self-signed) on :2011 — both serve independently.
# HTTPS redirect is disabled so that :2010 stays usable without the ingress
# controller rewriting URLs to :443 (which isn't published).
# Add /etc/hosts entries for admin.k8s-platform.test + client.k8s-platform.test.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: local-ca-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    # WAF stays ON. Narrow OWASP CRS exclusions for the embedded
    # Stalwart web-admin SPA (served at same-origin via the admin-panel
    # nginx proxy). All other checks (SQLi, XSS, scanner detection, etc.)
    # still apply to every endpoint.
    #
    # Rule 920420 "Request content type is not allowed by policy":
    # Stalwart's Leptos SPA submits POST /auth/token with
    # `Content-Type: text/plain`. The CRS allow-list omits text/plain,
    # so the anomaly score hits 5 and 949110 returns 403. Remove 920420
    # only for this exact path. IDs in 1100000-1199999 are reserved for
    # user rules (won't collide with CRS or future CRS updates).
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRule REQUEST_URI "@beginsWith /auth/token" \
          "id:1100001,phase:1,pass,nolog,ctl:ruleRemoveById=920420"
spec:
  tls:
    - hosts:
        - admin.k8s-platform.test
        - client.k8s-platform.test
      secretName: platform-dev-tls
  rules:
    - host: admin.k8s-platform.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.k8s-platform.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
