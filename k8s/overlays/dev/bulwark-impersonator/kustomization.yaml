# Dev overlay for bulwark-impersonator sidecar resources.
#
# The container itself is patched in the dev/bulwark overlay (its
# spec lives in the Bulwark Deployment now, not a separate one).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - ../../../base/bulwark-impersonator
  - secret.yaml
