# Dev-only Secret. DO NOT use these values in production.
#
# JWT_SECRET: matches platform-api's local-dev signing key. Take the
# JWT_SECRET value from .env.local — for development the same secret
# is shared across admin-panel, client-panel, platform-api, and the
# impersonator so a single JWT can be minted by platform-api and
# verified here.
#
# STALWART_MASTER_USER + STALWART_MASTER_PASSWORD: must match the
# Stalwart Account that has the `impersonate` permission. For DinD
# this is bootstrapped via the Phase 0 spike (master@k8s-platform.test
# with Admin role); for staging/prod bootstrap.sh provisions
# master@master.local.
apiVersion: v1
kind: Secret
metadata:
  name: bulwark-impersonator-secrets
  namespace: mail
  labels:
    app: bulwark-impersonator
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  # WARNING: must match .env.local's JWT_SECRET.
  JWT_SECRET: "local-dev-jwt-secret-not-for-production"
  STALWART_MASTER_USER: "master@k8s-platform.test"
  STALWART_MASTER_PASSWORD: "Master-Webmail-2026-Pass!"
  # Operator token gating /__impersonator/settings (DELETE). The
  # platform-api lifecycle hook sends this in X-Admin-Token. Must
  # match `LIFECYCLE_HOOK_BULWARK_ADMIN_TOKEN` on the backend.
  IMPERSONATOR_ADMIN_TOKEN: "local-dev-impersonator-admin-token-32+chars"
