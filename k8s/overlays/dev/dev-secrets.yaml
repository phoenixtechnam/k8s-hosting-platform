# Dev-only secrets — hardcoded values safe for local development only.
# Production creates these out-of-band via sealed-secrets or external-secrets.
apiVersion: v1
kind: Secret
metadata:
  name: platform-db-credentials
  namespace: platform
type: Opaque
stringData:
  # CNPG initdb requires both username + password keys. The url
  # field continues to exist for backend DATABASE_URL.
  username: platform
  password: local-dev-password
  url: "postgresql://platform:local-dev-password@postgres.platform.svc.cluster.local:5432/hosting_platform"
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-jwt-secret
  namespace: platform
type: Opaque
stringData:
  secret: local-dev-jwt-secret-not-for-production-use
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: platform
type: Opaque
stringData:
  oidc-encryption-key: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  internal-secret: local-dev-platform-internal-secret-please-rotate
---
# platform-stalwart-creds (the platform-ns mirror of Stalwart's admin
# cleartext) is NOT committed. It is generated at first `mail-up` by
# scripts/generate-stalwart-secret.sh alongside mail/stalwart-secrets
# and kept in sync by the Rotate Password endpoint.
---
# oauth2-proxy config — base/oauth2-proxy excludes its own secret.yaml
# so each overlay must provide one with environment-specific URLs.
# OAUTH2_PROXY_COOKIE_SECRET must be exactly 16/24/32 bytes (here: 32 hex chars = 16 bytes).
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-config
  namespace: platform
type: Opaque
stringData:
  OIDC_ISSUER_URL: "https://dex.k8s-platform.test:2011/dex"
  OAUTH2_PROXY_CLIENT_ID: "hosting-platform-oauth2-proxy"
  OAUTH2_PROXY_CLIENT_SECRET: "local-dev-secret-oauth2-proxy"
  OAUTH2_PROXY_COOKIE_SECRET: "FCg1fX56K3KKIwfTwwTizNK1D6rLacez"
  # With transparent per-panel oauth2-proxy routing, the redirect URL is
  # per-request (oauth2-proxy reads X-Forwarded-Host from nginx-ingress).
  # This static value is a sane default for callers that bypass nginx;
  # in normal flow each protected panel uses its own callback URL.
  OAUTH2_PROXY_REDIRECT_URL: "https://admin.k8s-platform.test:2011/oauth2/callback"
