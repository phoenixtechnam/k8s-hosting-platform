#
# Dev overlay for Stalwart Mail Server.
#
# Standalone kustomization — deploy independently of the main dev overlay so
# the bootstrap.sh auto-regenerated dev/kustomization.yaml never touches it.
#
# Deploy:
#   kubectl apply -k k8s/overlays/dev/stalwart/
#
# Or via local.sh:
#   ./scripts/local.sh mail-up
#
# Differences from the base:
#   1. Service type LoadBalancer → NodePort (DinD k3s has no LB provider)
#   2. Dev hostname mail.dind.local
#   3. NetworkPolicy removed (DinD k3s has no NP enforcer)
#
# The Stalwart admin + master credentials Secret is no longer checked in:
# `./scripts/local.sh mail-up` calls `scripts/generate-stalwart-secret.sh`
# which generates random passwords and writes the Secret at first deploy.
# Re-runs are a no-op (use `--force` to rotate at bootstrap time; for
# day-to-day rotation see the admin panel's "Rotate password" button).
#
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - ../../../base/stalwart
  - platform-postgres.yaml
  - webadmin-ingress.yaml

patches:
  - path: service-nodeport-patch.yaml
    target:
      kind: Service
      name: stalwart-mail
  # Remove the NetworkPolicy in dev — local k3s has no enforcer and it only adds noise
  - patch: |-
      $patch: delete
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: stalwart-mail
        namespace: mail
