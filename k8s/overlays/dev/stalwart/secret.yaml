#
# Dev-only secret for local DinD k3s.
# Plaintext bcrypt hashes — DO NOT use in production.
# Production uses sealed-secrets or SOPS.
#
# Credentials:
#   Admin user:  admin / stalwart-dev-admin  (port 8080 WebAdmin)
#   Master user: master / stalwart-dev-master  (Roundcube SSO in Phase 2)
#
apiVersion: v1
kind: Secret
metadata:
  name: stalwart-secrets
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  ADMIN_SECRET: "$2b$12$EZUN2eedZX4AroNN4J0pC.ZwESBfebi4kjAYZtDp3YdRT77iumgCS"
  MASTER_SECRET: "$2b$12$0fEHxp1VwDtv6vX38JLZ/uTez/IpgXdZnKw7if/hSEIeLrnaJlC1K"
  STALWART_HOSTNAME: "mail.dind.local"
  # PostgreSQL SQL directory — connects to the platform-postgres Service
  # in the mail namespace, which is a bridge pointing at the docker-compose
  # postgres container. See k8s/overlays/dev/stalwart/platform-postgres.yaml.
  STALWART_DB_HOST: "platform-postgres.mail.svc.cluster.local"
  STALWART_DB_NAME: "hosting_platform"
  STALWART_DB_USER: "stalwart_reader"
  STALWART_DB_PASSWORD: "stalwart-dev-reader-pw"
