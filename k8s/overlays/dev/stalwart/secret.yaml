#
# Dev-only secret for local DinD k3s.
# Plaintext bcrypt hashes — DO NOT use in production.
# Production uses sealed-secrets or SOPS.
#
# Credentials:
#   Admin user:  admin / stalwart-dev-admin  (port 8080 WebAdmin)
#   Master user: master / stalwart-dev-master  (Roundcube SSO in Phase 2)
#
apiVersion: v1
kind: Secret
metadata:
  name: stalwart-secrets
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
type: Opaque
stringData:
  ADMIN_SECRET: "$2b$12$EZUN2eedZX4AroNN4J0pC.ZwESBfebi4kjAYZtDp3YdRT77iumgCS"
  # Cleartext copy of the admin password used by the cert-reload and
  # backup CronJobs to authenticate against Stalwart's admin HTTP API.
  # stalwart-cli does Basic Auth with the cleartext, then the server
  # bcrypt-compares against ADMIN_SECRET. The CronJobs cannot use
  # ADMIN_SECRET directly because it's a hash, not a password.
  #
  # Production note: this dev pattern injects the cleartext into the
  # Stalwart pod's env so the kubectl-exec'd CronJob shells can read
  # it. In production, prefer mounting the cleartext into the CronJob
  # pods directly via a separate Secret + envFrom, NOT into Stalwart's
  # own env. See k8s/overlays/production/stalwart/ for the recommended
  # pattern.
  ADMIN_SECRET_PLAIN: "stalwart-dev-admin"
  MASTER_SECRET: "$2b$12$0fEHxp1VwDtv6vX38JLZ/uTez/IpgXdZnKw7if/hSEIeLrnaJlC1K"
  STALWART_HOSTNAME: "mail.dind.local"
  # PostgreSQL SQL directory — connects to the platform-postgres Service
  # in the mail namespace, which is a bridge pointing at the docker-compose
  # postgres container. See k8s/overlays/dev/stalwart/platform-postgres.yaml.
  STALWART_DB_HOST: "platform-postgres.mail.svc.cluster.local"
  STALWART_DB_NAME: "hosting_platform"
  STALWART_DB_USER: "stalwart_reader"
  STALWART_DB_PASSWORD: "stalwart-dev-reader-pw"
