#
# `platform-postgres.mail.svc.cluster.local` resolves to the platform
# postgres Service via Kubernetes ExternalName (CNAME in cluster DNS).
# Stalwart's config references the mail-ns DNS name; this indirection
# lets us relocate the real Postgres without changing Stalwart config.
#
# No Endpoints resource is needed — ExternalName Services don't create
# endpoints; the kubelet's DNS returns the target hostname directly and
# the pod re-resolves it to the real Service IP.
#
apiVersion: v1
kind: Service
metadata:
  name: platform-postgres
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: platform-db-bridge
spec:
  type: ExternalName
  externalName: postgres.platform.svc.cluster.local
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
# The NetworkPolicy allowing mail→postgres lives in the main dev
# overlay (../allow-mail-to-postgres-netpol.yaml) — placing it here
# would be silently reparented to `mail` namespace by this
# kustomization's `namespace: mail` directive.
