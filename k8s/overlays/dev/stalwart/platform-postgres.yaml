#
# `platform-postgres.mail.svc.cluster.local` resolves to the platform
# postgres Service via Kubernetes ExternalName (CNAME in cluster DNS).
# Stalwart's config references the mail-ns DNS name; this indirection
# lets us relocate the real Postgres without changing Stalwart config.
#
# No Endpoints resource is needed — ExternalName Services don't create
# endpoints; the kubelet's DNS returns the target hostname directly and
# the pod re-resolves it to the real Service IP.
#
apiVersion: v1
kind: Service
metadata:
  name: platform-postgres
  namespace: mail
  labels:
    app: stalwart-mail
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: platform-db-bridge
spec:
  type: ExternalName
  externalName: postgres.platform.svc.cluster.local
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
---
# Allow mail-ns pods (Stalwart) to reach postgres in platform-ns. The
# platform namespace has `default-deny-ingress`, which blocks
# cross-namespace access by default.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mail-to-postgres
  namespace: platform
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mail
      ports:
        - protocol: TCP
          port: 5432
