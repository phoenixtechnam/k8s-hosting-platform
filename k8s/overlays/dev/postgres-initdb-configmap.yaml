# Dev overlay: init script to create the Roundcube database on first boot.
# In production, this SQL runs as a manual bootstrap step.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: platform
data:
  01-roundcube-db.sh: |
    #!/bin/sh
    set -eu
    ROUNDCUBE_DB="roundcube"
    ROUNDCUBE_USER="roundcube"
    ROUNDCUBE_PASSWORD="roundcube-local-dev-password"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<SQL
    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '$ROUNDCUBE_USER') THEN
        CREATE ROLE $ROUNDCUBE_USER WITH LOGIN PASSWORD '$ROUNDCUBE_PASSWORD';
      END IF;
    END
    \$\$;
    SELECT 'CREATE DATABASE $ROUNDCUBE_DB OWNER $ROUNDCUBE_USER'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '$ROUNDCUBE_DB')\gexec
    GRANT ALL PRIVILEGES ON DATABASE $ROUNDCUBE_DB TO $ROUNDCUBE_USER;
    SQL
    echo "[initdb] Roundcube database '$ROUNDCUBE_DB' ready"
