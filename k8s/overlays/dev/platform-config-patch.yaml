apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  environment: "development"
  log-level: "debug"
  default-storage-class: "local-path"
  # ${DOMAIN} is substituted by Flux postBuild.substituteFrom (or by
  # bootstrap's envsubst pass) from the platform-cluster-config CM in
  # flux-system. local.sh sets DOMAIN=k8s-platform.test by default.
  ingress-base-domain: "${DOMAIN}"
  # Canonical apex domain. Drives admin/client/dex/webmail/mail subdomains.
  # Prefer this over ingress-base-domain on new deploys — both are read as
  # fallbacks by backend/src/config/domains.ts, so the rename is backwards-
  # compatible.
  platform-base-domain: "${DOMAIN}"
  cluster-issuer-name: "selfsigned-issuer"
  # Display URLs for outbound emails + UI footer. These are what the
  # operator visits in their browser, so they include the dev NodePort :2010.
  # NOT what the in-cluster services use for routing.
  admin-url: "http://admin.${DOMAIN}:2010"
  client-url: "http://client.${DOMAIN}:2010"
  support-email: "admin@${DOMAIN}"
  platform-name: "Hosting Platform (local dev)"
  # TLS Secret referenced from Ingress.spec.tls[0].secretName. Dev uses the
  # self-signed cert issued by local-ca-issuer (see the Certificate resource).
  platform-tls-secret-name: "platform-dev-tls"
  # Stalwart web-admin subdomain. Lives on :2011 (HTTPS w/ self-signed CA)
  # same as admin.* and client.*. Requires /etc/hosts entry mapping
  # mail-admin.<DOMAIN> to 127.0.0.1 — `./scripts/local.sh mail-up` prints
  # the line to add.
  stalwart-admin-url: "https://mail-admin.${DOMAIN}:2011/"
  cors-origins: "http://admin.${DOMAIN},http://client.${DOMAIN},http://localhost:5173,http://localhost:5174"
  # Cookie domain for platform_session — covers admin.*, client.*, and
  # mail-admin.* so a single login works across all three hostnames.
  session-cookie-domain: ".${DOMAIN}"
