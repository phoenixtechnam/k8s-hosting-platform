# Dedicated IngressRoute for the File Manager's streaming upload endpoint.
#
# Lives as a SEPARATE IngressRoute from the platform-ingress (which is
# now reconciler-managed, see backend/src/modules/system-settings/
# ingress-reconciler.ts) so that the WAF Middleware that protects every
# other /api/v1 route can stay on. Traefik matches IngressRoutes by
# priority (default = match-rule length), so the more specific
# `PathRegexp` here wins over the generic `/` on the platform route.
#
# Why carve this one path out of WAF coverage:
#   - The Coraza WAF plugin (Phase 3) buffers the full request body for
#     inspection. Like ingress-nginx's ModSecurity, that buffering is
#     unbounded by default and OOM-kills the controller on multi-GB
#     uploads. By splitting the upload path off into a dedicated
#     IngressRoute that does NOT attach the Coraza Middleware, the
#     File Manager's streaming endpoint stays free of body inspection.
#   - `/upload-raw` is JWT-authed on platform-api before it ever hits
#     the sidecar, and the body is an opaque binary blob — pattern
#     matching on it would be noise anyway.
#
# Hosts are pinned to the dev admin/client hostnames; for production
# the reconciler will emit this IngressRoute per the configured
# admin/client panel URLs alongside the main platform-ingress (Phase 2).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: platform-ingress-upload
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: file-manager-upload
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`admin.${DOMAIN}`) && PathRegexp(`^/api/v1/clients/[^/]+/files/upload-raw$`)"
      kind: Rule
      priority: 100
      services:
        - name: admin-panel
          port: 80
    - match: "Host(`client.${DOMAIN}`) && PathRegexp(`^/api/v1/clients/[^/]+/files/upload-raw$`)"
      kind: Rule
      priority: 100
      services:
        - name: client-panel
          port: 80
  tls:
    secretName: platform-dev-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-ingress-upload
  namespace: platform
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: file-manager-upload
spec:
  # Shared TLS Secret with the main platform-ingress (admin + client
  # apex hostnames). cert-manager is fine with two Certificate CRs
  # converging on the same secretName as long as the SAN list matches.
  secretName: platform-dev-tls
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
  dnsNames:
    - admin.${DOMAIN}
    - client.${DOMAIN}
  issuerRef:
    name: local-ca-issuer
    kind: ClusterIssuer
    group: cert-manager.io
