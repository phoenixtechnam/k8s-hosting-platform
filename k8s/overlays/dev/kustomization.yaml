# Dev overlay — local DinD environment.
#
# Two modes share this overlay:
#   ./scripts/local.sh up   → Full k3s (all pods, production-like)
#   ./scripts/local.sh dev  → Infra only (app pods scaled to 0, run on host)
#
# Uses local-path storage, .local domains, relaxed resource quotas,
# hardcoded dev secrets, and NodePort services for host access.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  # Dev-only services
  - dev-secrets.yaml
  - nodeport-services.yaml
  - postgres-initdb-patch.yaml
  # Dev-only sub-stacks (core only — mail/webmail are opt-in via local.sh)
  - dex/
  - cert-manager/

patches:
  - path: resource-quotas-patch.yaml
  - path: oauth2-proxy-cookie-patch.yaml
  - path: platform-config-patch.yaml
  - path: ingress-patch.yaml
  - path: backend-patch.yaml

images:
  - name: ghcr.io/phoenixtechnam/hosting-platform/backend
    newName: hosting-platform/backend
    newTag: local
  - name: ghcr.io/phoenixtechnam/hosting-platform/admin-panel
    newName: hosting-platform/admin-panel
    newTag: local
  - name: ghcr.io/phoenixtechnam/hosting-platform/client-panel
    newName: hosting-platform/client-panel
    newTag: local
