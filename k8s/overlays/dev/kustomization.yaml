apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: ghcr.io/phoenixtechnam/hosting-platform/backend
    newTag: "65f40ec"
  - name: ghcr.io/phoenixtechnam/hosting-platform/admin-panel
    newTag: "65f40ec"
  - name: ghcr.io/phoenixtechnam/hosting-platform/client-panel
    newTag: "65f40ec"

patches:
  # Override ingress hostnames for dev environment
  # Change YOURDOMAIN.COM to your actual domain before deploying
  - target:
      kind: Ingress
      name: platform-ingress
      namespace: platform
    patch: |
      - op: replace
        path: /spec/tls/0/hosts
        value:
          - api.dev.YOURDOMAIN.COM
          - admin.dev.YOURDOMAIN.COM
          - client.dev.YOURDOMAIN.COM
      - op: replace
        path: /spec/rules/0/host
        value: api.dev.YOURDOMAIN.COM
      - op: replace
        path: /spec/rules/1/host
        value: admin.dev.YOURDOMAIN.COM
      - op: replace
        path: /spec/rules/2/host
        value: client.dev.YOURDOMAIN.COM

  # Dev resource quotas (relaxed for testing)
  - target:
      kind: ResourceQuota
      name: hosting-quota
      namespace: hosting
    patch: |
      - op: replace
        path: /spec/hard/requests.cpu
        value: "4"
      - op: replace
        path: /spec/hard/requests.memory
        value: 8Gi
      - op: replace
        path: /spec/hard/limits.cpu
        value: "8"
      - op: replace
        path: /spec/hard/limits.memory
        value: 16Gi
      - op: replace
        path: /spec/hard/pods
        value: "50"
