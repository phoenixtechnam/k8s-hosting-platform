# Dev overlay: additional env vars for local development.
# Adds debug logging, disables rate limiting, injects Stalwart credentials.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-api
  namespace: platform
spec:
  template:
    spec:
      # Faster rolling restarts in dev — the backend handles SIGTERM cleanly.
      terminationGracePeriodSeconds: 5
      volumes:
        # Mount the Stalwart admin mirror Secret as a file — kubelet
        # auto-refreshes mounted Secret volumes (~60s) when the Secret
        # changes, while env vars bound via `secretKeyRef` only update on
        # pod restart. This lets the Rotate endpoint patch the Secret
        # and have platform-api pick up the new value without needing
        # to restart platform-api (which would kill the rotate response).
        - name: stalwart-creds
          secret:
            secretName: platform-stalwart-creds
        # Storage-lifecycle snapshot store. Tenant snapshot Jobs write
        # tarballs here via the same hostPath mount in each tenant
        # namespace; platform-api reads (stat/delete) them through this
        # mount. Kustomize strategic merge replaces the `volumes` list
        # wholesale when the overlay declares one, so the base's entry
        # has to be re-declared here.
        - name: platform-snapshots
          hostPath:
            path: /var/lib/platform/snapshots
            type: DirectoryOrCreate
      containers:
        - name: api
          volumeMounts:
            - name: stalwart-creds
              mountPath: /etc/stalwart-creds
              readOnly: true
            - name: platform-snapshots
              mountPath: /snapshots
          # Dev-only probes: poll fast so pods reach Ready as soon as the
          # app responds, instead of waiting for the prod-conservative
          # initialDelaySeconds: 5 + periodSeconds: 10 windows.
          startupProbe:
            httpGet:
              path: /api/v1/healthz
              port: 3000
            periodSeconds: 1
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 3000
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 3000
            periodSeconds: 30
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: debug
            - name: CERT_ENVIRONMENT
              value: development
            - name: DISABLE_RATE_LIMIT
              value: "true"
            - name: ADMIN_EMAIL
              value: admin@k8s-platform.test
            - name: ADMIN_PASSWORD
              value: admin
            - name: ADMIN_NAME
              value: "Platform Admin"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-db-credentials
                  key: url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-jwt-secret
                  key: secret
            - name: REDIS_URL
              value: redis://redis.platform.svc.cluster.local:6379
            - name: OIDC_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oidc-encryption-key
            - name: PLATFORM_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: internal-secret
            - name: DEFAULT_STORAGE_CLASS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: default-storage-class
                  optional: true
            - name: INGRESS_BASE_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ingress-base-domain
                  optional: true
            - name: INGRESS_DEFAULT_IPV4
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: ingress-default-ipv4
                  optional: true
            - name: CLUSTER_ISSUER_NAME
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: cluster-issuer-name
                  optional: true
            - name: PLATFORM_ENV
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: environment
                  optional: true
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: platform-config
                  key: cors-origins
                  optional: true
            - name: STALWART_MASTER_SECRET
              value: stalwart-dev-master
            - name: STALWART_IMAP_HOST
              value: stalwart-mail.mail.svc.cluster.local
            - name: STALWART_IMAP_PORT
              value: "143"
            # STALWART_ADMIN_PASSWORD is read from the mounted secret file
            # at /etc/stalwart-creds/ADMIN_SECRET_PLAIN — see credentials.ts.
            # We set STALWART_ADMIN_CREDS_DIR so the backend knows where
            # to look; the env var itself is intentionally NOT set from
            # secretKeyRef because that would freeze the value at pod start.
            - name: STALWART_ADMIN_CREDS_DIR
              value: /etc/stalwart-creds
