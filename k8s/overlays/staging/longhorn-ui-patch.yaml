# Longhorn dashboard on staging — longhorn.${DOMAIN}
#
# Gated by k8s/components/admin-auth-gate-cookie (see
# staging/kustomization.yaml components: block). Switch to
# admin-auth-gate-oauth2 when oauth2-proxy is wired into the admin
# panel's public ingress.
#
# This patch overrides the base Certificate's secretName + issuerRef so
# staging gets its own per-environment TLS secret. The base IngressRoute
# already references `longhorn-ui-tls`; we keep the same secretName
# convention here and just swap the issuer to letsencrypt-prod-http01
# (Flux postBuild substituteFrom doesn't populate CLUSTER_ISSUER_NAME on
# staging — same gotcha as the webmail overlay).
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: longhorn-ui
  namespace: longhorn-system
spec:
  secretName: longhorn-ui-staging-tls
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
---
# Override the base IngressRoute's tls.secretName so it picks up the
# staging-specific certificate above. Other fields (entryPoints, routes,
# middlewares) come from k8s/base/longhorn/ui-ingress.yaml unchanged.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn-ui
  namespace: longhorn-system
spec:
  tls:
    secretName: longhorn-ui-staging-tls
