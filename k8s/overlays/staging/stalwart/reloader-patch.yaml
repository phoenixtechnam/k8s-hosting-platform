# Overlay-specific Reloader annotation for the Stalwart StatefulSet.
#
# Extends the base annotation (stalwart-secrets) with the staging TLS
# secret so Reloader also rolls the pod when cert-manager renews the
# LE-staging certificate for stalwart.${DOMAIN}.
#
# The base only lists `stalwart-secrets` (universal). This patch appends
# the staging-specific TLS secret name so cert-renewal triggers a restart
# without a manual `kubectl rollout restart`.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart-mail
  namespace: mail
  annotations:
    secret.reloader.stakater.com/reload: "stalwart-webadmin-staging-tls,stalwart-secrets"
