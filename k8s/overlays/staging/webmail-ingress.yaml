# Cut 3 (2026-05-04): public IngressRoute for Roundcube webmail at
# https://webmail.${DOMAIN} on staging.
#
# Auth: NO admin-auth gate — webmail is end-user-facing. Authentication
# is handled by Roundcube itself (IMAP LOGIN with Stalwart) and by the
# JWT-SSO plugin when arriving via /api/v1/admin/mail/sso?to=...
#
# Why letsencrypt-prod-http01 is HARDCODED (not ${CLUSTER_ISSUER_NAME}):
# Flux's postBuild substituteFrom on staging only resolves DOMAIN from
# platform-cluster-config — CLUSTER_ISSUER_NAME isn't defined there. With
# Ingress + cert-manager annotations this caused the cert to never be
# created; with explicit Certificate CRs (Traefik IngressRoute pattern)
# the same risk applies → spec.issuerRef.name must be a literal string
# that resolves on staging at apply time.
#
# Note: the previous nginx annotations proxy-body-size: 55m + proxy-
# read/send-timeout: 120 carried over from when Stalwart's
# maxSizeAttachmentsPerEmail = 50 MB. In Traefik those limits are
# governed by the EntryPoint's `transport` section (cluster-default)
# and per-route `serversTransport`. The default Helm-installed Traefik
# allows up to maxRequestBodyBytes which is unbounded by default →
# adequate for 50 MB attachments without further tuning.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: platform-webmail-ingress
  namespace: mail
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
  annotations:
    # ADR-039 Phase 10: platform-api's webmail-router reconciler owns
    # this resource's services[0].name field, flipping it between
    # `roundcube` and `bulwark-impersonator` based on
    # platform_settings.default_webmail_engine. Flux would otherwise
    # revert the patch ~60s later from this manifest, producing a
    # 403 from Roundcube on the bulwark /_impersonate handoff URL.
    # `reconcile: disabled` tells Flux to skip this resource entirely
    # — initial creation happens once (manual or first-bootstrap),
    # subsequent updates are platform-api-owned.
    kustomize.toolkit.fluxcd.io/reconcile: disabled
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`webmail.${DOMAIN}`)"
      kind: Rule
      middlewares:
        - name: compress
          namespace: traefik
      services:
        - name: roundcube
          port: 80
  tls:
    secretName: platform-webmail-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-webmail
  namespace: mail
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  secretName: platform-webmail-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
  dnsNames:
    - webmail.${DOMAIN}
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
