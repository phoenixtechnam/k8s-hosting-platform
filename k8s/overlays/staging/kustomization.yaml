# Staging overlay — manual image builds and testing.
#
# Uses Longhorn storage, real domains with LE staging certs, Dex for OIDC.
# Image tags are manually set or auto-updated by Flux Image Automation.
#
# To deploy: update image tags below, push to staging branch, Flux reconciles.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ../../base/longhorn
  - ../../base/backup
  - dex/
  # Stalwart 0.16 mail server (Cut 3 cutover, 2026-05-04). Replaces the
  # 0.15 StatefulSet that lived under stalwart/. The cutover script
  # scripts/cutover-stalwart-v015-to-v016.sh removes the 0.15 resources
  # before this overlay applies.
  #
  # Requires a one-time operator step to generate stalwart-admin-creds
  # (the bcrypt-hashed admin password Secret consumed by the Deployment).
  # See docs/02-operations/STALWART_DEPLOYMENT.md.
  - stalwart-mail/
  # Cut 3 (2026-05-04): Roundcube webmail is always deployed alongside
  # Stalwart on staging+production. Operator-bootstrap step creates the
  # `roundcube-secrets` Secret + the `roundcube` PG database/role on
  # the platform CNPG cluster + the Stalwart master user — see
  # `scripts/bootstrap.sh:generate_roundcube_secrets`. Without those,
  # the Roundcube pod fails to start (CrashLoopBackOff on PG connect /
  # IMAP master-auth handshake).
  - roundcube/
  # ADR-039 — Bulwark webmail (JMAP-native) coexists with Roundcube.
  # `platform_settings.default_webmail_engine` selects which engine
  # new tenants get. Existing tenants keep their current engine.
  # Secrets (bulwark-secrets) operator-provisioned by
  # scripts/bootstrap.sh:generate_bulwark_secrets. The
  # BULWARK_JWT_AUTH_SECRET key MUST equal platform-api's
  # WEBMAIL_JWT_SECRET (bootstrap.sh generates one shared value).
  - bulwark/
  # Cross-namespace NetworkPolicy so Stalwart (mail ns) can reach
  # Postgres (platform ns). Lives at the overlay root, not under
  # stalwart/, because it targets the platform namespace and the
  # stalwart subdir's `namespace: mail` directive would reparent it.
  - allow-mail-to-postgres-netpol.yaml
  # NOTE: Roundcube also uses platform Postgres for session/contacts
  # storage (Phase 3.A.5), and the existing allow-mail-to-postgres
  # netpol already covers it (`from.namespaceSelector: mail` matches
  # every pod in mail ns including roundcube). No separate netpol.
  # Public-facing Ingress for webmail.${DOMAIN} — base ships a
  # local-CA dev-only ingress (k8s/base/roundcube-deployment.yaml line
  # 69-86) wired for k8s-platform.test. Staging gets its own ingress
  # with the LE prod cluster issuer.
  - webmail-ingress.yaml
  # Cut 3 (2026-05-05): staging-only override of Stalwart's default
  # per-IP submission throttle (5/sec). Mail HA stress harness sends
  # N concurrent SMTPS from a single in-cluster pod — default trips
  # the throttle. Production keeps the default.
  - stalwart-throttle-override-job.yaml
  # Platform-wide Valkey (Redis-protocol) coordinator cache. 3-replica
  # HA from day 1 + Sentinel co-located. Fresh installs land at K8s
  # default replicas=1; storage-policy reconciler scales to 3 when HA
  # mode is applied. NetworkPolicy locks the cache to redis-system /
  # mail / platform namespaces — tenant namespaces explicitly blocked.
  - valkey/
  # Image promotion (was Flux Image Automation, removed 2026-05-09):
  # Now handled by the in-CI "Pin image tags in kustomization.yaml"
  # step in .github/workflows/build-deploy.yml. Build * jobs export
  # their resolved timestamp tag; the version-bump job rewrites
  # newTag in this file via sed and pushes via the workflow's
  # ephemeral GITHUB_TOKEN. No long-lived PAT, no separate
  # controller. The flux-image-* manifests + the corresponding
  # image-reflector-controller + image-automation-controller
  # deployments are no longer installed by bootstrap.sh.

# Admin-auth gate — applies an auth_request to every Ingress labelled
# `platform.phoenix-host.net/admin-ui=true` (Longhorn UI, Stalwart web-
# admin, future admin-only UIs). Cookie mode gates on platform_session
# (current staging login flow). Switch to admin-auth-gate-oauth2 when
# oauth2-proxy is wired into the public admin ingress — every admin
# UI picks up the oauth2 gate automatically.
components:
  - ../../components/admin-auth-gate-cookie
  # M1: pin all system workloads (admin-panel, platform-api, postgres,
  # redis, oauth2-proxy, sftp-gateway, stalwart-mail, roundcube, …) to
  # nodes labelled platform.phoenix-host.net/node-role=server. The
  # component excludes dex because dex is overlay-only (not in base /
  # not in production); its matching patch is wired inline below.
  # See docs/07-reference/NODE_ROLE_TAXONOMY.md for apply-order notes.
  - ../../components/system-node-affinity

patches:
  - path: platform-version-patch.yaml
  - path: deploy-rev-patch.yaml
  - path: resource-quotas-patch.yaml
  - path: platform-config-patch.yaml
  # ingress-patch.yaml was REMOVED in the Traefik migration. platform-ingress
  # is now reconciler-managed (backend/src/modules/system-settings/
  # ingress-reconciler.ts creates the IngressRoute from system_settings on
  # startup). Per-environment TLS settings flow through the reconciler
  # via the platform-cluster-config ConfigMap (Phase 2).
  - path: longhorn-ui-patch.yaml
  # Staging-only: system-db at 10Gi (existing cluster from pre-Phase-1
  # 10Gi base default). Base now defaults to 5Gi for fresh installs.
  - path: system-db-storage-patch.yaml
  # M1: same affinity-patch as the system-node-affinity component,
  # applied to dex which is overlay-only (so it can't live inside the
  # shared component without breaking the production overlay, which
  # doesn't include dex). Patch inlined rather than `path: ../../…`
  # because Kustomize refuses to load patch files outside the overlay
  # root (security constraint).
  - target: { kind: Deployment, name: dex, namespace: platform }
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dex
        namespace: platform
      spec:
        template:
          spec:
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: platform.phoenix-host.net/node-role
                          operator: In
                          values: [server]
            tolerations:
              - key: platform.phoenix-host.net/server-only
                operator: Equal
                value: "true"
                effect: NoSchedule

images:
  - name: ghcr.io/phoenixtechnam/hosting-platform/backend
    newTag: "20260518154150-1751f3f" # {"$imagepolicy": "flux-system:backend:tag"}
  - name: ghcr.io/phoenixtechnam/hosting-platform/admin-panel
    newTag: "20260518154151-1751f3f" # {"$imagepolicy": "flux-system:admin-panel:tag"}
  - name: ghcr.io/phoenixtechnam/hosting-platform/tenant-panel
    newTag: "20260518154149-1751f3f" # {"$imagepolicy": "flux-system:tenant-panel:tag"}
