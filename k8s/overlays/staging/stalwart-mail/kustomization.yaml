# Staging overlay for Stalwart 0.16 (RocksDB DataStore).
#
# Phase 1 (RocksDB migration): mail-pg CNPG cluster removed; Stalwart
# now uses embedded RocksDB on stalwart-rocksdb-data PVC (local-path).
#
# Differences from the base:
#   1. stalwart-mail Service: LoadBalancer → ClusterIP+externalIPs
#      (single Hetzner VPS — no cloud LB). Mirrors v015's service-patch.
#   2. ingress-mgmt: hardcoded letsencrypt-prod-http01 cert-issuer +
#      auth-signin URL with the staging admin login. The base uses a
#      ${CLUSTER_ISSUER_NAME} placeholder that staging's
#      platform-cluster-config ConfigMap does NOT define (only DOMAIN is
#      substituted), so we patch the literal value here.
#   3. Reloader annotation: also watch stalwart-webadmin-prod-tls so the
#      Deployment rolls when the LE cert is renewed.
#
# 0.15 overlay (k8s/overlays/staging/stalwart/) MUST be removed from the
# parent kustomization.yaml before applying this overlay — both share
# the `mail` namespace and would race for the Stalwart Service name.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - ../../../base/stalwart-mail
  # NOTE: 0.16 (RocksDB) does NOT need the platform-postgres ExternalName
  # bridge that 0.15 used. The DataStore is local RocksDB — no external DB.

patches:
  # Stalwart-mail-v016 Service: LoadBalancer → ClusterIP+externalIPs.
  # The single staging VPS has no cloud LB controller (k3s --disable=
  # servicelb, no MetalLB). externalIPs is the vendor-neutral path to
  # bind public-facing mail ports to the node's external IP.
  #
  # The IP itself comes from the `platform-cluster-config` ConfigMap
  # (key STALWART_EXTERNAL_IP, written by bootstrap.sh's
  # detect_public_ipv4) and is resolved per-cluster by Flux's postBuild
  # substituteFrom — no checked-in literal, no per-cluster fork. The
  # mail-externalip-reconciler CronJob (k8s/base/mail-externalips) keeps
  # the live Service.spec.externalIPs in sync with worker-role nodes on
  # multi-node clusters.
  - patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: stalwart-mail
        namespace: mail
      spec:
        type: ClusterIP
        externalTrafficPolicy: Cluster
        externalIPs:
          - ${STALWART_EXTERNAL_IP}
    target:
      kind: Service
      name: stalwart-mail

  # Hardcode cert-issuer + per-environment Secret name on staging. The
  # base Certificate uses ${CLUSTER_ISSUER_NAME}; staging's platform-
  # cluster-config does NOT define that variable (only DOMAIN is exposed
  # via Flux postBuild substituteFrom) so we patch the literal value
  # here. Auth-signin URL is no longer needed — the admin-auth-cookie
  # Middleware (chosen by the overlay's admin-auth-gate-cookie component)
  # carries the verify endpoint; the redirect-to-login flow is owned by
  # platform-api on a 401 response.
  - patch: |
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: stalwart-webadmin
        namespace: mail
      spec:
        secretName: stalwart-webadmin-prod-tls
        issuerRef:
          name: letsencrypt-prod-http01
          kind: ClusterIssuer
          group: cert-manager.io
    target:
      group: cert-manager.io
      version: v1
      kind: Certificate
      name: stalwart-webadmin

  # Mirror the staging-specific Secret name into the IngressRoute so
  # it picks up the certificate Cert-Manager creates above.
  - patch: |
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: stalwart-webadmin
        namespace: mail
      spec:
        tls:
          secretName: stalwart-webadmin-prod-tls
    target:
      group: traefik.io
      version: v1alpha1
      kind: IngressRoute
      name: stalwart-webadmin

  # Reloader: roll the Deployment when the LE-prod TLS cert is renewed.
  # Phase 1 (RocksDB): mail-pg-app-credentials removed from the list.
  # The base already watches stalwart-admin-creds,stalwart-snapshot-restic-repo.
  # This overlay appends stalwart-webadmin-prod-tls (LE cert renewal).
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: stalwart-mail
        namespace: mail
        annotations:
          secret.reloader.stakater.com/reload: "stalwart-admin-creds,stalwart-snapshot-restic-repo,stalwart-webadmin-prod-tls"
    target:
      kind: Deployment
      name: stalwart-mail
