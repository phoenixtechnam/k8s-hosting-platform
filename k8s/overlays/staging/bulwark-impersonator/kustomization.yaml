# Staging bulwark-impersonator overlay.
#
# The impersonator container lives as a sidecar inside the Bulwark
# Pod (k8s/base/bulwark/deployment.yaml). This overlay contributes
# the ConfigMap (script), Service (selects the bulwark Pod),
# and NetworkPolicy.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - ../../../base/bulwark-impersonator
