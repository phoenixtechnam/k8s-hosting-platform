apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: platform
  labels:
    app: dex
spec:
  # Replicas owned by the M14 storage-policy reconciler again. Earlier
  # this overlay pinned replicas:1 because per-pod SQLite auth state
  # made multi-replica Dex incoherent (auth_request created on pod A
  # could not be looked up on pod B → "invalid 'state' parameter").
  # config.yaml now uses storage.type: postgres against the platform
  # CNPG `app` database, so every Dex pod shares state and HA is
  # safe again. See integration-oidc-dex.sh scenarios 6+7 for
  # regression coverage.
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: dex
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.45.1
          command: ["dex", "serve", "/etc/dex/config.yaml"]
          env:
            # Dex supports $ENV substitution in config.yaml. The
            # oauth2-proxy client secret comes from the generated
            # oauth2-proxy-config Secret (bootstrap creates it), and
            # config.yaml references it as $OAUTH2_PROXY_CLIENT_SECRET.
            # This avoids committing the secret into git.
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-config
                  key: OAUTH2_PROXY_CLIENT_SECRET
            # CNPG-managed credentials for the `app` database. The
            # `postgres-app` Secret is created by the postgres Cluster
            # CR and contains username + password keys for the same
            # account platform-api uses. Dex creates its own table
            # set on first start (auth_request, auth_code, …); none
            # collide with platform-api's table names.
            - name: DEX_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: username
            - name: DEX_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: password
          ports:
            - containerPort: 5556
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/dex
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /dex/.well-known/openid-configuration
              port: 5556
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /dex/.well-known/openid-configuration
              port: 5556
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: dex-config
