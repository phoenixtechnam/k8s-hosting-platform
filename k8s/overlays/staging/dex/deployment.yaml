apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex
  namespace: platform
  labels:
    app: dex
spec:
  # M12: 2 replicas + topology spread for HA across control-plane.
  replicas: 2
  selector:
    matchLabels:
      app: dex
  template:
    metadata:
      labels:
        app: dex
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: dex
      containers:
        - name: dex
          image: ghcr.io/dexidp/dex:v2.45.1
          command: ["dex", "serve", "/etc/dex/config.yaml"]
          env:
            # Dex supports $ENV substitution in config.yaml. The
            # oauth2-proxy client secret comes from the generated
            # oauth2-proxy-config Secret (bootstrap creates it), and
            # config.yaml references it as $OAUTH2_PROXY_CLIENT_SECRET.
            # This avoids committing the secret into git.
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-config
                  key: OAUTH2_PROXY_CLIENT_SECRET
          ports:
            - containerPort: 5556
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/dex
              readOnly: true
            - name: data
              mountPath: /var/dex
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /dex/.well-known/openid-configuration
              port: 5556
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /dex/.well-known/openid-configuration
              port: 5556
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: dex-config
        - name: data
          emptyDir: {}
