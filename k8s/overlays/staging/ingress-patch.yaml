# Patch ingress hostnames for staging environment.
# Current staging uses sslip.io magic DNS (maps admin.89.167.3.56.sslip.io
# directly to 89.167.3.56). Swap these when you move to a real DNS apex.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging-http01
spec:
  tls:
    - hosts:
        - admin.89.167.3.56.sslip.io
        - client.89.167.3.56.sslip.io
      secretName: platform-staging-tls
  rules:
    - host: admin.89.167.3.56.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.89.167.3.56.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
