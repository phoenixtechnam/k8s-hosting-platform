# Patch ingress hostnames for staging environment.
# Replace example.com with your actual staging domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging-http01
spec:
  tls:
    - hosts:
        - admin.staging.example.com
        - client.staging.example.com
      secretName: platform-staging-tls
  rules:
    - host: admin.staging.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.staging.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
