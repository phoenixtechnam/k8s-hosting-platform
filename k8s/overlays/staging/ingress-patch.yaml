# Patch ingress hostnames for staging environment.
# Apex: ${DOMAIN} (A record → 89.167.3.56; wildcard
# *.${DOMAIN} CNAMEs to the apex).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-http01
    # Use `ssl-redirect` (NOT `force-ssl-redirect`). The two differ in one
    # critical way: `ssl-redirect` exempts `/.well-known/acme-challenge/*`
    # so cert-manager's HTTP-01 solver Ingress can serve the validation
    # token on port 80; `force-ssl-redirect` redirects ALL paths to HTTPS,
    # including the ACME challenge path. Caught on testing.phoenix-host.
    # net 2026-05-01: every Order stuck in pending because LE got 308 to
    # https when fetching the http://…/.well-known/acme-challenge/<token>
    # URL.
    #
    # `ssl-redirect: true` still HTTPS-redirects normal traffic (the
    # Ingress has a TLS section, which is the prerequisite). Browsers
    # opening admin.<domain> over http get bumped to https as expected.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - admin.${DOMAIN}
        - client.${DOMAIN}
        - dex.${DOMAIN}
      secretName: platform-staging-tls
  rules:
    - host: admin.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
    - host: dex.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dex
                port:
                  number: 5556
