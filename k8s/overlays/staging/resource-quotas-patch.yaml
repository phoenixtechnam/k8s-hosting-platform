# Staging overlay: medium resource quotas — between dev (4 CPU/4Gi)
# and production (16 CPU/32Gi). Suitable for a 4-8 vCPU staging server.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hosting-quota
  namespace: hosting
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 24Gi
    persistentvolumeclaims: "100"
    pods: "100"
    services: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hosting-limit-range
  namespace: hosting
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 4Gi
      min:
        cpu: 25m
        memory: 32Mi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-quota
  namespace: platform
spec:
  hard:
    # HA tier headroom on a 3-server cluster of 4 GB-RAM nodes
    # (~12 GB total cluster RAM, ~4-6 GB free for the platform
    # namespace after OS + k3s + Calico + Longhorn + cert-manager).
    #   5 stateless deploys × 3 replicas × ~500m limit ≈ 7.5 CPU
    #   3 CNPG postgres instances × 1 CPU limit          = 3.0 CPU
    #   stalwart-mail, platform-suspended, sftp-gateway,
    #   dex (where it lives), various sidecars            ≈ 2.5 CPU
    # Old 8-CPU ceiling blocked postgres-3 join during Apply HA.
    # PITR adds ~1.3 GB transient (temp postgres 512 Mi + bootstrap-
    # controller 384 Mi + snapshot-recovery Job 384 Mi via LimitRange
    # defaults) — fits inside 20 Gi limits.memory headroom. No pods
    # cap: CPU/memory quotas already bound resource consumption.
    #
    # 2026-05-20 bump: 16→20 CPU + 16Gi→20Gi memory. The 16-CPU
    # ceiling reliably blocked every platform-api rolling update
    # (surge=1 new pod × 1.5 CPU limit = 1500m, didn't fit when
    # steady-state usage was ~15400m). Paired with dropping
    # platform-api limits.cpu 1500m → 750m in the same change,
    # so the steady-state baseline drops by 1500m AND the surge
    # headroom grows by 4000m. Rolling updates now fit with
    # ~5GB CPU + ~5GB memory of margin.
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "20"
    limits.memory: 20Gi
---
# LimitRange for platform namespace — supplies default container
# resource limits/requests so pods that don't specify them (e.g.
# CNPG-managed bootstrap-controller / snapshot-recovery Job pods
# during PITR) still satisfy the platform-quota's
# limits.cpu/limits.memory/requests.cpu/requests.memory hard limits.
# Mirrors k8s/base/resource-quotas.yaml; staging overlay needs its
# own copy because the base ResourceQuota gets fully replaced by the
# staging-overlay one (ResourceQuota strategic merge replaces, not
# merges). Defaults sized for 4 GB-RAM cluster servers.
apiVersion: v1
kind: LimitRange
metadata:
  name: platform-limit-range
  namespace: platform
spec:
  limits:
    - type: Container
      default:
        cpu: 300m
        memory: 384Mi
      defaultRequest:
        cpu: 20m
        memory: 32Mi
      max:
        cpu: "4"
        memory: 4Gi
      min:
        cpu: 10m
        memory: 32Mi
