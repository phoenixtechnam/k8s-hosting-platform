# Staging overlay: medium resource quotas — between dev (4 CPU/4Gi)
# and production (16 CPU/32Gi). Suitable for a 4-8 vCPU staging server.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hosting-quota
  namespace: hosting
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 24Gi
    persistentvolumeclaims: "100"
    pods: "100"
    services: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hosting-limit-range
  namespace: hosting
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 4Gi
      min:
        cpu: 25m
        memory: 32Mi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-quota
  namespace: platform
spec:
  hard:
    # HA tier headroom on a 3-server cluster:
    #   5 stateless deploys × 3 replicas × ~500m limit ≈ 7.5 CPU
    #   3 CNPG postgres instances × 1 CPU limit          = 3.0 CPU
    #   stalwart-mail, platform-suspended, sftp-gateway,
    #   dex (where it lives), various sidecars            ≈ 2.5 CPU
    # Old 8-CPU ceiling blocked postgres-3 join during Apply HA.
    requests.cpu: "8"
    requests.memory: 8Gi
    limits.cpu: "16"
    limits.memory: 16Gi
    pods: "30"
