# Staging overlay: medium resource quotas — between dev (4 CPU/4Gi)
# and production (16 CPU/32Gi). Suitable for a 4-8 vCPU staging server.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: hosting-quota
  namespace: hosting
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 24Gi
    persistentvolumeclaims: "100"
    pods: "100"
    services: "100"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: hosting-limit-range
  namespace: hosting
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 4Gi
      min:
        cpu: 25m
        memory: 32Mi
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: platform-quota
  namespace: platform
spec:
  hard:
    # HA tier headroom on a 3-server cluster:
    #   5 stateless deploys × 3 replicas × ~500m limit ≈ 7.5 CPU
    #   3 CNPG postgres instances × 1 CPU limit          = 3.0 CPU
    #   stalwart-mail, platform-suspended, sftp-gateway,
    #   dex (where it lives), various sidecars            ≈ 2.5 CPU
    # Old 8-CPU ceiling blocked postgres-3 join during Apply HA.
    # Bumped 2026-05-03 (memory + pods) for snapshot-only Postgres
    # PITR: the auto-promote orchestrator runs a temp CNPG cluster
    # IN ADDITION to the source while it bootstrap-recovers + snapshot-
    # handoffs (~5-10 min). Worst case: source 3 instances + temp 1
    # instance + per-instance bootstrap-controller + snapshot-recovery
    # Job pods, all needing memory headroom.
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "60"
---
# LimitRange for platform namespace — supplies default container
# resource limits/requests so pods that don't specify them (e.g.
# CNPG-managed bootstrap-controller / snapshot-recovery Job pods
# during PITR) still satisfy the platform-quota's
# limits.cpu/limits.memory/requests.cpu/requests.memory hard limits.
# Mirrors k8s/base/resource-quotas.yaml; staging overlay needs its
# own copy because the base ResourceQuota gets fully replaced by the
# staging-overlay one (ResourceQuota strategic merge replaces, not
# merges).
apiVersion: v1
kind: LimitRange
metadata:
  name: platform-limit-range
  namespace: platform
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "4"
        memory: 4Gi
      min:
        cpu: 10m
        memory: 32Mi
