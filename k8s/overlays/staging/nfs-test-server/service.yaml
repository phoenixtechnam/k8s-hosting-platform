apiVersion: v1
kind: Service
metadata:
  name: nfs-test-server
  namespace: platform
  labels:
    app: nfs-test-server
    platform.phoenix-host.net/staging-only: "true"
spec:
  type: ClusterIP
  selector:
    app: nfs-test-server
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
      protocol: TCP
    - name: mountd
      port: 20048
      targetPort: 20048
      protocol: TCP
    - name: rpcbind
      port: 111
      targetPort: 111
      protocol: TCP
