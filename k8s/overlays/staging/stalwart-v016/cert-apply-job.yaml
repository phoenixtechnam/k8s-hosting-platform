# One-shot Job that creates the Stalwart-side x:Certificate row in the
# Stalwart 0.16 config store (PostgreSQL).
#
# WHY a separate Job (rather than extending bootstrap-plan):
#   The existing stalwart-v016-bootstrap Job is a once-ever fresh-DB
#   bootstrap (suspend=true, completed long ago). Re-running it would
#   re-apply all entries, including `update Account credentials Password`
#   for admin — risky on a live system. A separate Job keeps the
#   destructive-update surface minimal.
#
# RUN MODEL:
#   Idempotent against repeat runs:
#     - First run: `create` succeeds, Stalwart loads the cert on next
#       TLS handshake (parses SANs from the PEM via the `serverSet`
#       subjectAlternativeNames field).
#     - Subsequent runs: stalwart-cli reports "already exists" and the
#       wrapper script exits 0.
#
#   Sequencing: the apply container retries on connection failure /
#   transient API errors via backoffLimit=10 + restartPolicy=OnFailure.
#   No init-container wait — the cert files don't need to exist on
#   THIS pod's filesystem (the Certificate row references paths inside
#   the Stalwart pod, not this Job's pod).
#
# IDEMPOTENCY:
#   stalwart-cli's `apply` command reports "already exists" when an
#   object create collides. The wrapper script greps for that string
#   and exits 0 — turning a transient "I've already been run" into
#   a no-op.
#
# RBAC: only reads `stalwart-admin-creds` Secret (recoveryPassword)
# from `mail` ns — already permitted by the default in-namespace
# Secret read for ServiceAccount `default`.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stalwart-v016-cert-apply
  namespace: mail
  labels:
    app: stalwart-mail-v016
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: mail-cert-bootstrap
  annotations:
    # Same SSA-merge guard as bootstrap-job: prevents Flux from
    # reverting any field on the Job spec after the operator triggers
    # it. Once the Job completes, Flux sees `succeeded` and leaves it
    # alone.
    kustomize.toolkit.fluxcd.io/ssa: merge
    # `force: enabled` tells Flux to delete + recreate this Job when
    # spec.template changes (which is otherwise immutable on
    # batch/v1 Jobs). Without this, every Job-template edit during
    # iterative deploys leaves Flux stuck in `field is immutable`
    # for the entire Kustomization. Discovered the hard way during
    # the 2026-05-06 cert-mount path migration — Flux refused to
    # converge on the new revision until the operator manually
    # `kubectl delete job` first. With `force: enabled`, Flux does
    # that itself.
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  # Keep the completed Job (and its pod logs) for 24h so the operator
  # can inspect the apply output if anything went sideways. Same TTL
  # as bootstrap-job for consistency.
  ttlSecondsAfterFinished: 86400
  # Up to ~10 retries with exponential backoff while Stalwart's mgmt
  # API is unreachable (e.g. pod is rolling under Reloader). Each
  # retry waits ~10s longer than the previous, so the Job tolerates
  # ~5min of API unavailability before giving up.
  backoffLimit: 10
  template:
    metadata:
      labels:
        # Deliberately NOT `app: stalwart-mail-v016` — that label is
        # selected by the `stalwart-mail-v016` NetworkPolicy whose
        # egress rules block TCP 8080 (only mail-pg 5432, DNS, ACME
        # 443, and outbound SMTP 25/465/587 are allowed). This Job
        # MUST reach stalwart-mgmt-v016:8080 over the cluster
        # network, so it identifies itself with a distinct
        # `app: stalwart-cert-bootstrap` label that the NetworkPolicy
        # does NOT select. The mail namespace has no default-deny
        # egress, so this label gives the Job implicit allow-all.
        # Verified empirically 2026-05-06.
        app: stalwart-cert-bootstrap
        app.kubernetes.io/part-of: hosting-platform
        app.kubernetes.io/component: mail-cert-bootstrap
    spec:
      restartPolicy: OnFailure
      initContainers:
        # Download stalwart-cli v1.0.4 (SHA256-pinned). Identical to
        # the bootstrap-job initContainer — keeping the binary in a
        # shared emptyDir avoids needing a custom image.
        - name: download-cli
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              CLI_VERSION="v1.0.4"
              CLI_URL="https://github.com/stalwartlabs/cli/releases/download/$${CLI_VERSION}/stalwart-cli-x86_64-unknown-linux-musl.tar.xz"
              CLI_SHA256="01c734752cc44b9e24f753cbacfc2d489dadaaccf72cd229ecb7269e85e0eefa"

              echo "Downloading stalwart-cli $${CLI_VERSION}..."
              wget -q -O /tmp/stalwart-cli.tar.xz "$${CLI_URL}"

              actual=$$(sha256sum /tmp/stalwart-cli.tar.xz | awk '{print $$1}')
              if [ "$${actual}" != "$${CLI_SHA256}" ]; then
                echo "ERROR: stalwart-cli SHA256 mismatch" >&2
                echo "  expected: $${CLI_SHA256}" >&2
                echo "  actual:   $${actual}" >&2
                exit 1
              fi

              tar -xJf /tmp/stalwart-cli.tar.xz -C /tmp/
              mv /tmp/stalwart-cli-*/stalwart-cli /shared/stalwart-cli
              chmod +x /shared/stalwart-cli
              echo "stalwart-cli ready at /shared/stalwart-cli"
          volumeMounts:
            - name: shared-bin
              mountPath: /shared
      containers:
        - name: apply-cert
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              # Plan: create one x:Certificate row pointing at the file
              # paths on the Stalwart pod. Stalwart resolves the file
              # at TLS handshake time and parses SANs out of the PEM
              # (subjectAlternativeNames is a serverSet field). No
              # NetworkListener changes needed — Stalwart auto-routes
              # by SNI against the SAN list.
              #
              # ID `default-mail-tls` is arbitrary but stable across
              # re-runs. If you ever need to swap the cert, update the
              # row by deleting + re-creating with the same ID, or
              # apply with the `update` verb.
              #
              # `printf` (NOT heredoc) — yaml block scalars preserve
              # the indentation prefix on every line of the heredoc
              # body, which made stalwart-cli v1.0.4 reject the plan
              # with the unhelpful `error: builder error` (HIGH-fix
              # follow-up, 2026-05-06).
              printf '%s\n' '{"@type":"create","object":"Certificate","value":{"default-mail-tls":{"certificate":{"@type":"File","filePath":"/run/stalwart-tls/tls.crt"},"privateKey":{"@type":"File","filePath":"/run/stalwart-tls/tls.key"}}}}' > /tmp/plan.json

              # Sanity-print the rendered plan + a wc so the operator
              # can confirm it's a single line of well-formed JSON.
              echo "--- plan.json (wc=$$(wc -c < /tmp/plan.json) bytes) ---"
              cat /tmp/plan.json
              echo "--- end plan ---"

              echo "Applying x:Certificate row..."

              # Capture stalwart-cli output to a file, then check its
              # actual exit code. The previous `... | tee ...` form
              # masked stalwart-cli failures because under `set -eu`
              # in a pipeline the exit status comes from the LAST
              # command (`tee`), which exits 0 unless writing fails.
              # That swallowed real connection-refused / 401 / 5xx
              # errors and reported success — the backoffLimit retry
              # mechanism never fired. Code-review HIGH fix
              # (2026-05-06).
              cli_rc=0
              HOME=/tmp \
              STALWART_PASSWORD="$${STALWART_RECOVERY_PASSWORD}" \
                /shared/stalwart-cli \
                  --url "http://stalwart-mgmt-v016.mail.svc.cluster.local:8080" \
                  --user "admin" \
                  apply --file /tmp/plan.json >/tmp/out.txt 2>&1 || cli_rc=$$?

              # Echo what the CLI said so the operator can read it via
              # kubectl logs.
              cat /tmp/out.txt

              if [ "$${cli_rc}" -eq 0 ]; then
                echo "Certificate row created successfully."
                exit 0
              fi

              # Idempotency: treat "already exists" as success.
              if grep -qE 'already.exists|alreadyExists|conflict|409' /tmp/out.txt; then
                echo "Certificate row already exists — idempotent success."
                exit 0
              fi

              echo "ERROR: stalwart-cli apply failed (rc=$${cli_rc}) with non-conflict error." >&2
              exit "$${cli_rc}"
          env:
            # Recovery admin password — Stalwart's HTTP-Basic credential
            # for the mgmt API. Survives bootstrap (the recoveryPassword
            # remains valid as a fall-back admin even after bootstrap
            # creates the permanent admin account).
            - name: STALWART_RECOVERY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-admin-creds
                  key: recoveryPassword
          volumeMounts:
            - name: shared-bin
              mountPath: /shared
      volumes:
        - name: shared-bin
          emptyDir: {}
