# Staging-only override for Stalwart 0.16's default per-IP submission
# throttle (id `iphfjphgabab`, 5 messages/sec per remote IP).
#
# Why staging-only:
#   The harness's MAIL_STRESS=1 stress test sends N concurrent SMTPS
#   submissions from a single in-cluster tester pod (one source IP).
#   Default throttle blocks ~75% of the storm, making the HA-failure
#   assertion unreliable. Production keeps the default — real
#   anti-spam protection matters there.
#
# Why a Job (not a Kustomize patch):
#   Stalwart's MtaInboundThrottle settings live in Stalwart's PG
#   (mail-pg CNPG cluster), not in any k8s resource. They're created
#   by Stalwart at first install and only tunable via stalwart-cli's
#   `update MtaInboundThrottle <id>` against the JMAP mgmt API. Flux
#   can't reconcile this; a one-shot Job invoking the cli is the
#   canonical approach.
#
# Idempotency:
#   `cli update --field enable=false` is idempotent. Re-running the
#   Job after Flux reconciles is a no-op. The Job has
#   `restartPolicy: OnFailure` + `activeDeadlineSeconds: 600` so it
#   eventually gives up if the recovery admin password is wrong (and
#   surfaces the failure in `kubectl get jobs`).
#
# Order of operations:
#   1. Operator runs scripts/bootstrap.sh:bootstrap_stalwart_v016
#      which creates stalwart-admin-creds (with recoveryPassword).
#   2. Flux applies this overlay; Job spawns.
#   3. Job downloads stalwart-cli, authenticates as `admin` via
#      recovery password, runs `update MtaInboundThrottle ...`.
#   4. Stalwart applies the change to its in-memory config (no
#      restart needed).
#
# To restore the default (e.g. before promoting staging behavior to
# production), delete this file from the overlay; Flux's prune will
# remove the Job. Operators who want to re-enable the throttle on a
# live cluster can:
#   stalwart-cli --user admin update MtaInboundThrottle iphfjphgabab \
#     --field enable=true
apiVersion: batch/v1
kind: Job
metadata:
  name: stalwart-throttle-override
  namespace: mail
  labels:
    app.kubernetes.io/component: stalwart-throttle-override
    app.kubernetes.io/part-of: hosting-platform
  annotations:
    # Use SSA merge strategy so Flux's reconcile doesn't fight with
    # k8s's auto-added Job labels (controller-uid, batch.kubernetes.io
    # /job-name) on .spec.template.metadata.labels. Without this, every
    # Flux reconcile after first-create dry-run-fails with "spec.template:
    # field is immutable" and the entire `platform` Kustomization status
    # sticks Ready=False — caught on testing.phoenix-host.net 2026-05-08.
    # The sister Job stalwart-bootstrap already has this annotation;
    # this one was missing it.
    kustomize.toolkit.fluxcd.io/ssa: merge
  # No `kustomize.toolkit.fluxcd.io/force: enabled` annotation — that
  # would re-create the Job on EVERY Flux reconcile (10 min on staging),
  # spawning a new pod + redownloading stalwart-cli + re-running the
  # idempotent update. The Job runs once on first apply; subsequent
  # changes to this manifest's content (e.g. CLI version bump) write a
  # new resource generation and Flux re-applies on its own.
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: stalwart-throttle-override
    spec:
      restartPolicy: OnFailure
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: platform.phoenix-host.net/node-role
                    operator: In
                    values: [server]
      tolerations:
        - key: platform.phoenix-host.net/server-only
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: cli
          image: alpine:3.20
          env:
            - name: STALWART_URL
              value: "http://stalwart-mgmt.mail.svc.cluster.local:8080"
            - name: STALWART_USER
              value: "admin"
            - name: STALWART_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stalwart-admin-creds
                  key: recoveryPassword
          command: ["sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache wget tar xz >/dev/null
              cd /tmp
              # SHA256-pinned download — same version + checksum the
              # bootstrap-job uses (k8s/base/stalwart-mail/stalwart/
              # bootstrap-job.yaml). Keep these two pins in lock-step
              # when bumping CLI versions.
              CLI_VERSION="v1.0.4"
              CLI_SHA256="01c734752cc44b9e24f753cbacfc2d489dadaaccf72cd229ecb7269e85e0eefa"
              CLI_URL="https://github.com/stalwartlabs/cli/releases/download/$${CLI_VERSION}/stalwart-cli-x86_64-unknown-linux-musl.tar.xz"
              wget -q -O cli.tar.xz "$${CLI_URL}"
              actual=$$(sha256sum cli.tar.xz | awk '{print $$1}')
              if [ "$${actual}" != "$${CLI_SHA256}" ]; then
                echo "ERROR: stalwart-cli SHA256 mismatch" >&2
                echo "  expected: $${CLI_SHA256}" >&2
                echo "  actual:   $${actual}" >&2
                exit 1
              fi
              tar -xJf cli.tar.xz
              CLI=/tmp/stalwart-cli-x86_64-unknown-linux-musl/stalwart-cli
              chmod +x "$$CLI"

              # Wait for Stalwart mgmt port to be reachable (Stalwart
              # rollout may still be in progress when this Job spawns).
              for i in $$(seq 1 30); do
                if "$$CLI" query MtaInboundThrottle >/dev/null 2>&1; then
                  break
                fi
                echo "waiting for stalwart mgmt API..."
                sleep 5
              done

              # Discover the per-IP throttle ID dynamically — Stalwart
              # 0.16 generates deterministic IDs from the throttle's
              # natural key, but the ID format isn't part of the public
              # contract. Look up by `Description` instead. The default
              # per-IP throttle ships as "Sender IP throttle" with
              # keys=remoteIp, count=5, period=1s. CRITICAL: matching
              # by description text means a future Stalwart release
              # that renames this throttle would silently no-op the
              # update, so we ALSO assert the AFTER state shows
              # `Enabled: false`.
              THROTTLE_ID=$$("$$CLI" query MtaInboundThrottle 2>/dev/null \
                | awk '/Sender IP throttle/ {print $$1; exit}')
              if [ -z "$${THROTTLE_ID}" ]; then
                echo "ERROR: per-IP throttle not found by description" >&2
                "$$CLI" query MtaInboundThrottle 2>&1 || true
                exit 1
              fi
              echo "Resolved per-IP throttle id: $${THROTTLE_ID}"

              echo "BEFORE:"
              "$$CLI" get MtaInboundThrottle "$${THROTTLE_ID}" 2>&1 | grep -E "Description|Enabled|Count|Period" || true

              "$$CLI" update MtaInboundThrottle "$${THROTTLE_ID}" --field 'enable=false'

              # Self-verify: cli `update` returns 0 even if the field
              # patch was a no-op or the record was missing on some
              # builds. Re-fetch and assert `Enabled: No`. Without this
              # the throttle could silently stay on and stress tests
              # would mysteriously fail with auth-blocked.
              if ! "$$CLI" get MtaInboundThrottle "$${THROTTLE_ID}" 2>&1 | grep -qE "Enabled:[[:space:]]+No"; then
                echo "ERROR: throttle update did not stick — Enabled is still Yes" >&2
                "$$CLI" get MtaInboundThrottle "$${THROTTLE_ID}" 2>&1 || true
                exit 1
              fi

              echo "AFTER:"
              "$$CLI" get MtaInboundThrottle "$${THROTTLE_ID}" 2>&1 | grep -E "Description|Enabled|Count|Period" || true

              echo "stalwart-throttle-override: per-IP throttle disabled (staging-only)"
