apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  environment: "staging"
  log-level: "info"
  default-storage-class: "longhorn"
  ingress-base-domain: "staging.phoenix-host.net"
  cluster-issuer-name: "letsencrypt-prod-http01"
  admin-url: "https://admin.staging.phoenix-host.net"
  client-url: "https://client.staging.phoenix-host.net"
  cors-origins: "https://admin.staging.phoenix-host.net,https://client.staging.phoenix-host.net"
  # Per-client sidecar image — pull from GHCR on real clusters.
  file-manager-image: "ghcr.io/phoenixtechnam/hosting-platform/file-manager-sidecar:latest"
  # Longhorn dashboard URL for the Storage Configuration iframe.
  longhorn-url: "https://longhorn.staging.phoenix-host.net/"
