apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  environment: "staging"
  log-level: "info"
  default-storage-class: "longhorn"
  ingress-base-domain: "${DOMAIN}"
  cluster-issuer-name: "letsencrypt-prod-http01"
  admin-url: "https://admin.${DOMAIN}"
  client-url: "https://client.${DOMAIN}"
  # Canonical public URL used to mint CRL distribution URLs in mTLS
  # provider metadata. Set to the admin host so the CRL endpoint
  # matches the JWT-scoped API surface.
  public-url: "https://admin.${DOMAIN}"
  cors-origins: "https://admin.${DOMAIN},https://client.${DOMAIN}"
  # Per-client sidecar image — pull from GHCR on real clusters.
  file-manager-image: "ghcr.io/phoenixtechnam/hosting-platform/file-manager-sidecar:latest"
  # Private Worker — clients dial in to this WSS host with their token.
  # The wildcard A record `tunnels.${DOMAIN}` must point at cluster
  # ingress (set up at install time, no per-client DNS work needed).
  tunnel-base-url: "wss://tunnels.${DOMAIN}"
  private-worker-frps-image: "fatedier/frps:v0.62.1"
  private-worker-agent-image: "ghcr.io/phoenixtechnam/hosting-platform/private-worker-agent:latest"
  # Longhorn dashboard URL for the Storage Configuration iframe.
  longhorn-url: "https://longhorn.${DOMAIN}/"
  # platform_session cookie Domain attribute. Shares the cookie across
  # all admin-only subdomains (longhorn, stalwart, future ones) so
  # admin-panel iframes carry the auth automatically. Without this the
  # cookie is host-only to admin.<apex> and cross-subdomain iframes
  # hit the nginx auth_request gate with no cookie → redirect loop.
  session-cookie-domain: ".${DOMAIN}"
  # Passkey (WebAuthn) RP — placeholder-templated. ${DOMAIN} is
  # resolved by Flux postBuild.substituteFrom (and by bootstrap.sh's
  # envsubst pass at install time). Kept in the overlay so Flux's
  # platform-config-patch carries them too — the bootstrap-only path
  # gets overwritten by Flux on every reconcile, so the SoT must be
  # in the overlay for clusters running Flux.
  passkey-rp-id: "${DOMAIN}"
  passkey-rp-name: "Phoenix Hosting (staging)"
  passkey-origins: "https://admin.${DOMAIN},https://client.${DOMAIN}"
