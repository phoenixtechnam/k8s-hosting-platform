apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  environment: "staging"
  log-level: "info"
  default-storage-class: "longhorn"
  ingress-base-domain: "${DOMAIN}"
  cluster-issuer-name: "letsencrypt-prod-http01"
  admin-url: "https://admin.${DOMAIN}"
  client-url: "https://client.${DOMAIN}"
  cors-origins: "https://admin.${DOMAIN},https://client.${DOMAIN}"
  # Per-client sidecar image — pull from GHCR on real clusters.
  file-manager-image: "ghcr.io/phoenixtechnam/hosting-platform/file-manager-sidecar:latest"
  # Longhorn dashboard URL for the Storage Configuration iframe.
  longhorn-url: "https://longhorn.${DOMAIN}/"
  # platform_session cookie Domain attribute. Shares the cookie across
  # all admin-only subdomains (longhorn, mail-admin, future ones) so
  # admin-panel iframes carry the auth automatically. Without this the
  # cookie is host-only to admin.<apex> and cross-subdomain iframes
  # hit the nginx auth_request gate with no cookie → redirect loop.
  session-cookie-domain: ".${DOMAIN}"
  # Passkey (WebAuthn) RP — passkey-rp-id and passkey-origins now
  # default from bootstrap.sh based on --domain (so a fresh install
  # on any apex Just Works). We keep passkey-rp-name here only to
  # override the friendly name shown on the OS biometric prompt.
  passkey-rp-name: "Phoenix Hosting (staging)"
