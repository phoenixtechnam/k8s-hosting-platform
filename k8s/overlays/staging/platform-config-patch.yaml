apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  environment: "staging"
  log-level: "info"
  default-storage-class: "longhorn"
  ingress-base-domain: "staging.example.com"
  cluster-issuer-name: "letsencrypt-staging-http01"
  admin-url: "https://admin.staging.example.com"
  client-url: "https://client.staging.example.com"
  cors-origins: "https://admin.staging.example.com,https://client.staging.example.com"
