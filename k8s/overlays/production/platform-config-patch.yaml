apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
  namespace: platform
data:
  environment: "production"
  log-level: "warn"
  default-storage-class: "longhorn"
  ingress-base-domain: "example.com"
  cluster-issuer-name: "letsencrypt-prod-http01"
  admin-url: "https://admin.example.com"
  client-url: "https://client.example.com"
  cors-origins: "https://admin.example.com,https://client.example.com"
