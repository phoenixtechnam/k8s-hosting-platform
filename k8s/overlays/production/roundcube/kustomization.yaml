# Phase 3.A.2 — production Roundcube overlay.
#
# Re-enables TLS peer verification on the Roundcube → Stalwart IMAP/SMTP
# connections. In dev we disable it because Stalwart uses a self-signed
# cert (see k8s/base/roundcube/configmap-config.yaml).
#
# Prerequisite: Stalwart must be serving a CA-issued cert whose SANs
# include the in-cluster service hostname Roundcube connects to. With
# the default cert-manager + Let's Encrypt path the SANs only cover
# the public subdomains, NOT *.svc.cluster.local — operators wanting
# verify_peer=true must mount a private CA bundle (or use an internal
# issuer like cert-manager's CA issuer).
#
# Cut 3 (2026-05-04): switched from configMapGenerator behavior:merge
# to a strategic-merge ConfigMap patch because the base ships
# roundcube-config-extra as a directly-declared ConfigMap, not via a
# generator. Generator-merge only targets generator-produced ConfigMaps.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - ../../../base/roundcube

patches:
  - target:
      kind: ConfigMap
      name: roundcube-config-extra
    path: roundcube-config-extra-patch.yaml
