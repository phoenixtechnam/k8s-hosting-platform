# Production Roundcube overlay — aligned with staging 2026-05-07.
#
# Webmail is always deployed alongside Stalwart on staging and
# production — operator-bootstrapped Secret `roundcube-secrets` plus a
# `roundcube` Postgres database/role on the platform CNPG cluster
# (`system-db`) are created by `scripts/bootstrap.sh` (see
# generate_roundcube_secrets + create_roundcube_db).
#
# In-cluster IMAP/SMTP from Roundcube → stalwart-mail-v016 uses
# verify_peer=false because Stalwart's LE cert has SANs for the public
# subdomains, NOT the in-cluster Service hostname. The browser →
# ingress hop IS verified normally. See roundcube-config-extra-patch
# header for the rationale and the path to re-enable verify_peer.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mail

resources:
  - ../../../base/roundcube

patches:
  - target:
      kind: ConfigMap
      name: roundcube-config-extra
    path: roundcube-config-extra-patch.yaml
