apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-config-extra
  namespace: mail
data:
  jwt_auth.inc.php: |
    <?php
    // Production Roundcube config (aligned with staging 2026-05-07).
    //
    // verify_peer is false on the in-cluster IMAP/SMTP hop because
    // Stalwart's LE cert SAN list covers the public subdomains
    // (mail.${DOMAIN}, stalwart.${DOMAIN}, webmail.${DOMAIN}), NOT
    // the in-cluster Service hostname stalwart-mail-v016.mail.svc.
    // The browser → ingress hop IS verified normally.
    //
    // To re-enable verify_peer=true on the internal hop, mount a
    // private CA bundle that includes the in-cluster Service hostname
    // (e.g. via cert-manager CA issuer). Out of scope for this overlay.

    if (!in_array('jwt_auth', $config['plugins'] ?? [])) {
      $config['plugins'][] = 'jwt_auth';
    }

    $config['imap_host'] = getenv('ROUNDCUBEMAIL_DEFAULT_HOST');
    $config['smtp_host'] = getenv('ROUNDCUBEMAIL_SMTP_SERVER');

    $config['imap_conn_options'] = [
      'ssl' => [
        'verify_peer'       => false,
        'verify_peer_name'  => false,
        'allow_self_signed' => true,
      ],
    ];
    $config['smtp_conn_options'] = [
      'ssl' => [
        'verify_peer'       => false,
        'verify_peer_name'  => false,
        'allow_self_signed' => true,
      ],
    ];

    $config['use_https'] = true;
    $config['proxy_whitelist'] = ['10.0.0.0/8', '127.0.0.1'];

    $config['username_domain'] = '';
    $config['request_check_tokens'] = false;
