# Patch ingress hostnames for production environment.
# Replace ${DOMAIN} with your actual production domain.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: platform
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-http01
spec:
  tls:
    - hosts:
        - admin.${DOMAIN}
        - client.${DOMAIN}
      secretName: platform-production-tls
  rules:
    - host: admin.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-panel
                port:
                  number: 80
    - host: client.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client-panel
                port:
                  number: 80
