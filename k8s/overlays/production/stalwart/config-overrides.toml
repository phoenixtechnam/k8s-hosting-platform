# Production config override — full replacement of config.toml.
#
# This file is the COMPLETE production config (not a partial patch) because
# configMapGenerator{behavior: merge} for files replaces the entire file
# content for any file key listed in the overlay — it does NOT do TOML-level
# deep-merge. Production-specific changes (TLS for Postgres, [certificate.default]
# mount) require replacing the full file.
#
# CI guard: scripts/ci-stalwart-config-drift.sh diffs this file against
# k8s/base/stalwart/stalwart-config.toml and fails if any section diverges
# outside the allowlist in scripts/stalwart-config-prod-allowed-divergence.txt.
# Run locally: bash scripts/ci-stalwart-config-drift.sh

# ─── Server identity ───────────────────────────────────────────────────
[server]
hostname = "%{env:STALWART_HOSTNAME}%"

# ─── TLS certificates ─────────────────────────────────────────────────
# Mounted by the cert-mount StatefulSet patch in this same overlay.
# cert-manager writes the renewed cert into the Secret; restart the
# pod or run `stalwart-cli server reload-certificates` to pick it up.
[certificate.default]
cert = "file:///etc/stalwart/tls/tls.crt"
private-key = "file:///etc/stalwart/tls/tls.key"
default = true

# ─── Listeners ─────────────────────────────────────────────────────────

[server.listener.smtp]
bind = "[::]:25"
protocol = "smtp"

[server.listener.submission]
bind = "[::]:587"
protocol = "smtp"

[server.listener.submissions]
bind = "[::]:465"
protocol = "smtp"
tls.implicit = true

[server.listener.imap]
bind = "[::]:143"
protocol = "imap"

[server.listener.imaptls]
bind = "[::]:993"
protocol = "imap"
tls.implicit = true

[server.listener.pop3]
bind = "[::]:110"
protocol = "pop3"

[server.listener.pop3s]
bind = "[::]:995"
protocol = "pop3"
tls.implicit = true

[server.listener.sieve]
bind = "[::]:4190"
protocol = "managesieve"

[server.listener.http]
protocol = "http"
bind = "[::]:8080"

# ─── Storage ───────────────────────────────────────────────────────────
[storage]
data = "rocksdb"
fts = "rocksdb"
lookup = "rocksdb"
blob = "fs-blob"
directory = "sql"

[store.rocksdb]
type = "rocksdb"
path = "/opt/stalwart/data"
compression = "lz4"

[store.fs-blob]
type = "fs"
path = "/opt/stalwart/blobs"
depth = 2

# ─── PostgreSQL data store ────────────────────────────────────────────
# Production overlay enables TLS between Stalwart and Postgres.
[store.pg]
type = "postgresql"
host = "%{env:STALWART_DB_HOST}%"
port = 5432
database = "%{env:STALWART_DB_NAME}%"
user = "%{env:STALWART_DB_USER}%"
password = "%{env:STALWART_DB_PASSWORD}%"
timeout = "15s"

[store.pg.tls]
enable = true
allow-invalid-certs = false
# Phase 3 T3.1: pin the CA bundle that signs the platform-postgres
# server certificate. The Secret `platform-postgres-ca` is mounted
# read-only at /etc/stalwart/pg-tls/ca.crt by the cert-mount
# StatefulSet patch in this overlay. cert-manager populates the
# Secret from the platform-internal Issuer.
root-cert = "file:///etc/stalwart/pg-tls/ca.crt"

[store.pg.pool]
max-connections = 10

# Phase 3 T3.2 / T5.3: privacy-hardened query set. Mirrors the base
# config (k8s/base/stalwart/stalwart-config.toml) one-for-one. Keep in
# sync with base — diverging here is caught by scripts/ci-stalwart-config-drift.sh.
# The `verify` query intentionally returns no rows so anonymous SMTP
# clients cannot enumerate addresses across all clients on the platform
# (RFC 5321 §3.5.2: "252 Cannot VRFY user").
[store.pg.query]
name       = "SELECT name, type, secret, description, quota FROM stalwart.principals WHERE name = $1"
members    = "SELECT $1::text AS member_of WHERE false"
recipients = "SELECT name FROM stalwart.emails WHERE address = $1"
emails     = "SELECT address FROM stalwart.emails WHERE name = $1 ORDER BY type DESC, address ASC"
verify     = "SELECT address FROM stalwart.emails WHERE false AND $1::text IS NOT NULL"
expand     = "SELECT member_address AS address FROM stalwart.alias_expansion WHERE list_address = $1 ORDER BY member_address LIMIT 50"
domains    = "SELECT 1 FROM stalwart.domains WHERE name = $1 LIMIT 1"

# ─── SQL directory bound to the PostgreSQL store ──────────────────────
[directory.sql]
type = "sql"
store = "pg"

[directory.sql.columns]
name = "name"
description = "description"
secret = "secret"
email = "address"
quota = "quota"
class = "type"

# ─── Authentication ────────────────────────────────────────────────────
[authentication.fallback-admin]
user = "admin"
secret = "%{env:ADMIN_SECRET}%"

[authentication.master]
user = "master"
secret = "%{env:MASTER_SECRET}%"

# ─── Security: IP allowlist ────────────────────────────────────────────
# Mirrors k8s/base/stalwart/stalwart-config.toml — this file is a FULL
# replacement of config.toml (configMapGenerator merge), so changes to
# the base must be manually kept in sync here.
# CI guard (scripts/ci-stalwart-config-drift.sh) catches drift at PR time.
# See base file for rationale: kube-proxy SNATs external traffic to node
# IP on ClusterIP+externalIPs; externalTrafficPolicy is irrelevant here.
[server.security]
allowed-ips = ["127.0.0.0/8", "::1/128", "10.42.0.0/16", "10.43.0.0/16"]

# ─── Telemetry ─────────────────────────────────────────────────────────
[tracer.stdout]
type = "stdout"
level = "info"
ansi = false
enable = true

[metrics.prometheus]
enable = true
