# Overlay-specific Reloader annotation for the Stalwart StatefulSet.
#
# Extends the base annotation (stalwart-secrets) with the production TLS
# secret so Reloader rolls the pod when cert-manager renews stalwart-tls
# (the cert mounted at /etc/stalwart/tls/ for SMTP/IMAP TLS).
#
# stalwart-tls is provisioned by the backend certificates module via
# POST /api/v1/admin/mail/certificate/ensure and mounted in the StatefulSet
# by k8s/overlays/production/stalwart/statefulset-cert-mount.yaml.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart-mail
  namespace: mail
  annotations:
    secret.reloader.stakater.com/reload: "stalwart-tls,stalwart-secrets"
