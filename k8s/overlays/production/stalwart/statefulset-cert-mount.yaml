#
# Patch: mount the cert-manager-managed `stalwart-tls` Secret read-only
# at /etc/stalwart/tls/. The Stalwart TOML [certificate.default] block
# in the overlay ConfigMap references these files.
#
# The Secret is provisioned by the backend certificates module via
# POST /api/v1/admin/mail/certificate/ensure (see kustomization.yaml
# for the bootstrap steps).
#
# Phase 3 T3.1: ALSO mount the platform-postgres CA bundle at
# /etc/stalwart/pg-tls/ca.crt so Stalwart can verify the Postgres
# server cert end-to-end. The Secret `platform-postgres-ca` is
# expected to be created by cert-manager (see the production
# overlay's platform-postgres-tls Certificate CR) and contains a
# single key `ca.crt` with the PEM-encoded issuer chain.
#
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stalwart-mail
  namespace: mail
spec:
  template:
    spec:
      containers:
        - name: stalwart
          volumeMounts:
            - name: tls-cert
              mountPath: /etc/stalwart/tls
              readOnly: true
            - name: pg-ca
              mountPath: /etc/stalwart/pg-tls
              readOnly: true
      volumes:
        - name: tls-cert
          secret:
            secretName: stalwart-tls
            # Optional at kustomize merge time, but cert-manager should
            # have already populated it per the bootstrap procedure.
            optional: false
        - name: pg-ca
          secret:
            secretName: platform-postgres-ca
            optional: false
            items:
              - key: ca.crt
                path: ca.crt
