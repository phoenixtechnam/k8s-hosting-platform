# Cut 3 (2026-05-04): production IngressRoute for Roundcube webmail at
# https://webmail.${DOMAIN}.
#
# Same shape as the staging overlay's webmail-ingress.yaml. Auth: NO
# admin-auth gate — webmail is end-user-facing. End users authenticate
# to Roundcube directly via IMAP LOGIN against Stalwart, OR via the
# JWT-SSO path from /api/v1/admin/mail/sso?to= (when the master user
# is provisioned).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: platform-webmail-ingress
  namespace: mail
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`webmail.${DOMAIN}`)"
      kind: Rule
      middlewares:
        - name: compress
          namespace: traefik
      services:
        - name: roundcube
          port: 80
  tls:
    secretName: platform-webmail-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: platform-webmail
  namespace: mail
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
spec:
  secretName: platform-webmail-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  usages:
    - digital signature
    - key encipherment
    - server auth
  dnsNames:
    - webmail.${DOMAIN}
  issuerRef:
    name: letsencrypt-prod-http01
    kind: ClusterIssuer
    group: cert-manager.io
