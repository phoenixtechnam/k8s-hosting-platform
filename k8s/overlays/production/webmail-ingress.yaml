# Cut 3 (2026-05-04): production Ingress for Roundcube webmail at
# https://webmail.${DOMAIN}.
#
# Same shape as the staging overlay's webmail-ingress.yaml. Auth: NO
# admin-auth gate — webmail is end-user-facing. End users authenticate
# to Roundcube directly via IMAP LOGIN against Stalwart, OR via the
# JWT-SSO path from /api/v1/admin/mail/sso?to= (when the master user
# is provisioned — see TODO in roundcube-secrets bootstrap).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-webmail-ingress
  namespace: mail
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: webmail
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-http01
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "55m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - webmail.${DOMAIN}
      secretName: platform-webmail-tls
  rules:
    - host: webmail.${DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: roundcube
                port:
                  number: 80
