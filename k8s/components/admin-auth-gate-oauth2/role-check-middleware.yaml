# Second-stage ForwardAuth Middleware in the oauth2 admin-auth Chain.
# After oauth2-proxy validates the Dex OIDC session and injects the
# X-Auth-Request-Email header, this Middleware calls platform-api's
# /api/v1/auth/verify-admin-email — backend reads the email header,
# looks up the user row, and returns 204 only if role ∈ {super_admin,
# admin, billing, support}. Any other status fails the chain and the
# request never reaches the IngressRoute's backend Service.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-auth-role-check
  namespace: traefik
  labels:
    app.kubernetes.io/part-of: hosting-platform
    app.kubernetes.io/component: admin-auth-gate
spec:
  forwardAuth:
    address: "http://platform-api.platform.svc.cluster.local:3000/api/v1/auth/verify-admin-email"
    # See traefik-types.ts forwardAuthSpec comment block + the
    # entryPoint trustedIPs gate in bootstrap.sh install_traefik.
    trustForwardHeader: false
    # Forward the email + user headers that oauth2-proxy injected. Traefik
    # forwards request headers by default; this list is what the BACKEND
    # response headers we want to propagate downstream (e.g. for audit log).
    authResponseHeaders:
      - X-Platform-Admin-User
      - X-Platform-Admin-Role
    # Without this, Traefik would forward the browser's cookie/auth header
    # to the role-check upstream. The role-check endpoint must only trust
    # X-Auth-Request-Email (set by oauth2-proxy as a response header in
    # the previous chain step → which Traefik then passes downstream as a
    # request header). Stripping client-supplied auth headers prevents a
    # browser from spoofing role-check by sending its own X-Platform-*.
    authRequestHeaders:
      - X-Auth-Request-Email
      - X-Auth-Request-User
