# admin-auth-gate-oauth2 — Kustomize Component
#
# Gates every IngressRoute labelled `platform.phoenix-host.net/admin-ui=true`
# behind oauth2-proxy's Dex-OIDC session AND a backend role-check that
# maps the OIDC email to an admin role.
#
# How it works in the Traefik model:
#   1. The base ships a Middleware `admin-auth-cookie@traefik` whose
#      ForwardAuth address points at platform-api's verify-admin-session
#      (the cookie gate).
#   2. This component REPLACES `admin-auth-cookie@traefik` with a Chain
#      middleware that composes two ForwardAuth steps:
#        a. `admin-auth-oauth2-proxy@traefik` →
#           http://oauth2-proxy.platform.svc.cluster.local:4180/oauth2/auth
#           (oauth2-proxy enforces a valid Dex OIDC session, sets the
#           X-Auth-Request-Email response header)
#        b. `admin-auth-role-check@traefik` →
#           http://platform-api.platform.svc.cluster.local:3000/api/v1/auth/verify-admin-email
#           (backend looks up email → user row → role ∈ {super_admin,
#           admin, billing, support})
#   3. Both steps must return 2xx for the request to pass. 401 from
#      oauth2-proxy causes Traefik to forward oauth2-proxy's redirect
#      (Set-Cookie + Location to /oauth2/start) back to the browser.
#
# The role check separates auth (Dex user OK) from authorization (user
# is an admin). Both are required to reach an admin-ui IngressRoute.
#
# Pick exactly ONE admin-auth-gate component per overlay:
#   - components/admin-auth-gate-cookie  → platform_session + local login
#   - components/admin-auth-gate-oauth2  → oauth2-proxy + Dex OIDC (THIS)
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - oauth2-proxy-middleware.yaml
  - role-check-middleware.yaml

# Replace the base admin-auth-cookie Middleware with a Chain that runs
# oauth2-proxy first, then the backend role-check. The Chain executes
# its members in declared order — a non-2xx response from any step
# short-circuits and is returned to the client (which, for oauth2-proxy,
# means a 302 redirect to Dex via /oauth2/start).
patches:
  - target:
      group: traefik.io
      version: v1alpha1
      kind: Middleware
      name: admin-auth-cookie
      namespace: traefik
    patch: |-
      - op: replace
        path: /spec
        value:
          chain:
            middlewares:
              - name: admin-auth-oauth2-proxy
                namespace: traefik
              - name: admin-auth-role-check
                namespace: traefik
