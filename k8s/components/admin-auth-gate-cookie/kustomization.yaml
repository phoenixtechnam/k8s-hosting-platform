# admin-auth-gate-cookie — Kustomize Component
#
# In the Traefik model, admin-ui IngressRoutes always reference the
# Middleware `admin-auth-cookie@traefik`. The BASE
# (k8s/base/traefik/middlewares-admin-auth.yaml) ships that Middleware
# pre-wired to platform-api's verify-admin-session endpoint — which IS
# the cookie gate. So this component carries only a self-stamping
# annotation patch that records the operator's choice; the behaviour
# itself comes from the base middleware unchanged.
#
# Pick exactly ONE admin-auth-gate component per overlay:
#   - components/admin-auth-gate-cookie  → platform_session + local login (THIS)
#   - components/admin-auth-gate-oauth2  → oauth2-proxy + Dex OIDC
#
# Why an annotation-only stamp is enough: dropping the cookie component
# from an overlay would silently keep the base middleware AND skip the
# oauth2 rebind, leaving the cluster on cookie auth without anyone
# having declared the intent. The ci-admin-auth-check guardrail compares
# this components: entry against the IngressRoutes labelled admin-ui=true
# to enforce one explicit choice per overlay; the annotation here is the
# audit trail (`kubectl describe middleware admin-auth-cookie -n traefik`).
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      group: traefik.io
      version: v1alpha1
      kind: Middleware
      name: admin-auth-cookie
      namespace: traefik
    patch: |-
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: admin-auth-cookie
        namespace: traefik
        annotations:
          platform.phoenix-host.net/auth-gate: cookie
