# admin-auth-gate-cookie — Kustomize Component
#
# Gates every Ingress labelled `platform.phoenix-host.net/admin-ui=true`
# behind the platform_session cookie via nginx auth_request.
#
# Intentionally snippet-free. Most managed nginx-ingress installs ship
# with `allow-snippet-annotations: "false"` as a hardening default
# (Longhorn's admission webhook rejects any Ingress that uses
# auth-snippet / server-snippet / configuration-snippet when that flag
# is off). This component uses only first-class annotations, so it
# works on hardened clusters.
#
# Two design points that this edit relies on:
#   1. nginx auth_request forwards the browser's Cookie header to the
#      subrequest by default — no explicit proxy_set_header needed.
#   2. The verify-admin-session endpoint ONLY reads the platform_session
#      cookie; it ignores Authorization entirely. That means we don't
#      need a snippet to strip Bearer tokens set by a gated SPA — the
#      backend is already safe against that contamination.
#
# The per-environment auth-signin redirect (public admin URL) is set on
# each overlay's ingress patch, because the apex differs between
# dev/staging/production.
#
# Pick exactly ONE admin-auth-gate component per overlay:
#   - components/admin-auth-gate-cookie  → platform_session + local login
#   - components/admin-auth-gate-oauth2  → oauth2-proxy + Dex OIDC
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Ingress
      labelSelector: platform.phoenix-host.net/admin-ui=true
    patch: |-
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: _  # patched by labelSelector — name placeholder required by SM
        annotations:
          nginx.ingress.kubernetes.io/auth-url: "http://platform-api.platform.svc.cluster.local:3000/api/v1/auth/verify-admin-session"
          platform.phoenix-host.net/auth-gate: "cookie"
