server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ─── Adminer reverse proxy ────────────────────────────────────────────────
    # Proxies /adminer/ to the backend's dedicated Adminer server (port 8081).
    # We use a variable for the upstream so nginx resolves DNS at request time
    # (not just at startup), which survives backend container restarts.
    # The rewrite strips the /adminer/ prefix before forwarding. sub_filter
    # rewrites absolute URLs in HTML so links/forms/assets work under /adminer/.
    location /adminer/ {
        # Use Docker's embedded DNS resolver (127.0.0.11) with 30s TTL so
        # nginx re-resolves the backend hostname after container restarts.
        resolver 127.0.0.11 valid=30s;
        set $adminer_upstream http://backend:8081;

        # Strip /adminer/ prefix: /adminer/foo → /foo
        rewrite ^/adminer/(.*) /$1 break;

        proxy_pass $adminer_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass_request_headers on;

        # Large body for SQL imports
        client_max_body_size 50m;

        # The backend's adminer-server already prefixes Location headers
        # with /adminer/, so we disable nginx's automatic redirect rewriting.
        proxy_redirect off;

        # Rewrite absolute URLs in Adminer's HTML responses so they include
        # the /adminer/ prefix. Without this, Adminer's form actions, links,
        # and asset references would point to / and bypass the proxy.
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript;
        sub_filter 'action="/' 'action="/adminer/';
        sub_filter 'href="/' 'href="/adminer/';
        sub_filter 'src="/' 'src="/adminer/';
        # Rewrite JavaScript location assignments and fetch URLs
        sub_filter "location.href='/" "location.href='/adminer/";
        sub_filter 'location.href="/' 'location.href="/adminer/';
        sub_filter "location='/" "location='/adminer/";
        sub_filter 'location="/' 'location="/adminer/';
    }

    # Exact match for /adminer without trailing slash — redirect to /adminer/
    location = /adminer {
        return 301 /adminer/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
