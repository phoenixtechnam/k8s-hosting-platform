# Local development stack
# Usage: ./scripts/local.sh up
# Or:    docker compose --env-file .env.local -f docker-compose.local.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${PORT_DB:-2013}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-hosting_platform}
      POSTGRES_USER: ${DB_USER:-platform}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-local-dev-password}
      # Phase 3.A.5: Roundcube session DB, created by initdb script on
      # first container start. These are passed through to the initdb
      # shell script via the Postgres container's env.
      ROUNDCUBE_DB_NAME: ${ROUNDCUBE_DB_NAME:-roundcube}
      ROUNDCUBE_DB_USER: ${ROUNDCUBE_DB_USER:-roundcube}
      ROUNDCUBE_DB_PASSWORD: ${ROUNDCUBE_DB_PASSWORD:-roundcube-local-dev-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-initdb:/docker-entrypoint-initdb.d:ro
    # Note: k3s pods reach postgres via a k8s Service + Endpoints resource
    # in the `mail` namespace that is dynamically populated with whatever
    # IP docker assigns to this container on each boot. The `mail-up`
    # command in scripts/local.sh patches the Endpoints on every deploy.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-platform} -d ${DB_NAME:-hosting_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${PORT_REDIS:-2014}:6379"
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT_API:-2012}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: debug
      DATABASE_URL: "postgresql://${DB_USER:-platform}:${DB_PASSWORD:-local-dev-password}@postgres:5432/${DB_NAME:-hosting_platform}"
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-not-for-production-use}
      REDIS_URL: redis://redis:6379
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@platform.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      ADMIN_NAME: ${ADMIN_NAME:-Platform Admin}
      CORS_ORIGINS: "http://${DOCKER_HOST_NAME:-dind.local}:${PORT_ADMIN:-2010},http://${DOCKER_HOST_NAME:-dind.local}:${PORT_CLIENT:-2011}"
      OIDC_ENCRYPTION_KEY: ${OIDC_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      # Phase 3 T5.1: shared secret for the file-manager sidecar's
      # platform-internal bypass header (used to read/write .platform/
      # hidden paths like sendmail-auth). The backend injects this
      # into each sidecar pod at creation time. Production deployments
      # should generate a fresh random value and store it in a
      # platform-level Kubernetes Secret instead of env.
      PLATFORM_INTERNAL_SECRET: ${PLATFORM_INTERNAL_SECRET:-local-dev-platform-internal-secret-please-rotate}
      DEFAULT_STORAGE_CLASS: ${DEFAULT_STORAGE_CLASS:-local-path}
      CLUSTER_ISSUER_NAME: ${CLUSTER_ISSUER_NAME:-local-ca-issuer}
      INGRESS_BASE_DOMAIN: ${INGRESS_BASE_DOMAIN:-ingress.localhost}
      INGRESS_DEFAULT_IPV4: ${INGRESS_DEFAULT_IPV4:-127.0.0.1}
      KUBECONFIG_PATH: /k8s/kubeconfig.yaml
      DISABLE_RATE_LIMIT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      k3s-server:
        condition: service_healthy
    volumes:
      - k3s-kubeconfig:/k8s:ro
    extra_hosts:
      - "dind.local:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/v1/admin/status"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  admin-panel:
    build:
      context: .
      dockerfile: frontend/admin-panel/Dockerfile
      args:
        VITE_API_URL: "http://${DOCKER_HOST_NAME:-dind.local}:${PORT_API:-2012}"
        VITE_CLIENT_PANEL_URL: "http://${DOCKER_HOST_NAME:-dind.local}:${PORT_CLIENT:-2011}"
    ports:
      - "${PORT_ADMIN:-2010}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  client-panel:
    build:
      context: .
      dockerfile: frontend/client-panel/Dockerfile
      args:
        VITE_API_URL: "http://${DOCKER_HOST_NAME:-dind.local}:${PORT_API:-2012}"
    ports:
      - "${PORT_CLIENT:-2011}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  dex:
    image: ghcr.io/dexidp/dex:v2.39.1
    ports:
      - "${PORT_DEX:-2015}:5556"
    volumes:
      - ./config/dex/config.yaml:/etc/dex/config.yaml:ro
      - dex-data:/var/dex
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ─── k3s — Local Kubernetes cluster for testing PVCs, Helm, manifests ──────
  k3s-server:
    image: rancher/k3s:v1.31.4-k3s1
    hostname: k8s-local  # Fixed so PV nodeAffinity stays stable across container restarts
    command:
      - server
      - --disable=traefik
      - --snapshotter=native
      - --write-kubeconfig=/output/kubeconfig.yaml
      - --write-kubeconfig-mode=644
      - --tls-san=${DOCKER_HOST_NAME:-dind.local}
      - --tls-san=k3s-server
      - --node-name=k8s-local
    ports:
      - "${PORT_K3S_API:-2016}:6443"
      # Roundcube webmail (Phase 2b) — host 2017 → NodePort 30017 → pod 80
      - "${PORT_WEBMAIL:-2017}:30017"
      # Stalwart mail server NodePorts (exposed via docker-compose so host can
      # reach them). k3s maps node ports 30025..30995 → Stalwart pod ports.
      # Phase 1 mail decision D11. See docs/06-features/MAIL_SERVER_IMPLEMENTATION_STATUS.md.
      - "${PORT_MAIL_SMTP:-2025}:30025"        # SMTP            (prod 25)
      - "${PORT_MAIL_SMTPS:-2465}:30465"       # SMTPS implicit  (prod 465)
      - "${PORT_MAIL_SUBMISSION:-2587}:30587"  # Submission      (prod 587)
      - "${PORT_MAIL_IMAP:-2143}:30143"        # IMAP STARTTLS   (prod 143)
      - "${PORT_MAIL_IMAPS:-2993}:30993"       # IMAPS implicit  (prod 993)
      - "${PORT_MAIL_POP3:-2110}:30110"        # POP3 STARTTLS   (prod 110)
      - "${PORT_MAIL_POP3S:-2995}:30995"       # POP3S implicit  (prod 995)
    environment:
      K3S_TOKEN: ${K3S_TOKEN:-local-dev-k3s-token}
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - k3s-kubeconfig:/output
      - k3s-storage:/var/lib/rancher/k3s/storage
    privileged: true
    tmpfs:
      - /run
      - /var/run
    healthcheck:
      test: ["CMD", "kubectl", "get", "nodes", "--no-headers"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Init job: wait for k3s ready, install NGINX ingress, verify storage
  k3s-init:
    image: rancher/k3s:v1.31.4-k3s1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for kubeconfig..."
        until [ -f /kubeconfig/kubeconfig.yaml ]; do sleep 1; done

        # Fix kubeconfig server URL so this container can reach k3s
        cp /kubeconfig/kubeconfig.yaml /tmp/kubeconfig.yaml
        sed -i "s|https://127.0.0.1:6443|https://k3s-server:6443|g" /tmp/kubeconfig.yaml
        export KUBECONFIG=/tmp/kubeconfig.yaml

        echo "Waiting for k3s API server..."
        until kubectl get nodes 2>/dev/null | grep -q " Ready"; do
          sleep 2
        done
        echo "k3s is ready!"

        # Also update the shared kubeconfig for backend access
        sed -i "s|https://127.0.0.1:6443|https://k3s-server:6443|g" /kubeconfig/kubeconfig.yaml 2>/dev/null || true

        # Verify local-path StorageClass (built into k3s)
        echo "Checking StorageClass..."
        kubectl get storageclass
        echo ""

        # Install NGINX Ingress Controller
        echo "Installing NGINX Ingress Controller..."
        kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.12.0/deploy/static/provider/cloud/deploy.yaml 2>/dev/null || echo "NGINX ingress already installed or network unavailable — skipping"

        # Install cert-manager
        echo "Installing cert-manager..."
        kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml 2>/dev/null || echo "cert-manager already installed or network unavailable — skipping"

        echo "Waiting for cert-manager webhook..."
        kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s 2>/dev/null || echo "cert-manager webhook not ready — continuing"

        # Create self-signed CA for local development
        echo "Creating local CA issuer..."
        kubectl apply -f - <<CAEOF
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: selfsigned-bootstrap
        spec:
          selfSigned: {}
        ---
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: local-ca
          namespace: cert-manager
        spec:
          isCA: true
          commonName: local-dev-ca
          secretName: local-ca-secret
          duration: 87600h
          issuerRef:
            name: selfsigned-bootstrap
            kind: ClusterIssuer
        ---
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: local-ca-issuer
        spec:
          ca:
            secretName: local-ca-secret
        CAEOF
        echo "cert-manager + local CA issuer ready"

        # Create hosting-platform namespace
        kubectl create namespace hosting-platform 2>/dev/null || true

        # Test PVC creation
        echo "Testing PVC provisioning..."
        kubectl apply -f - <<PVCEOF
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: test-pvc
          namespace: hosting-platform
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 64Mi
          storageClassName: local-path
        PVCEOF

        echo ""
        echo "════════════════════════════════════════════════"
        echo "  k3s cluster ready!"
        echo "  Nodes:          $(kubectl get nodes --no-headers | wc -l)"
        echo "  StorageClass:   $(kubectl get sc --no-headers | head -1 | awk '{print $1}')"
        echo "  Test PVC:       $(kubectl get pvc test-pvc -n hosting-platform --no-headers 2>/dev/null | awk '{print $2}')"
        echo "  cert-manager:   $(kubectl get deployment cert-manager -n cert-manager --no-headers 2>/dev/null | awk '{print $2}' || echo 'not installed')"
        echo "  CA Issuer:      $(kubectl get clusterissuer local-ca-issuer --no-headers 2>/dev/null | awk '{print $2}' || echo 'not ready')"
        echo "════════════════════════════════════════════════"
    volumes:
      - k3s-kubeconfig:/kubeconfig
    depends_on:
      k3s-server:
        condition: service_healthy

volumes:
  postgres-data:
  dex-data:
  k3s-data:
  k3s-kubeconfig:
  k3s-storage:
