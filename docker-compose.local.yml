# Local development stack — k3s only.
#
# All platform services (Postgres, Redis, Backend, Admin, Client, Dex,
# Stalwart, Roundcube, SFTP) run inside k3s as Kubernetes pods, using the
# same Kustomize manifests as staging/production.
#
# Two modes:
#   ./scripts/local.sh up   — Full integration: all pods in k3s
#   ./scripts/local.sh dev  — Fast dev: infra in k3s, apps on host with hot-reload
#
# Host port range: 2010-2030 (no standard ports in DinD).

services:
  k3s-server:
    image: rancher/k3s:v1.31.4-k3s1
    hostname: k8s-local
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    command:
      - server
      - --disable=traefik
      - --snapshotter=native
      - --write-kubeconfig=/output/kubeconfig.yaml
      - --write-kubeconfig-mode=644
      - --tls-san=${DOCKER_HOST_NAME:-dind.local}
      - --tls-san=k3s-server
      - --node-name=k8s-local
      - --kubelet-arg=max-pods=50
    ports:
      # ─── Ingress (Traefik v3) ──────────────────────────────────────
      # Same host ports as the legacy nginx-ingress (2010/2011) so
      # operator muscle memory + DNS records keep working. Traefik
      # binds via hostPort on the DaemonSet (NOT hostNetwork) and the
      # kube-proxy DNAT routes :80/:443 → traefik pod via the Service.
      - "${PORT_INGRESS_HTTP:-2010}:80"       # Traefik web entrypoint
      - "${PORT_INGRESS_HTTPS:-2011}:443"     # Traefik websecure entrypoint
      # ─── Platform services ─────────────────────────────────────────
      # Backend API is NOT exposed — admin/client panels reverse-proxy /api/*
      # internally to platform-api.platform.svc.cluster.local:3000.
      - "${PORT_DB:-2013}:30432"              # PostgreSQL (NodePort)
      - "${PORT_REDIS:-2014}:30379"           # Redis (NodePort)
      - "${PORT_DEX:-2015}:30556"             # Dex OIDC (NodePort)
      - "${PORT_K3S_API:-2016}:6443"          # k3s API
      - "${PORT_WEBMAIL:-2017}:30017"         # Roundcube webmail
      - "${PORT_OAUTH2_PROXY:-2018}:30180"    # OAuth2 Proxy (NodePort)
      - "${PORT_SFTP:-2019}:30222"            # SFTP Gateway
      # ─── Mail server (Stalwart) ────────────────────────────────────
      - "${PORT_MAIL_SMTP:-2020}:30025"       # SMTP
      - "${PORT_MAIL_SUBMISSION:-2021}:30587"  # Submission
      - "${PORT_MAIL_IMAP:-2022}:30143"       # IMAP
      - "${PORT_MAIL_IMAPS:-2023}:30993"      # IMAPS
      - "${PORT_MAIL_SMTPS:-2024}:30465"      # SMTPS
      - "${PORT_MAIL_POP3:-2025}:30110"       # POP3
      - "${PORT_MAIL_POP3S:-2026}:30995"      # POP3S
    environment:
      K3S_TOKEN: ${K3S_TOKEN:-local-dev-k3s-token}
    volumes:
      - k3s-data:/var/lib/rancher/k3s
      - k3s-kubeconfig:/output
      - k3s-storage:/var/lib/rancher/k3s/storage
    privileged: true
    tmpfs:
      - /run
      - /var/run
    healthcheck:
      test: ["CMD", "kubectl", "get", "nodes", "--no-headers"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Init job: install cert-manager + CNPG + namespaces. Traefik v3
  # is NOT installed by this Job — scripts/local.sh runs the helm
  # install on the workstation host (matching scripts/bootstrap.sh's
  # install_traefik) because the rancher/k3s image lacks the helm
  # binary and the plugin install needs the helm chart's full
  # value-set wiring (initContainer mounts, plugin args, etc).
  k3s-init:
    image: rancher/k3s:v1.31.4-k3s1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for kubeconfig..."
        until [ -f /kubeconfig/kubeconfig.yaml ]; do sleep 1; done

        cp /kubeconfig/kubeconfig.yaml /tmp/kubeconfig.yaml
        sed -i "s|https://127.0.0.1:6443|https://k3s-server:6443|g" /tmp/kubeconfig.yaml
        export KUBECONFIG=/tmp/kubeconfig.yaml

        echo "Waiting for k3s API server..."
        until kubectl get nodes 2>/dev/null | grep -q " Ready"; do
          sleep 2
        done
        echo "k3s is ready!"

        # Fix shared kubeconfig for external access
        sed -i "s|https://127.0.0.1:6443|https://k3s-server:6443|g" /kubeconfig/kubeconfig.yaml 2>/dev/null || true

        echo "Checking StorageClass..."
        kubectl get storageclass

        # Install cert-manager + CNPG in parallel — both are
        # independent downloads + pod rollouts. Running them
        # concurrently cuts the k3s infra phase from ~3min to ~90s on
        # a cold start.
        #
        # Traefik v3 is installed by scripts/local.sh AFTER this Job
        # completes — see _install_traefik_local in local.sh. It runs
        # the same helm command as scripts/bootstrap.sh install_traefik
        # so the local DinD stack matches production end-to-end
        # (Traefik DaemonSet + CrowdSec bouncer plugin + ModSecurity
        # plugin + secret volume mount for the bouncer key).
        #
        # CNPG (CloudNative-PG operator) is REQUIRED — k8s/base/
        # database.yaml declares a Cluster CR. Without the operator
        # the CR is accepted by the API but never reconciled; Postgres
        # pods/PVCs are never created and platform-api crashes on
        # every login because it can't reach the DB. Root cause of
        # the 2026-05-07 broken-DinD incident; the operator goes in
        # at infra time so the platform pods come up cleanly.
        echo "Installing cert-manager + CNPG operator (parallel)..."
        (
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.2/cert-manager.yaml 2>/dev/null \
            || echo "cert-manager already installed or network unavailable"
          kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s 2>/dev/null \
            || echo "cert-manager webhook not ready — continuing"
        ) &
        CERTMGR_PID=$$!
        (
          # CNPG 1.29 — matches bootstrap.sh's operator version (chart
          # 0.28.0 / app v1.29.0) so the Cluster CR schema accepts
          # `spec.probes` (added in 1.25). Older 1.24 install was
          # rejecting our database.yaml with `strict decoding error:
          # unknown field spec.probes`. Bump in lockstep with
          # scripts/bootstrap.sh CNPG_CHART_VERSION when upgrading
          # again, and bump the PG imageName in k8s/base/database.yaml
          # if the CNPG minor drops compatibility.
          kubectl apply --server-side -f \
            https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.29/releases/cnpg-1.29.1.yaml 2>/dev/null \
            || echo "CNPG operator already installed or network unavailable"
          kubectl rollout status deployment/cnpg-controller-manager -n cnpg-system --timeout=120s 2>/dev/null \
            || echo "CNPG operator not ready — continuing"
        ) &
        CNPG_PID=$$!
        wait "$$CERTMGR_PID" "$$CNPG_PID"

        # Create self-signed CA for local development
        echo "Creating local CA issuer..."
        kubectl apply -f - <<CAEOF
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: selfsigned-bootstrap
        spec:
          selfSigned: {}
        ---
        apiVersion: cert-manager.io/v1
        kind: Certificate
        metadata:
          name: local-ca
          namespace: cert-manager
        spec:
          isCA: true
          commonName: local-dev-ca
          secretName: local-ca-secret
          duration: 87600h
          issuerRef:
            name: selfsigned-bootstrap
            kind: ClusterIssuer
        ---
        apiVersion: cert-manager.io/v1
        kind: ClusterIssuer
        metadata:
          name: local-ca-issuer
        spec:
          ca:
            secretName: local-ca-secret
        CAEOF
        echo "cert-manager + local CA issuer ready"

        # Create namespaces
        kubectl create namespace hosting-platform 2>/dev/null || true
        kubectl create namespace platform 2>/dev/null || true
        kubectl create namespace mail 2>/dev/null || true

        echo ""
        echo "════════════════════════════════════════════════"
        echo "  k3s infrastructure ready!"
        echo "  Nodes:          $(kubectl get nodes --no-headers | wc -l)"
        echo "  StorageClass:   $(kubectl get sc --no-headers | head -1 | awk '{print $1}')"
        echo "  cert-manager:   $(kubectl get deployment cert-manager -n cert-manager --no-headers 2>/dev/null | awk '{print $2}' || echo 'not installed')"
        echo "  CA Issuer:      $(kubectl get clusterissuer local-ca-issuer --no-headers 2>/dev/null | awk '{print $2}' || echo 'not ready')"
        echo "════════════════════════════════════════════════"
    volumes:
      - k3s-kubeconfig:/kubeconfig
    depends_on:
      k3s-server:
        condition: service_healthy

volumes:
  k3s-data:
  k3s-kubeconfig:
  k3s-storage:
