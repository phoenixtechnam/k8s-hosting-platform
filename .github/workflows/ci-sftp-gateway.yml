name: SFTP Gateway CI

on:
  push:
    branches: [main]
    paths: ['images/sftp-gateway/**', '.github/workflows/ci-sftp-gateway.yml']
  pull_request:
    branches: [main]
    paths: ['images/sftp-gateway/**', '.github/workflows/ci-sftp-gateway.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/phoenixtechnam/hosting-platform/sftp-gateway

jobs:
  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable={{is_default_branch}}

      # Build to local cache for PR scanning; push only on main
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: images/sftp-gateway
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          # docker/metadata-action tags with type=sha,prefix= use the
          # short (7-char) sha by default, but github.sha is the full
          # 40-char sha — so the previous ${env.IMAGE}:${github.sha}
          # referenced a tag that was never pushed and every Trivy run
          # died with "manifest unknown". Use the first tag emitted by
          # metadata-action instead.
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
        if: github.event_name != 'pull_request'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif
          category: sftp-gateway
