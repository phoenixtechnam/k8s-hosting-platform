name: Firewall-Reconciler CI

on:
  push:
    branches: [main]
    paths:
      - 'images/firewall-reconciler/**'
      - '.github/workflows/ci-firewall-reconciler.yml'
  pull_request:
    branches: [main]
    paths:
      - 'images/firewall-reconciler/**'
      - '.github/workflows/ci-firewall-reconciler.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/phoenixtechnam/hosting-platform/firewall-reconciler

jobs:
  build:
    name: Build + Test + Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: images/firewall-reconciler/go.sum

      - name: go mod download
        working-directory: images/firewall-reconciler
        run: go mod download

      - name: go vet
        working-directory: images/firewall-reconciler
        run: go vet ./...

      - name: go test
        working-directory: images/firewall-reconciler
        run: go test -race -count=1 ./...

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v5
        with:
          context: images/firewall-reconciler
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
