name: Mail-Backup-Tools CI

on:
  push:
    branches: [main]
    paths: ['images/mail-backup-tools/**', '.github/workflows/ci-mail-backup-tools.yml']
  pull_request:
    branches: [main]
    paths: ['images/mail-backup-tools/**', '.github/workflows/ci-mail-backup-tools.yml']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/phoenixtechnam/hosting-platform/mail-backup-tools

jobs:
  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: images/mail-backup-tools
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # ignore-unfixed: true — upstream Debian CVEs without an
          # available fix (libgnutls/libexpat/libnghttp2 in trixie-slim
          # as of 2026-05) cannot be remediated at our layer. They
          # still land in the SARIF upload to GitHub Security so an
          # operator gets a per-image report; we only CI-gate on
          # actionable CVEs (where bumping a package version would
          # close them). Tracked as a follow-up: switch base to a
          # distroless variant when Phase 2 JMAP code lands.
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && github.event_name != 'pull_request'
        with:
          sarif_file: trivy-results.sarif
          category: mail-backup-tools
