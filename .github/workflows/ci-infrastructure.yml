name: Infrastructure CI

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'catalog-images/**'
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'catalog-images/**'

jobs:
  kustomize-build:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Building base..."
          kubectl kustomize k8s/base
          echo "Building dev overlay..."
          kubectl kustomize k8s/overlays/dev
          echo "Building staging overlay..."
          kubectl kustomize k8s/overlays/staging
          echo "Building production overlay..."
          kubectl kustomize k8s/overlays/production

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # shellcheck is pre-installed on ubuntu-latest runners. The
          # previous `sudo apt-get install -y` step intermittently failed
          # on repo mirror hash mismatches — skip it unless the tool is
          # genuinely missing (and update the lists first if it is).
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          shellcheck --version
          # --severity=warning skips info-level findings (SC2086 quoting
          # hints, SC2016 literal $ in single quotes, etc.) that we've
          # explicitly chosen as the intended pattern. Real bugs (SC1000-
          # range parse errors) still fail the job.
          shellcheck --severity=warning scripts/*.sh

  admin-auth-gate-check:
    name: Admin-auth gate guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          # mikefarah/yq v4 — exact syntax used in scripts/ci-admin-auth-check.sh.
          # Ubuntu's apt yq is Python-based and incompatible.
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Verify admin-only Ingresses have an auth gate
        run: ./scripts/ci-admin-auth-check.sh

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - nginx-php84
          - apache-php84
          - wordpress-php84
          - static-nginx
          - node22
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker build \
            --tag "hosting-catalog/${{ matrix.image }}:test" \
            "catalog-images/${{ matrix.image }}"
