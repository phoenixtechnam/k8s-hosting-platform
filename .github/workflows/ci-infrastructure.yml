name: Infrastructure CI

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'catalog-images/**'
  pull_request:
    branches: [main]
    paths:
      - 'k8s/**'
      - 'scripts/**'
      - 'catalog-images/**'

jobs:
  kustomize-build:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Building base..."
          kubectl kustomize k8s/base
          echo "Building dev overlay..."
          kubectl kustomize k8s/overlays/dev
          echo "Building staging overlay..."
          kubectl kustomize k8s/overlays/staging
          echo "Building production overlay..."
          kubectl kustomize k8s/overlays/production

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # shellcheck is pre-installed on ubuntu-latest runners. The
          # previous `sudo apt-get install -y` step intermittently failed
          # on repo mirror hash mismatches — skip it unless the tool is
          # genuinely missing (and update the lists first if it is).
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y shellcheck
          fi
          shellcheck --version
          # --severity=warning skips info-level findings (SC2086 quoting
          # hints, SC2016 literal $ in single quotes, etc.) that we've
          # explicitly chosen as the intended pattern. Real bugs (SC1000-
          # range parse errors) still fail the job.
          shellcheck --severity=warning scripts/*.sh

  admin-auth-gate-check:
    name: Admin-auth gate guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          # mikefarah/yq v4 — exact syntax used in scripts/ci-admin-auth-check.sh.
          # Ubuntu's apt yq is Python-based and incompatible.
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Verify admin-only Ingresses have an auth gate
        run: ./scripts/ci-admin-auth-check.sh

  firewall-check:
    name: Firewall-rule guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify bootstrap.sh firewall rules
        run: ./scripts/ci-firewall-check.sh

  no-dex-in-production:
    name: Dex must not ship in production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Verify production overlay does not deploy Dex
        run: ./scripts/ci-no-dex-in-production.sh

  no-pinned-domains:
    name: No hard-coded apex domains in K8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan k8s/ for pinned apex literals
        run: ./scripts/ci-no-pinned-domains.sh

  k8s-patch-check:
    name: K8s client patchNamespaced* Content-Type guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every patch call has an explicit middleware shim
        run: ./scripts/ci-k8s-patch-check.sh

  flux-envsubst-check:
    name: Flux postBuild envsubst safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no malformed ${...} sequences in rendered overlays
        # Catches the parse-error class that crashed the 2026-05-04
        # staging cutover apply (`${'`, `${ `, `${{` etc.) — Flux's
        # drone/envsubst aborts the kustomization with "unable to
        # parse variable name" and the cluster freezes mid-cutover.
        run: ./scripts/ci-flux-envsubst-check.sh

  system-affinity-check:
    name: System node-affinity guardrail
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yq
        run: |
          # Same binary as admin-auth-gate-check — kept as a separate step
          # so this job can fail independently when yq drifts.
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - name: Verify system workloads carry role=server nodeAffinity
        run: ./scripts/ci-system-affinity-check.sh

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - nginx-php84
          - apache-php84
          - wordpress-php84
          - static-nginx
          - node22
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker build \
            --tag "hosting-catalog/${{ matrix.image }}:test" \
            "catalog-images/${{ matrix.image }}"
