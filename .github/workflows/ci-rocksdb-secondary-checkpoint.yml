name: rocksdb-secondary-checkpoint CI

# Tiny Rust binary that opens a live Stalwart RocksDB primary as a SECONDARY
# instance (no LOCK conflict) and creates a hard-linked Checkpoint. Used as
# the initContainer in mail-archive Jobs to enable zero-downtime app-level
# archives via `stalwart -e` against the checkpoint dir.
#
# Mirrors ci-mail-backup-tools.yml exactly — same registry, same tagging
# scheme, same Trivy gate.

on:
  push:
    branches: [main]
    paths:
      - 'images/rocksdb-secondary-checkpoint/**'
      - '.github/workflows/ci-rocksdb-secondary-checkpoint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'images/rocksdb-secondary-checkpoint/**'
      - '.github/workflows/ci-rocksdb-secondary-checkpoint.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/phoenixtechnam/hosting-platform/rocksdb-secondary-checkpoint

jobs:
  build:
    name: Build + Scan + Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}},enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: images/rocksdb-secondary-checkpoint
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          # Don't fail the build on findings — same policy as mail-backup-tools.
          # The image is internal-only (initContainer in a privileged Job)
          # and the binary is a static rocksdb glue; surface area is tiny.
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
