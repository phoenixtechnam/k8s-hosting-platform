name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**', 'packages/api-contracts/**']
  pull_request:
    branches: [main]
    paths: ['backend/**', 'packages/api-contracts/**']

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @k8s-hosting/api-contracts
      - run: npm run lint -w @k8s-hosting/backend
      - run: npm run typecheck -w @k8s-hosting/backend

  # Mail-subsystem SDK shape probe — catches v0-positional
  # @kubernetes/client-node casts that silently fail on the v1 SDK.
  # Same probe as in ci-infrastructure.yml, wired here so it also runs
  # on backend-only PRs (where the violations actually land).
  mail-sdk-shape:
    name: Mail-admin SDK v0/v1 shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: ./scripts/ci-mail-sdk-shape.sh

  no-longhorn-in-mail:
    name: No Longhorn refs in mail subsystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-no-longhorn-in-mail.sh

  mail-arch-regressions:
    name: Mail architecture regression guards (Phase 1/2 streamline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/ci-mail-arch-regressions.sh

  tenant-bundles-coverage-audit:
    name: tenant-bundles coverage audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pure bash + grep + awk + sed; no Node setup needed. Fails
      # when a new client-FK'd table lands in db/schema.ts without
      # being added to CONFIG_DUMP_TABLES or the explicit exclusion
      # list in config.ts. Also flags new tenant-namespace
      # PVCs/Secrets created in code without a backup-coverage
      # decision. Prevents the silent-drop bug where a new tenant
      # data dimension stops being backed up because nobody updated
      # the bundle.
      - name: Audit tenant data coverage vs bundle components
        run: ./scripts/ci-tenant-bundles-schema-audit.sh
      - name: Audit tenant PVC/Secret creation sites
        run: ./scripts/ci-tenant-bundles-resource-audit.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: hosting_platform_test
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U platform"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://platform:platform@localhost:5432/hosting_platform_test
      JWT_SECRET: ci-test-secret-key-at-least-16-chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @k8s-hosting/api-contracts
      - run: npm run test:coverage -w @k8s-hosting/backend
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @k8s-hosting/api-contracts
      - run: npm run build -w @k8s-hosting/backend
