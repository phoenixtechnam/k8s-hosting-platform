name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**', 'packages/api-contracts/**']
  pull_request:
    branches: [main]
    paths: ['backend/**', 'packages/api-contracts/**']

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @k8s-hosting/api-contracts
      - run: npm run lint -w @k8s-hosting/backend
      - run: npm run typecheck -w @k8s-hosting/backend

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: rootpassword
          MARIADB_DATABASE: hosting_platform_test
          MARIADB_USER: platform
          MARIADB_PASSWORD: platform
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: mysql://platform:platform@localhost:3306/hosting_platform_test
      JWT_SECRET: ci-test-secret-key-at-least-16-chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @k8s-hosting/api-contracts
      - run: npm run test:coverage -w @k8s-hosting/backend
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @k8s-hosting/api-contracts
      - run: npm run build -w @k8s-hosting/backend
