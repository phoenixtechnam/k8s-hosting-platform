name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/phoenixtechnam/hosting-platform

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-admin-panel:
    name: Build Admin Panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/admin-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/admin-panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-client-panel:
    name: Build Client Panel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/client-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/client-panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-dev:
    name: Update Dev Tags
    runs-on: ubuntu-latest
    needs: [build-backend, build-admin-panel, build-client-panel]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update dev image tags
        run: |
          SHA="${GITHUB_SHA::7}"
          cat > k8s/overlays/dev/kustomization.yaml << EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          resources:
            - ../../base

          images:
            - name: ghcr.io/phoenixtechnam/hosting-platform/backend
              newTag: "${SHA}"
            - name: ghcr.io/phoenixtechnam/hosting-platform/admin-panel
              newTag: "${SHA}"
            - name: ghcr.io/phoenixtechnam/hosting-platform/client-panel
              newTag: "${SHA}"

          patches:
            - target:
                kind: ResourceQuota
                name: hosting-quota
                namespace: hosting
              patch: |
                - op: replace
                  path: /spec/hard/requests.cpu
                  value: "4"
                - op: replace
                  path: /spec/hard/requests.memory
                  value: 8Gi
                - op: replace
                  path: /spec/hard/limits.cpu
                  value: "8"
                - op: replace
                  path: /spec/hard/limits.memory
                  value: 16Gi
                - op: replace
                  path: /spec/hard/pods
                  value: "50"
          EOF

      - name: Commit dev tag update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet || git commit -m "ci: update dev image tags to ${GITHUB_SHA::7}"
          git push
