name: Build Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/admin-panel/**'
      - 'frontend/client-panel/**'
      - 'packages/api-contracts/**'
      - '.github/workflows/build-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/phoenixtechnam/hosting-platform

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin_panel: ${{ steps.filter.outputs.admin_panel }}
      client_panel: ${{ steps.filter.outputs.client_panel }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/api-contracts/**'
            admin_panel:
              - 'frontend/admin-panel/**'
              - 'packages/api-contracts/**'
            client_panel:
              - 'frontend/client-panel/**'
              - 'packages/api-contracts/**'

  build-backend:
    name: Build Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-admin-panel:
    name: Build Admin Panel
    needs: changes
    if: needs.changes.outputs.admin_panel == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/admin-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/admin-panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-client-panel:
    name: Build Client Panel
    needs: changes
    if: needs.changes.outputs.client_panel == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/client-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/client-panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Tag strategy:
  # - SHA:          for traceability (e.g., a1b2c3d)
  # - latest:       consumed by dev environment
  # - timestamp-SHA: consumed by staging Flux Image Automation
  #                  (matches image-policies.yaml regex pattern)
  #
  # Production uses pinned semver tags from release.yml — never :latest.
  #
  # Per-job path filters via dorny/paths-filter mean a frontend-only change
  # no longer rebuilds the backend image (and vice versa). api-contracts
  # changes still trigger all three since they're a shared dependency.
