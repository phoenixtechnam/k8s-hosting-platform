name: Build Images

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/admin-panel/**'
      - 'frontend/client-panel/**'
      - 'packages/api-contracts/**'
      - 'images/firewall-reconciler/**'
      - '.github/workflows/build-deploy.yml'
      # Infra-only commits also need to reach staging via Flux. Without
      # these paths, k8s/** changes (LimitRanges, manifests) and scripts/**
      # changes never hit the update-staging-version job, so origin/staging
      # never fast-forwards and Flux can't see them. Build-* jobs gate on
      # their own dorny/paths-filter so this is cheap when no images need
      # building — only update-staging-version actually runs to advance
      # staging.
      - 'k8s/**'
      - 'scripts/**'
      # Exclude the files that update-staging-version itself rewrites.
      # Without these `!` patterns the auto-pin commit (which only
      # touches these three files) would re-trigger build-deploy →
      # rebuild → new auto-pin → infinite loop. Previously prevented by
      # `[skip ci]` in the auto-pin commit message, but that also skipped
      # sync-staging, leaving the pin stranded on main. With these path
      # exclusions, the auto-pin commit no longer fires build-deploy and
      # we can drop `[skip ci]`, so sync-staging propagates the pin.
      - '!k8s/overlays/staging/kustomization.yaml'
      - '!k8s/overlays/staging/platform-version-patch.yaml'
      - '!k8s/overlays/staging/deploy-rev-patch.yaml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/phoenixtechnam/hosting-platform

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin_panel: ${{ steps.filter.outputs.admin_panel }}
      client_panel: ${{ steps.filter.outputs.client_panel }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'packages/api-contracts/**'
            admin_panel:
              - 'frontend/admin-panel/**'
              - 'packages/api-contracts/**'
            client_panel:
              - 'frontend/client-panel/**'
              - 'packages/api-contracts/**'

  build-backend:
    name: Build Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - id: tag
        name: Extract timestamp tag (for kustomization.yaml pin)
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # Pick the YYYYMMDDHHmmss-SHA tag (skip "latest" + bare-sha).
          # Pattern: ${IMG}:<14 digits>-<7+ hex chars>
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          if [[ -z "$ts_tag" ]]; then
            echo "::error::could not extract timestamp tag from: $ALL_TAGS"; exit 1
          fi
          echo "timestamp_tag=${ts_tag}" >> "$GITHUB_OUTPUT"
          echo "backend timestamp tag → ${ts_tag}"

  build-admin-panel:
    name: Build Admin Panel
    needs: changes
    if: needs.changes.outputs.admin_panel == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/admin-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/admin-panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - id: tag
        name: Extract timestamp tag
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [[ -z "$ts_tag" ]] && { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=${ts_tag}" >> "$GITHUB_OUTPUT"
          echo "admin-panel timestamp tag → ${ts_tag}"

  build-client-panel:
    name: Build Client Panel
    needs: changes
    if: needs.changes.outputs.client_panel == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      timestamp_tag: ${{ steps.tag.outputs.timestamp_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/client-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDDHHmmss'}}-{{sha}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/client-panel/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - id: tag
        name: Extract timestamp tag
        env:
          ALL_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          ts_tag=$(echo "$ALL_TAGS" | grep -oE ':[0-9]{14}-[0-9a-f]{7,}' | head -1 | sed 's/^://')
          [[ -z "$ts_tag" ]] && { echo "::error::no timestamp tag in $ALL_TAGS"; exit 1; }
          echo "timestamp_tag=${ts_tag}" >> "$GITHUB_OUTPUT"
          echo "client-panel timestamp tag → ${ts_tag}"

  # Tag strategy:
  # - SHA:          for traceability (e.g., a1b2c3d)
  # - latest:       consumed by dev environment
  # - timestamp-SHA: consumed by staging Flux Image Automation
  #                  (matches image-policies.yaml regex pattern)
  #
  # Production uses pinned semver tags from release.yml — never :latest.
  #
  # Per-job path filters via dorny/paths-filter mean a frontend-only change
  # no longer rebuilds the backend image (and vice versa). api-contracts
  # changes still trigger all three since they're a shared dependency.

  # ─────────────────────────────────────────────────────────────────────
  # Commit the resolved short-SHA into platform-version-patch.yaml on
  # the staging overlay, so the backend's /api/v1/admin/platform/version
  # endpoint returns the real running version instead of "unknown".
  #
  # Runs after images are pushed, only on main. Loop prevention is now
  # the responsibility of the negative-path filter on the workflow's
  # `on.push.paths` (the auto-pin commit only modifies the three
  # staging-overlay files, which are excluded). `[skip ci]` was removed
  # from the commit message so sync-staging propagates the pin onto
  # the staging branch — otherwise Flux keeps reconciling the previous
  # image tag.
  update-staging-version:
    name: Update staging platform-version
    runs-on: ubuntu-latest
    needs: [build-backend, build-admin-panel, build-client-panel]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip version]')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: version
        run: |
          # Use short-sha of the commit that triggered this build.
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          # Pull the latest semver tag reachable from HEAD. When no tag
          # exists yet (brand-new repo) git describe returns empty — the
          # `|| echo` fallback doesn't fire on empty stdout, only on
          # non-zero exit. Default via parameter expansion instead.
          LAST_TAG=$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null | sed 's/^v//')
          : "${LAST_TAG:=0.0.0}"
          VERSION="${LAST_TAG}-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Staging version → ${VERSION}"

      - name: Write platform-version overlay patch
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ github.ref_name }}
        run: |
          mkdir -p k8s/overlays/staging
          cat > k8s/overlays/staging/platform-version-patch.yaml <<PATCH
          # Auto-generated by .github/workflows/build-deploy.yml on each
          # main-branch push. Do not edit by hand — edits will be overwritten.
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: platform-version
            namespace: platform
          data:
            version: "${VERSION}"
            branch: "${BRANCH}"
          PATCH
          # Ensure the patch is referenced from kustomization.yaml
          if ! grep -q "platform-version-patch.yaml" k8s/overlays/staging/kustomization.yaml; then
            sed -i '/^patches:/a\  - path: platform-version-patch.yaml' k8s/overlays/staging/kustomization.yaml
          fi

      - name: Write deploy-rev rollout patch
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # The platform-version ConfigMap change above doesn't by itself
          # restart the platform-api pod — configMapKeyRef env vars are
          # resolved at pod creation, not live. And since `:latest` images
          # are immutable name-wise, Flux won't roll the Deployment either.
          #
          # Stamp a deploy-rev annotation on each relevant Deployment's pod
          # template. Changing an annotation in spec.template triggers a
          # new ReplicaSet, which creates a fresh pod that picks up the
          # current ConfigMap value AND pulls the latest image
          # (imagePullPolicy: Always on :latest-tagged containers).
          cat > k8s/overlays/staging/deploy-rev-patch.yaml <<PATCH
          # Auto-generated by .github/workflows/build-deploy.yml on each
          # main-branch push — the annotation changes with every VERSION
          # so Flux rolls the pod, which picks up the latest :latest
          # image and the current platform-version ConfigMap value.
          # Do not edit by hand — edits will be overwritten.
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: platform-api
            namespace: platform
          spec:
            template:
              metadata:
                annotations:
                  platform.phoenix-host.net/deploy-rev: "${VERSION}"
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: admin-panel
            namespace: platform
          spec:
            template:
              metadata:
                annotations:
                  platform.phoenix-host.net/deploy-rev: "${VERSION}"
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: client-panel
            namespace: platform
          spec:
            template:
              metadata:
                annotations:
                  platform.phoenix-host.net/deploy-rev: "${VERSION}"
          ---
          # firewall-reconciler — :latest-tagged DaemonSet that needs
          # rolling on every push so the new image SHA is picked up
          # (imagePullPolicy: Always on the container).
          apiVersion: apps/v1
          kind: DaemonSet
          metadata:
            name: firewall-reconciler
            namespace: platform-system
          spec:
            template:
              metadata:
                annotations:
                  platform.phoenix-host.net/deploy-rev: "${VERSION}"
          PATCH
          if ! grep -q "deploy-rev-patch.yaml" k8s/overlays/staging/kustomization.yaml; then
            sed -i '/^  - path: platform-version-patch.yaml/a\  - path: deploy-rev-patch.yaml' k8s/overlays/staging/kustomization.yaml
          fi

      - name: Pin image tags in kustomization.yaml
        env:
          BACKEND_TAG: ${{ needs.build-backend.outputs.timestamp_tag }}
          ADMIN_TAG: ${{ needs.build-admin-panel.outputs.timestamp_tag }}
          CLIENT_TAG: ${{ needs.build-client-panel.outputs.timestamp_tag }}
        run: |
          # Replaces the work that Flux's image-automation-controller
          # used to do via a long-lived PAT. The IUA approach failed
          # silently for 4+ days when the PAT expired, leaving staging
          # pinned to stale image SHAs. Doing the rewrite from this
          # workflow uses the ephemeral GITHUB_TOKEN that already has
          # repo write permission for the bot identity — no PAT to
          # rotate, no separate controller to monitor.
          KUST=k8s/overlays/staging/kustomization.yaml
          # sed N;s/.../.../ pairs the matched `name: ...` line with the
          # next `newTag: "..."` line, then rewrites the tag in the
          # paired buffer. Anchoring `name` line with a $-end marker
          # avoids matching within a "newTag" comment.
          pin() {
            local image=$1 tag=$2
            [[ -z "$tag" ]] && { echo "skip $image (no tag — build was skipped)"; return; }
            sed -i -e "/name: ghcr\.io.*\/${image}\$/{N;s/newTag: \"[^\"]*\"/newTag: \"${tag}\"/}" "$KUST"
            echo "pinned ${image} → ${tag}"
          }
          pin backend       "$BACKEND_TAG"
          pin admin-panel   "$ADMIN_TAG"
          pin client-panel  "$CLIENT_TAG"
          echo "---kustomization newTag lines after pin---"
          grep -B1 newTag "$KUST" | grep -E "name: ghcr|newTag"

      - name: Commit + push
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet k8s/overlays/staging/; then
            echo "No change — skipping commit."
            exit 0
          fi
          git add \
            k8s/overlays/staging/platform-version-patch.yaml \
            k8s/overlays/staging/deploy-rev-patch.yaml \
            k8s/overlays/staging/kustomization.yaml
          # No [skip ci] — loop prevention is on the workflow's path
          # filter (the auto-pin commit only touches the three excluded
          # files). Dropping [skip ci] lets sync-staging fire and
          # propagate the pin to the staging branch.
          git commit -m "chore(staging): pin platform-version to ${VERSION}"

          # Retry with rebase on non-fast-forward. Two PRs merged within
          # the same ~2 min window race against this push: whichever
          # build-deploy run finishes second sees main has moved and gets
          # `[rejected] non-fast-forward`. The auto-pin commit only
          # touches the three negative-path-filtered files, so rebasing
          # onto fresh origin/main cannot conflict with code commits.
          # An actual conflict would mean someone hand-edited one of
          # the three auto-managed files in the same window — that
          # warrants a human, so we abort and fail loudly rather than
          # masking it.
          #
          # Without this retry, a missed pin permanently strands the
          # image: subsequent commits run dorny/paths-filter against
          # their OWN parent, not "last successful pin", so an unrelated
          # path-touching commit can leave the unpinned image invisible
          # to all future builds until a manual workflow_dispatch
          # rebuilds it. See project_sync_staging_skip_ci_gap.md for
          # the 2026-05-11 incident this fixes.
          set +e
          for attempt in 1 2 3; do
            git push origin HEAD:main
            push_rc=$?
            if [[ $push_rc -eq 0 ]]; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt rejected (rc=$push_rc) — rebasing onto fresh origin/main"
            git fetch origin main
            git rebase origin/main
            rebase_rc=$?
            if [[ $rebase_rc -ne 0 ]]; then
              echo "::error::rebase failed (rc=$rebase_rc) — auto-pin file conflicts with a concurrent commit. Manual resolution required."
              git rebase --abort || true
              exit 1
            fi
          done
          echo "::error::push failed after 3 attempts with rebase — main is moving faster than we can land the auto-pin. Check for a build-deploy loop or a runaway pusher."
          exit 1
          # main → staging propagation is owned by sync-staging.yml.
          # That workflow does a real merge (not fast-forward) and fails
          # loudly on conflict, so we don't silently drop infra-only
          # commits anymore. The previous `git push origin HEAD:staging
          # || true` here masked divergence — see project_cluster_resource_audit_2026_05_09.
