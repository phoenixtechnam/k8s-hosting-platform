name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'k8s/**'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/hosting-platform

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'backend/') || contains(github.event.head_commit.added, 'backend/')
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-admin-panel:
    name: Build Admin Panel
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/admin-panel/') || contains(github.event.head_commit.added, 'frontend/admin-panel/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/admin-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: frontend/admin-panel
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-client-panel:
    name: Build Client Panel
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'frontend/client-panel/') || contains(github.event.head_commit.added, 'frontend/client-panel/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/client-panel
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: frontend/client-panel
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-staging:
    name: Update Staging Manifests
    runs-on: ubuntu-latest
    needs: [build-backend, build-admin-panel, build-client-panel]
    if: always() && !cancelled() && (needs.build-backend.result == 'success' || needs.build-admin-panel.result == 'success' || needs.build-client-panel.result == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in staging overlay
        run: |
          cd k8s/overlays/staging
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          # Update image tags using kustomize
          if [ "${{ needs.build-backend.result }}" = "success" ]; then
            kustomize edit set image ghcr.io/hosting-platform/backend=${{ env.IMAGE_PREFIX }}/backend:${SHORT_SHA}
          fi
          if [ "${{ needs.build-admin-panel.result }}" = "success" ]; then
            kustomize edit set image ghcr.io/hosting-platform/admin-panel=${{ env.IMAGE_PREFIX }}/admin-panel:${SHORT_SHA}
          fi
          if [ "${{ needs.build-client-panel.result }}" = "success" ]; then
            kustomize edit set image ghcr.io/hosting-platform/client-panel=${{ env.IMAGE_PREFIX }}/client-panel:${SHORT_SHA}
          fi

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/staging/
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: update staging image tags to ${GITHUB_SHA:0:7}"
            git push
          fi
